        // ==================== CENSUS VIEW COMPONENT ====================
        function CensusManagement() {
            const [patients, setPatients] = React.useState([]);
            const [activeTab, setActiveTab] = React.useState('Active');
            const [sortBy, setSortBy] = React.useState('room');
            const [showTemplateModal, setShowTemplateModal] = React.useState(false);
            const [labs, setLabs] = React.useState([]);
            const dictation = useDictation();
            const [pendingAction, setPendingAction] = React.useState(null);

            React.useEffect(() => {
                DB.init().then(() => {
                    loadPatients();
                    loadLabs();
                });
            }, []);

            const loadPatients = async () => {
                const allPatients = await DB.getAll('patients');
                const sorted = allPatients.sort((a, b) => {
                    if (sortBy === 'room') return parseInt(a.room) - parseInt(b.room);
                    if (sortBy === 'acuity') return (b.status === 'critical' ? 1 : b.status === 'guarded' ? 2 : 3) - (a.status === 'critical' ? 1 : a.status === 'guarded' ? 2 : 3);
                    if (sortBy === 'pod') return calculatePOD(b.admitDate) - calculatePOD(a.admitDate);
                    return 0;
                });
                setPatients(sorted);
            };

            const loadLabs = async () => {
                const allLabs = await DB.getAll('labs');
                setLabs(allLabs);
            };

            const getLatestLab = (patientId, labType) => {
                return labs.filter(l => l.patientId === patientId && l.testName === labType)
                    .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))[0];
            };

            const handleDischarge = async (patientId) => {
                if (confirm('Discharge this patient?')) {
                    const patient = patients.find(p => p.id === patientId);
                    await DB.put('patients', { ...patient, status: 'discharged', dischargeDate: new Date().toISOString() });
                    loadPatients();
                }
            };

            const handleTransfer = async (patientId) => {
                const newRoom = prompt('Enter new room number:');
                if (newRoom) {
                    const patient = patients.find(p => p.id === patientId);
                    await DB.put('patients', { ...patient, room: newRoom });
                    loadPatients();
                }
            };

            const handleStatusChange = async (patientId, newStatus) => {
                const patient = patients.find(p => p.id === patientId);
                await DB.put('patients', { ...patient, status: newStatus });
                loadPatients();
            };

            const handleAddFromTemplate = async (templateName) => {
                const template = ERAS_TEMPLATES[templateName];
                const patientData = {
                    name: 'New Patient',
                    room: '0',
                    age: 0,
                    gender: 'M',
                    admitDate: new Date().toISOString(),
                    diagnosis: templateName,
                    procedure: template.procedures[0] || '',
                    problems: template.problems,
                    treatmentPlan: template.treatmentPlan,
                    diet: template.diet,
                    activity: template.activity,
                    dvtProphylaxis: template.dvtProphylaxis,
                    giProphylaxis: template.giProphylaxis,
                    status: 'stable',
                    codeStatus: 'FULL',
                    concerns: false
                };
                await DB.add('patients', patientData);
                setShowTemplateModal(false);
                loadPatients();
            };

            const activePatients = patients.filter(p => p.status !== 'discharged');
            const dischargedToday = patients.filter(p => p.status === 'discharged' && p.dischargeDate &&
                formatDate(p.dischargeDate) === getTodayDateString());

            const statusColor = (status) => {
                switch(status) {
                    case 'stable': return 'bg-emerald-900 text-emerald-600';
                    case 'guarded': return 'bg-amber-900 text-amber-600';
                    case 'critical': return 'bg-red-900 text-red-600';
                    default: return 'bg-gray-50 text-gray-600';
                }
            };

            const handleParseCensusDictation = (transcript) => {
                const parsed = parseCensusSpeech(transcript);
                if (parsed.room) {
                    const patient = patients.find(p => p.room === parsed.room);
                    if (patient) {
                        if (parsed.action === 'discharge') {
                            setPendingAction({ type: 'discharge', patientId: patient.id, patientRoom: patient.room });
                        } else if (parsed.action === 'transfer' && parsed.newRoom) {
                            setPendingAction({ type: 'transfer', patientId: patient.id, fromRoom: patient.room, toRoom: parsed.newRoom });
                        } else if (parsed.status) {
                            handleStatusChange(patient.id, parsed.status);
                        }
                        dictation.clear();
                    }
                }
            };

            const confirmAndExecuteAction = async () => {
                if (!pendingAction) return;
                if (pendingAction.type === 'discharge') {
                    const patient = patients.find(p => p.id === pendingAction.patientId);
                    if (patient) {
                        await DB.put('patients', { ...patient, status: 'discharged', dischargeDate: new Date().toISOString() });
                        await loadPatients();
                    }
                } else if (pendingAction.type === 'transfer') {
                    const patient = patients.find(p => p.id === pendingAction.patientId);
                    if (patient) {
                        await DB.put('patients', { ...patient, room: pendingAction.toRoom });
                        await loadPatients();
                    }
                }
                setPendingAction(null);
            };

            return (
                <div className="p-4 md:p-6 max-w-7xl mx-auto">
                    {pendingAction && (
                        <div className="mb-4 bg-amber-900 border border-amber-700 rounded-lg p-4">
                            <p className="text-amber-100 font-medium mb-2">
                                {pendingAction.type === 'discharge'
                                    ? `Discharge Room ${pendingAction.patientRoom}?`
                                    : `Transfer Room ${pendingAction.fromRoom} to Room ${pendingAction.toRoom}?`}
                            </p>
                            <div className="flex gap-2">
                                <button onClick={confirmAndExecuteAction} className="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded text-sm font-medium">
                                    Confirm
                                </button>
                                <button onClick={() => setPendingAction(null)} className="px-3 py-1.5 bg-gray-100 hover:bg-gray-50 text-white rounded text-sm font-medium">
                                    Cancel
                                </button>
                            </div>
                        </div>
                    )}

                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                        <div>
                            <h2 className="text-2xl font-bold text-medical-600 mb-2">
                                {activeTab === 'Active' ? `Active Patients: ${activePatients.length}` : `Discharged Today: ${dischargedToday.length}`}
                            </h2>
                        </div>
                        <div className="flex flex-wrap gap-2">
                            {activeTab === 'Active' && (
                                <>
                                    <select value={sortBy} onChange={(e) => { setSortBy(e.target.value); loadPatients(); }}
                                        className="px-3 py-2 bg-gray-50 border border-gray-300 rounded text-gray-600 text-sm">
                                        <option value="room">Sort by Room</option>
                                        <option value="acuity">Sort by Acuity</option>
                                        <option value="pod">Sort by POD</option>
                                    </select>
                                    <button onClick={() => setShowTemplateModal(true)}
                                        className="px-3 py-2 bg-medical-600 hover:bg-medical-700 text-white rounded text-sm font-medium">
                                        Add from Template
                                    </button>
                                </>
                            )}
                        </div>
                    </div>

                    <DictationBar dictation={dictation} onParse={handleParseCensusDictation} parseLabel="Execute Command" />

                    {/* Tabs */}
                    <div className="flex gap-2 mb-4 border-b border-gray-200">
                        <button onClick={() => setActiveTab('Active')}
                            className={`px-4 py-2 font-medium transition ${activeTab === 'Active' ? 'text-medical-600 border-b-2 border-medical-500' : 'text-gray-500 hover:text-gray-600'}`}>
                            Active
                        </button>
                        <button onClick={() => setActiveTab('Discharged')}
                            className={`px-4 py-2 font-medium transition ${activeTab === 'Discharged' ? 'text-medical-600 border-b-2 border-medical-500' : 'text-gray-500 hover:text-gray-600'}`}>
                            Discharged Today
                        </button>
                    </div>

                    {/* Active Tab */}
                    {activeTab === 'Active' && (
                        <div className="space-y-3">
                            {activePatients.map(patient => (
                                <div key={patient.id} className="bg-white border border-gray-200 rounded p-4">
                                    <div className="grid grid-cols-2 md:grid-cols-7 gap-3 mb-3">
                                        <div>
                                            <p className="text-xs text-gray-400">Room</p>
                                            <p className="font-bold text-medical-600">{patient.room}</p>
                                        </div>
                                        <div>
                                            <p className="text-xs text-gray-400">Diagnosis</p>
                                            <p className="text-sm text-gray-600">{patient.diagnosis || 'N/A'}</p>
                                        </div>
                                        <div>
                                            <p className="text-xs text-gray-400">POD</p>
                                            <p className="text-sm font-bold text-amber-600">{calculatePOD(patient.admitDate)}</p>
                                        </div>
                                        <div>
                                            <p className="text-xs text-gray-400">Status</p>
                                            <div className="flex gap-1 flex-wrap">
                                                {['stable', 'guarded', 'critical'].map(s => (
                                                    <button key={s} onClick={() => handleStatusChange(patient.id, s)}
                                                        className={`text-xs px-2 py-1 rounded font-medium cursor-pointer transition ${patient.status === s ? statusColor(s) : 'bg-gray-50 text-gray-500 hover:bg-gray-100'}`}>
                                                        {s.charAt(0).toUpperCase() + s.slice(1)}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        <div>
                                            <p className="text-xs text-gray-400">Red Flags</p>
                                            <p className="text-sm">{patient.concerns ? <span className="text-red-600">⚠️ Yes</span> : <span className="text-emerald-600">✓ No</span>}</p>
                                        </div>
                                        <div>
                                            <p className="text-xs text-gray-400">Diet</p>
                                            <p className="text-sm text-gray-600">{patient.diet || 'N/A'}</p>
                                        </div>
                                        <div>
                                            <p className="text-xs text-gray-400">Activity</p>
                                            <p className="text-sm text-gray-600">{patient.activity || 'N/A'}</p>

                                    </div>
                                    <div className="flex flex-wrap gap-2">
                                        <button onClick={() => handleDischarge(patient.id)}

                                            Discharge
                                        </button>
                                        <button onClick={() => handleTransfer(patient.id)}

                                            Transfer
                                        </button>

                        </div>
                    )}

                    {/* Discharged Tab */}
                    {activeTab === 'Discharged' && (
                        <div className="space-y-3">
                            {dischargedToday.length === 0 ? (
                                <p className="text-gray-500 py-8 text-center">No patients discharged today</p>
                            ) : (

                                    <div key={patient.id} className="bg-white border border-gray-200 rounded p-4">
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                            <div>
                                                <p className="text-xs text-gray-400">Patient</p>
                                                <p className="font-semibold text-gray-600">{patient.name}</p>
                                            </div>
                                            <div>
                                                <p className="text-xs text-gray-400">Room</p>
                                                <p className="text-sm text-medical-600">{patient.room}</p>
                                            </div>
                                            <div>
                                                <p className="text-xs text-gray-400">Discharged</p>
                                                <p className="text-sm text-gray-600">{formatTime(patient.dischargeDate)}</p>
                                            </div>
                                            <div>
                                                <p className="text-xs text-gray-400">POD</p>
                                                <p className="text-sm text-amber-600">{calculatePOD(patient.admitDate)}</p>

                        </div>

                    {/* Template Modal */}
                    {showTemplateModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">

        // ==================== SHIFT HANDOFF COMPONENT ====================
        function Handoff() {
            const [patients, setPatients] = React.useState([]);
            const [handoffPlans, setHandoffPlans] = React.useState({});
            const [ifsThens, setIfsThens] = React.useState({});
            const [contactInfo, setContactInfo] = React.useState({});
            const [activePatientId, setActivePatientId] = React.useState(null);
            const dictation = useDictation();
            const patientDictations = {};

            React.useEffect(() => {
                DB.init().then(() => loadPatients());
            }, []);

            const loadPatients = async () => {
                const allPatients = await DB.getAll('patients');
                const active = allPatients.filter(p => p.status !== 'discharged').sort((a, b) => parseInt(a.room) - parseInt(b.room));
                setPatients(active);

                const plans = {};
                const ifs = {};
                const contact = {};
                active.forEach(p => {
                    plans[p.id] = p.treatmentPlan || '';
                    ifs[p.id] = '';
                    contact[p.id] = p.phone || '';
                });
                setHandoffPlans(plans);
                setIfsThens(ifs);
                setContactInfo(contact);
            };

            const handleAutoGenerate = async () => {
                const plans = { ...handoffPlans };
                patients.forEach(p => {
                    plans[p.id] = `Continue current management. ${p.treatmentPlan || 'Monitor status.'} Notify team of any deterioration.`;
                });
                setHandoffPlans(plans);
            };

            const handleParseHandoffDictation = (transcript) => {
                const parsed = parseHandoffSpeech(transcript);
                if (activePatientId) {
                    if (parsed.overnightPlan) {
                        setHandoffPlans({...handoffPlans, [activePatientId]: parsed.overnightPlan});
                    }
                    if (parsed.ifThen) {
                        setIfsThens({...ifsThens, [activePatientId]: parsed.ifThen});
                    }
                    if (parsed.contact) {
                        setContactInfo({...contactInfo, [activePatientId]: parsed.contact});
                    }
                    dictation.clear();
                }
            };

            const handleExportPDF = async () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const timestamp = getCurrentDateTime();

                doc.setFontSize(14);
                doc.text('Shift Handoff Report', 10, 10);
                doc.setFontSize(10);
                doc.text(`Generated: ${timestamp}`, 10, 18);

                let yPosition = 25;
                const pageHeight = doc.internal.pageSize.height;
                const margin = 10;
                const contentWidth = doc.internal.pageSize.width - 2 * margin;

                patients.forEach((patient, idx) => {
                    if (yPosition > pageHeight - 40) {
                        doc.addPage();
                        yPosition = 10;
                    }

                    doc.setFontSize(11);
                    doc.setTextColor(100, 150, 220);
                    doc.text(`Room ${patient.room} | ${patient.diagnosis || 'N/A'} | POD ${calculatePOD(patient.admitDate)} | ${patient.codeStatus || 'FULL'}`, margin, yPosition);
                    yPosition += 6;

                    doc.setFontSize(9);
                    doc.setTextColor(100, 100, 100);

                    doc.text('Summary:', margin, yPosition);
                    yPosition += 4;
                    const summaryLines = doc.splitTextToSize(handoffPlans[patient.id] || patient.treatmentPlan || '', contentWidth - 5);
                    summaryLines.forEach(line => {
                        doc.text(line, margin + 2, yPosition);
                        yPosition += 3;
                    });

                    doc.text('Active Issues:', margin, yPosition);
                    yPosition += 4;
                    const issues = patient.problems ? patient.problems.slice(0, 3) : [];
                    if (issues.length === 0) {
                        doc.text('None reported', margin + 2, yPosition);
                        yPosition += 3;
                    } else {
                        issues.forEach(issue => {
                            doc.text(`• ${issue}`, margin + 2, yPosition);
                            yPosition += 3;
                        });
                    }

                    doc.text('Overnight Plan:', margin, yPosition);
                    yPosition += 4;
                    const planLines = doc.splitTextToSize(handoffPlans[patient.id] || 'Monitor status', contentWidth - 5);
                    planLines.forEach(line => {
                        doc.text(line, margin + 2, yPosition);
                        yPosition += 3;
                    });

                    if (ifsThens[patient.id]) {
                        doc.text('If/Then:', margin, yPosition);
                        yPosition += 4;
                        const ifLines = doc.splitTextToSize(ifsThens[patient.id], contentWidth - 5);
                        ifLines.forEach(line => {
                            doc.text(line, margin + 2, yPosition);
                            yPosition += 3;
                        });
                    }

                    yPosition += 4;
                });

                doc.save(`handoff-${getTodayISO()}.pdf`);
            };

            return (
                <div className="p-4 md:p-6 max-w-4xl mx-auto">
                    <div className="flex justify-between items-center mb-6">
                        <div>
                            <h2 className="text-2xl font-bold text-medical-600">Shift Handoff</h2>
                            <p className="text-sm text-gray-500">{getCurrentDateTime()}</p>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={handleAutoGenerate} className="px-4 py-2 bg-amber-600 hover:bg-amber-700 text-white rounded font-medium text-sm">
                                Auto-Generate
                            </button>
                            <button onClick={handleExportPDF} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded font-medium text-sm">
                                Export PDF
                            </button>
                        </div>
                    </div>

                    <DictationBar dictation={dictation} onParse={handleParseHandoffDictation} parseLabel="Apply to Patient" />

                    <div className="space-y-4">
                        {patients.map(patient => (
                            <div key={patient.id} className="bg-white border border-gray-200 rounded-lg p-4">
                                <div className="grid grid-cols-4 gap-3 mb-4 text-sm">
                                    <div className="font-bold text-medical-600">Room {patient.room}</div>
                                    <div className="text-gray-600">{patient.diagnosis || 'N/A'}</div>
                                    <div className="text-amber-600">POD {calculatePOD(patient.admitDate)}</div>
                                    <div className="text-gray-600">{patient.codeStatus || 'FULL'}</div>
                                </div>

                                <div className="space-y-3">
                                    <div>
                                        <label className="text-xs text-gray-500 font-semibold">Brief Summary</label>
                                        <textarea value={handoffPlans[patient.id] || ''} onChange={(e) => setHandoffPlans({...handoffPlans, [patient.id]: e.target.value})}
                                            className="w-full mt-1 px-3 py-2 bg-gray-50 border border-gray-300 rounded text-gray-600 text-sm"
                                            rows="2" placeholder="Treatment plan and key points"/>
                                    </div>

                                    <div>
                                        <div className="flex items-center justify-between mb-1">
                                            <label className="text-xs text-gray-500 font-semibold">Overnight Plan</label>
                                            <button onClick={() => setActivePatientId(activePatientId === patient.id ? null : patient.id)}
                                                className={`text-xs px-2 py-1 rounded transition ${activePatientId === patient.id ? 'bg-medical-600 text-white' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'}`}>
                                                {activePatientId === patient.id ? '✓ Active' : 'Set Active'}
                                            </button>
                                        </div>
                                        <textarea value={handoffPlans[patient.id] || ''} onChange={(e) => setHandoffPlans({...handoffPlans, [patient.id]: e.target.value})}
                                            className="w-full mt-1 px-3 py-2 bg-gray-50 border border-gray-300 rounded text-gray-600 text-sm"
                                            rows="2" placeholder="Continue current management..."/>
                                    </div>

                                    <div>
                                        <label className="text-xs text-gray-500 font-semibold">If/Then Plan</label>
                                        <textarea value={ifsThens[patient.id] || ''} onChange={(e) => setIfsThens({...ifsThens, [patient.id]: e.target.value})}
                                            className="w-full mt-1 px-3 py-2 bg-gray-50 border border-gray-300 rounded text-gray-600 text-sm"
                                            rows="2" placeholder="E.g., If temp >38.5, then blood cultures x2"/>
                                    </div>

                                    <div>
                                        <label className="text-xs text-gray-500 font-semibold">Contact Info</label>
                                        <input type="text" value={contactInfo[patient.id] || ''} onChange={(e) => setContactInfo({...contactInfo, [patient.id]: e.target.value})}
                                            className="w-full mt-1 px-3 py-2 bg-gray-50 border border-gray-300 rounded text-gray-600 text-sm"
                                            placeholder="Phone/Contact"/>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ==================== PRE-ROUND CHECKLIST COMPONENT ====================
        function PreRound() {
            const [patients, setPatients] = React.useState([]);
            const [checklist, setChecklist] = React.useState({});
            const [labs, setLabs] = React.useState([]);
            const [outputs, setOutputs] = React.useState([]);
            const [expandedPatient, setExpandedPatient] = React.useState(null);
            const dictation = useDictation();

            React.useEffect(() => {
                DB.init().then(() => {
                    loadPatients();
                    loadLabs();
                    loadOutputs();
                });
            }, []);

            const loadPatients = async () => {
                const allPatients = await DB.getAll('patients');
                const active = allPatients.filter(p => p.status !== 'discharged').sort((a, b) => parseInt(a.room) - parseInt(b.room));
                setPatients(active);

                const newChecklist = {};
                active.forEach(p => {
                    newChecklist[p.id] = {
                        vitals: false,
                        ios: false,
                        labs: false,
                        overnight: false,
                        lines: false,
                        meds: false,
                        pain: false,
                        plan: false,
                        notes: { vitals: '', ios: '', labs: '', overnight: '', lines: '', meds: '', pain: '', plan: '' }
                    };
                });
                setChecklist(newChecklist);
            };

            const loadLabs = async () => {
                const allLabs = await DB.getAll('labs');
                setLabs(allLabs);
            };

            const loadOutputs = async () => {
                const allOutputs = await DB.getAll('outputs');
                setOutputs(allOutputs);
            };

            const getLatestLabs = (patientId) => {
                return labs.filter(l => l.patientId === patientId)
                    .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
                    .slice(0, 5);
            };

            const getLatestOutputs = (patientId) => {
                return outputs.filter(o => o.patientId === patientId)
                    .sort((a, b) => new Date(b.date) - new Date(a.date))
                    .slice(0, 3);
            };

            const toggleItem = (patientId, item) => {
                setChecklist(prev => ({
                    ...prev,
                    [patientId]: {
                        ...prev[patientId],
                        [item]: !prev[patientId][item]
                    }
                }));
            };

            const markAllReviewed = (patientId) => {
                setChecklist(prev => ({
                    ...prev,
                    [patientId]: {
                        vitals: true,
                        ios: true,
                        labs: true,
                        overnight: true,
                        lines: true,
                        meds: true,
                        pain: true,
                        plan: true,
                        notes: prev[patientId].notes
                    }
                }));
            };

            const updateNote = (patientId, item, note) => {
                setChecklist(prev => ({
                    ...prev,
                    [patientId]: {
                        ...prev[patientId],
                        notes: {
                            ...prev[patientId].notes,
                            [item]: note
                        }
                    }
                }));
            };

            const totalItems = patients.length * 8;
            const checkedItems = patients.reduce((sum, p) => {
                const c = checklist[p.id];
                if (!c) return sum;
                return sum + [c.vitals, c.ios, c.labs, c.overnight, c.lines, c.meds, c.pain, c.plan].filter(Boolean).length;

            const itemLabels = ['Vitals reviewed', 'I/Os reviewed', 'Labs reviewed', 'Overnight events reviewed', 'Lines/drains/tubes assessed', 'Current medications reviewed', 'Pain assessment', 'Plan updated'];

            const uncheckedCount = patients.length * 8 - checkedItems;
            const timeRemaining = Math.ceil((uncheckedCount / 8) * 3);

            const handleParsePreRoundDictation = (transcript) => {
                const parsed = parsePreRoundSpeech(transcript);
                const roomMatch = transcript.match(/room\s+(\d+)/i);
                if (roomMatch) {
                    const room = roomMatch[1];
                    const patient = patients.find(p => p.room === room);
                    if (patient) {
                        const patientId = patient.id;
                        setChecklist(prev => {
                            const updated = { ...prev, [patientId]: { ...prev[patientId] } };
                            parsed.checkedItems.forEach(item => {
                                updated[patientId][item] = true;
                            });
                            if (parsed.notes) {
                                updated[patientId].notes = { ...updated[patientId].notes, general: parsed.notes };
                            }
                            return updated;
                        });
                    }
                } else {
                    const patientId = expandedPatient;
                    if (patientId) {
                        setChecklist(prev => {
                            const updated = { ...prev, [patientId]: { ...prev[patientId] } };
                            parsed.checkedItems.forEach(item => {
                                updated[patientId][item] = true;
                            });
                            if (parsed.notes) {
                                updated[patientId].notes = { ...updated[patientId].notes, general: parsed.notes };
                            }
                            return updated;

            return (

                        <div className="w-full bg-gray-50 rounded h-2">

                    <div className="space-y-3">

                            const isExpanded = expandedPatient === patient.id;

                                    {isExpanded && (

                                            {items.map((item, idx) => (

        // ==================== ROUNDS RECORDER COMPONENT ====================

            React.useEffect(() => {
                DB.init().then(() => loadPatients());

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.lang = 'en-US';

                    recognitionRef.current.onstart = () => setIsRecording(true);
                    recognitionRef.current.onend = () => setIsRecording(false);
                    recognitionRef.current.onerror = () => setIsRecording(false);

                    recognitionRef.current.onresult = (event) => {
                        let interim = '';
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            const t = event.results[i][0].transcript;
                            if (event.results[i].isFinal) {
                                setTranscript(prev => prev + t + ' ');
                            } else {
                                interim += t;
                            }
                        }
                        setLiveTranscript(interim);
                    };
                }

            const loadPatients = async () => {
                const allPatients = await DB.getAll('patients');
                const active = allPatients.filter(p => p.status !== 'discharged').sort((a, b) => parseInt(a.room) - parseInt(b.room));
                setPatients(active);
                if (active.length > 0 && !selectedPatientId) {
                    setSelectedPatientId(active[0].id);
                }
            };

            const startRecording = () => {
                if (recognitionRef.current) {
                    setTranscript('');
                    setLiveTranscript('');
                    recognitionRef.current.start();

            const stopRecording = () => {
                if (recognitionRef.current) {
                    recognitionRef.current.stop();
                    const patient = patients.find(p => p.id === selectedPatientId);

                if (text.includes('clears') || text.includes('clear')) parsed.diet.push('Clears');
                if (text.includes('regular') && text.includes('diet')) parsed.diet.push('Regular Diet');
                if (text.includes('advance')) parsed.diet.push('Advance Diet');
                if (text.includes('full liquids')) parsed.diet.push('Full Liquids');

                // Activity keywords
                if (text.includes('ambulate') || text.includes('walking')) parsed.activity.push('Ambulate');
                if (text.includes('bed rest') || text.includes('bedrest')) parsed.activity.push('Bedrest');
                if (text.includes('chair') || text.includes('up to chair')) parsed.activity.push('Up to Chair');
                if (text.includes('physical therapy') || text.includes('pt')) parsed.activity.push('PT Evaluation');
                if (text.includes('weight bearing')) parsed.activity.push('Weight Bearing');

                // Orders keywords
                if (text.includes('order') || text.includes('ordered')) parsed.orders.push('New Order');
                if (text.includes('start')) parsed.orders.push('Start Medication');
                if (text.includes('discontinue') || text.includes('stop')) parsed.orders.push('Discontinue');
                if (text.includes('check') || text.includes('repeat') || text.includes('recheck')) parsed.orders.push('Repeat Labs');
                if (text.includes('consult')) parsed.orders.push('Consult');

                // Disposition keywords
                if (text.includes('discharge')) parsed.disposition.push('Discharge');
                if (text.includes('home')) parsed.disposition.push('Home');
                if (text.includes('rehab') || text.includes('rehabilitation')) parsed.disposition.push('Rehab');
                if (text.includes('snf') || text.includes('skilled')) parsed.disposition.push('SNF');
                if (text.includes('transfer')) parsed.disposition.push('Transfer');

                setParsedItems(parsed);
            };

            const applyToPatient = async () => {
                const patient = patients.find(p => p.id === selectedPatientId);

                const updates = { ...patient };
                if (parsedItems.diet.length > 0) updates.diet = parsedItems.diet[0];
                if (parsedItems.activity.length > 0) updates.activity = parsedItems.activity[0];
                if (parsedItems.disposition.length > 0 && parsedItems.disposition[0] === 'Discharge') {
                    updates.status = 'discharged';
                    updates.dischargeDate = new Date().toISOString();

                await DB.put('patients', updates);
                alert('Patient record updated');
                setTranscript('');
                setParsedItems({ diet: [], activity: [], orders: [], disposition: [] });

                        {/* Patient Selector */}

                            <select value={selectedPatientId || ''} onChange={(e) => setSelectedPatientId(parseInt(e.target.value))}
                                className="w-full mt-2 px-4 py-2 bg-gray-50 border border-gray-300 rounded text-gray-600">
                                {patients.map(p => (

                        {/* Recording Controls */}
                        <div className="bg-white border border-gray-200 rounded-lg p-6">
                            <div className="text-center mb-6">

                                    {isRecording ? '⏹' : '⏺'}
                                </button>
                            </div>

                            {/* Live Transcript */}
                            {isRecording && (
                                <div className="mb-4 p-3 bg-gray-50 border border-medical-500 rounded">
                                    <p className="text-sm text-gray-600">{transcript}{liveTranscript}</p>
                                    <div className="flex gap-1 mt-2 items-center">
                                        {[...Array(5)].map((_, i) => (
                                            <div key={i} className="w-1 h-4 bg-medical-500 text-white rounded-full animate-pulse" style={{animationDelay: `${i * 100}ms`}}></div>
                                        ))}

                            {/* Transcript Editing */}
                            {transcript && !isRecording && (
                                <div className="mb-4">
                                    <label className="text-sm text-gray-500 font-semibold">Transcript</label>
                                    <textarea value={transcript} onChange={(e) => setTranscript(e.target.value)}
                                        className="w-full mt-2 px-3 py-2 bg-gray-50 border border-gray-300 rounded text-gray-600"
                                        rows="4"/>
                                    <button onClick={parseTranscript}
                                        className="w-full mt-2 px-4 py-2 bg-medical-600 hover:bg-medical-700 text-white rounded font-medium">
                                        Parse Plan

                            {/* Parsed Items */}
                            {Object.values(parsedItems).some(arr => arr.length > 0) && (

                                        <div>

                                            <div className="flex flex-wrap gap-2 mt-1">

        // ==================== CONSULTS SPEECH PARSER ====================
        function parseConsultSpeech(transcript) {
            const lower = transcript.toLowerCase();
            const result = {};

            // Patient ID lookup by room
            const roomMatch = transcript.match(/(?:room|patient room)\s+(\d+)/i);
            if (roomMatch) result.patientId = roomMatch[1];

            // Service
            const serviceKeywords = {
                'cardio': 'Cardiology', 'card': 'Cardiology',
                'pulmo': 'Pulmonology', 'respir': 'Pulmonology',
                'nephro': 'Nephrology', 'kidney': 'Nephrology',
                'gi': 'GI/Hepatology', 'hepato': 'GI/Hepatology', 'liver': 'GI/Hepatology',
                'infect': 'Infectious Disease', 'id': 'Infectious Disease',
                'endo': 'Endocrine', 'thyroid': 'Endocrine',
                'heme': 'Hematology/Oncology', 'onc': 'Hematology/Oncology', 'cancer': 'Hematology/Oncology',
                'neuro': 'Neurology', 'neuro': 'Neurosurgery',
                'ortho': 'Orthopedics', 'orthoped': 'Orthopedics',
                'vascular': 'Vascular Surgery', 'vasc': 'Vascular Surgery',
                'plastic': 'Plastic Surgery',
                'urology': 'Urology', 'urotogy': 'Urology', 'uro': 'Urology',
                'ob': 'OB/GYN', 'gyn': 'OB/GYN', 'obstet': 'OB/GYN',
                'psych': 'Psychiatry',
                'palli': 'Palliative Care',
                'pain': 'Pain Management',
                'pt': 'PT/OT', 'ot': 'PT/OT', 'physical': 'PT/OT',
                'speech': 'Speech/Swallow', 'swallow': 'Speech/Swallow',
                'nutri': 'Nutrition', 'diet': 'Nutrition',
                'social': 'Social Work',
                'case': 'Case Management',
                'ir': 'Interventional Radiology', 'intervent': 'Interventional Radiology',
                'radio': 'Radiology', 'imaging': 'Radiology',
                'path': 'Pathology',
                'wound': 'Wound Care'
            };
            for (let key in serviceKeywords) {
                if (lower.includes(key)) {
                    result.service = serviceKeywords[key];
                    break;
                }
            }

            // Reason
            const reasonMatch = transcript.match(/(?:reason|for|r\/o|rule out)\s+(.+?)(?:urgent|routine|emergent|finding|they found|consultant|recommend|$)/i);
            if (reasonMatch) result.reason = reasonMatch[1].trim();

            // Urgency
            if (/\b(?:emergent|emergenc|emergency)\b/i.test(lower)) result.urgency = 'Emergent';
            else if (/\b(?:urgent|urgency)\b/i.test(lower)) result.urgency = 'Urgent';
            else if (/\b(?:routine)\b/i.test(lower)) result.urgency = 'Routine';

            // Findings
            const findingsMatch = transcript.match(/(?:finding|found|show|they found|consultant found)\s+(.+?)(?:recommend|they recommend|follow|$)/i);
            if (findingsMatch) result.findings = findingsMatch[1].trim();

            // Recommendations
            const recsMatch = transcript.match(/(?:recommend|recs?|suggest)\s+(.+?)(?:follow|next|note|$)/i);
            if (recsMatch) result.recommendations = recsMatch[1].trim();

            // Follow up
            if (/follow[\s-]?up|they'll come back|come back|recheck|reassess|next visit|see again/i.test(lower)) {
                result.followUpNeeded = 'Yes - as recommended by consultant';
            }

            // Notes
            const noteMatch = transcript.match(/(?:note|notes)\s+(.+?)$/i);
            if (noteMatch) result.notes = noteMatch[1].trim();

            return result;
        }

        // ==================== CONSULTS TRACKER ====================
        function ConsultsTracker() {

            const CONSULT_SERVICES = [

                'Vascular Surgery', 'Plastic Surgery', 'Urology', 'OB/GYN', 'Psychiatry',

            ];

            React.useEffect(() => {

            }, []);

            const setupQuickDictation = () => {
                if (typeof window !== 'undefined') {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (SpeechRecognition) {
                        quickRecognitionRef.current = new SpeechRecognition();
                        quickRecognitionRef.current.continuous = true;
                        quickRecognitionRef.current.interimResults = true;
                        quickRecognitionRef.current.onstart = () => setQuickListening(true);
                        quickRecognitionRef.current.onresult = (event) => {
                            let interimTranscript = '';
                            let finalTranscript = '';
                            for (let i = event.resultIndex; i < event.results.length; i++) {
                                const transcript = event.results[i][0].transcript;
                                if (event.results[i].isFinal) {
                                    finalTranscript += transcript + ' ';
                                } else {
                                    interimTranscript += transcript;
                                }
                            }
                            setQuickTranscript(prev => prev + finalTranscript + interimTranscript);
                        };
                        quickRecognitionRef.current.onerror = () => setQuickListening(false);
                        quickRecognitionRef.current.onend = () => setQuickListening(false);
                    }
                }
            };

            const startQuickDictation = () => {
                if (quickRecognitionRef.current) {
                    setQuickTranscript('');
                    quickRecognitionRef.current.start();
                }
            };

            const stopQuickDictation = () => {
                if (quickRecognitionRef.current) {
                    quickRecognitionRef.current.stop();
                }
            };

            const saveQuickConsult = async () => {
                const parsed = parseConsultSpeech(quickTranscript);
                if (!parsed.service || !parsed.reason) {
                    alert('Could not parse service and reason from speech. Please check the transcript.');
                    return;
                }

                const patientId = parsed.patientId ? Number(parsed.patientId) : null;
                const patient = patientId ? patients.find(p => p.id === patientId) : null;

                const data = {
                    patientId: parsed.patientId || '',

                    reason: parsed.reason || '',
                    urgency: parsed.urgency || 'Routine',
                    findings: parsed.findings || '',

                    followUpNeeded: parsed.followUpNeeded || '',
                    requestedBy: '',

                    const [c, p] = await Promise.all([DB.getAll('consults'), DB.getAll('patients')]);

                        const urgOrder = { 'Emergent': 0, 'Urgent': 1, 'Routine': 2 };
                        if (urgOrder[a.urgency] !== urgOrder[b.urgency]) return urgOrder[a.urgency] - urgOrder[b.urgency];
                        return new Date(b.requestTime) - new Date(a.requestTime);
                    }));

        function ConsultFormModal({ form, setForm, patients, CONSULT_SERVICES, editingConsult, handleSave, onClose }) {
            const [transcript, setTranscript] = React.useState('');
            const [listening, setListening] = React.useState(false);
            const recognitionRef = React.useRef(null);

            React.useEffect(() => {
                if (typeof window !== 'undefined') {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (SpeechRecognition) {
                        recognitionRef.current = new SpeechRecognition();
                        recognitionRef.current.continuous = true;
                        recognitionRef.current.interimResults = true;
                        recognitionRef.current.onstart = () => setListening(true);
                        recognitionRef.current.onresult = (event) => {
                            let interimTranscript = '';
                            let finalTranscript = '';
                            for (let i = event.resultIndex; i < event.results.length; i++) {
                                const t = event.results[i][0].transcript;
                                if (event.results[i].isFinal) {
                                    finalTranscript += t + ' ';
                                } else {
                                    interimTranscript += t;
                                }
                            }
                            setTranscript(prev => prev + finalTranscript + interimTranscript);
                        };
                        recognitionRef.current.onerror = () => setListening(false);
                        recognitionRef.current.onend = () => setListening(false);
                    }
                }
            }, []);

            const startListening = () => {
                if (recognitionRef.current) {
                    setTranscript('');
                    recognitionRef.current.start();
                }
            };

            const stopListening = () => {

                    recognitionRef.current.stop();
