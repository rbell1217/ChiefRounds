    <script type="text/babel">

        // ==================== DATABASE HELPER ====================
        // Collections that contain PHI and should be encrypted
        const PHI_COLLECTIONS = ['patients', 'consults', 'casePrep'];

        const DB = {
            teamId: null,
            setTeamId(id) { this.teamId = id; },
            _col(store) {
                if (!this.teamId) throw new Error('No team selected');
                return db.collection('teams').doc(this.teamId).collection(store);
            },
            _shouldEncrypt(store) {
                return CryptoHelper.isEnabled() && PHI_COLLECTIONS.includes(store);
            },
            async init() { /* Firestore is ready immediately */ },
            async getAll(store) {
                const snap = await this._col(store).get();
                const docs = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                if (this._shouldEncrypt(store)) {
                    return Promise.all(docs.map(d => CryptoHelper.decryptRecord(d)));
                }
                return docs;
            },
            async get(store, id) {
                const doc = await this._col(store).doc(String(id)).get();
                if (!doc.exists) return null;
                const data = { ...doc.data(), id: doc.id };
                return this._shouldEncrypt(store) ? CryptoHelper.decryptRecord(data) : data;
            },
            async add(store, data) {
                const { id, ...rest } = data; // strip any existing id
                const toWrite = this._shouldEncrypt(store) ? await CryptoHelper.encryptRecord({ ...rest, createdAt: rest.createdAt || new Date().toISOString() }) : { ...rest, createdAt: rest.createdAt || new Date().toISOString() };
                const ref = await this._col(store).add(toWrite);
                return ref.id;
            },
            async put(store, data) {
                if (data.id) {
                    const { id, ...rest } = data;
                    const toWrite = this._shouldEncrypt(store) ? await CryptoHelper.encryptRecord(rest) : rest;
                    await this._col(store).doc(String(id)).set(toWrite, { merge: true });
                    return id;
                }
                return this.add(store, data);
            },
            async delete(store, id) {
                await this._col(store).doc(String(id)).delete();
            },
            async getByIndex(store, indexName, value) {
                // Note: encrypted fields cannot be queried by index - this only works for non-PHI fields
                const snap = await this._col(store).where(indexName, '==', value).get();
                const docs = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                if (this._shouldEncrypt(store)) {
                    return Promise.all(docs.map(d => CryptoHelper.decryptRecord(d)));
                }
                return docs;
            }
        };

        // ==================== PHI ENCRYPTION (AES-256-GCM) ====================
        const PHI_FIELDS = ['room', 'diagnosis', 'problems', 'procedures', 'pmh', 'psh', 'homeMeds', 'allergies',
            'antibiotics', 'examFindings', 'treatmentPlan', 'concerns', 'dispositionPlan', 'codeStatus',
            'reason', 'findings', 'recommendations', 'notes', 'soapNote', 'transcript',
            'roundsHistory', 'preRoundHistory', 'diet', 'activity', 'dvtProphylaxis', 'giProphylaxis',
            'subjective', 'objective', 'assessment', 'plan', 'vitals', 'labNotes', 'socialHx', 'familyHx'];

        const CryptoHelper = {
            _key: null,
            _enabled: false,

            async deriveKey(passphrase, salt) {
                const enc = new TextEncoder();
                const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
                return crypto.subtle.deriveKey(
                    { name: 'PBKDF2', salt: enc.encode(salt), iterations: 310000, hash: 'SHA-256' },
                    keyMaterial,
                    { name: 'AES-GCM', length: 256 },
                    false,
                    ['encrypt', 'decrypt']
                );
            },

            async init(passphrase, teamId) {
                if (!passphrase) { this._enabled = false; return; }
                try {
                    this._key = await this.deriveKey(passphrase, 'chiefRounds_' + teamId);
                    this._enabled = true;
                    console.log('PHI encryption enabled');
                } catch (e) {
                    console.error('Encryption init failed:', e);
                    this._enabled = false;
                }
            },

            isEnabled() { return this._enabled && this._key !== null; },

            async encrypt(plaintext) {
                if (!this._enabled || !plaintext) return plaintext;
                try {
                    const enc = new TextEncoder();
                    const iv = crypto.getRandomValues(new Uint8Array(12));
                    const data = typeof plaintext === 'string' ? plaintext : JSON.stringify(plaintext);
                    const cipherBuf = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, this._key, enc.encode(data));
                    // Combine IV + ciphertext, encode as base64
                    const combined = new Uint8Array(iv.length + cipherBuf.byteLength);
                    combined.set(iv);
                    combined.set(new Uint8Array(cipherBuf), iv.length);
                    return '🔒' + btoa(String.fromCharCode(...combined));
                } catch (e) {
                    console.error('Encrypt error:', e);
                    return plaintext;
                }
            },

            async decrypt(ciphertext) {
                if (!this._enabled || !ciphertext) return ciphertext;
                if (typeof ciphertext !== 'string' || !ciphertext.startsWith('🔒')) return ciphertext;
                try {
                    const raw = atob(ciphertext.slice(2));
                    const bytes = new Uint8Array(raw.length);
                    for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
                    const iv = bytes.slice(0, 12);
                    const data = bytes.slice(12);
                    const plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, this._key, data);
                    const text = new TextDecoder().decode(plainBuf);
                    // Try to parse as JSON (for arrays/objects)
                    try { return JSON.parse(text); } catch { return text; }
                } catch (e) {
                    console.error('Decrypt error:', e);
                    return ciphertext;
                }
            },

            async encryptRecord(data) {
                if (!this._enabled) return data;
                const encrypted = { ...data };
                for (const field of PHI_FIELDS) {
                    if (encrypted[field] !== undefined && encrypted[field] !== null && encrypted[field] !== '') {
                        encrypted[field] = await this.encrypt(encrypted[field]);
                    }
                }
                // Handle nested roundsHistory and preRoundHistory
                if (encrypted.roundsHistory && typeof encrypted.roundsHistory === 'object' && !encrypted.roundsHistory.startsWith?.('🔒')) {
                    encrypted.roundsHistory = await this.encrypt(encrypted.roundsHistory);
                }
                if (encrypted.preRoundHistory && typeof encrypted.preRoundHistory === 'object' && !encrypted.preRoundHistory.startsWith?.('🔒')) {
                    encrypted.preRoundHistory = await this.encrypt(encrypted.preRoundHistory);
                }
                encrypted._encrypted = true;
                return encrypted;
            },

            async decryptRecord(data) {
                if (!this._enabled || !data?._encrypted) return data;
                const decrypted = { ...data };
                for (const field of PHI_FIELDS) {
                    if (decrypted[field] !== undefined && decrypted[field] !== null) {
                        decrypted[field] = await this.decrypt(decrypted[field]);
                    }
                }
                delete decrypted._encrypted;
                return decrypted;
            }
        };

                this._events.forEach(evt => document.addEventListener(evt, () => this._resetTimer(), { passive: true }));

            stop() {
                if (this._timer) clearTimeout(this._timer);
                this._events.forEach(evt => document.removeEventListener(evt, this._resetTimer));

            _resetTimer() {
                if (InactivityMonitor._timer) clearTimeout(InactivityMonitor._timer);

        // ==================== TIMEZONE & UTILITY FUNCTIONS ====================
        const APP_TIMEZONE = 'America/Chicago'; // Central Time

        function getCurrentDateTime() {
            return new Date().toLocaleString('en-US', {
                timeZone: APP_TIMEZONE,
                month: '2-digit', day: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true

        }

        }

        }

            return new Date(date).toLocaleString('en-US', { timeZone: APP_TIMEZONE, month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function getTodayDateString() {
            return new Date().toLocaleDateString('en-US', { timeZone: APP_TIMEZONE });
        }

        function getTodayISO() {
            const now = new Date();
            // Use en-US to get reliable M/D/YYYY, then convert to YYYY-MM-DD
            const fmt = new Intl.DateTimeFormat('en-US', { timeZone: APP_TIMEZONE, year: 'numeric', month: 'numeric', day: 'numeric' }).format(now);
            const m = fmt.match(/(\d+)\/(\d+)\/(\d+)/);
            if (m) return `${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
            // Fallback to en-CA
            return new Intl.DateTimeFormat('en-CA', { timeZone: APP_TIMEZONE, year: 'numeric', month: '2-digit', day: '2-digit' }).format(now);
        }

        function calculatePOD(admitDate) {
            if (!admitDate) return 0;
            try {
                // Get today in Central Time as year/month/day numbers
                const now = new Date();
                const todayFmt = new Intl.DateTimeFormat('en-US', { timeZone: APP_TIMEZONE, year: 'numeric', month: 'numeric', day: 'numeric' }).format(now);
                // todayFmt = "3/21/2026" format
                const todayMatch = todayFmt.match(/(\d+)\/(\d+)\/(\d+)/);
                if (!todayMatch) return 0;
                const todayMs = Date.UTC(parseInt(todayMatch[3]), parseInt(todayMatch[1]) - 1, parseInt(todayMatch[2]));

                // Parse admit date - handle multiple formats
                let admitMs;
                let ad = admitDate;

                // Handle Firestore Timestamp objects
                if (ad && typeof ad === 'object' && ad.toDate) {
                    ad = ad.toDate().toISOString();
                } else if (ad && typeof ad === 'object' && ad.seconds) {
                    ad = new Date(ad.seconds * 1000).toISOString();
                }

                if (typeof ad === 'string') {
                    // Try YYYY-MM-DD or ISO format
                    const isoMatch = ad.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
                    if (isoMatch) {
                        admitMs = Date.UTC(parseInt(isoMatch[1]), parseInt(isoMatch[2]) - 1, parseInt(isoMatch[3]));
                    } else {
                        // Try M/D/YYYY format
                        const usMatch = ad.match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
                        if (usMatch) {
                            let yr = parseInt(usMatch[3]);
                            if (yr < 100) yr += 2000;
                            admitMs = Date.UTC(yr, parseInt(usMatch[1]) - 1, parseInt(usMatch[2]));
                        } else {
                            // Last resort: let Date parse it
                            const d = new Date(ad);
                            if (!isNaN(d.getTime())) admitMs = d.getTime();
                        }
                    }
                } else if (ad instanceof Date) {
                    admitMs = Date.UTC(ad.getFullYear(), ad.getMonth(), ad.getDate());
                }

                if (admitMs === undefined || isNaN(admitMs)) return 0;

                const days = Math.floor((todayMs - admitMs) / (1000 * 60 * 60 * 24));
                return Math.max(0, days);
            } catch (e) {
                console.error('calculatePOD error:', e, 'admitDate:', admitDate);
                return 0;
            }
        }

        // Smart date parser: understands "3/18", "3/18/26", "3/18/2026", "March 18", "Mar 18", etc.
        // Returns YYYY-MM-DD string or null if no date found
        function parseFlexibleDate(text) {
            if (!text) return null;
            const t = text.trim();
            const todayParts = getTodayISO().split('-');
            const currentYear = parseInt(todayParts[0]);
            const currentMonth = parseInt(todayParts[1]);

            const monthNames = { jan: 1, january: 1, feb: 2, february: 2, mar: 3, march: 3, apr: 4, april: 4, may: 5, jun: 6, june: 6, jul: 7, july: 7, aug: 8, august: 8, sep: 9, september: 9, oct: 10, october: 10, nov: 11, november: 11, dec: 12, december: 12 };

            let month, day, year;

            // M/D/YY or M/D/YYYY
            const slashFull = t.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
            if (slashFull) {
                month = parseInt(slashFull[1]);
                day = parseInt(slashFull[2]);
                year = parseInt(slashFull[3]);
                if (year < 100) year += 2000;
            }
            // M/D (no year)
            if (!month) {
                const slashShort = t.match(/(\d{1,2})[\/\-](\d{1,2})(?!\d)/);
                if (slashShort) {
                    month = parseInt(slashShort[1]);
                    day = parseInt(slashShort[2]);
                    year = currentYear;
                    // If the date is more than 6 months in the future, assume last year
                    if (month > currentMonth + 6) year--;
                }
            }
            // "March 18" or "Mar 18" or "18 March"
            if (!month) {
                const namedMonth = t.match(/([a-zA-Z]+)\s+(\d{1,2})(?:\s*,?\s*(\d{2,4}))?/);
                if (namedMonth && monthNames[namedMonth[1].toLowerCase()]) {
                    month = monthNames[namedMonth[1].toLowerCase()];
                    day = parseInt(namedMonth[2]);
                    year = namedMonth[3] ? parseInt(namedMonth[3]) : currentYear;
                    if (year < 100) year += 2000;
                }
            }
            if (!month) {
                const dayFirst = t.match(/(\d{1,2})\s+([a-zA-Z]+)(?:\s*,?\s*(\d{2,4}))?/);
                if (dayFirst && monthNames[dayFirst[2].toLowerCase()]) {
                    day = parseInt(dayFirst[1]);
                    month = monthNames[dayFirst[2].toLowerCase()];
                    year = dayFirst[3] ? parseInt(dayFirst[3]) : currentYear;
                    if (year < 100) year += 2000;
                }
            }

            if (month && day && year && month >= 1 && month <= 12 && day >= 1 && day <= 31) {
                return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            }
            return null;
        }

        // Extract a date from signout text near date-related keywords
        function extractDateFromContext(text) {
            // Look for explicit date labels
            const datePatterns = [
                /(?:admit(?:ted)?|admission|admitted on|date of admission|DOA)\s*[:\-]?\s*(.+?)(?:\n|,|;|\s{2,}|$)/i,
                /(?:surgery|op|operation|procedure)\s*(?:date|on)?\s*[:\-]?\s*(.+?)(?:\n|,|;|\s{2,}|$)/i,
                /(?:date)\s*[:\-]\s*(.+?)(?:\n|,|;|\s{2,}|$)/i,
                // "s/p lap appy 3/18" or "s/p colectomy on 3/18"
                /s\/p\s+.+?\b(\d{1,2}\/\d{1,2}(?:\/\d{2,4})?)\b/i,
                // "appy 3/18" or "chole 3/19"
                /(?:appy|chole|colectomy|ex-?lap|whipple|hernia|nissen|resection|bypass|ostomy)\s+(?:on\s+)?(\d{1,2}\/\d{1,2}(?:\/\d{2,4})?)/i,
            ];
            for (const pattern of datePatterns) {
                const match = text.match(pattern);
                if (match) {
                    const parsed = parseFlexibleDate(match[1]);
                    if (parsed) return parsed;
                }
            }
            // Look for date patterns that appear after a dash or pipe (common in signout headers)
            // e.g. "512 - 65M - Appendicitis s/p lap appy - 3/18"
            const headerDateMatch = text.match(/[-|]\s*(\d{1,2}\/\d{1,2}(?:\/\d{2,4})?)\s*(?:[-|,\n]|$)/);
            if (headerDateMatch) {
                const parsed = parseFlexibleDate(headerDateMatch[1]);
                if (parsed) return parsed;
            }
            // Look for any M/D or M/D/YY pattern that's NOT a room number (room nums are 3-4 digits, dates have a slash)
            const allDates = [];
            const dateRegex = /\b(\d{1,2}\/\d{1,2}(?:\/\d{2,4})?)\b/g;
            let m;
            while ((m = dateRegex.exec(text)) !== null) {
                const parsed = parseFlexibleDate(m[1]);
                if (parsed) allDates.push(parsed);
            }
            // If we found exactly one date, use it. If multiple, use the earliest (likely admit/surgery date).
            if (allDates.length === 1) return allDates[0];
            if (allDates.length > 1) {
                allDates.sort();
                return allDates[0]; // earliest date
            }
            return null;
        }

        function isLabAbnormal(type, value) {
            if (!LAB_RANGES[type]) return false;
            const range = LAB_RANGES[type];
            return value < range.min || value > range.max;
        }

        function getTrendArrow(currentValue, previousValue) {
            if (!previousValue) return '—';
            if (Math.abs(currentValue - previousValue) < 0.01) return '→';
            return currentValue > previousValue ? '↑' : '↓';
        }

        function parseSpeechCommand(transcript) {
            const t = transcript.toLowerCase();
            const result = {};

            // Room - flexible matching
            const roomMatch = transcript.match(/room\s+(\d+)/i) || transcript.match(/^(\d{3,4})\b/);
            if (roomMatch) result.room = roomMatch[1];

            // Diagnosis - many trigger phrases, captures until next section keyword
            const sectionBreak = /(?:\b(?:problems?|procedures?|diet|activity|plan|dispo|disposition|concern|red flag|code status|prophylaxis|dvt|gi prophy|admit)\b|$)/i;
            const diagMatch = transcript.match(/(?:diagnosis|diagnosed with|dx|for)\s+(.+?)(?=\s*(?:problems?|procedures?|diet|activity|plan|dispo|concern|red flag|code|prophylaxis|dvt|admit|$))/i);
            if (diagMatch) result.diagnosis = diagMatch[1].replace(/\s+/g, ' ').trim();
            // If no keyword, try "status post" or "s/p" pattern
            if (!result.diagnosis) {

            if (probMatch) result.problems = probMatch[1].replace(/\s+/g, ' ').trim();

            // Procedures
            const procMatch = transcript.match(/(?:procedures?(?:\s+(?:are|is|include|done|performed))?)\s+(.+?)(?=\s*(?:diet|activity|plan|dispo|concern|code|prophylaxis|$))/i);
            if (procMatch) result.procedures = procMatch[1].replace(/\s+/g, ' ').trim();

            // Diet - match natural speech patterns
            const dietMap = [
                { match: /\b(npo|nothing by mouth|nil per os)\b/i, val: 'NPO' },
                { match: /\b(ice chips)\b/i, val: 'Ice Chips' },
                { match: /\b(clear liquid|clears|clear diet)\b/i, val: 'Clears' },
                { match: /\b(full liquid)\b/i, val: 'Full Liquids' },
                { match: /\b(mechanical soft|soft diet)\b/i, val: 'Mechanical Soft' },
                { match: /\b(regular diet|regular|advance(d)? to regular|general diet|house diet)\b/i, val: 'Regular' },
                { match: /\b(cardiac diet|heart healthy)\b/i, val: 'Cardiac' },

        // Remove duplicate phrases that occur when user re-dictates
        function removeDuplicatePhrases(text) {
            if (!text || text.length < 20) return text;
            // Split into sentences
            const sentences = text.split(/(?<=[.!?])\s+/).filter(s => s.trim());
            if (sentences.length < 2) return text;

            const unique = [sentences[0]];
            for (let i = 1; i < sentences.length; i++) {
                const curr = sentences[i].toLowerCase().replace(/[^a-z0-9 ]/g, '').trim();
                let isDupe = false;
                // Check against recent sentences (window of 3 lookback)
                for (let j = Math.max(0, i - 3); j < i; j++) {
                    const prev = sentences[j].toLowerCase().replace(/[^a-z0-9 ]/g, '').trim();
                    // Exact or near-exact match (Dice coefficient > 0.85)
                    if (curr === prev) { isDupe = true; break; }
                    const similarity = _diceSimilarity(curr, prev);
                    if (similarity > 0.85) { isDupe = true; break; }
                }
                if (!isDupe) unique.push(sentences[i]);
            }

            // Also detect repeated phrases within a single "sentence" (non-sentence-ending text)
            let result = unique.join(' ');
            // Match repeated consecutive phrase blocks (3+ words repeated)
            result = result.replace(/\b((?:\S+\s+){3,}?)(\s*\1)+/gi, '$1');

            return result;
        }

        // Dice coefficient for fuzzy sentence matching
        function _diceSimilarity(a, b) {
            if (!a || !b) return 0;
            if (a === b) return 1;
            const bigramsA = new Set();
            const bigramsB = new Set();
            for (let i = 0; i < a.length - 1; i++) bigramsA.add(a.substring(i, i + 2));
            for (let i = 0; i < b.length - 1; i++) bigramsB.add(b.substring(i, i + 2));
            let intersection = 0;
            for (const bg of bigramsA) if (bigramsB.has(bg)) intersection++;
            return (2 * intersection) / (bigramsA.size + bigramsB.size);
        }

        // Proofread/clean up dictated text for conciseness and readability
        function proofreadDictation(text) {
            if (!text) return text;
            let cleaned = text;

            // Remove filler words/phrases common in dictation
            const fillerPatterns = [
                /\b(um+|uh+|ah+|er+|hmm+|like I said|you know|basically|I mean|so+)\b\s*/gi,
                /\b(let me see|how do I say this|what's the word)\b\s*/gi,
                /\b(go ahead and|I want to say|I would say|kind of like)\b\s*/gi,
            ];
            for (const pat of fillerPatterns) {
                cleaned = cleaned.replace(pat, '');
            }

            // Remove false starts and corrections: "the patient, I mean the patient" -> "the patient"
            cleaned = cleaned.replace(/\b(\w+(?:\s+\w+){0,3}),?\s*(?:I mean|no|sorry|actually|wait|correction)\s+\1/gi, '$1');

            // Remove "period" and "comma" spoken as words (speech commands)
            cleaned = cleaned.replace(/\bperiod\b/gi, '.').replace(/\bcomma\b/gi, ',').replace(/\bnew line\b/gi, '\n');

            // Clean up punctuation spacing
            cleaned = cleaned.replace(/\s+([.,;:!?])/g, '$1');
            cleaned = cleaned.replace(/([.,;:!?])(?=[A-Za-z])/g, '$1 ');

            // Fix double spaces
            cleaned = cleaned.replace(/\s{2,}/g, ' ').trim();

            // Capitalize first letter of each sentence
            cleaned = cleaned.replace(/(^|[.!?]\s+)([a-z])/g, (m, pre, letter) => pre + letter.toUpperCase());

            // Capitalize first letter overall
            if (cleaned.length > 0) {
                cleaned = cleaned.charAt(0).toUpperCase() + cleaned.slice(1);
            }

            // Add period at end if missing punctuation
            if (cleaned.length > 0 && !/[.!?\n]$/.test(cleaned.trim())) {
                cleaned = cleaned.trim() + '.';
            }

            return cleaned;
        }

            // These broad patterns catch the many ways STT garbles medical terminology

            cleaned = cleaned.replace(/\bwould\s+end\b/gi, 'with end');
            // "he must a me" / "hemi must to me" etc for common garbles
            cleaned = cleaned.replace(/\bin\s+the\s+estimate\s+in\s+place/gi, 'ileostomy in place');

            // --- Spelled-out letters ---
            cleaned = cleaned.replace(/\bC\s*[.]?\s*H\s*[.]?\s*O\s*[.]?\s*L\s*[.]?\s*E\b\.?/gi, 'chole');
            cleaned = cleaned.replace(/\bA\s*[.]?\s*P\s*[.]?\s*P\s*[.]?\s*Y\b\.?/gi, 'appy');
            cleaned = cleaned.replace(/\bN\s*[.]?\s*P\s*[.]?\s*O\b\.?/gi, 'NPO');

            // --- Collapse "X. Ectomy" / "X. Ostomy" / "X. Otomy" across sentence breaks ---
            cleaned = cleaned.replace(/(\w{3,})\.\s*(ectomy|ostomy|otomy)\b/gi, '$1$2');

            // --- CHOLECYSTECTOMY (broadest phonetic catch) ---
            // Catches: holy cystectomy, cooley cystectomy, cole assist ectomy, cola cyst ectomy, etc.
            cleaned = cleaned.replace(/\b(?:ch?ol[eiy]?|hol[liy]?|cool[eiy]?|kol[eiy]?|col[ea]?|call[ea]?)[\s.]*(?:a[\s.]*)?(?:cyst|sis?t|assist|sister)[\s.]*(?:ect?omy|ecto\s*me|to\s*me|ec\s*to\s*me)\.?/gi, 'cholecystectomy');
            // Standalone "coley/cooley/koli" when not followed by other words (meant as abbreviation "chole")
            cleaned = cleaned.replace(/\b(?:cool?[eiy]|kol[eiy]|coll?[eiy]|coal[eiy])(?=[\s.,;:!?]|$)/gi, 'chole');

            // --- APPENDECTOMY (broadest phonetic catch) ---
            // Catches: appy and postectomy, a pen dectomy, append ectomy, app and ectomy, etc.
            cleaned = cleaned.replace(/\bapp?[eiy]?\.?\s*(?:and\s*)?(?:post|pen\s*d?|pend?)[\s.]*(?:ect?omy|ecto\s*me|to\s*me|deck?\s*(?:to\s*)?me)\.?/gi, 'appendectomy');
            cleaned = cleaned.replace(/\ba[\s.]*pen(?:dant|d)?[\s.]*(?:ect?omy|ecto\s*me|deck?\s*(?:to\s*)?me)\.?/gi, 'appendectomy');

            // --- ILEOCECECTOMY (broadest phonetic catch) ---
            // Catches: heliocestomy, helio cestomy, illio sectomy, ileal cecectomy, etc.
            cleaned = cleaned.replace(/\b(?:h?(?:e|i)l[ei]?[ao]?|ill?[ei]?[ao]?|iliac)[\s.]*(?:ce[cs]t|sect|cecect|cecal[\s.]*ect|psychic[\s.]*to)[\s.]*(?:omy|o\s*me|to\s*me)\.?/gi, 'ileocecectomy');
            cleaned = cleaned.replace(/\b(?:ileal|ill?[ei]a[ln]?|ilio)[\s.]*(?:ce[cs]|cecal)[\s.]*(?:ect?omy|ecto\s*me)\.?/gi, 'ileocecectomy');

            // --- HEMICOLECTOMY ---
            cleaned = cleaned.replace(/\b(?:hemi|semi|hemmy)[\s.]*(?:col[ea]?|coal|collect)[\s.]*(?:ect?omy|ecto\s*me|to\s*me|a\s*sectomy)\.?/gi, 'hemicolectomy');

            // --- COLECTOMY ---
            cleaned = cleaned.replace(/\b(?:col[ea]?|coal|colon)[\s.]*(?:ect?omy|ecto\s*me|to\s*me)\.?/gi, 'colectomy');

            // --- GASTRECTOMY ---
            cleaned = cleaned.replace(/\b(?:gastr?|gas\s*tr?)[\s.]*(?:ect?omy|ecto\s*me)\.?/gi, 'gastrectomy');

            // --- SPLENECTOMY ---
            cleaned = cleaned.replace(/\b(?:spleen?|splene?)[\s.]*(?:ect?omy|ecto\s*me)\.?/gi, 'splenectomy');

            // --- NEPHRECTOMY ---
            cleaned = cleaned.replace(/\b(?:neph?r[eo]?|nef\s*r[eo]?)[\s.]*(?:ect?omy|ecto\s*me)\.?/gi, 'nephrectomy');

            // --- MASTECTOMY ---
            cleaned = cleaned.replace(/\b(?:mass?t?|mast)[\s.]*(?:ect?omy|ecto\s*me)\.?/gi, 'mastectomy');

            // --- THYROIDECTOMY ---
            cleaned = cleaned.replace(/\b(?:thyr?oid|thigh\s*ro?id)[\s.]*(?:ect?omy|ecto\s*me)\.?/gi, 'thyroidectomy');

            // --- THORACOTOMY ---
            cleaned = cleaned.replace(/\b(?:thorac?|thorough|thora)[\s.]*(?:[ck]?ot[oa]?my|cost[\s.]*(?:to\s*)?me|cotton[\s.]*me|economy)\.?/gi, 'thoracotomy');

            // --- LAPAROTOMY ---
            cleaned = cleaned.replace(/\b(?:lap\s*a?\s*rot|la\s*parrot|lap\s*arot)[\s.]*(?:omy|o\s*me|amy)\.?/gi, 'laparotomy');

            // --- LAPAROSCOPY ---
            cleaned = cleaned.replace(/\b(?:lap\s*a?\s*r[oa]s?|lap\s*or\s*os?)[\s.]*(?:copy|scopy|co\s*py)\.?/gi, 'laparoscopy');

            // --- TRACHEOSTOMY ---
            cleaned = cleaned.replace(/\b(?:trach?[eiy]?|trak[eiy]?|trick[eiy]?)[\s.]*(?:ost?omy|os?\s*to\s*me)\.?/gi, 'tracheostomy');

            // --- ILEOSTOMY ---
            cleaned = cleaned.replace(/\b(?:ile[ao]?|ill?[ei]a[lo]?|ileus)[\s.]*(?:st?omy|sto\s*me|stony|dummy)\.?/gi, 'ileostomy');

            // --- COLOSTOMY ---
            cleaned = cleaned.replace(/\b(?:col[ao]?|cola|colon)[\s.]*(?:st?omy|sto\s*me|stony)\.?/gi, 'colostomy');

            // --- CHOLECYSTITIS ---
            cleaned = cleaned.replace(/\b(?:ch?ol[eiy]?|hol[liy]?|cool[eiy]?|col[ea]?)[\s.]*(?:a[\s.]*)?(?:cyst|sis?t)[\s.]*(?:itis|ight\s*is|eye\s*tis)\.?/gi, 'cholecystitis');

            // --- DIVERTICULITIS ---
            cleaned = cleaned.replace(/\b(?:diver|divert)[\s.]*(?:tick|tic)[\s.]*(?:you[\s.]*)?(?:l[iy][\s.]*)?(?:tis|tight\s*is)\.?/gi, 'diverticulitis');

            // --- PANCREATITIS ---
            cleaned = cleaned.replace(/\b(?:pancre?a?t|pan\s*create?)[\s.]*(?:itis|ight\s*is|titus)\.?/gi, 'pancreatitis');

            // --- PERITONITIS ---
            cleaned = cleaned.replace(/\b(?:perit[oa]n|perry[\s.]*t[oa][\s.]*n?)[\s.]*(?:itis|ight\s*is|night\s*is)\.?/gi, 'peritonitis');

            // --- ANASTOMOSIS ---
            cleaned = cleaned.replace(/\b(?:ana?st[oa]?m|anna[\s.]*st[oa][\s.]*m?)[\s.]*(?:osis|o[\s.]*sis|[oa][\s.]*Moses)\.?/gi, 'anastomosis');

            // Step 1: Apply surgical/procedure term corrections (misrecognition fixes)
            for (const [pattern, replacement] of _surgicalCorrectionPatterns) {
                cleaned = cleaned.replace(pattern, replacement);
            }

            // Step 2: Medical abbreviation corrections (speech-to-text often expands these)
            const medTerms = [
                [/\bstatus post\b/gi, 's/p'],
                [/\bpost op(erative)?\b/gi, 'postop'],
                [/\bpre op(erative)?\b/gi, 'preop'],
                [/\blap\s+(appy|chole|coly?|appendectomy)\b/gi, (m, p) => 'lap ' + p.toLowerCase()],
                [/\blaparoscopic\b/gi, 'lap'],
                [/\bappendectomy\b/gi, 'appy'],
                [/\bcholecystectomy\b/gi, 'chole'],
                [/\bpost operative day\s*(\d+)/gi, 'POD $1'],
                [/\bP\s*O\s*D\s*#?\s*(\d+)/gi, 'POD $1'],
                [/\bpee oh dee\b/gi, 'POD'],
                [/\bnothing by mouth\b/gi, 'NPO'],
                [/\bn\.?\s*p\.?\s*o\.?\b/gi, 'NPO'],
                [/\bT\s*I\s*D\b/gi, 'TID'],
                [/\bthree times (a |per )?day\b/gi, 'TID'],
                [/\btwice (a |per )?day\b/gi, 'BID'],
                [/\bB\s*I\s*D\b/gi, 'BID'],
                [/\bonce (a |per )?day\b/gi, 'daily'],
                [/\bsequential compression devices?\b/gi, 'SCDs'],
                [/\bdeep vein thrombosis\b/gi, 'DVT'],
                [/\bD\s*V\s*T\b/g, 'DVT'],
                [/\bdo not resuscitate\b/gi, 'DNR'],
                [/\bdo not intubate\b/gi, 'DNI'],
                [/\bD\s*N\s*R\b/g, 'DNR'],
                [/\bfull code\b/gi, 'Full Code'],
                [/\bout of bed\b/gi, 'OOB'],
                [/\bnasogastric tube\b/gi, 'NGT'],
                [/\bjackson[ -]?pratt\b/gi, 'JP'],
                [/\bJ\s*P\s*drain\b/gi, 'JP drain'],
                [/\bintravenous\b/gi, 'IV'],
                [/\bI\s*V\s*F?\b/g, (m) => m.replace(/\s/g, '')],
                [/\bwhite blood cell(s| count)?\b/gi, 'WBC'],
                [/\bhemoglobin\b/gi, 'Hgb'],
                [/\bcreatinine\b/gi, 'Cr'],
                [/\bblood urea nitrogen\b/gi, 'BUN'],
                [/\bcomplete blood count\b/gi, 'CBC'],
                [/\bcomprehensive metabolic panel\b/gi, 'CMP'],
                [/\bbasic metabolic panel\b/gi, 'BMP'],
                [/\bcomputed tomography\b/gi, 'CT'],
                [/\bC\s*T\s*scan\b/gi, 'CT scan'],
                [/\bphysical therapy\b/gi, 'PT'],
                [/\boccupational therapy\b/gi, 'OT'],
                [/\bper oral\b/gi, 'PO'],
                [/\bP\s*O\b/g, 'PO'],
                [/\bmilligrams?\b/gi, 'mg'],
                [/\bmilliliters?\b/gi, 'mL'],
                [/\bsubcutaneous(ly)?\b/gi, 'subQ'],
            ];

            for (const [pattern, replacement] of medTerms) {
                cleaned = cleaned.replace(pattern, replacement);
            }

            // Step 2.5: Apply user custom dictionary corrections
            cleaned = CustomDictionary.apply(cleaned);

            // Step 3: Remove duplicate phrases from re-dictation
            cleaned = removeDuplicatePhrases(cleaned);

            // Step 4: Proofread for conciseness and readability
            cleaned = proofreadDictation(cleaned);

            return cleaned;
            } catch(e) { console.error('cleanMedicalSpeech error:', e); return text; }
        }

        // ==================== RED FLAGS DETECTION ====================
        function detectRedFlags(patient, labs, outputs) {
            const flags = [];
            const pod = calculatePOD(patient.admitDate);

            // Check labs for concerning trends
            if (labs && labs.length > 0) {
                const byType = {};
                labs.forEach(l => {
                    if (!byType[l.type]) byType[l.type] = [];
                    byType[l.type].push(l);
                });

                // Rising WBC (3+ values trending up)
                if (byType['WBC'] && byType['WBC'].length >= 2) {
                    const sorted = byType['WBC'].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    if (sorted.length >= 2 && sorted[0].value > sorted[1].value && sorted[0].value > 12) {
                        flags.push({ type: 'lab', severity: 'warning', text: `WBC rising: ${sorted[1].value} → ${sorted[0].value}` });
                    }
                    if (sorted[0].value > 15) {
                        flags.push({ type: 'lab', severity: 'critical', text: `WBC critically elevated: ${sorted[0].value}` });
                    }
                }

                // Dropping Hgb
                if (byType['Hgb'] && byType['Hgb'].length >= 2) {
                    const sorted = byType['Hgb'].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    if (sorted[0].value < sorted[1].value && sorted[0].value < 8) {
                        flags.push({ type: 'lab', severity: 'critical', text: `Hgb dropping: ${sorted[1].value} → ${sorted[0].value}` });
                    } else if (sorted[0].value < sorted[1].value && sorted[0].value < 10) {
                        flags.push({ type: 'lab', severity: 'warning', text: `Hgb trending down: ${sorted[1].value} → ${sorted[0].value}` });
                    }
                }

                // Rising Cr (AKI)
                if (byType['Cr'] && byType['Cr'].length >= 2) {
                    const sorted = byType['Cr'].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    if (sorted[0].value > sorted[1].value * 1.3) {
                        flags.push({ type: 'lab', severity: 'warning', text: `Cr rising: ${sorted[1].value} → ${sorted[0].value} (possible AKI)` });
                    }
                }

                // Rising lactate
                if (byType['Lactate'] && byType['Lactate'].length >= 1) {
                    const latest = byType['Lactate'].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))[0];
                    if (latest.value > 4) flags.push({ type: 'lab', severity: 'critical', text: `Lactate elevated: ${latest.value}` });
                    else if (latest.value > 2) flags.push({ type: 'lab', severity: 'warning', text: `Lactate mildly elevated: ${latest.value}` });
                }

                // Critically abnormal K
                if (byType['K'] && byType['K'].length >= 1) {
                    const latest = byType['K'].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))[0];
                    if (latest.value > 5.5) flags.push({ type: 'lab', severity: 'critical', text: `Hyperkalemia: K ${latest.value}` });
                    if (latest.value < 3.0) flags.push({ type: 'lab', severity: 'critical', text: `Hypokalemia: K ${latest.value}` });
                }
            }

            // POD-based flags
            if (pod >= 3 && patient.diet === 'NPO') {
                flags.push({ type: 'clinical', severity: 'info', text: `POD ${pod} still NPO - consider diet advancement` });
            }
            if (pod >= 2 && patient.activity === 'Bedrest') {
                flags.push({ type: 'clinical', severity: 'info', text: `POD ${pod} still on bedrest - consider mobilization` });
            }

            // Manual concerns from the patient record
            if (patient.concerns) {
                flags.push({ type: 'manual', severity: 'warning', text: patient.concerns });
            }

            return flags;
        }

        // ==================== LAB TREND ANALYSIS ====================
        function getLabTrends(patientId, labs) {
            if (!labs || labs.length === 0) return [];
            const patientLabs = labs.filter(l => l.patientId === patientId);
            const byType = {};
            patientLabs.forEach(l => {
                if (!byType[l.type]) byType[l.type] = [];
                byType[l.type].push(l);
            });

            const trends = [];
            Object.entries(byType).forEach(([type, values]) => {
                if (values.length < 2) return;
                const sorted = values.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                const latest = sorted[sorted.length - 1];
                const prev = sorted[sorted.length - 2];
                const change = latest.value - prev.value;
                const pctChange = Math.abs(change / prev.value * 100);
                const range = LAB_RANGES[type];
                const isAbnormal = range && (latest.value < range.min || latest.value > range.max);

                if (Math.abs(change) > 0.01) {
                    trends.push({
                        type,
                        current: latest.value,
                        previous: prev.value,
                        change,
                        pctChange: pctChange.toFixed(0),
                        direction: change > 0 ? 'up' : 'down',
                        arrow: change > 0 ? '↑' : '↓',
                        isAbnormal,
                        unit: range?.unit || '',
                        values: sorted.map(v => ({ value: v.value, date: v.timestamp }))
                    });
                }
            });

            // Sort: critical trends first (abnormal + big change)
            trends.sort((a, b) => {
                if (a.isAbnormal && !b.isAbnormal) return -1;
                if (!a.isAbnormal && b.isAbnormal) return 1;
                return b.pctChange - a.pctChange;
            });

            return trends;
        }

        // ==================== REUSABLE DICTATION HOOK ====================
        function useDictation(onTranscriptChange) {
            const recognitionRef = React.useRef(null);
            const [isListening, setIsListening] = React.useState(false);
            const [transcript, setTranscript] = React.useState('');
            const [interimText, setInterimText] = React.useState('');
            const finalTranscriptRef = React.useRef('');

            React.useEffect(() => {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SR) {
                    const rec = new SR();
                    rec.continuous = true;
                    rec.interimResults = true;
                    rec.lang = 'en-US';
                    rec.onstart = () => setIsListening(true);
                    rec.onend = () => {
                        setIsListening(false);
                        setInterimText('');
                    };
                    rec.onerror = (e) => {
                        if (e.error !== 'no-speech') setIsListening(false);
                    };
                    rec.onresult = (event) => {
                        let interim = '';
                        let finalText = finalTranscriptRef.current;
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            const t = event.results[i][0].transcript;
                            if (event.results[i].isFinal) {
                                // Apply smart medical cleanup to final speech results
                                const cleaned = cleanMedicalSpeech(t.trim());
                                // Remove trailing period if we're appending to existing text
                                const toAppend = finalText ? cleaned.replace(/\.$/, '') : cleaned;
                                finalText += (finalText ? ' ' : '') + toAppend;
                            } else {
                                interim += t;
                            }
                        }
                        finalTranscriptRef.current = finalText;
                        setTranscript(finalText);
                        setInterimText(interim);
                        if (onTranscriptChange) onTranscriptChange(finalText);
                    };
                    recognitionRef.current = rec;
                }
                return () => { if (recognitionRef.current) try { recognitionRef.current.stop(); } catch(e){} };
            }, []);

            const start = () => {
                if (recognitionRef.current && !isListening) {
                    finalTranscriptRef.current = transcript;
                    try { recognitionRef.current.start(); } catch(e){}
                }
            };
            const stop = () => {
                if (recognitionRef.current && isListening) {
                    try { recognitionRef.current.stop(); } catch(e){}
                }
            };
            const toggle = () => isListening ? stop() : start();
            const clear = () => {
                finalTranscriptRef.current = '';
                setTranscript('');
                setInterimText('');
            };
            const displayText = transcript + (interimText ? (transcript ? ' ' : '') + interimText : '');

            return { isListening, transcript, interimText, displayText, start, stop, toggle, clear, setTranscript };
        }

        // Reusable Dictation UI component
        function DictationBar({ dictation, onParse, parseLabel, compact }) {
            if (compact) {
                return (
                    <div className="flex items-center gap-2">

                            className={`flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-sm font-medium transition ${
                                dictation.isListening
                                    ? 'bg-red-500 text-white animate-pulse'
                                    : 'bg-gray-50 text-gray-600 hover:bg-gray-100'
                            }`}>
                            {dictation.isListening ? '⏹ Stop' : '🎤 Dictate'}
                        </button>
                        {dictation.displayText && (
                            <span className="text-sm text-gray-500 truncate flex-1">{dictation.displayText.slice(-60)}</span>
                        )}
                        {dictation.displayText && onParse && (
                            <button type="button" onClick={() => onParse(dictation.transcript)}
                                className="text-xs bg-medical-500 hover:bg-medical-600 text-white px-2 py-1 rounded transition">
                                {parseLabel || 'Apply'}
                            </button>
                        )}
                        {dictation.displayText && (
                            <button type="button" onClick={dictation.clear}
                                className="text-xs text-gray-400 hover:text-gray-600 px-1">✕</button>
                        )}
                    </div>
                );
            }
            return (
                <div className="bg-slate-50 border border-gray-300 rounded-xl p-3 mb-3">
                    <div className="flex items-center justify-between mb-2">
                        <button type="button" onClick={dictation.toggle}
                            className={`flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition ${
                                dictation.isListening
                                    ? 'bg-red-500 text-white animate-pulse'
                                    : 'bg-gray-50 text-gray-600 hover:bg-gray-100'
                            }`}>
                            {dictation.isListening ? '⏹ Stop Recording' : '🎤 Start Dictation'}
                        </button>
                        <div className="flex gap-2">
                            {dictation.displayText && onParse && (
                                <button type="button" onClick={() => onParse(dictation.transcript)}
                                    className="text-sm bg-medical-500 hover:bg-medical-600 text-white px-3 py-1.5 rounded-lg transition">
                                    {parseLabel || 'Parse & Fill'}
                                </button>
                            )}
                            {dictation.displayText && (
                                <button type="button" onClick={dictation.clear}
                                    className="text-sm text-gray-400 hover:text-gray-600 px-2 py-1.5">Clear</button>
                            )}
                        </div>
                    </div>
                    {(dictation.displayText || dictation.isListening) && (
                        <div className="bg-white rounded p-2 min-h-[40px] text-sm">
                            <span className="text-gray-600">{dictation.transcript}</span>
                            {dictation.interimText && <span className="text-gray-400 italic"> {dictation.interimText}</span>}
                            {dictation.isListening && !dictation.displayText && (
                                <span className="text-gray-400 italic">Listening... speak naturally</span>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        // ==================== SPEECH PARSERS FOR EACH SECTION ====================
        function parseTaskSpeech(transcript) {
            const t = transcript.toLowerCase();
            const result = {};
            const roomMatch = transcript.match(/room\s+(\d+)/i);
            if (roomMatch) result.room = roomMatch[1];

            const categories = {
                'Labs': /\b(lab|labs|check labs|draw labs|repeat labs|bmp|cmp|cbc|coags)\b/i,
                'Imaging': /\b(imaging|ct|x-ray|xray|mri|ultrasound|scan|echo|cxr)\b/i,
                'Consults': /\b(consult|call|page|notify)\b/i,
                'Medications': /\b(medication|med|start|give|administer|heparin|antibiotic|tylenol|morphine|dilaudid)\b/i,
                'Activity': /\b(activity|ambulate|pt eval|physical therapy|ot eval|walk|dangle|chair)\b/i,
                'Diet': /\b(diet|advance diet|npo|clears|regular diet|feed|nutrition|swallow)\b/i,
                'Discharge': /\b(discharge|dc|dispo|home|rehab|snf|case management|social work|follow.?up)\b/i,
            };
            for (const [cat, regex] of Object.entries(categories)) {
                if (regex.test(t)) { result.category = cat; break; }
            }
            if (!result.category) result.category = 'Other';

            if (/\b(urgent|high priority|important|asap|stat)\b/i.test(t)) result.priority = 'High';
            else if (/\b(low priority|when.?ever|if.?time|non.?urgent)\b/i.test(t)) result.priority = 'Low';
            else result.priority = 'Medium';

            result.description = transcript.replace(/room\s+\d+/i, '').trim();
            return result;
        }

        function parseHandoffSpeech(transcript) {
            const result = {};
            const ifThenMatch = transcript.match(/if\s+(.+?)(?:then|,)\s*(.+?)(?:also|and also|$)/i);
            if (ifThenMatch) {
                result.ifThen = 'If ' + ifThenMatch[1].trim() + ', then ' + ifThenMatch[2].trim();
            }
            const overnightMatch = transcript.match(/overnight\s+(?:plan\s+)?(?:is\s+)?(.+?)(?:if\s+|contact|$)/i);
            if (overnightMatch) result.overnightPlan = overnightMatch[1].trim();
            const contactMatch = transcript.match(/(?:contact|call|reach|page)\s+(.+?)$/i);
            if (contactMatch) result.contact = contactMatch[1].trim();
            result.fullText = transcript;
            return result;
        }

        function parsePreRoundSpeech(transcript) {
            // Normalize: fix common speech-to-text issues (words run together, etc.)
            let t = transcript
                .replace(/IV(?=[a-z])/g, 'IV ')        // "IVfluids" -> "IV fluids"
                .replace(/(?<=[a-z])IV/g, ' IV')        // "painIV" -> "pain IV"
                .replace(/(\d)(?=[a-zA-Z])/g, '$1 ')    // "120over80" -> "120 over 80"
                .replace(/(?<=[a-zA-Z])(\d)/g, ' $1')   // "WBC12" -> "WBC 12"
                .replace(/\bpayments?\b/gi, 'pain meds') // common STT error
                .replace(/\boral\s*payments?\b/gi, 'oral pain meds')
                .replace(/\bover\s*(\d)/gi, '/$1')      // "120 over 80" -> "120/80"
                .replace(/\bby\s*mouth\b/gi, 'PO')
                .replace(/\bintravenous\b/gi, 'IV');

            const result = { checkedItems: [], sectionNotes: {}, patientUpdates: {}, examFindings: '' };

            // ---- VITALS: scan entire transcript for any vital signs ----
            const vitals = [];
            if (/\b(afebrile|no fever|not febrile)\b/i.test(t)) vitals.push('Afebrile');
            else if (/\b(febrile|fever|spiked|temp\s*(?:of\s*)?\d)/i.test(t)) {
                const tv = t.match(/temp(?:erature|s)?\s*(?:is|was|of|:)?\s*(\d{2,3}\.?\d*)/i);
                vitals.push(tv ? `T ${tv[1]}` : 'Febrile');
            }
            const hrV = t.match(/(?:heart rate|hr|pulse)\s*(?:is|was|of|:)?\s*(\d{2,3})/i);
            if (hrV) vitals.push(`HR ${hrV[1]}`);
            else if (/\btachycardic\b/i.test(t)) vitals.push('Tachy');
            else if (/\bbradycardic\b/i.test(t)) vitals.push('Brady');
            const bpV = t.match(/(?:bp|blood pressure)\s*(?:is|was|of|:)?\s*(\d{2,3}\s*\/\s*\d{2,3})/i);
            if (bpV) vitals.push(`BP ${bpV[1].replace(/\s/g, '')}`);
            else if (/\bhypotensive\b/i.test(t)) vitals.push('Hypotensive');
            else if (/\bhypertensive\b/i.test(t)) vitals.push('Hypertensive');
            const rrV = t.match(/(?:rr|resp(?:iratory)?\s*rate|respirations?)\s*(?:is|was|of|:)?\s*(\d{1,2})/i);
            if (rrV) vitals.push(`RR ${rrV[1]}`);
            const satV = t.match(/(?:sat(?:s|uration)?|o2|spo2|pulse ox)\s*(?:is|was|of|:)?\s*(\d{2,3})\s*%?/i);
            if (satV) vitals.push(`SpO2 ${satV[1]}%`);
            if (/\b(hemodynamically stable|hd stable|vitals?\s*(?:are\s*)?stable|vitals?\s*(?:are\s*)?(?:within )?normal|vitals?\s*(?:look\s*)?good|vitals?\s*wnl|stable vitals?)\b/i.test(t)) {
                if (vitals.length === 0) vitals.push('Stable');
            }
            if (/\b(vitals?\s*(?:reviewed|checked|looked at|look good|are fine|unremarkable))\b/i.test(t) && vitals.length === 0) vitals.push('Reviewed');

            if (vitals.length > 0) {
                result.sectionNotes.vitals = vitals.join(', ');
                result.checkedItems.push('vitals');
            }

            // ---- LABS: scan for any lab values or lab-related words ----
            const labNorm = { 'white count': 'WBC', 'white blood cell': 'WBC', 'wbc': 'WBC', 'hemoglobin': 'Hgb', 'hgb': 'Hgb', 'hematocrit': 'Hct', 'hct': 'Hct',
                'platelets': 'Plt', 'plt': 'Plt', 'sodium': 'Na', 'na': 'Na', 'potassium': 'K', 'k': 'K',
                'chloride': 'Cl', 'cl': 'Cl', 'co2': 'CO2', 'bicarb': 'CO2', 'bun': 'BUN', 'creatinine': 'Cr', 'cr': 'Cr',
                'glucose': 'Glucose', 'calcium': 'Ca', 'ca': 'Ca', 'magnesium': 'Mg', 'mg': 'Mg',
                'phosphorus': 'Phos', 'phos': 'Phos', 'inr': 'INR', 'ptt': 'PTT', 'pt': 'PT',
                'lactate': 'Lactate', 'lactic': 'Lactate', 'troponin': 'Troponin', 'lipase': 'Lipase',
                'bilirubin': 'Tbili', 'tbili': 'Tbili', 'ast': 'AST', 'alt': 'ALT', 'alk phos': 'Alk Phos', 'albumin': 'Albumin' };
            const labPattern = /\b(wbc|white (?:blood )?count|hemoglobin|hgb|hct|hematocrit|platelets?|plt|sodium|na|potassium|k|chloride|cl|co2|bicarb|bun|creatinine|cr|glucose|calcium|ca|magnesium|mg|phosphorus|phos|inr|ptt|pt|lactate|lactic|troponin|lipase|bilirubin|tbili|ast|alt|alk phos|albumin)\s*(?:is|was|of|at|came back|:)?\s*(\d+\.?\d*)/gi;
            let lm;
            const labEntries = [];
            while ((lm = labPattern.exec(t)) !== null) {
                const name = labNorm[lm[1].toLowerCase()] || lm[1].toUpperCase();
                labEntries.push(`${name} ${lm[2]}`);
            }
            if (/\b(leukocytosis|elevated wbc|wbc\s*(?:is\s*)?(?:up|rising|elevated|high|trending up))\b/i.test(t)) labEntries.push('WBC elevated');
            if (/\b(anemia|low\s*(?:hgb|hemoglobin)|hgb\s*(?:is\s*)?(?:down|dropping|low|decreased))\b/i.test(t)) labEntries.push('Hgb low');
            if (/\b(aki|acute kidney|creatinine\s*(?:is\s*)?(?:up|rising|elevated|bumped))\b/i.test(t)) labEntries.push('Cr elevated');
            if (/\b(labs?\s+(?:are\s*)?(?:stable|wnl|normal|within normal|unremarkable|improved|look(?:ing)?\s*good|look(?:ing)?\s*better|trending\s*(?:down|up|better)))\b/i.test(t)) {
                const ql = t.match(/labs?\s+(?:are\s*)?(stable|wnl|normal|within normal|unremarkable|improved|look(?:ing)?\s*good|look(?:ing)?\s*better|trending\s*(?:down|up|better))/i);
                if (ql && labEntries.length === 0) labEntries.push(`Labs ${ql[1]}`);
            }
            if (/\b(labs?\s*(?:reviewed|checked|looked at))\b/i.test(t) && labEntries.length === 0) labEntries.push('Labs reviewed');
            if (/\b(cbc|bmp|cmp|lfts?|coags?)\s*(?:is|was|are|were|looks?|came back)?\s*(normal|wnl|stable|unremarkable|within normal)/i.test(t)) {
                const panelMatch = t.match(/(cbc|bmp|cmp|lfts?|coags?)\s*(?:is|was|are|were|looks?|came back)?\s*(normal|wnl|stable|unremarkable|within normal)/i);
                labEntries.push(`${panelMatch[1].toUpperCase()} ${panelMatch[2]}`);
            }

            if (labEntries.length > 0) {
                result.sectionNotes.labs = labEntries.join(', ');
                result.checkedItems.push('labs');
            }

            // ---- I/Os ----
            const ioNotes = [];
            const uopMatch = t.match(/(?:uop|urine output|put out|making|voided?|foley)\s*(?:is|was|of|about|:)?\s*(\d+)\s*(?:ml|cc|mls|milliliters?)?/i);
            if (uopMatch) ioNotes.push(`UOP ${uopMatch[1]}mL`);
            if (/\b(net\s*positive|positive\s*(?:fluid|balance)|fluid\s*positive)\b/i.test(t)) ioNotes.push('Net positive');
            if (/\b(net\s*negative|negative\s*(?:fluid|balance)|fluid\s*negative)\b/i.test(t)) ioNotes.push('Net negative');
            if (/\b(net\s*even|even\s*(?:fluid|balance)|fluid\s*even|balanced)\b/i.test(t)) ioNotes.push('Net even');
            if (/\b(good\s*(?:urine\s*)?output|adequate\s*(?:urine\s*)?output|making\s*(?:good\s*)?urine|good\s*uop)\b/i.test(t)) ioNotes.push('Adequate UOP');
            if (/\b(low\s*(?:urine\s*)?output|poor\s*output|oliguric|not\s*making\s*(?:much\s*)?urine|decreased\s*(?:urine\s*)?output|low\s*uop)\b/i.test(t)) ioNotes.push('Low UOP');
            const drainOut = t.match(/(?:jp|drain|ng|ngt|chest tube)\s*(?:output|put out|is|was|:)?\s*(\d+)\s*(?:ml|cc)?/i);
            if (drainOut) ioNotes.push(`Drain ${drainOut[1]}mL`);
            if (/\b(i\s*(?:and|&)\s*o(?:s)?|i\/o(?:s)?|ins?\s*and\s*outs?)\s*(?:are\s*|look\s*)?(reviewed|even|balanced|wnl|good|fine|look\s*good)\b/i.test(t)) ioNotes.push('I/Os reviewed');
            if (/\b(stop(?:ping)?\s*(?:the\s*)?(?:iv|IV)\s*fluids?|d\/?c\s*(?:the\s*)?(?:iv|IV)\s*fluids?|off\s*(?:iv|IV)\s*fluids?)\b/i.test(t)) ioNotes.push('D/C IV fluids');
            if (/\b((?:iv|IV)\s*fluids?\s*(?:running|at|infusing))\b/i.test(t)) ioNotes.push('IVF running');

            if (ioNotes.length > 0) {
                result.sectionNotes.ios = ioNotes.join(', ');
                result.checkedItems.push('ios');
            }

            // ---- OVERNIGHT ----
            const overnightNotes = [];
            if (/\b(uneventful|no\s*(?:overnight\s*)?events?|quiet\s*night|slept\s*well|no\s*issues|no\s*concerns?|nothing\s*overnight|good\s*night|no\s*complaints?)\b/i.test(t)) overnightNotes.push('Uneventful night');
            if (/\b(nurs(?:e|ing)\s+(?:called|reports?|says?|said|noted|mentioned))\b/i.test(t)) {
                const nm = t.match(/nurs(?:e|ing)\s+(?:called|reports?|says?|said|noted|mentioned)\s+(.+?)(?:\.|,\s*(?:vitals|labs|plan|pain|i\/o|lines)|$)/i);
                overnightNotes.push(nm ? `Nursing: ${nm[1].trim().substring(0, 60)}` : 'Nursing called');
            }
            if (/\b(poor\s*sleep|restless|agitated|confused|delirium|sundowner|sundowning|didn't sleep|couldn't sleep)\b/i.test(t)) overnightNotes.push('Restless/poor sleep');
            if (/\b(nausea|vomiting|vomited|emesis|threw up|n\/?v)\b/i.test(t)) overnightNotes.push('N/V');
            if (/\b(desatted|desaturation|desaturated|hypoxic|required\s*(?:more\s*)?o2|oxygen\s*requirement|o2\s*requirement)\b/i.test(t)) overnightNotes.push('Desaturation event');
            if (/\b(tachycardi(?:a|c)\s*(?:overnight|last night|episode)|had\s*(?:an?\s*)?episode)\b/i.test(t)) overnightNotes.push('Episode overnight');

            if (overnightNotes.length > 0) {
                result.sectionNotes.overnight = overnightNotes.join('; ');
                result.checkedItems.push('overnight');
            }

            // ---- LINES/DRAINS/TUBES ----
            const lineNotes = [];
            if (/\b(piv|peripheral\s*(?:iv|line)|(?:iv|IV)\s*(?:in place|intact|working|x\s*\d+|site\s*(?:looks?\s*)?(?:good|clean)))\b/i.test(t)) lineNotes.push('PIV intact');
            if (/\b(central\s*line|triple\s*lumen|tlc|quad\s*lumen|picc)\b/i.test(t)) {
                const cl = t.match(/(central\s*line|triple\s*lumen|tlc|quad\s*lumen|picc)/i)[1];
                lineNotes.push(/\b(d\/?c|removed|pulled|discontinued|out)\b/i.test(t) ? `${cl} d/c` : `${cl} intact`);
            }
            if (/\bfoley\b/i.test(t)) lineNotes.push(/\b(d\/?c|removed|pulled|out|discontinued)\b/i.test(t) ? 'Foley d/c' : 'Foley in place');
            if (/\b(jp|jackson[\s-]?pratt)\b/i.test(t)) lineNotes.push('JP in place');
            if (/\b(ng\s*tube|ngt|nasogastric)\b/i.test(t)) {
                lineNotes.push(/\b(d\/?c|removed|out)\b/i.test(t) ? 'NGT d/c' : /\b(suction|lcws|wall)\b/i.test(t) ? 'NGT to LCWS' : 'NGT in place');
            }
            if (/\b(chest\s*tube)\b/i.test(t)) lineNotes.push('Chest tube in place');
            if (/\b(wound\s*vac)\b/i.test(t)) lineNotes.push('Wound vac intact');
            if (/\b(lines?\s*(?:are\s*)?(?:all\s*)?intact|no\s*(?:lines|drains|tubes)|lines?\s*(?:look\s*)?good)\b/i.test(t)) {
                if (lineNotes.length === 0) lineNotes.push('Lines intact');
            }
            if (/\b(drain(?:s|age)?|draining)\b/i.test(t) && lineNotes.length === 0) lineNotes.push('Drains noted');

            if (lineNotes.length > 0) {
                result.sectionNotes.lines = lineNotes.join(', ');
                result.checkedItems.push('lines');
            }

            // ---- MEDICATIONS ----
            const medNotes = [];
            // Specific antibiotics
            const abxNames = t.match(/\b(vanco(?:mycin)?|zosyn|pip(?:eracillin)?(?:\s*tazo(?:bactam)?)?|flagyl|metronidazole|ancef|cefazolin|cipro(?:floxacin)?|meropenem|unasyn|augmentin|levo(?:floxacin)?|levaquin|doxy(?:cycline)?|bactrim|clindamycin|ceftriaxone|rocephin|cefepime|amp(?:icillin)?(?:\s*sulbactam)?|keflex|cephalexin)\b/gi);
            if (abxNames) {
                const unique = [...new Set(abxNames.map(n => n.charAt(0).toUpperCase() + n.slice(1).toLowerCase()))];
                medNotes.push(`Abx: ${unique.join(', ')}`);
            }
            // Pain meds
            const painMeds = t.match(/\b(dilaudid|hydromorphone|morphine|oxycodone|percocet|tylenol|acetaminophen|toradol|ketorolac|gabapentin|ibuprofen|motrin|advil|norco|tramadol|fentanyl)\b/gi);
            if (painMeds) {
                const unique = [...new Set(painMeds.map(n => n.charAt(0).toUpperCase() + n.slice(1).toLowerCase()))];
                medNotes.push(`Pain meds: ${unique.join(', ')}`);
            }
            if (/\b(heparin|lovenox|enoxaparin)\b/i.test(t)) medNotes.push('DVT ppx');
            if (/\b(insulin|sliding scale|iss)\b/i.test(t)) medNotes.push('Insulin/SSI');
            if (/\b(pca)\b/i.test(t)) medNotes.push('PCA');
            if (/\b(home\s*meds?\s*(?:resumed|restarted|back on|taking))\b/i.test(t)) medNotes.push('Home meds resumed');
            if (/\b(home\s*meds?\s*(?:held|on hold|not taking|stopped))\b/i.test(t)) medNotes.push('Home meds held');
            if (/\b(meds?\s*(?:reviewed|unchanged|continued|no\s*changes?|same)|no\s*med\s*changes?|continue\s*(?:current\s*)?meds?)\b/i.test(t)) {
                if (medNotes.length === 0) medNotes.push('Meds reviewed, no changes');
            }
            // Catch "switch from IV to oral" or "transition to PO"
            if (/\bswitch\b.*\bIV\b.*\b(?:oral|po)\b/i.test(t) || /\btransition\b.*\b(?:oral|po)\b/i.test(t) || /\bIV\s*to\s*(?:oral|po)\b/i.test(t)) medNotes.push('Transition IV to PO');
            if (/\b(stop(?:ping)?\s*(?:the\s*)?(?:iv|IV)\s*(?:pain\s*)?meds?)\b/i.test(t)) medNotes.push('D/C IV pain meds');
            if (/\b(oral\s*pain\s*meds?|po\s*pain\s*(?:meds?|control))\b/i.test(t)) medNotes.push('Start PO pain meds');

            if (medNotes.length > 0) {
                result.sectionNotes.meds = medNotes.join(', ');
                result.checkedItems.push('meds');
            }

            // ---- PAIN ----
            const painNotes = [];
            const painScore = t.match(/(?:pain\s*(?:(?:score|level|scale|is|was|of|at|:)\s*)?)(\d{1,2})\s*(?:\/|out of)\s*10/i) ||
                              t.match(/(\d{1,2})\s*(?:\/|out of)\s*10\s*(?:for\s*)?pain/i);
            if (painScore) painNotes.push(`Pain ${painScore[1]}/10`);
            if (/\b(well\s*controlled|pain\s*(?:is\s*)?controlled|comfortable|no\s*pain|pain\s*free|minimal\s*pain|pain\s*(?:is\s*)?good|tolerable|managing\s*(?:well|okay|ok)|doing\s*(?:well|okay|ok)\s*(?:with\s*)?pain)\b/i.test(t)) painNotes.push('Well controlled');
            if (/\b(poorly\s*controlled|uncontrolled|significant\s*pain|severe\s*pain|requesting\s*(?:more\s*)?pain\s*med|in\s*(?:a\s*lot\s*of\s*)?pain|hurting|not\s*controlled)\b/i.test(t)) painNotes.push('Poorly controlled');
            if (/\b(epidural)\b/i.test(t)) painNotes.push('Epidural');
            if (/\b(nerve\s*block)\b/i.test(t)) painNotes.push('Nerve block');

            if (painNotes.length > 0) {
                result.sectionNotes.pain = painNotes.join(', ');
                result.checkedItems.push('pain');
            }

            // ---- PLAN ----
            const planNotes = [];
            // Capture "plan is to..." or "the plan for today is..."
            const planMatch = t.match(/(?:the\s*)?plan\s*(?:is|for today(?:'?s)?|today(?:'?s)?\s*plan\s*is)?\s*(?:is\s*)?(?:to\s*)?(.+?)(?:(?:\.\s*(?:vitals|labs|pain|overnight|lines|i\/o|exam))|$)/i);
            if (planMatch && planMatch[1].trim().length > 3) planNotes.push(planMatch[1].trim().substring(0, 120));
            if (/\b(advance\s*(?:the\s*)?diet|advancing\s*diet|advance\s*to)\b/i.test(t)) planNotes.push('Advance diet');
            if (/\b(d\/?c\s*(?:today|tomorrow|in the morning|home|when)|discharge\s*(?:today|tomorrow|pending|home|when)|going\s*home|ready\s*for\s*discharge|send\s*(?:them?\s*)?home)\b/i.test(t)) planNotes.push('D/C planning');
            if (/\b(to\s*(?:the\s*)?or|back\s*to\s*or|surgery\s*today|procedure\s*today|scope\s*today|operative|taking\s*(?:them?\s*)?(?:to|back))\b/i.test(t)) planNotes.push('OR/procedure');
            if (/\b(continue\s*(?:current|same|the)?\s*(?:plan|management)|stay\s*the\s*course|same\s*plan|no\s*changes?\s*(?:to\s*(?:the\s*)?plan)?)\b/i.test(t)) planNotes.push('Continue current plan');
            if (/\b(consult|get\s*(?:a\s*)?consult|call\s*(?:a\s*)?consult)\b/i.test(t)) {
                const cm = t.match(/consult\s+(\w+)/i);
                planNotes.push(cm ? `Consult ${cm[1]}` : 'Consult pending');
            }
            if (/\b(remove|pull|take\s*out|d\/?c)\s*(?:the\s*)?(?:foley|jp|drain|ngt?|ng\s*tube|chest\s*tube|picc|central\s*line)\b/i.test(t)) {
                const rm = t.match(/(?:remove|pull|take\s*out|d\/?c)\s*(?:the\s*)?(foley|jp|drain|ngt?|ng\s*tube|chest\s*tube|picc|central\s*line)/i);
                planNotes.push(`D/C ${rm[1]}`);
            }

            if (planNotes.length > 0) {
                result.sectionNotes.plan = [...new Set(planNotes)].join('; ');
                result.checkedItems.push('plan');
            }

            // ---- PHYSICAL EXAM only (for examFindings profile field) ----
            const examParts = [];
            if (/\bCTAB\b/i.test(t)) examParts.push('Lungs CTAB');
            if (/\bRRR\b/i.test(t)) examParts.push('Heart RRR');
            if (/\bS\/?NT\/?ND\b/i.test(t)) examParts.push('Abd S/NT/ND');
            if (/\bCDI\b/i.test(t) || /\bclean\s*dry\s*(?:and\s*)?intact\b/i.test(t)) examParts.push('Wound CDI');
            if (/\bA\s*&?\s*O\s*x?\s*3\b/i.test(t) || /\balert\s*(?:and\s*)?oriented\b/i.test(t)) examParts.push('Neuro A&Ox3');

            const examRules = [
                { pat: /(?:abdomen|abd(?:omen)?)\s+(?:is\s+)?((?:soft|distended|tender|non[\s-]?tender|non[\s-]?distended|flat|firm|rigid|guarding|diffuse|peritoneal|rebound).{0,40})/i, prefix: 'Abd' },
                { pat: /(?:wound|incision|surgical\s*site|staples|sutures?)\s+(?:is\s+|are\s+|looks?\s+)?((?:clean|dry|intact|open|draining|healing|well|erythema|no erythema|red|pink|closed).{0,40})/i, prefix: 'Wound' },
                { pat: /(?:lungs?|breath\s*sounds?)\s+(?:are\s+|is\s+)?((?:clear|diminished|crackles|wheezing|bilateral|equal|rhonchi|coarse).{0,40})/i, prefix: 'Lungs' },
                { pat: /(?:extremit(?:ies|y)|legs?|(?:lower|upper)\s*extrem)\s+(?:are\s+|is\s+|with\s+|no\s+|have\s+)?((?:no edema|edema|swelling|warm|cool|trace|pitting|pulses|symmetric).{0,40})/i, prefix: 'Ext' }
            ];
            examRules.forEach(({ pat, prefix }) => {
                const m = t.match(pat);
                if (m && !examParts.some(e => e.startsWith(prefix))) {
                    const finding = m[1].trim().replace(/[,.]$/, '').substring(0, 50);
                    if (finding.length > 1) examParts.push(`${prefix} ${finding}`);
                }
            });

            if (examParts.length > 0) {
                result.examFindings = examParts.join('; ');
            }

            // ---- Diet/Activity for patient profile updates ----
            const dietMatch = t.match(/(?:advance|change|switch|start)\s+(?:(?:the\s*)?diet\s+)?(?:to\s+)?(regular|clears?|full\s*liquids?|npo|mechanical\s*soft|cardiac|renal|diabetic)/i) ||
                              t.match(/diet\s*(?:is|to|:)\s*(regular|clears?|full\s*liquids?|npo|mechanical\s*soft|cardiac|renal|diabetic)/i);
            if (dietMatch) {
                const dietMap = { 'npo': 'NPO', 'clears': 'Clears', 'clear': 'Clears', 'full liquids': 'Full Liquids', 'full liquid': 'Full Liquids', 'regular': 'Regular', 'mechanical soft': 'Mechanical Soft', 'cardiac': 'Cardiac', 'renal': 'Renal', 'diabetic': 'Diabetic' };
                result.patientUpdates.diet = dietMap[dietMatch[1].toLowerCase().trim()] || dietMatch[1];
            }

            // De-duplicate checkedItems
            result.checkedItems = [...new Set(result.checkedItems)];

            return result;
        }

        function parseCensusSpeech(transcript) {
            const result = {};
            const roomMatch = transcript.match(/room\s+(\d+)/i);
            if (roomMatch) result.room = roomMatch[1];
            if (/\b(discharge|dc |dc$|send home)\b/i.test(transcript)) result.action = 'discharge';
            if (/\b(transfer|move to)\b/i.test(transcript)) result.action = 'transfer';
            const newRoomMatch = transcript.match(/(?:transfer|move)\s+(?:to\s+)?(?:room\s+)?(\d+)/i);
            if (newRoomMatch) result.newRoom = newRoomMatch[1];
            if (/\b(critical|unstable|crashing)\b/i.test(transcript)) result.status = 'critical';
            else if (/\b(guarded|concerning|watch)\b/i.test(transcript)) result.status = 'guarded';
            else if (/\b(stable|doing well|good)\b/i.test(transcript)) result.status = 'stable';
            return result;
        }

        // ==================== MODAL COMPONENTS ====================
        function PatientFormModal({ onClose, onSave, editingPatient }) {
            const [formData, setFormData] = React.useState(editingPatient || {
                room: '', diagnosis: '', problems: [], procedures: [], pmh: [],
                psh: [], homeMeds: [], allergies: [],
                antibiotics: [], examFindings: '',
                treatmentPlan: '', diet: 'Regular', activity: 'Ambulate TID',
                dvtProphylaxis: 'Heparin 5000 TID', giProphylaxis: 'Pantoprazole',
                dispositionPlan: '', concerns: '', codeStatus: 'Full Code',
                admitDate: getTodayISO()
            });
            const [selectedTemplate, setSelectedTemplate] = React.useState('');
            const [parsedFields, setParsedFields] = React.useState([]);

            const dictation = useDictation();

            const applyTemplate = () => {
                if (selectedTemplate && ERAS_TEMPLATES[selectedTemplate]) {
                    const template = ERAS_TEMPLATES[selectedTemplate];
                    setFormData(prev => ({
                        ...prev, ...template,
                        problems: typeof template.problems === 'string' ? [template.problems] : template.problems
                    }));
                    setSelectedTemplate('');
                }
            };

            const applyDictation = (transcript) => {
                const parsed = parseSpeechCommand(transcript);
                const filledFields = Object.keys(parsed).filter(k => parsed[k]);
                setParsedFields(filledFields);
                setFormData(prev => ({ ...prev, ...parsed }));
                // Flash the parsed fields indicator, clear after 3s
                setTimeout(() => setParsedFields([]), 3000);
            };

        function TaskFormModal({ patientId, teamData, onClose, onSave }) {
            const [category, setCategory] = React.useState('Labs');
            const [description, setDescription] = React.useState('');
            const [priority, setPriority] = React.useState('Medium');
            const [assignee, setAssignee] = React.useState('');
            const dictation = useDictation((transcript) => {
                const parsed = parseTaskSpeech(transcript);
                if (parsed.category) setCategory(parsed.category);
                if (parsed.priority) setPriority(parsed.priority);
                setDescription(parsed.description || transcript);
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                if (description) {
                    onSave({
                        patientId,
                        category,
                        description,
                        priority,
                        assignee,
                        completed: false,
                        createdAt: new Date().toISOString()
                    });
                    setDescription('');
                    setCategory('Labs');
                    setPriority('Medium');
                    setAssignee('');
                }
            };
