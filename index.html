        // ==================== TEAM SETUP ====================
        function TeamSetup({ user, onTeamReady }) {
            const [mode, setMode] = React.useState(null); // null, 'create', 'join'
            const [teamName, setTeamName] = React.useState('');
            const [joinCode, setJoinCode] = React.useState('');
            const [error, setError] = React.useState('');
            const [loading, setLoading] = React.useState(false);

            const generateCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();

            const handleCreate = async () => {
                if (!teamName.trim()) return;
                setLoading(true);
                setError('');
                try {
                    const code = generateCode();
                    const teamRef = await db.collection('teams').add({
                        name: teamName.trim(),
                        inviteCode: code,
                        createdBy: user.uid,
                        createdAt: new Date().toISOString(),
                        members: [{ uid: user.uid, name: user.displayName || user.email, email: user.email, role: 'admin' }]
                    });
                    await db.collection('users').doc(user.uid).set({
                        email: user.email,
                        displayName: user.displayName || user.email.split('@')[0],
                        teamId: teamRef.id,
                        teamIds: firebase.firestore.FieldValue.arrayUnion(teamRef.id),
                        role: 'admin'
                    }, { merge: true });
                    onTeamReady(teamRef.id);
                } catch (err) {
                    setError(err.message);
                }
                setLoading(false);
            };

            const handleJoin = async () => {
                if (!joinCode.trim()) return;
                setLoading(true);
                setError('');
                try {
                    const snap = await db.collection('teams').where('inviteCode', '==', joinCode.trim().toUpperCase()).get();
                    if (snap.empty) {
                        setError('Invalid invite code. Please check and try again.');
                        setLoading(false);
                        return;
                    }
                    const teamDoc = snap.docs[0];
                    const teamData = teamDoc.data();
                    const alreadyMember = teamData.members?.some(m => m.uid === user.uid);
                    if (!alreadyMember) {
                        await teamDoc.ref.update({
                            members: firebase.firestore.FieldValue.arrayUnion({
                                uid: user.uid,
                                name: user.displayName || user.email,
                                email: user.email,
                                role: 'member'
                            })
                        });
                    }
                    await db.collection('users').doc(user.uid).set({
                        email: user.email,
                        displayName: user.displayName || user.email.split('@')[0],
                        teamId: teamDoc.id,
                        teamIds: firebase.firestore.FieldValue.arrayUnion(teamDoc.id),
                        role: 'member'
                    }, { merge: true });
                    onTeamReady(teamDoc.id);
                } catch (err) {
                    setError(err.message);
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-lg p-8 w-full max-w-sm">
                        <div className="text-center mb-6">
                            <h1 className="text-2xl font-bold text-medical-700">🩺 Welcome!</h1>
                            <p className="text-gray-500 text-sm mt-1">Hi {user.displayName || user.email}. Set up your team to get started.</p>
                        </div>

                        {error && (
                            <div className="bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg p-3 mb-4">{error}</div>
                        )}

                        {!mode && (
                            <div className="space-y-3">
                                <button onClick={() => setMode('create')} className="w-full bg-medical-600 text-white hover:bg-medical-700 font-semibold py-3 px-4 rounded-lg transition">
                                    Create a New Team
                                </button>
                                <button onClick={() => setMode('join')} className="w-full bg-white border-2 border-gray-200 hover:border-gray-300 text-gray-700 font-medium py-3 px-4 rounded-lg transition">
                                    Join an Existing Team
                                </button>
                            </div>
                        )}

                        {mode === 'create' && (
                            <div className="space-y-3">
                                <input
                                    type="text"
                                    placeholder="Team name (e.g., Gen Surg Gold)"
                                    value={teamName}
                                    onChange={e => setTeamName(e.target.value)}
                                    className="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-medical-500"
                                />
                                <button onClick={handleCreate} disabled={loading} className="w-full bg-medical-600 text-white hover:bg-medical-700 font-semibold py-3 rounded-lg transition disabled:opacity-50">
                                    {loading ? 'Creating...' : 'Create Team'}
                                </button>
                                <button onClick={() => setMode(null)} className="w-full text-sm text-gray-500 hover:text-gray-700">Back</button>
                            </div>
                        )}

                        {mode === 'join' && (
                            <div className="space-y-3">
                                <input
                                    type="text"
                                    placeholder="Enter invite code"
                                    value={joinCode}
                                    onChange={e => setJoinCode(e.target.value.toUpperCase())}
                                    maxLength={6}
                                    className="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm tracking-widest text-center font-mono uppercase focus:outline-none focus:ring-2 focus:ring-medical-500"
                                />
                                <button onClick={handleJoin} disabled={loading} className="w-full bg-medical-600 text-white hover:bg-medical-700 font-semibold py-3 rounded-lg transition disabled:opacity-50">
                                    {loading ? 'Joining...' : 'Join Team'}
                                </button>
                                <button onClick={() => setMode(null)} className="w-full text-sm text-gray-500 hover:text-gray-700">Back</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==================== MAIN APP ====================
        function App() {
            const [user, setUser] = React.useState(null);
            const [teamId, setTeamId] = React.useState(null);
            const [teamData, setTeamData] = React.useState(null);
            const [allTeams, setAllTeams] = React.useState([]);
            const [authLoading, setAuthLoading] = React.useState(true);
            const [activeTab, setActiveTab] = React.useState('Home');
            const [isMobile, setIsMobile] = React.useState(window.innerWidth < 768);
            const [showProfile, setShowProfile] = React.useState(false);
            const [showTeamManager, setShowTeamManager] = React.useState(false);

            // Load all teams a user belongs to
            const loadAllTeams = async (uid) => {
                try {
                    const userDoc = await db.collection('users').doc(uid).get();
                    const userData = userDoc.exists ? userDoc.data() : {};
                    const teamIds = userData.teamIds || [];
                    // Always include current teamId if not in array (backwards compat)
                    if (userData.teamId && !teamIds.includes(userData.teamId)) {
                        teamIds.push(userData.teamId);
                    }
                    if (teamIds.length === 0) return [];
                    const teams = [];
                    for (const tid of teamIds) {
                        try {
                            const tDoc = await db.collection('teams').doc(tid).get();
                            if (tDoc.exists) teams.push({ id: tid, ...tDoc.data() });
                        } catch (e) { /* team may have been deleted */ }
                    }
                    setAllTeams(teams);
                    return teams;
                } catch (e) {
                    console.error('Error loading teams:', e);
                    return [];
                }
            };

            // Listen for auth state changes (persisted login)
            React.useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (u) => {
                    setUser(u);
                    if (u) {
                        try {
                            const userDoc = await db.collection('users').doc(u.uid).get();
                            if (userDoc.exists && userDoc.data().teamId) {
                                const tid = userDoc.data().teamId;
                                setTeamId(tid);
                                DB.setTeamId(tid);
                                const teamDoc = await db.collection('teams').doc(tid).get();
                                if (teamDoc.exists) setTeamData({ id: tid, ...teamDoc.data() });
                            }
                            await loadAllTeams(u.uid);
                        } catch (err) {
                            console.error('Error loading user/team data:', err);
                        }
                    } else {
                        setTeamId(null);
                        setTeamData(null);
                        setAllTeams([]);
                    }
                    setAuthLoading(false);
                });
                return () => unsub();
            }, []);

            React.useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const handleTeamReady = async (tid) => {
                setTeamId(tid);
                DB.setTeamId(tid);
                const teamDoc = await db.collection('teams').doc(tid).get();
                if (teamDoc.exists) setTeamData({ id: tid, ...teamDoc.data() });
                if (user) await loadAllTeams(user.uid);
                setActiveTab('Home');
            };

            const switchTeam = async (tid) => {
                setTeamId(tid);
                DB.setTeamId(tid);
                const teamDoc = await db.collection('teams').doc(tid).get();
                if (teamDoc.exists) setTeamData({ id: tid, ...teamDoc.data() });
                // Update active teamId in user doc
                await db.collection('users').doc(user.uid).set({ teamId: tid }, { merge: true });
                setActiveTab('Home');
                setShowProfile(false);
                setShowTeamManager(false);
            };

            const leaveTeam = async (tid) => {
                if (!user) return;
                try {
                    // Remove user from team members
                    const teamDoc = await db.collection('teams').doc(tid).get();
                    if (teamDoc.exists) {
                        const members = (teamDoc.data().members || []).filter(m => m.uid !== user.uid);
                        await db.collection('teams').doc(tid).update({ members });
                    }
                    // Remove team from user's teamIds
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    const userData = userDoc.exists ? userDoc.data() : {};
                    const teamIds = (userData.teamIds || []).filter(id => id !== tid);
                    const newActiveTeam = tid === teamId ? (teamIds[0] || null) : teamId;
                    await db.collection('users').doc(user.uid).set({ teamIds, teamId: newActiveTeam }, { merge: true });
                    // If leaving current team, switch
                    if (tid === teamId) {
                        if (newActiveTeam) {
                            await switchTeam(newActiveTeam);
                        } else {
                            setTeamId(null);
                            setTeamData(null);
                        }
                    }
                    await loadAllTeams(user.uid);
                } catch (e) {
                    console.error('Error leaving team:', e);
                }
            };

            const deleteTeam = async (tid) => {
                if (!user) return;
                try {
                    const teamDoc = await db.collection('teams').doc(tid).get();
                    if (!teamDoc.exists) return;
                    const tData = teamDoc.data();
                    // Only admin/creator can delete
                    if (tData.createdBy !== user.uid) {
                        alert('Only the team creator can delete this team.');
                        return;
                    }
                    // Delete the team document
                    await db.collection('teams').doc(tid).delete();
                    // Remove from all members' teamIds (just current user for now)
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    const userData = userDoc.exists ? userDoc.data() : {};
                    const teamIds = (userData.teamIds || []).filter(id => id !== tid);
                    const newActiveTeam = tid === teamId ? (teamIds[0] || null) : teamId;
                    await db.collection('users').doc(user.uid).set({ teamIds, teamId: newActiveTeam }, { merge: true });
                    if (tid === teamId) {
                        if (newActiveTeam) {
                            await switchTeam(newActiveTeam);
                        } else {
                            setTeamId(null);
                            setTeamData(null);
                        }
                    }
                    await loadAllTeams(user.uid);
                } catch (e) {
                    console.error('Error deleting team:', e);
                }
            };

            const handleSignOut = () => {
                auth.signOut();
                setUser(null);
                setTeamId(null);
                setTeamData(null);
                setAllTeams([]);
                setShowProfile(false);
                setShowTeamManager(false);
            };

            // Loading state
            if (authLoading) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center">
                        <div className="text-center">
                            <h1 className="text-2xl font-bold text-medical-700 mb-2">🩺 ChiefRounds</h1>
                            <p className="text-gray-500">Loading...</p>
                        </div>
                    </div>
                );
            }

            // Not logged in
            if (!user) {
                return <LoginScreen />;
            }

            // Logged in but no team
            if (!teamId) {
                return <TeamSetup user={user} onTeamReady={handleTeamReady} />;
            }

            const tabs = ['Patients', 'Attending', 'Tasks', 'Consults', 'Trauma', 'Census', 'Handoff', 'Pre-Round', 'Rounds'];

            // Home landing page component
            const HomeScreen = () => {
                const [stats, setStats] = React.useState({ patients: 0, incompleteTasks: 0, preRounded: 0 });

                React.useEffect(() => {
                    (async () => {
                        try {
                            const patients = (await DB.getAll('patients')).filter(p => p.status !== 'discharged');
                            const tasks = await DB.getAll('tasks');
                            const incomplete = tasks.filter(t => !t.completed).length;
                            const today = getTodayISO();
                            const preRounded = patients.filter(p => p.preRoundHistory?.[today]).length;
                            setStats({ patients: patients.length, incompleteTasks: incomplete, preRounded });
                        } catch (e) {}
                    })();
                }, []);

                const mainCards = [
                    {
                        title: 'Tasks',
                        subtitle: stats.incompleteTasks > 0 ? `${stats.incompleteTasks} incomplete` : 'All caught up',
                        icon: '\u2611\uFE0F',
                        color: 'bg-medical-600',
                        lightBg: 'bg-slate-50',
                        tab: 'Tasks'
                    },
                    {
                        title: 'Rounds',
                        subtitle: 'Record & parse rounds',
                        icon: '\uD83C\uDFA4',
                        color: 'bg-emerald-600',
                        lightBg: 'bg-emerald-50',
                        tab: 'Rounds'
                    },
                    {
                        title: 'Pre-Round',
                        subtitle: `${stats.preRounded}/${stats.patients} patients done`,
                        icon: '\uD83D\uDCCB',
                        color: 'bg-indigo-600',
                        lightBg: 'bg-indigo-50',
                        tab: 'Pre-Round'
                    }
                ];

                return (
                    <div className="p-4 md:p-8 max-w-4xl mx-auto">
                        <div className="mb-8 text-center md:text-left">
                            <h2 className="text-2xl md:text-3xl font-bold text-medical-800">
                                Good {new Date().getHours() < 12 ? 'morning' : new Date().getHours() < 17 ? 'afternoon' : 'evening'}{user.displayName ? `, ${user.displayName.split(' ')[0]}` : ''}
                            </h2>
                            <p className="text-gray-500 mt-1">{teamData?.name || 'Your team'} -- {stats.patients} patient{stats.patients !== 1 ? 's' : ''} on service</p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                            {mainCards.map(card => (
                                <button
                                    key={card.tab}
                                    onClick={() => setActiveTab(card.tab)}
                                    className="text-left bg-white border border-gray-100 rounded-xl p-6 shadow-sm hover:shadow-md transition-all hover:-translate-y-0.5 active:scale-[0.98]"
                                >
                                    <div className={`w-12 h-12 ${card.lightBg} rounded-xl flex items-center justify-center text-2xl mb-4`}>
                                        {card.icon}
                                    </div>
                                    <h3 className="text-lg font-bold text-gray-800 mb-1">{card.title}</h3>
                                    <p className="text-sm text-gray-500">{card.subtitle}</p>
                                </button>
                            ))}
                        </div>

                        <div className="border-t border-gray-200 pt-6">
                            <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-4">All Features</p>
                            <div className="grid grid-cols-3 md:grid-cols-6 gap-2">
                                {tabs.map(tab => (
                                    <button
                                        key={tab}
                                        onClick={() => setActiveTab(tab)}
                                        className="bg-white border border-gray-100 rounded-xl py-3 px-2 text-center hover:bg-slate-50 hover:border-medical-300 transition text-sm font-medium text-gray-600 hover:text-medical-700 shadow-sm"
                                    >
                                        {tab}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderContent = () => {
                switch (activeTab) {
                    case 'Home': return <HomeScreen />;
                    case 'Patients': return <PatientTracker />;
                    case 'Attending': return <AttendingView />;
                    case 'Tasks': return <TeamTasks teamData={teamData} currentUser={user} />;
                    case 'Consults': return <ConsultsTracker />;
                    case 'Trauma': return <TraumaActivations />;
                    case 'Census': return <CensusManagement />;
                    case 'Handoff': return <Handoff />;
                    case 'Pre-Round': return <PreRound />;
                    case 'Rounds': return <RoundsRecorder />;
                    default: return <HomeScreen />;
                }
            };

            // Team Manager Modal
            const TeamManagerModal = () => {
                const [mode, setMode] = React.useState(null); // null, 'create', 'join'
                const [newTeamName, setNewTeamName] = React.useState('');
                const [joinCode, setJoinCode] = React.useState('');
                const [error, setError] = React.useState('');
                const [loading, setLoading] = React.useState(false);
                const [confirmDelete, setConfirmDelete] = React.useState(null);
                const [confirmLeave, setConfirmLeave] = React.useState(null);

                const generateCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();

                const handleCreateNew = async () => {
                    if (!newTeamName.trim()) return;
                    setLoading(true);
                    setError('');
                    try {
                        const code = generateCode();
                        const teamRef = await db.collection('teams').add({
                            name: newTeamName.trim(),
                            inviteCode: code,
                            createdBy: user.uid,
                            createdAt: new Date().toISOString(),
                            members: [{ uid: user.uid, name: user.displayName || user.email, email: user.email, role: 'admin' }]
                        });
                        await db.collection('users').doc(user.uid).set({
                            teamId: teamRef.id,
                            teamIds: firebase.firestore.FieldValue.arrayUnion(teamRef.id)
                        }, { merge: true });
                        await switchTeam(teamRef.id);
                        setShowTeamManager(false);
                    } catch (err) {
                        setError(err.message);
                    }
                    setLoading(false);
                };

                const handleJoinNew = async () => {
                    if (!joinCode.trim()) return;
                    setLoading(true);
                    setError('');
                    try {
                        const snap = await db.collection('teams').where('inviteCode', '==', joinCode.trim().toUpperCase()).get();
                        if (snap.empty) {
                            setError('Invalid invite code.');
                            setLoading(false);
                            return;
                        }
                        const tDoc = snap.docs[0];
                        const tData = tDoc.data();
                        const alreadyMember = tData.members?.some(m => m.uid === user.uid);
                        if (!alreadyMember) {
                            await tDoc.ref.update({
                                members: firebase.firestore.FieldValue.arrayUnion({
                                    uid: user.uid, name: user.displayName || user.email, email: user.email, role: 'member'
                                })
                            });
                        }
                        await db.collection('users').doc(user.uid).set({
                            teamId: tDoc.id,
                            teamIds: firebase.firestore.FieldValue.arrayUnion(tDoc.id)
                        }, { merge: true });
                        await switchTeam(tDoc.id);
                        setShowTeamManager(false);
                    } catch (err) {
                        setError(err.message);
                    }
                    setLoading(false);
                };

                return (
                    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4 modal-backdrop" onClick={() => setShowTeamManager(false)}>
                        <div className="bg-white rounded-xl shadow-xl w-full max-w-md max-h-[80vh] overflow-y-auto modal-content" onClick={e => e.stopPropagation()}>
                            <div className="p-5 border-b border-gray-100">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-lg font-bold text-gray-800">Manage Teams</h2>
                                    <button onClick={() => setShowTeamManager(false)} className="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
                                </div>
                            </div>

                            <div className="p-5 space-y-3">
                                <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Your Teams</p>
                                {allTeams.map(t => (
                                    <div key={t.id} className={`border rounded-xl p-3 transition ${t.id === teamId ? 'border-medical-400 bg-slate-50' : 'border-gray-100 hover:border-gray-200'}`}>
                                        <div className="flex justify-between items-start">
                                            <div className="flex-1">
                                                <div className="flex items-center gap-2">
                                                    <p className="font-semibold text-gray-800">{t.name}</p>
                                                    {t.id === teamId && <span className="text-[10px] bg-medical-600 text-white px-1.5 py-0.5 rounded">Active</span>}
                                                </div>
                                                <div className="flex items-center gap-2 mt-1">
                                                    <span className="text-xs text-gray-400">Code:</span>
                                                    <code className="text-xs font-mono bg-gray-100 px-1.5 py-0.5 rounded tracking-wider">{t.inviteCode}</code>
                                                </div>
                                                <p className="text-xs text-gray-400 mt-1">{t.members?.length || 1} member(s)</p>
                                            </div>
                                            <div className="flex flex-col gap-1 ml-2">
                                                {t.id !== teamId && (
                                                    <button onClick={() => switchTeam(t.id)} className="text-xs bg-medical-600 text-white px-2.5 py-1 rounded-lg hover:bg-medical-700 transition">
                                                        Switch
                                                    </button>
                                                )}
                                                {confirmLeave === t.id ? (
                                                    <div className="flex gap-1">
                                                        <button onClick={() => { leaveTeam(t.id); setConfirmLeave(null); }} className="text-[10px] bg-red-500 text-white px-1.5 py-0.5 rounded">Yes</button>
                                                        <button onClick={() => setConfirmLeave(null)} className="text-[10px] bg-gray-200 text-gray-600 px-1.5 py-0.5 rounded">No</button>
                                                    </div>
                                                ) : (
                                                    <button onClick={() => setConfirmLeave(t.id)} className="text-xs text-gray-400 hover:text-amber-600 transition">
                                                        Leave
                                                    </button>
                                                )}
                                                {t.createdBy === user.uid && (
                                                    confirmDelete === t.id ? (
                                                        <div className="flex gap-1">
                                                            <button onClick={() => { deleteTeam(t.id); setConfirmDelete(null); }} className="text-[10px] bg-red-600 text-white px-1.5 py-0.5 rounded">Delete</button>
                                                            <button onClick={() => setConfirmDelete(null)} className="text-[10px] bg-gray-200 text-gray-600 px-1.5 py-0.5 rounded">No</button>
                                                        </div>
                                                    ) : (
                                                        <button onClick={() => setConfirmDelete(t.id)} className="text-xs text-gray-400 hover:text-red-600 transition">
                                                            Delete
                                                        </button>
                                                    )
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}

                                {allTeams.length === 0 && (
                                    <p className="text-sm text-gray-400 text-center py-4">No teams yet. Create or join one below.</p>
                                )}
                            </div>

                            <div className="p-5 border-t border-gray-100 space-y-3">
                                {!mode && (
                                    <div className="flex gap-2">
                                        <button onClick={() => setMode('create')} className="flex-1 bg-medical-600 hover:bg-medical-700 text-white py-2 rounded-lg font-medium text-sm transition">
                                            Create New Team
                                        </button>
                                        <button onClick={() => setMode('join')} className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 rounded-lg font-medium text-sm transition">
                                            Join Team
                                        </button>
                                    </div>
                                )}
                                {mode === 'create' && (
                                    <div className="space-y-2">
                                        <input value={newTeamName} onChange={e => setNewTeamName(e.target.value)} placeholder="Team name" className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-800" />
                                        <div className="flex gap-2">
                                            <button onClick={handleCreateNew} disabled={loading || !newTeamName.trim()} className="flex-1 bg-medical-600 hover:bg-medical-700 text-white py-2 rounded-lg font-medium text-sm disabled:opacity-50 transition">
                                                {loading ? 'Creating...' : 'Create'}
                                            </button>
                                            <button onClick={() => { setMode(null); setError(''); }} className="px-3 py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-lg text-sm transition">Cancel</button>
                                        </div>
                                    </div>
                                )}
                                {mode === 'join' && (
                                    <div className="space-y-2">
                                        <input value={joinCode} onChange={e => setJoinCode(e.target.value.toUpperCase())} placeholder="Invite code" maxLength={6} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-800 font-mono tracking-widest text-center uppercase" />
                                        <div className="flex gap-2">
                                            <button onClick={handleJoinNew} disabled={loading || !joinCode.trim()} className="flex-1 bg-medical-600 hover:bg-medical-700 text-white py-2 rounded-lg font-medium text-sm disabled:opacity-50 transition">
                                                {loading ? 'Joining...' : 'Join'}
                                            </button>
                                            <button onClick={() => { setMode(null); setError(''); }} className="px-3 py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-lg text-sm transition">Cancel</button>
                                        </div>
                                    </div>
                                )}
                                {error && <p className="text-xs text-red-500">{error}</p>}
                            </div>
                        </div>
                    </div>
                );
            };

            // Profile dropdown component
            const ProfileMenu = () => (
                <div className="relative">
                    <button
                        onClick={() => setShowProfile(!showProfile)}
                        className="flex items-center gap-2 bg-gray-50 hover:bg-gray-100 rounded-full py-1.5 px-3 transition"
                    >
                        <div className="w-7 h-7 rounded-full bg-medical-600 text-white flex items-center justify-center text-xs font-bold">
                            {(user.displayName || user.email || '?')[0].toUpperCase()}
                        </div>
                        <span className="text-sm font-medium text-gray-700 hidden md:inline">{user.displayName || user.email?.split('@')[0]}</span>
                    </button>
                    {showProfile && (
                        <div className="absolute right-0 top-full mt-2 bg-white border border-gray-100 rounded-xl shadow-lg w-72 z-50 overflow-hidden">
                            <div className="p-4 border-b border-gray-100">
                                <p className="font-semibold text-gray-800">{user.displayName || 'User'}</p>
                                <p className="text-xs text-gray-500">{user.email}</p>
                            </div>
                            {teamData && (
                                <div className="p-4 border-b border-gray-100">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <p className="text-xs text-gray-400 font-medium uppercase tracking-wide mb-1">Current Team</p>
                                            <p className="font-semibold text-gray-800">{teamData.name}</p>
                                        </div>
                                        <button onClick={() => { setShowTeamManager(true); setShowProfile(false); }} className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-2 py-1 rounded-lg transition">
                                            Manage
                                        </button>
                                    </div>
                                    <div className="flex items-center gap-2 mt-2">
                                        <span className="text-xs text-gray-500">Invite code:</span>
                                        <code className="text-xs font-mono bg-gray-100 px-2 py-0.5 rounded font-bold tracking-widest">{teamData.inviteCode}</code>
                                    </div>
                                    <p className="text-xs text-gray-400 mt-2">{teamData.members?.length || 1} member(s)</p>
                                    <div className="mt-2 space-y-1">
                                        {teamData.members?.map((m, i) => (
                                            <div key={i} className="flex items-center gap-2 text-xs text-gray-600">
                                                <div className="w-5 h-5 rounded-full bg-gray-200 flex items-center justify-center text-[10px] font-bold text-gray-500">{(m.name || m.email || '?')[0].toUpperCase()}</div>
                                                <span>{m.name || m.email}</span>
                                                {m.role === 'admin' && <span className="text-[10px] bg-medical-600 text-white px-1.5 py-0.5 rounded">Admin</span>}
                                            </div>
                                        ))}
                                    </div>
                                    {allTeams.length > 1 && (
                                        <div className="mt-3 pt-3 border-t border-gray-100">
                                            <p className="text-xs text-gray-400 mb-2">Switch team:</p>
                                            <div className="space-y-1">
                                                {allTeams.filter(t => t.id !== teamId).map(t => (
                                                    <button key={t.id} onClick={() => switchTeam(t.id)} className="w-full text-left text-xs px-2 py-1.5 rounded-lg hover:bg-slate-50 text-gray-600 hover:text-medical-700 transition flex justify-between items-center">
                                                        <span>{t.name}</span>
                                                        <span className="text-gray-300">{t.members?.length || 1}m</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                            <div className="p-2 space-y-0.5">
                                <button onClick={() => { setShowTeamManager(true); setShowProfile(false); }} className="w-full text-left px-3 py-2 text-sm text-gray-600 hover:bg-gray-50 rounded-md transition">
                                    Manage Teams
                                </button>
                                <button onClick={handleSignOut} className="w-full text-left px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded-md transition">
                                    Sign Out
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );

            const isHome = activeTab === 'Home';

            if (isMobile) {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col">
                        {showTeamManager && <TeamManagerModal />}
                        <div className="bg-white border-b border-gray-200 p-3 sticky top-0 z-20 shadow-sm">
                            <div className="flex justify-between items-center">
                                <div className="flex items-center gap-2">
                                    {!isHome && (
                                        <button onClick={() => setActiveTab('Home')} className="text-medical-600 hover:text-medical-700 p-1 -ml-1 transition">
                                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                                        </button>
                                    )}
                                    <div>
                                        <h1 className="text-xl font-bold text-medical-600">{isHome ? '\uD83E\uDE7A ChiefRounds' : activeTab}</h1>
                                        <p className="text-xs text-gray-500">{getTodayDateString()}</p>
                                    </div>
                                </div>
                                <ProfileMenu />
                            </div>
                        </div>

                        <div className={`flex-1 overflow-y-auto ${!isHome ? 'pb-20' : ''}`} onClick={() => showProfile && setShowProfile(false)}>
                            {renderContent()}
                        </div>

                        {!isHome && (
                            <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-[0_-2px_8px_rgba(0,0,0,0.06)] z-30" style={{paddingBottom: 'env(safe-area-inset-bottom)'}}>
                                <div className="flex overflow-x-auto scrollbar-hide" style={{WebkitOverflowScrolling: 'touch', scrollbarWidth: 'none', msOverflowStyle: 'none'}}>
                                    {tabs.map(tab => (
                                        <button
                                            key={tab}
                                            onClick={() => setActiveTab(tab)}
                                            className={`flex-shrink-0 py-3.5 px-4 text-[11px] font-medium transition whitespace-nowrap ${
                                                activeTab === tab
                                                    ? 'text-medical-600 border-t-2 border-medical-500 bg-slate-50/50'
                                                    : 'text-gray-400 hover:text-gray-600'
                                            }`}
                                        >
                                            {tab}
                                        </button>
                                    ))}
                                </div>
                            </nav>
                        )}
                    </div>
                );
            }

            // Desktop Layout
            return (
                <div className="min-h-screen bg-slate-50 flex flex-col">
                    {showTeamManager && <TeamManagerModal />}
                    <div className="bg-white border-b border-gray-200 p-4 sticky top-0 z-20 shadow-sm">
                        <div className="flex justify-between items-center">
                            <button onClick={() => setActiveTab('Home')} className="text-2xl font-bold text-medical-700 hover:text-medical-800 transition">
                                {'\uD83E\uDE7A'} ChiefRounds
                            </button>
                            <div className="flex items-center gap-4">
                                <p className="text-sm text-gray-500">{getCurrentDateTime()}</p>
                                <ProfileMenu />
                            </div>
                        </div>
                    </div>

                    {!isHome && (
                        <div className="bg-white border-b border-gray-200 flex overflow-x-auto shadow-sm">
                            <button
                                onClick={() => setActiveTab('Home')}
                                className="px-4 py-3 font-medium transition whitespace-nowrap text-gray-400 hover:text-medical-600"
                                title="Back to Home"
                            >
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="inline"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                            </button>
                            {tabs.map(tab => (
                                <button
                                    key={tab}
                                    onClick={() => setActiveTab(tab)}
                                    className={`px-4 py-3 font-medium transition whitespace-nowrap ${
                                        activeTab === tab
                                            ? 'text-medical-600 nav-item-active border-b-4 border-medical-500'
                                            : 'text-gray-500 hover:text-gray-600'
                                    }`}
                                >
                                    {tab}
                                </button>
                            ))}
                        </div>
                    )}

                    <div className="flex-1 overflow-y-auto" onClick={() => showProfile && setShowProfile(false)}>
                        {renderContent()}
                    </div>
                </div>
            );
        }

        // ==================== RENDER APP ====================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
