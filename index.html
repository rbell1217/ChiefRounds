        // ==================== CONSULTS SPEECH PARSER ====================
        function parseConsultSpeech(transcript) {
            const lower = transcript.toLowerCase();
            const result = {};

            // Patient ID lookup by room
            const roomMatch = transcript.match(/(?:room|patient room)\s+(\d+)/i);
            if (roomMatch) result.patientId = roomMatch[1];

            // Service
            const serviceKeywords = {
                'cardio': 'Cardiology', 'card': 'Cardiology',
                'pulmo': 'Pulmonology', 'respir': 'Pulmonology',
                'nephro': 'Nephrology', 'kidney': 'Nephrology',
                'gi': 'GI/Hepatology', 'hepato': 'GI/Hepatology', 'liver': 'GI/Hepatology',
                'infect': 'Infectious Disease', 'id': 'Infectious Disease',
                'endo': 'Endocrine', 'thyroid': 'Endocrine',
                'heme': 'Hematology/Oncology', 'onc': 'Hematology/Oncology', 'cancer': 'Hematology/Oncology',
                'neuro': 'Neurology', 'neuro': 'Neurosurgery',
                'ortho': 'Orthopedics', 'orthoped': 'Orthopedics',
                'vascular': 'Vascular Surgery', 'vasc': 'Vascular Surgery',
                'plastic': 'Plastic Surgery',
                'urology': 'Urology', 'urotogy': 'Urology', 'uro': 'Urology',
                'ob': 'OB/GYN', 'gyn': 'OB/GYN', 'obstet': 'OB/GYN',
                'psych': 'Psychiatry',
                'palli': 'Palliative Care',
                'pain': 'Pain Management',
                'pt': 'PT/OT', 'ot': 'PT/OT', 'physical': 'PT/OT',
                'speech': 'Speech/Swallow', 'swallow': 'Speech/Swallow',
                'nutri': 'Nutrition', 'diet': 'Nutrition',
                'social': 'Social Work',
                'case': 'Case Management',
                'ir': 'Interventional Radiology', 'intervent': 'Interventional Radiology',
                'radio': 'Radiology', 'imaging': 'Radiology',
                'path': 'Pathology',
                'wound': 'Wound Care'
            };
            for (let key in serviceKeywords) {
                if (lower.includes(key)) {
                    result.service = serviceKeywords[key];
                    break;
                }
            }

            // Reason
            const reasonMatch = transcript.match(/(?:reason|for|r\/o|rule out)\s+(.+?)(?:urgent|routine|emergent|finding|they found|consultant|recommend|$)/i);
            if (reasonMatch) result.reason = reasonMatch[1].trim();

            // Urgency
            if (/\b(?:emergent|emergenc|emergency)\b/i.test(lower)) result.urgency = 'Emergent';
            else if (/\b(?:urgent|urgency)\b/i.test(lower)) result.urgency = 'Urgent';
            else if (/\b(?:routine)\b/i.test(lower)) result.urgency = 'Routine';

            // Findings
            const findingsMatch = transcript.match(/(?:finding|found|show|they found|consultant found)\s+(.+?)(?:recommend|they recommend|follow|$)/i);
            if (findingsMatch) result.findings = findingsMatch[1].trim();

            // Recommendations
            const recsMatch = transcript.match(/(?:recommend|recs?|suggest)\s+(.+?)(?:follow|next|note|$)/i);
            if (recsMatch) result.recommendations = recsMatch[1].trim();

            // Follow up
            if (/follow[\s-]?up|they'll come back|come back|recheck|reassess|next visit|see again/i.test(lower)) {
                result.followUpNeeded = 'Yes - as recommended by consultant';
            }

            // Notes
            const noteMatch = transcript.match(/(?:note|notes)\s+(.+?)$/i);
            if (noteMatch) result.notes = noteMatch[1].trim();

            return result;
        }

        // ==================== CONSULTS TRACKER ====================
        function ConsultsTracker() {
            const [consults, setConsults] = React.useState([]);
            const [patients, setPatients] = React.useState([]);
            const [showForm, setShowForm] = React.useState(false);
            const [editingConsult, setEditingConsult] = React.useState(null);
            const [filter, setFilter] = React.useState('all');
            const [showQuickDictate, setShowQuickDictate] = React.useState(false);
            const [quickTranscript, setQuickTranscript] = React.useState('');
            const [quickListening, setQuickListening] = React.useState(false);
            const quickRecognitionRef = React.useRef(null);
            const [form, setForm] = React.useState({
                patientId: '', service: '', reason: '', urgency: 'Routine',
                requestedBy: '', requestTime: new Date().toISOString().slice(0, 16),
                recommendations: '', findings: '', followUpNeeded: '',
                status: 'Pending', notes: ''
            });

            const CONSULT_SERVICES = [
                'Cardiology', 'Pulmonology', 'Nephrology', 'GI/Hepatology', 'Infectious Disease',
                'Endocrine', 'Hematology/Oncology', 'Neurology', 'Neurosurgery', 'Orthopedics',
                'Vascular Surgery', 'Plastic Surgery', 'Urology', 'OB/GYN', 'Psychiatry',
                'Palliative Care', 'Pain Management', 'PT/OT', 'Speech/Swallow', 'Nutrition',
                'Social Work', 'Case Management', 'Interventional Radiology', 'Radiology',
                'Pathology', 'Wound Care', 'Other'
            ];

            React.useEffect(() => {
                loadData();
                setupQuickDictation();
            }, []);

            const setupQuickDictation = () => {
                if (typeof window !== 'undefined') {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (SpeechRecognition) {
                        quickRecognitionRef.current = new SpeechRecognition();
                        quickRecognitionRef.current.continuous = true;
                        quickRecognitionRef.current.interimResults = true;
                        quickRecognitionRef.current.onstart = () => setQuickListening(true);
                        quickRecognitionRef.current.onresult = (event) => {
                            let interimTranscript = '';
                            let finalTranscript = '';
                            for (let i = event.resultIndex; i < event.results.length; i++) {
                                const transcript = event.results[i][0].transcript;
                                if (event.results[i].isFinal) {
                                    finalTranscript += transcript + ' ';
                                } else {
                                    interimTranscript += transcript;
                                }
                            }
                            setQuickTranscript(prev => prev + finalTranscript + interimTranscript);
                        };
                        quickRecognitionRef.current.onerror = () => setQuickListening(false);
                        quickRecognitionRef.current.onend = () => setQuickListening(false);
                    }
                }
            };

            const startQuickDictation = () => {
                if (quickRecognitionRef.current) {
                    setQuickTranscript('');
                    quickRecognitionRef.current.start();
                }
            };

            const stopQuickDictation = () => {
                if (quickRecognitionRef.current) {
                    quickRecognitionRef.current.stop();
                }
            };

            const saveQuickConsult = async () => {
                const parsed = parseConsultSpeech(quickTranscript);
                if (!parsed.service || !parsed.reason) {
                    alert('Could not parse service and reason from speech. Please check the transcript.');
                    return;
                }

                const patientId = parsed.patientId ? Number(parsed.patientId) : null;
                const patient = patientId ? patients.find(p => p.id === patientId) : null;

                const data = {
                    patientId: parsed.patientId || '',
                    service: parsed.service || '',
                    reason: parsed.reason || '',
                    urgency: parsed.urgency || 'Routine',
                    findings: parsed.findings || '',
                    recommendations: parsed.recommendations || '',
                    followUpNeeded: parsed.followUpNeeded || '',
                    requestedBy: '',
                    requestTime: new Date().toISOString().slice(0, 16),
                    status: 'Pending',
                    notes: parsed.notes || '',
                    patientRoom: patient ? patient.room : 'N/A',
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };

                await DB.add('consults', data);
                setQuickTranscript('');
                setShowQuickDictate(false);
                loadData();
            };

            const loadData = async () => {
                try {
                    const [c, p] = await Promise.all([DB.getAll('consults'), DB.getAll('patients')]);
                    setConsults(c.sort((a, b) => {
                        const urgOrder = { 'Emergent': 0, 'Urgent': 1, 'Routine': 2 };
                        if (urgOrder[a.urgency] !== urgOrder[b.urgency]) return urgOrder[a.urgency] - urgOrder[b.urgency];
                        return new Date(b.requestTime) - new Date(a.requestTime);
                    }));
                    setPatients(p.filter(pt => pt.status === 'active'));
                } catch (e) { console.error(e); }
            };

            const resetForm = () => setForm({
                patientId: '', service: '', reason: '', urgency: 'Routine',
                requestedBy: '', requestTime: new Date().toISOString().slice(0, 16),
                recommendations: '', findings: '', followUpNeeded: '',
                status: 'Pending', notes: ''
            });

            const handleSave = async () => {
                if (!form.service || !form.reason) return;
                const patient = patients.find(p => p.id === Number(form.patientId));
                const data = { ...form, patientRoom: patient ? patient.room : 'N/A', updatedAt: new Date().toISOString() };
                if (editingConsult) {
                    await DB.put('consults', { ...data, id: editingConsult.id });
                } else {
                    data.createdAt = new Date().toISOString();
                    await DB.add('consults', data);
                }
                resetForm(); setEditingConsult(null); setShowForm(false); loadData();
            };

            const handleEdit = (c) => {
                setForm({ ...c });
                setEditingConsult(c);
                setShowForm(true);
            };

            const handleDelete = async (id) => {
                await DB.delete('consults', id);
                loadData();
            };

            const updateStatus = async (consult, newStatus) => {
                await DB.put('consults', { ...consult, status: newStatus, updatedAt: new Date().toISOString() });
                loadData();
            };

            const filtered = filter === 'all' ? consults : consults.filter(c => c.status === filter);

            const statusColors = {
                'Pending': 'bg-amber-500/20 text-amber-600 border-amber-500/50',
                'Seen': 'bg-medical-500/20 text-medical-600 border-medical-500/50',
                'Recs Given': 'bg-emerald-50 text-emerald-600 border-emerald-500/50',
                'Follow-Up': 'bg-purple-500/20 text-purple-400 border-purple-500/50',
                'Signed Off': 'bg-slate-500/20 text-gray-500 border-gray-300/50'
            };

            const urgencyColors = { 'Emergent': 'text-red-600', 'Urgent': 'text-amber-600', 'Routine': 'text-gray-500' };

            const pendingCount = consults.filter(c => c.status === 'Pending').length;
            const activeCount = consults.filter(c => ['Pending', 'Seen', 'Follow-Up'].includes(c.status)).length;

            return (
                <div className="p-4 pb-20 max-w-4xl mx-auto">
                    {showQuickDictate && (
                        <div className="bg-white border border-medical-500/50 rounded-xl p-4 mb-4 shadow-lg shadow-sky-500/10">
                            <div className="flex items-center justify-between mb-3">
                                <h3 className="text-white font-bold">Quick Dictate Consult</h3>
                                <button onClick={() => { stopQuickDictation(); setShowQuickDictate(false); setQuickTranscript(''); }}
                                    className="text-gray-500 hover:text-gray-600 text-xl">×</button>
                            </div>
                            <button onClick={quickListening ? stopQuickDictation : startQuickDictation}
                                className={`w-full py-3 rounded-lg font-bold text-white mb-3 transition ${
                                    quickListening ? 'bg-red-500 text-white animate-pulse' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'
                                }`}>
                                {quickListening ? '🎤 Listening...' : '🎤 Start Dictating'}
                            </button>
                            {quickTranscript && (
                                <div className="bg-slate-50 border border-gray-300 rounded p-3 text-gray-600 text-sm min-h-[60px] mb-3 max-h-[120px] overflow-y-auto">
                                    {quickTranscript}
                                </div>
                            )}
                            <div className="flex gap-2">
                                <button onClick={saveQuickConsult}
                                    className="flex-1 bg-medical-500 hover:bg-medical-600 text-white py-2 rounded-lg font-medium transition">
                                    Save Consult
                                </button>
                                <button onClick={() => setQuickTranscript('')}
                                    className="bg-gray-50 hover:bg-gray-100 text-gray-600 px-3 py-2 rounded-lg transition">
                                    Clear
                                </button>
                            </div>
                        </div>
                    )}

                    <div className="flex justify-between items-center mb-4">
                        <div>
                            <h2 className="text-2xl font-bold text-medical-600">Consults</h2>
                            <p className="text-sm text-gray-500">{activeCount} active | {pendingCount} pending response</p>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setShowQuickDictate(!showQuickDictate)}
                                className="bg-medical-600 hover:bg-medical-700 text-white px-3 py-2 rounded-lg font-medium transition text-sm">
                                🎤 Quick Dictate
                            </button>
                            <button onClick={() => { resetForm(); setEditingConsult(null); setShowForm(true); }}
                                className="bg-medical-500 hover:bg-medical-600 text-white px-4 py-2 rounded-lg font-medium transition">
                                + New Consult
                            </button>
                        </div>
                    </div>

                    {/* Filters */}
                    <div className="flex gap-2 mb-4 overflow-x-auto pb-1 scrollbar-hide">
                        {['all', 'Pending', 'Seen', 'Recs Given', 'Follow-Up', 'Signed Off'].map(f => (
                            <button key={f} onClick={() => setFilter(f)}
                                className={`px-3 py-1 rounded-full text-sm whitespace-nowrap transition ${
                                    filter === f ? 'bg-medical-500 text-white' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'
                                }`}>
                                {f === 'all' ? 'All' : f} {f !== 'all' && `(${consults.filter(c => c.status === f).length})`}
                            </button>
                        ))}
                    </div>

                    {/* Consult Cards */}
                    {filtered.length === 0 ? (
                        <div className="text-center py-12 text-gray-400">
                            <p className="text-4xl mb-2">📋</p>
                            <p>No consults {filter !== 'all' ? `with status "${filter}"` : 'yet'}</p>
                        </div>
                    ) : filtered.map(c => (
                        <div key={c.id} className={`bg-white border border-gray-100 rounded-xl p-4 mb-3 ${
                            c.urgency === 'Emergent' ? 'border-l-4 border-l-red-500' : c.urgency === 'Urgent' ? 'border-l-4 border-l-amber-500' : ''
                        }`}>
                            <div className="flex justify-between items-start mb-2">
                                <div>
                                    <div className="flex items-center gap-2 flex-wrap">
                                        <span className="font-bold text-white text-lg">{c.service}</span>
                                        <span className={`text-xs font-medium ${urgencyColors[c.urgency]}`}>({c.urgency})</span>
                                        <span className={`text-xs px-2 py-0.5 rounded-full border ${statusColors[c.status]}`}>{c.status}</span>
                                    </div>
                                    <p className="text-sm text-gray-500">Rm {c.patientRoom} | Requested: {formatShortDateTime(c.requestTime)}</p>
                                </div>
                                <div className="flex gap-1">
                                    <button onClick={() => handleEdit(c)} className="text-medical-600 hover:text-medical-500 text-sm px-2 py-1">Edit</button>
                                    <button onClick={() => handleDelete(c.id)} className="text-red-600 hover:text-red-600 text-sm px-2 py-1">Del</button>
                                </div>
                            </div>

                            <p className="text-gray-600 text-sm mb-2"><span className="text-gray-400">Reason:</span> {c.reason}</p>

                            {c.findings && (
                                <div className="bg-gray-50/50 rounded p-2 mb-2">
                                    <p className="text-xs text-gray-400 font-medium mb-1">FINDINGS</p>
                                    <p className="text-sm text-gray-600">{c.findings}</p>
                                </div>
                            )}

                            {c.recommendations && (
                                <div className="bg-emerald-500/10 border border-emerald-500/30 rounded p-2 mb-2">
                                    <p className="text-xs text-emerald-600 font-medium mb-1">RECOMMENDATIONS</p>
                                    <p className="text-sm text-emerald-600">{c.recommendations}</p>
                                </div>
                            )}

                            {c.followUpNeeded && (
                                <div className="bg-purple-500/10 border border-purple-500/30 rounded p-2 mb-2">
                                    <p className="text-xs text-purple-400 font-medium mb-1">FOLLOW-UP NEEDED</p>
                                    <p className="text-sm text-purple-300">{c.followUpNeeded}</p>
                                </div>
                            )}

                            {c.notes && <p className="text-xs text-gray-400 mt-1">Notes: {c.notes}</p>}

                            {/* Quick status update buttons */}
                            <div className="flex gap-2 mt-3 flex-wrap">
                                {['Pending', 'Seen', 'Recs Given', 'Follow-Up', 'Signed Off'].filter(s => s !== c.status).map(s => (
                                    <button key={s} onClick={() => updateStatus(c, s)}
                                        className="text-xs bg-gray-50 hover:bg-gray-100 text-gray-600 px-2 py-1 rounded transition">
                                        Mark {s}
                                    </button>
                                ))}
                            </div>
                        </div>
                    ))}

                    {/* Form Modal with Voice Dictation */}
                    {showForm && (
                        <ConsultFormModal
                            form={form}
                            setForm={setForm}
                            patients={patients}
                            CONSULT_SERVICES={CONSULT_SERVICES}
                            editingConsult={editingConsult}
                            handleSave={handleSave}
                            onClose={() => { setShowForm(false); setEditingConsult(null); resetForm(); }}
                        />
                    )}
                </div>
            );
        }

        function ConsultFormModal({ form, setForm, patients, CONSULT_SERVICES, editingConsult, handleSave, onClose }) {

            React.useEffect(() => {
                if (typeof window !== 'undefined') {

                    if (SpeechRecognition) {
                        recognitionRef.current = new SpeechRecognition();
                        recognitionRef.current.continuous = true;
                        recognitionRef.current.interimResults = true;
                        recognitionRef.current.onstart = () => setListening(true);
                        recognitionRef.current.onresult = (event) => {
                            let interimTranscript = '';
                            let finalTranscript = '';
                            for (let i = event.resultIndex; i < event.results.length; i++) {
                                const t = event.results[i][0].transcript;
                                if (event.results[i].isFinal) {
                                    finalTranscript += t + ' ';
                                } else {
                                    interimTranscript += t;
                                }
                            }
                            setTranscript(prev => prev + finalTranscript + interimTranscript);
                        };
                        recognitionRef.current.onerror = () => setListening(false);
                        recognitionRef.current.onend = () => setListening(false);
                    }
                }
            }, []);

            const startListening = () => {
                if (recognitionRef.current) {
                    setTranscript('');

                    recognitionRef.current.stop();

                                    {transcript}

                            <div className="flex gap-2">

                        <div className="space-y-3">

                        <div className="flex gap-3 mt-4">

                    </div>
                </div>
            );
        }

        // ==================== TRAUMA SPEECH PARSER ====================
        function parseTraumaSpeech(transcript) {
            // Step 1: Deduplicate STT repetition/stuttering
            // Speech recognition often repeats partial phrases as it refines
            function deduplicateSTT(text) {
                const words = text.split(/\s+/).filter(Boolean);
                if (words.length < 4) return text;
                // Remove repeated phrases (sliding window approach)
                const cleaned = [];
                let i = 0;
                while (i < words.length) {
                    // Check if a phrase of length 3-8 starting at i repeats immediately after
                    let foundRepeat = false;
                    for (let pLen = Math.min(8, Math.floor((words.length - i) / 2)); pLen >= 3; pLen--) {
                        const phrase = words.slice(i, i + pLen).join(' ').toLowerCase();
                        const nextPhrase = words.slice(i + pLen, i + pLen * 2).join(' ').toLowerCase();
                        if (phrase === nextPhrase) {
                            // Keep one copy, skip the duplicate
                            for (let j = 0; j < pLen; j++) cleaned.push(words[i + j]);
                            i += pLen * 2;
                            foundRepeat = true;
                            break;
                        }
                    }
                    if (!foundRepeat) {
                        cleaned.push(words[i]);
                        i++;
                    }
                }
                return cleaned.join(' ');
            }

            // Step 2: Normalize common STT errors for trauma context
            let t = deduplicateSTT(transcript);
            t = t
                .replace(/\bgunl\b/gi, 'gun')
                .replace(/\bemo\s*pneumo/gi, 'hemopneumo')
                .replace(/\bhemo\s*new\s*mo/gi, 'hemopneumo')
                .replace(/\bhemo\s*pneumo/gi, 'hemopneumo')
                .replace(/\bnew\s*mo\s*thorax/gi, 'pneumothorax')
                .replace(/\bpneumo\s*thorax/gi, 'pneumothorax')
                .replace(/\bhemo\s*thorax/gi, 'hemothorax')
                .replace(/\bhemopneumothorax/gi, 'hemopneumothorax')
                .replace(/\bGCS\s*(\d+)/gi, 'GCS $1')
                .replace(/\bg\s*c\s*s\s*(?:of|is|score)?\s*(\d+)/gi, 'GCS $1')
                .replace(/\bglasgow\s*(\d+)/gi, 'GCS $1')
                .replace(/\bintubat\w*/gi, 'intubated')
                .replace(/\bchest\s*tube/gi, 'chest tube')
                .replace(/\bbilateral/gi, 'bilateral')
                .replace(/\bright\s*sided/gi, 'right-sided')
                .replace(/\bleft\s*sided/gi, 'left-sided')
                .replace(/\bfast\s*(?:exam|scan|positive|negative)/gi, (m) => m.toUpperCase())
                .replace(/\bblood\s*pressure/gi, 'BP')
                .replace(/\bheart\s*rate/gi, 'HR')
                .replace(/\brespiratory\s*rate/gi, 'RR')
                .replace(/\b(\d+)\s*over\s*(\d+)/gi, '$1/$2')
                .replace(/\bsat(?:uration)?s?\s*(\d+)/gi, 'SpO2 $1')
                .replace(/\bo2\s*sat/gi, 'SpO2');

            const lower = t.toLowerCase();
            const result = {};

            // Level
            if (/level\s*(?:one|1)/i.test(t) || /\bl1\b/i.test(t) || /level\s+1/i.test(t)) result.level = 'Level 1';
            else if (/level\s*(?:two|2)/i.test(t) || /\bl2\b/i.test(t)) result.level = 'Level 2';
            else if (/trauma\s*alert/i.test(t)) result.level = 'Trauma Alert';
            else if (/trauma\s*consult/i.test(t)) result.level = 'Trauma Consult';

            // Room
            const roomMatch = t.match(/(?:room|bay|bed)\s+(\w+)/i);
            if (roomMatch) result.room = roomMatch[1];

            // Age/Sex
            const ageMatch = t.match(/(\d{1,3})\s*(?:year|yr|y\.?o\.?)\s*(?:old)?\s*(male|female|man|woman|m\b|f\b)/i);
            if (ageMatch) result.patientInfo = ageMatch[1] + 'yo ' + (ageMatch[2].match(/^[mM]/) ? 'M' : 'F');

            // Mechanism - scan entire transcript
            const mechKeywords = {
                'gsw': 'GSW', 'gunshot': 'GSW', 'gun shot': 'GSW', 'shooting': 'GSW',
                'stab': 'Stab wound', 'stabbing': 'Stab wound', 'knife': 'Stab wound',
                'mvc': 'MVC', 'motor vehicle': 'MVC', 'car crash': 'MVC', 'car accident': 'MVC',
                'motorcycle': 'MCC (Motorcycle)', 'mcc': 'MCC (Motorcycle)',
                'pedestrian': 'Pedestrian struck', 'ped struck': 'Pedestrian struck',
                'fall': 'Fall', 'fell': 'Fall',
                'assault': 'Assault', 'beaten': 'Assault',
                'bicycle': 'Bicycle crash', 'bike': 'Bicycle crash',
                'atv': 'ATV', 'all terrain': 'ATV',
                'blast': 'Blast injury', 'explosion': 'Blast injury',
                'burn': 'Burn', 'thermal': 'Burn',
                'industrial': 'Industrial'
            };
            for (let key in mechKeywords) {
                if (lower.includes(key)) {
                    result.mechanism = mechKeywords[key];
                    break;
                }
            }

            // Injuries - collect all mentioned injuries from entire transcript
            const injuryPatterns = [
                { re: /(?:hemopneumothorax|hemo\s*pneumo\s*thorax)/i, val: 'hemopneumothorax' },
                { re: /pneumothorax/i, val: 'pneumothorax' },
                { re: /hemothorax/i, val: 'hemothorax' },
                { re: /rib\s*fracture/i, val: 'rib fracture' },
                { re: /(?:pelvic|pelvis)\s*fracture/i, val: 'pelvic fracture' },
                { re: /(?:femur|femoral)\s*fracture/i, val: 'femur fracture' },
                { re: /(?:tib.?fib|tibia|fibula)\s*fracture/i, val: 'tib/fib fracture' },
                { re: /open\s*fracture/i, val: 'open fracture' },
                { re: /skull\s*fracture/i, val: 'skull fracture' },
                { re: /subdural/i, val: 'subdural hematoma' },
                { re: /epidural\s*hematoma/i, val: 'epidural hematoma' },
                { re: /subarachnoid/i, val: 'SAH' },
                { re: /intra\s*cranial\s*hemorrhage|ich\b/i, val: 'ICH' },
                { re: /splenic\s*(?:lac|injury|rupture)/i, val: 'splenic injury' },
                { re: /liver\s*(?:lac|injury)/i, val: 'liver laceration' },
                { re: /bowel\s*(?:injury|perf)/i, val: 'bowel injury' },
                { re: /renal\s*(?:lac|injury)/i, val: 'renal injury' },
                { re: /aortic/i, val: 'aortic injury' },
                { re: /vascular\s*injury/i, val: 'vascular injury' },
                { re: /spinal\s*(?:cord|injury|fracture)/i, val: 'spinal injury' },
                { re: /flail\s*chest/i, val: 'flail chest' },
                { re: /cardiac\s*tamponade/i, val: 'cardiac tamponade' },
                { re: /tension\s*pneumo/i, val: 'tension pneumothorax' },
                { re: /amputation/i, val: 'amputation' },
                { re: /degloving/i, val: 'degloving injury' },
                { re: /laceration/i, val: 'laceration' }
            ];
            const injuries = [];
            injuryPatterns.forEach(({ re, val }) => {
                if (re.test(t) && !injuries.includes(val)) injuries.push(val);
            });

            // Also capture location-specific injuries: "right chest", "left flank", etc
            const locationInjuries = t.match(/(?:right|left|bilateral)\s+(?:chest|flank|abdomen|thigh|leg|arm|shoulder|neck|back|head)\s+\w+/gi);
            if (locationInjuries) {
                locationInjuries.forEach(li => {
                    const clean = li.trim();
                    if (!injuries.some(inj => clean.toLowerCase().includes(inj.toLowerCase()))) {
                        injuries.push(clean);
                    }
                });
            }

            if (injuries.length > 0) result.injuries = injuries.join(', ');
            // Fallback: if no structured injuries found, try to extract from "with" or "sustained"
            if (!result.injuries) {
                const withMatch = t.match(/(?:with|sustained|presenting with|has)\s+(?:a\s+)?(.+?)(?:\.|GCS|primary|vitals|blood|consult|plan|admit|$)/i);
                if (withMatch) result.injuries = withMatch[1].replace(/\s+/g, ' ').trim().substring(0, 200);
            }

            // GCS
            const gcsMatch = t.match(/GCS\s*(?:of|is|score)?\s*(\d{1,2})/i);
            if (gcsMatch) result.gcs = gcsMatch[1];

            // Primary Survey (ABCDE) - scan entire transcript for each component
            const primaryComponents = [];
            // Airway
            if (/airway\s*(intact|secured|patent|compromised|intubated|protected)/i.test(t)) {
                primaryComponents.push('A: ' + t.match(/airway\s*(intact|secured|patent|compromised|intubated|protected)/i)[1]);
            } else if (/intubated/i.test(t)) {
                primaryComponents.push('A: intubated');
            }
            // Breathing
            const breathMatch = t.match(/(?:breath\s*sounds?|breathing)\s+(decreased|absent|bilateral|clear|diminished|equal|unequal|right|left)[\w\s]*/i);
            if (breathMatch) primaryComponents.push('B: breath sounds ' + breathMatch[1].trim());
            if (/chest\s*tube\s*(?:placed|inserted|in)/i.test(t)) primaryComponents.push('B: chest tube placed');
            // Circulation
            const circMatch = t.match(/(?:BP|blood pressure)\s*(\d+\/\d+)/i);
            if (circMatch) primaryComponents.push('C: BP ' + circMatch[1]);
            const hrMatch = t.match(/(?:HR|heart rate|pulse)\s*(\d{2,3})/i);
            if (hrMatch) primaryComponents.push('C: HR ' + hrMatch[1]);
            if (/(?:massive transfusion|mtp|transfus)/i.test(t)) primaryComponents.push('C: MTP activated');
            if (/(?:2\s*large\s*bore|large\s*bore\s*iv|two\s*large)/i.test(t)) primaryComponents.push('C: 2 large-bore IVs');
            // Disability
            if (result.gcs) primaryComponents.push('D: GCS ' + result.gcs);
            const pupilMatch = t.match(/pupils?\s*(equal|unequal|fixed|dilated|reactive|blown|pinpoint)[\w\s]*/i);
            if (pupilMatch) primaryComponents.push('D: pupils ' + pupilMatch[1].trim());
            // Exposure
            if (/log\s*roll/i.test(t)) primaryComponents.push('E: log roll performed');

            if (primaryComponents.length > 0) result.primarySurvey = primaryComponents.join('. ');

            // Vitals as a group
            const vitals = [];
            if (circMatch) vitals.push('BP ' + circMatch[1]);
            if (hrMatch) vitals.push('HR ' + hrMatch[1]);
            const rrMatch = t.match(/(?:RR|respiratory rate)\s*(\d{1,2})/i);
            if (rrMatch) vitals.push('RR ' + rrMatch[1]);
            const spo2Match = t.match(/SpO2\s*(\d{2,3})/i);
            if (spo2Match) vitals.push('SpO2 ' + spo2Match[1] + '%');
            if (vitals.length > 0) result.vitals = vitals.join(', ');

            // Imaging
            const imagingOrdered = [];
            if (/(?:ct\s*(?:pan\s*scan|head|chest|abdomen|pelvis|spine|angio))/i.test(t)) {
                const ctTypes = t.match(/ct\s*(?:pan\s*scan|head|chest|abdomen|pelvis|spine|angio\w*)/gi);
                if (ctTypes) ctTypes.forEach(ct => { if (!imagingOrdered.includes(ct.trim())) imagingOrdered.push(ct.trim()); });
            }
            if (/(?:chest\s*(?:x-?ray|xray|film))/i.test(t)) imagingOrdered.push('CXR');
            if (/(?:pelvic\s*(?:x-?ray|xray|film))/i.test(t)) imagingOrdered.push('pelvic XR');
            if (/\bfast\b/i.test(t)) imagingOrdered.push('FAST');
            if (/\be-?fast\b/i.test(t)) imagingOrdered.push('eFAST');
            if (imagingOrdered.length > 0) result.imagingOrdered = imagingOrdered.join(', ');

            // Imaging Findings
            const imgFindings = [];
            if (/fast\s*(?:is\s*)?(?:positive|pos)/i.test(t)) imgFindings.push('FAST positive');
            if (/fast\s*(?:is\s*)?(?:negative|neg)/i.test(t)) imgFindings.push('FAST negative');
            const ctFindMatch = t.match(/(?:ct|scan|imaging)\s+(?:shows?|reveal|demonstrate)\s+(.+?)(?:labs|consult|plan|$)/i);
            if (ctFindMatch) imgFindings.push(ctFindMatch[1].trim());
            if (imgFindings.length > 0) result.imagingFindings = imgFindings.join('. ');

            // Lab Findings
            const labFindings = [];
            const hgbMatch = t.match(/(?:hemoglobin|hgb|h&h)\s*(?:is|of)?\s*(\d+\.?\d*)/i);
            if (hgbMatch) labFindings.push('Hgb ' + hgbMatch[1]);
            const lactateMatch = t.match(/lactate\s*(?:is|of)?\s*(\d+\.?\d*)/i);
            if (lactateMatch) labFindings.push('Lactate ' + lactateMatch[1]);
            const phMatch = t.match(/\bpH\s*(?:is|of)?\s*(\d+\.?\d*)/i);
            if (phMatch) labFindings.push('pH ' + phMatch[1]);
            const baseMatch = t.match(/base\s*(?:deficit|excess)\s*(?:is|of)?\s*(-?\d+\.?\d*)/i);
            if (baseMatch) labFindings.push('Base deficit ' + baseMatch[1]);
            const inrMatch = t.match(/\bINR\s*(?:is|of)?\s*(\d+\.?\d*)/i);
            if (inrMatch) labFindings.push('INR ' + inrMatch[1]);
            if (/type\s*and\s*(?:screen|cross)/i.test(t)) labFindings.push('T&S sent');
            if (labFindings.length > 0) result.labFindings = labFindings.join(', ');

            // Consulting Services
            const consultMapping = {
                'neurosurgery': 'Neurosurgery', 'neurosurg': 'Neurosurgery', 'neuro': 'Neurosurgery',
                'orthopedics': 'Orthopedics', 'ortho': 'Orthopedics', 'orthopedic': 'Orthopedics',
                'vascular': 'Vascular', 'vascular surgery': 'Vascular',
                'cardiothoracic': 'Cardiothoracic', 'ct surgery': 'Cardiothoracic',
                'urology': 'Urology', 'uro': 'Urology',
                'plastic': 'Plastic Surgery', 'plastics': 'Plastic Surgery',
                'oral': 'OMFS', 'maxillofacial': 'OMFS', 'omfs': 'OMFS',
                'interventional radiology': 'IR', 'interventional': 'IR',
                'spine': 'Spine', 'anesthesia': 'Anesthesia',
                'thoracic': 'Thoracic Surgery', 'acute care surgery': 'Acute Care Surgery'
            };
            const services = [];
            for (let keyword in consultMapping) {
                if (lower.includes(keyword)) {
                    const mapped = consultMapping[keyword];
                    if (!services.includes(mapped)) services.push(mapped);
                }
            }
            if (services.length > 0) result.consultServices = services;

            // Plan - scan for plan-related phrases
            const planPhrases = [];
            if (/(?:admit|admission)\s*(?:to)?\s*(?:trauma\s*)?(?:icu|intensive|step.?down|floor)/i.test(t)) {
                const adMatch = t.match(/(?:admit|admission)\s*(?:to)?\s*(trauma\s*icu|icu|intensive care|step.?down|floor)/i);
                if (adMatch) planPhrases.push('Admit to ' + adMatch[1].trim());
            }
            if (/(?:take|going|go)\s*(?:to)?\s*(?:the\s*)?(?:or|operating room)/i.test(t)) planPhrases.push('To OR');
            if (/(?:serial|repeat)\s*(?:h&h|hemoglobin|hgb|labs)/i.test(t)) {
                const serialMatch = t.match(/(?:serial|repeat)\s*(h&h|hemoglobin|hgb|labs)(?:\s*(?:every|q)\s*(\d+)\s*(?:hour|hr|h))?/i);
                if (serialMatch) planPhrases.push('Serial ' + serialMatch[1] + (serialMatch[2] ? ' q' + serialMatch[2] + 'h' : ''));
            }
            if (/massive\s*transfusion|mtp/i.test(t)) planPhrases.push('MTP activated');
            if (/chest\s*tube/i.test(t) && !result.primarySurvey?.includes('chest tube')) planPhrases.push('Chest tube placed');
            if (/damage\s*control/i.test(t)) planPhrases.push('Damage control surgery');
            if (/(?:repeat|follow.?up)\s*ct/i.test(t)) planPhrases.push('Repeat CT');
            if (/(?:tetanus|tdap)/i.test(t)) planPhrases.push('Tetanus prophylaxis');
            if (/(?:antibiotics|abx)/i.test(t)) planPhrases.push('Antibiotics started');
            if (planPhrases.length > 0) result.plan = planPhrases.join('. ');

            // Disposition
            if (/trauma\s*icu|t-?icu/i.test(lower)) result.disposition = 'Trauma ICU';
            else if (/step.?down/i.test(lower)) result.disposition = 'Step-down';
            else if (/\bfloor\b/i.test(lower)) result.disposition = 'Floor';
            else if (/\bor\b|operating room/i.test(lower)) result.disposition = 'OR';
            else if (/discharge/i.test(lower)) result.disposition = 'Discharge';
            else if (/transfer/i.test(lower)) result.disposition = 'Transfer';
            else if (/morgue|deceased|expired/i.test(lower)) result.disposition = 'Morgue';

            return result;
        }

        // ==================== TRAUMA ACTIVATIONS ====================
        function TraumaActivations() {
            const [traumas, setTraumas] = React.useState([]);
            const [showForm, setShowForm] = React.useState(false);
            const [editingTrauma, setEditingTrauma] = React.useState(null);
            const [expandedId, setExpandedId] = React.useState(null);
            const [filter, setFilter] = React.useState('active');
            const [showQuickTrauma, setShowQuickTrauma] = React.useState(false);
            const [quickTranscript, setQuickTranscript] = React.useState('');
            const [quickListening, setQuickListening] = React.useState(false);
            const quickRecognitionRef = React.useRef(null);
            const [form, setForm] = React.useState({
                level: 'Level 1', room: '', mechanism: '', injuries: '',
                activationTime: new Date().toISOString().slice(0, 16),
                primarySurvey: '', secondarySurvey: '',
                imagingOrdered: '', imagingFindings: '',
                labFindings: '', consultServices: [],
                consultFindings: '', plan: '', nextSteps: '',
                disposition: '', status: 'Active', notes: ''
            });

            const TRAUMA_LEVELS = ['Level 1', 'Level 2', 'Trauma Alert', 'Trauma Consult'];
            const COMMON_CONSULTS = ['Neurosurgery', 'Orthopedics', 'Vascular', 'Cardiothoracic', 'Urology', 'Plastic Surgery', 'Oral/Maxillofacial', 'Interventional Radiology', 'Spine'];
            const COMMON_IMAGING = ['CT Head', 'CT C-spine', 'CT Chest', 'CT Abdomen/Pelvis', 'CT Pan Scan', 'CXR', 'Pelvis XR', 'FAST Exam', 'CTA Chest', 'CTA Neck', 'CT Angio Abdomen'];
            const COMMON_MECHANISMS = ['MVC', 'MCC (Motorcycle)', 'Pedestrian struck', 'Fall', 'GSW', 'Stab wound', 'Assault', 'Bicycle crash', 'ATV', 'Industrial', 'Blast injury', 'Burn'];

            React.useEffect(() => { loadData(); setupQuickTrauma(); }, []);

            const quickFinalRef = React.useRef('');
            const setupQuickTrauma = () => {
                if (typeof window !== 'undefined') {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (SpeechRecognition) {
                        quickRecognitionRef.current = new SpeechRecognition();
                        quickRecognitionRef.current.continuous = true;
                        quickRecognitionRef.current.interimResults = true;
                        quickRecognitionRef.current.onstart = () => { setQuickListening(true); quickFinalRef.current = ''; };
                        quickRecognitionRef.current.onresult = (event) => {
                            let finalTranscript = '';
                            let interimTranscript = '';
                            for (let i = 0; i < event.results.length; i++) {
                                const t = event.results[i][0].transcript;
                                if (event.results[i].isFinal) {
                                    finalTranscript += t + ' ';
                                } else {
                                    interimTranscript += t;
                                }
                            }
                            quickFinalRef.current = finalTranscript;
                            setQuickTranscript(finalTranscript + interimTranscript);
                        };
                        quickRecognitionRef.current.onerror = () => setQuickListening(false);
                        quickRecognitionRef.current.onend = () => setQuickListening(false);
                    }
                }
            };

            const startQuickTrauma = () => {
                if (quickRecognitionRef.current) {
                    setQuickTranscript('');
                    quickRecognitionRef.current.start();
                }
            };

            const stopQuickTrauma = () => {
                if (quickRecognitionRef.current) {
                    quickRecognitionRef.current.stop();
                }
            };

            const saveQuickTrauma = async () => {
                // Use the final transcript ref to avoid interim duplicates
                const textToparse = quickFinalRef.current || quickTranscript;
                const parsed = parseTraumaSpeech(textToparse);
                if (!parsed.mechanism) {
                    alert('Could not parse mechanism from speech. Please provide more detail.');
                    return;
                }

                const data = {
                    level: parsed.level || 'Level 1',
                    room: parsed.room || '',
                    mechanism: parsed.mechanism || '',
                    injuries: parsed.injuries || '',
                    primarySurvey: parsed.primarySurvey || '',
                    secondarySurvey: parsed.secondarySurvey || '',
                    imagingOrdered: parsed.imagingOrdered || '',
                    imagingFindings: parsed.imagingFindings || '',
                    labFindings: parsed.labFindings || '',
                    consultServices: parsed.consultServices || [],
                    consultFindings: parsed.consultFindings || '',
                    plan: parsed.plan || '',
                    nextSteps: parsed.nextSteps || '',
                    disposition: parsed.disposition || '',
                    vitals: parsed.vitals || '',
                    gcs: parsed.gcs || '',
                    patientInfo: parsed.patientInfo || '',
                    activationTime: new Date().toISOString().slice(0, 16),
                    status: 'Active',
                    notes: '',
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };

                const traumaDoc = await DB.add('traumas', data);

                // Also create a patient entry so trauma shows in main patient list
                const traumaRoom = parsed.room || 'TB' + (traumas.length + 1);
                const diagParts = [parsed.mechanism || 'Trauma'];
                if (parsed.injuries) diagParts.push(parsed.injuries.split(',')[0].trim());
                const patientData = {
                    room: traumaRoom,
                    diagnosis: diagParts.join(' - '),
                    problems: [], procedures: [],
                    admitDate: getTodayISO(),
                    status: 'active',
                    isTrauma: true,
                    traumaLevel: parsed.level || 'Level 1',
                    traumaId: traumaDoc || '',
                    diet: '', activity: '', prophylaxis: '',
                    labs: [], concerns: '', antibiotics: [],
                    pmh: [], psh: [], homeMeds: [], allergies: [],
                    examFindings: parsed.primarySurvey || '',
                    preRoundHistory: {},
                    treatmentPlan: parsed.plan || '',
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };
                await DB.add('patients', patientData);

                setQuickTranscript('');
                setShowQuickTrauma(false);
                quickFinalRef.current = '';
                loadData();
            };

            const loadData = async () => {
                try {
                    const t = await DB.getAll('traumas');
                    setTraumas(t.sort((a, b) => new Date(b.activationTime) - new Date(a.activationTime)));
                } catch (e) { console.error(e); }
            };

            const resetForm = () => setForm({
                level: 'Level 1', room: '', mechanism: '', injuries: '',
                activationTime: new Date().toISOString().slice(0, 16),
                primarySurvey: '', secondarySurvey: '',
                imagingOrdered: '', imagingFindings: '',
                labFindings: '', consultServices: [],
                consultFindings: '', plan: '', nextSteps: '',
                disposition: '', status: 'Active', notes: ''
            });

            const handleSave = async () => {
                if (!form.mechanism) return;
                const data = { ...form, consultServices: form.consultServices || [], updatedAt: new Date().toISOString() };
                if (editingTrauma) {
                    await DB.put('traumas', { ...data, id: editingTrauma.id });
                    // Sync updates back to the linked patient entry
                    try {
                        const allPatients = await DB.getAll('patients');
                        let linked = allPatients.find(p => p.traumaId === editingTrauma.id);
                        // Fallback: match by isTrauma + mechanism in diagnosis for older entries without traumaId
                        if (!linked) {
                            linked = allPatients.find(p => p.isTrauma && p.diagnosis?.includes(editingTrauma.mechanism));
                        }
                        if (linked) {
                            // Ensure traumaId is set for future syncs
                            if (!linked.traumaId) linked.traumaId = editingTrauma.id;
                            const diagParts = [data.mechanism || 'Trauma'];
                            if (data.injuries) diagParts.push(data.injuries.split(',')[0].trim());
                            await DB.put('patients', {
                                ...linked,
                                room: data.room || linked.room,
                                diagnosis: diagParts.join(' - '),
                                traumaLevel: data.level || linked.traumaLevel,
                                examFindings: data.primarySurvey || linked.examFindings,
                                treatmentPlan: data.plan || linked.treatmentPlan,
                                updatedAt: new Date().toISOString()
                            });
                        }
                    } catch (e) { console.error('Failed to sync trauma to patient:', e); }
                } else {
                    data.createdAt = new Date().toISOString();
                    const traumaDoc = await DB.add('traumas', data);
                    // Also create a patient entry for new traumas
                    const traumaRoom = data.room || 'TB' + (traumas.length + 1);
                    const diagParts = [data.mechanism || 'Trauma'];
                    if (data.injuries) diagParts.push(data.injuries.split(',')[0].trim());
                    const patientData = {
                        room: traumaRoom,
                        diagnosis: diagParts.join(' - '),
                        problems: [], procedures: [],
                        admitDate: getTodayISO(),
                        status: 'active',
                        isTrauma: true,
                        traumaLevel: data.level || 'Level 1',
                        traumaId: traumaDoc || '',
                        diet: '', activity: '', prophylaxis: '',
                        labs: [], concerns: '', antibiotics: [],
                        pmh: [], psh: [], homeMeds: [], allergies: [],
                        examFindings: data.primarySurvey || '',
                        preRoundHistory: {},
                        treatmentPlan: data.plan || '',
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString()
                    };
                    await DB.add('patients', patientData);
                }
                resetForm(); setEditingTrauma(null); setShowForm(false); loadData();
            };

            const handleEdit = (t) => {
                setForm({ ...t, consultServices: t.consultServices || [] });
                setEditingTrauma(t);
                setShowForm(true);
            };

            const handleDelete = async (id) => {
                await DB.delete('traumas', id);
                loadData();
            };

            const toggleConsultService = (svc) => {
                setForm(prev => ({
                    ...prev,
                    consultServices: prev.consultServices.includes(svc)
                        ? prev.consultServices.filter(s => s !== svc)
                        : [...prev.consultServices, svc]
                }));
            };

            const filtered = filter === 'all' ? traumas : traumas.filter(t => filter === 'active' ? t.status === 'Active' : t.status !== 'Active');
            const levelColors = { 'Level 1': 'bg-red-500', 'Level 2': 'bg-amber-500', 'Trauma Alert': 'bg-orange-500', 'Trauma Consult': 'bg-medical-500' };
            const activeCount = traumas.filter(t => t.status === 'Active').length;

            return (
                <div className="p-4 pb-20 max-w-4xl mx-auto">
                    {showQuickTrauma && (
                        <div className="bg-white border border-red-500/50 rounded-xl p-4 mb-4 shadow-lg shadow-red-500/10">
                            <div className="flex items-center justify-between mb-3">
                                <h3 className="text-red-600 font-bold">Quick Trauma Activation</h3>
                                <button onClick={() => { stopQuickTrauma(); setShowQuickTrauma(false); setQuickTranscript(''); }}
                                    className="text-gray-500 hover:text-gray-600 text-xl">×</button>
                            </div>
                            <button onClick={quickListening ? stopQuickTrauma : startQuickTrauma}
                                className={`w-full py-4 rounded-lg font-bold text-white mb-3 transition text-lg ${
                                    quickListening ? 'bg-red-500 text-white animate-pulse' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'
                                }`}>
                                {quickListening ? '🎤 Listening...' : '🎤 Start Dictating'}
                            </button>
                            {quickTranscript && (
                                <div className="bg-slate-50 border border-gray-300 rounded p-3 text-gray-600 text-sm min-h-[60px] mb-3 max-h-[120px] overflow-y-auto">
                                    {quickTranscript}
                                </div>
                            )}
                            <div className="flex gap-2">
                                <button onClick={saveQuickTrauma}
                                    className="flex-1 bg-red-500 hover:bg-red-600 text-white py-2 rounded-lg font-medium transition">
                                    Save Trauma
                                </button>
                                <button onClick={() => setQuickTranscript('')}
                                    className="bg-gray-50 hover:bg-gray-100 text-gray-600 px-3 py-2 rounded-lg transition">
                                    Clear
                                </button>
                            </div>
                        </div>
                    )}

                    <div className="flex justify-between items-center mb-4">
                        <div>
                            <h2 className="text-2xl font-bold text-red-600">Trauma Activations</h2>
                            <p className="text-sm text-gray-500">{activeCount} active | {traumas.length} total today</p>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setShowQuickTrauma(!showQuickTrauma)}
                                className="bg-red-600 hover:bg-red-700 text-white px-3 py-2 rounded-lg font-medium transition text-sm">
                                🎤 Quick Trauma
                            </button>
                            <button onClick={() => { resetForm(); setEditingTrauma(null); setShowForm(true); }}
                                className="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-medium transition">
                                + Trauma
                            </button>
                        </div>
                    </div>

                    <div className="flex gap-2 mb-4">
                        {['active', 'resolved', 'all'].map(f => (
                            <button key={f} onClick={() => setFilter(f)}
                                className={`px-3 py-1 rounded-full text-sm capitalize transition ${
                                    filter === f ? 'bg-red-500 text-white' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'
                                }`}>{f}</button>
                        ))}
                    </div>

                    {filtered.length === 0 ? (
                        <div className="text-center py-12 text-gray-400">
                            <p className="text-4xl mb-2">🚑</p>
                            <p>No trauma activations {filter !== 'all' ? `(${filter})` : ''}</p>
                        </div>
                    ) : filtered.map(t => (
                        <div key={t.id} className={`bg-white border border-gray-100 rounded-xl mb-3 overflow-hidden ${
                            t.status === 'Active' ? 'border-l-4 border-l-red-500' : ''
                        }`}>
                            {/* Header - always visible */}
                            <div className="p-4 cursor-pointer" onClick={() => setExpandedId(expandedId === t.id ? null : t.id)}>
                                <div className="flex justify-between items-start">
                                    <div className="flex items-center gap-2 flex-wrap">
                                        <span className={`${levelColors[t.level]} text-white text-xs font-bold px-2 py-0.5 rounded`}>{t.level}</span>
                                        <span className="font-bold text-gray-800">{t.mechanism}</span>
                                        {t.patientInfo && <span className="text-gray-500 text-sm">| {t.patientInfo}</span>}
                                        {t.room && <span className="text-gray-500 text-sm">| Rm {t.room}</span>}
                                        {t.gcs && <span className="text-xs bg-yellow-100 text-yellow-800 px-2 py-0.5 rounded font-medium">GCS {t.gcs}</span>}
                                        <span className={`text-xs px-2 py-0.5 rounded-full ${
                                            t.status === 'Active' ? 'bg-red-50 text-red-600' : 'bg-gray-100 text-gray-500'
                                        }`}>{t.status}</span>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <span className="text-xs text-gray-400">{formatTime(t.activationTime)}</span>
                                        <span className="text-gray-400">{expandedId === t.id ? '▲' : '▼'}</span>
                                    </div>
                                </div>
                                {t.injuries && <p className="text-sm text-gray-600 mt-1">{t.injuries}</p>}
                                {t.vitals && <p className="text-xs text-slate-600 mt-1">Vitals: {t.vitals}</p>}
                                {t.consultServices && t.consultServices.length > 0 && (
                                    <div className="flex gap-1 mt-2 flex-wrap">
                                        {t.consultServices.map(s => (
                                            <span key={s} className="text-xs bg-gray-50 text-gray-600 px-2 py-0.5 rounded">{s}</span>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* Expanded detail */}
                            {expandedId === t.id && (
                                <div className="border-t border-gray-200 p-4 space-y-3">
                                    {t.primarySurvey && (
                                        <div><p className="text-xs text-gray-400 font-medium">PRIMARY SURVEY (ABCDE)</p>
                                        <p className="text-sm text-gray-600">{t.primarySurvey}</p></div>
                                    )}
                                    {t.secondarySurvey && (
                                        <div><p className="text-xs text-gray-400 font-medium">SECONDARY SURVEY</p>
                                        <p className="text-sm text-gray-600">{t.secondarySurvey}</p></div>
                                    )}

                                    {(t.imagingOrdered || t.imagingFindings) && (
                                        <div className="bg-slate-500/10 border border-slate-500/30 rounded p-3">
                                            <p className="text-xs text-slate-600 font-medium mb-1">RADIOLOGY</p>
                                            {t.imagingOrdered && <p className="text-sm text-gray-600"><span className="text-gray-400">Ordered:</span> {t.imagingOrdered}</p>}
                                            {t.imagingFindings && <p className="text-sm text-slate-600 mt-1"><span className="text-slate-600">Findings:</span> {t.imagingFindings}</p>}
                                        </div>
                                    )}

                                    {t.labFindings && (
                                        <div className="bg-purple-500/10 border border-purple-500/30 rounded p-3">
                                            <p className="text-xs text-purple-400 font-medium mb-1">LAB FINDINGS</p>
                                            <p className="text-sm text-purple-300">{t.labFindings}</p>
                                        </div>
                                    )}

                                    {t.consultFindings && (
                                        <div className="bg-emerald-500/10 border border-emerald-500/30 rounded p-3">
                                            <p className="text-xs text-emerald-600 font-medium mb-1">CONSULTANT FINDINGS & RECS</p>
                                            <p className="text-sm text-emerald-600">{t.consultFindings}</p>
                                        </div>
                                    )}

                                    {t.plan && (
                                        <div className="bg-medical-500 text-white/10 border border-medical-500/30 rounded p-3">
                                            <p className="text-xs text-medical-600 font-medium mb-1">PLAN</p>
                                            <p className="text-sm text-medical-500">{t.plan}</p>
                                        </div>
                                    )}

                                    {t.nextSteps && (
                                        <div className="bg-amber-500/10 border border-amber-500/30 rounded p-3">
                                            <p className="text-xs text-amber-600 font-medium mb-1">NEXT STEPS</p>
                                            <p className="text-sm text-amber-600">{t.nextSteps}</p>
                                        </div>
                                    )}

                                    {t.disposition && <p className="text-sm text-gray-600"><span className="text-gray-400">Disposition:</span> {t.disposition}</p>}
                                    {t.notes && <p className="text-xs text-gray-400">Notes: {t.notes}</p>}

                                    <div className="flex gap-2 pt-2">
                                        <button onClick={() => handleEdit(t)} className="bg-medical-500 text-white/20 text-medical-600 hover:bg-medical-500 text-white/30 px-3 py-1 rounded text-sm transition">Edit</button>
                                        {t.status === 'Active' ? (
                                            <button onClick={async () => { await DB.put('traumas', {...t, status: 'Resolved', updatedAt: new Date().toISOString()}); loadData(); }}
                                                className="bg-emerald-50 text-emerald-600 hover:bg-emerald-500/30 px-3 py-1 rounded text-sm transition">Resolve</button>
                                        ) : (
                                            <button onClick={async () => { await DB.put('traumas', {...t, status: 'Active', updatedAt: new Date().toISOString()}); loadData(); }}
                                                className="bg-amber-500/20 text-amber-600 hover:bg-amber-500/30 px-3 py-1 rounded text-sm transition">Reactivate</button>
                                        )}
                                        <button onClick={() => handleDelete(t.id)} className="bg-red-50 text-red-600 hover:bg-red-500/30 px-3 py-1 rounded text-sm transition">Delete</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    ))}

                    {/* Form Modal with Voice Dictation */}
                    {showForm && (
                        <TraumaFormModal
                            form={form}
                            setForm={setForm}
                            TRAUMA_LEVELS={TRAUMA_LEVELS}
                            COMMON_CONSULTS={COMMON_CONSULTS}
                            COMMON_IMAGING={COMMON_IMAGING}
                            COMMON_MECHANISMS={COMMON_MECHANISMS}
                            editingTrauma={editingTrauma}
                            handleSave={handleSave}
                            toggleConsultService={toggleConsultService}
                            onClose={() => { setShowForm(false); setEditingTrauma(null); resetForm(); }}
                        />
                    )}
                </div>
            );
        }

        function TraumaFormModal({ form, setForm, TRAUMA_LEVELS, COMMON_CONSULTS, COMMON_IMAGING, COMMON_MECHANISMS, editingTrauma, handleSave, toggleConsultService, onClose }) {
            const [transcript, setTranscript] = React.useState('');
            const [listening, setListening] = React.useState(false);
            const recognitionRef = React.useRef(null);

            React.useEffect(() => {
                if (typeof window !== 'undefined') {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (SpeechRecognition) {
                        recognitionRef.current = new SpeechRecognition();
                        recognitionRef.current.continuous = true;
                        recognitionRef.current.interimResults = true;
                        recognitionRef.current.onstart = () => setListening(true);
                        recognitionRef.current.onresult = (event) => {
                            let interimTranscript = '';
                            let finalTranscript = '';
                            for (let i = event.resultIndex; i < event.results.length; i++) {
                                const t = event.results[i][0].transcript;
                                if (event.results[i].isFinal) {
                                    finalTranscript += t + ' ';
                                } else {
                                    interimTranscript += t;
                                }
                            }
                            setTranscript(prev => prev + finalTranscript + interimTranscript);
                        };
                        recognitionRef.current.onerror = () => setListening(false);
                        recognitionRef.current.onend = () => setListening(false);
                    }
                }
            }, []);

            const startListening = () => {
                if (recognitionRef.current) {
                    setTranscript('');
                    recognitionRef.current.start();
                }
            };

            const stopListening = () => {
                if (recognitionRef.current) {
                    recognitionRef.current.stop();
                }
            };

            const parseAndFill = () => {
                const parsed = parseTraumaSpeech(transcript);
                setForm(prev => {
                    const newForm = { ...prev, ...parsed };
                    if (parsed.consultServices) {
                        newForm.consultServices = parsed.consultServices;
                    }
                    return newForm;
                });
                setTranscript('');
                setListening(false);
            };

            return (
                <div className="fixed inset-0 bg-black/60 flex items-start justify-center pt-4 z-50 overflow-y-auto modal-backdrop" onClick={onClose}>
                    <div className="bg-white rounded-xl p-5 w-full max-w-lg mx-4 mb-8 modal-content" onClick={e => e.stopPropagation()}>
                        <h3 className="text-lg font-bold text-white mb-4">{editingTrauma ? 'Edit Trauma' : 'New Trauma Activation'}</h3>

                        {/* Voice Dictation Section */}
                        <div className="bg-slate-50 border border-gray-200 rounded-lg p-4 mb-4">
                            <button onClick={listening ? stopListening : startListening}
                                className={`w-full py-3 rounded-lg font-bold text-white mb-3 transition ${
                                    listening ? 'bg-red-500 text-white animate-pulse' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'
                                }`}>
                                {listening ? '🎤 Listening...' : '🎤 Tap to Dictate'}
                            </button>
                            {transcript && (
                                <div className="bg-slate-50 border border-gray-300 rounded p-3 text-gray-600 text-sm min-h-[60px] mb-3 max-h-[100px] overflow-y-auto">
                                    {transcript}
                                </div>
                            )}
                            <div className="flex gap-2">
                                <button onClick={parseAndFill}
                                    className="flex-1 bg-medical-500 hover:bg-medical-600 text-white py-2 rounded font-medium transition text-sm">
                                    Parse & Fill
                                </button>
                                <button onClick={() => setTranscript('')}
                                    className="bg-gray-50 hover:bg-gray-100 text-gray-600 px-3 py-2 rounded transition text-sm">
                                    Clear
                                </button>
                            </div>
                        </div>

                        <div className="space-y-3 max-h-[60vh] overflow-y-auto">
                            <div className="grid grid-cols-2 gap-3">

        // ==================== LOGIN SCREEN ====================
        function LoginScreen({ onLogin }) {
            const [mode, setMode] = React.useState('login'); // 'login', 'signup'
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [displayName, setDisplayName] = React.useState('');
            const [error, setError] = React.useState('');
            const [loading, setLoading] = React.useState(false);

            const handleEmailLogin = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                try {
                    if (mode === 'signup') {
                        const cred = await auth.createUserWithEmailAndPassword(email, password);
                        await cred.user.updateProfile({ displayName: displayName || email.split('@')[0] });
                    } else {
                        await auth.signInWithEmailAndPassword(email, password);
                    }
                } catch (err) {
                    setError(err.message.replace('Firebase: ', ''));
                }
                setLoading(false);
            };

            const handleGoogleLogin = async () => {
                setError('');
                setLoading(true);
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    // Always use popup - signInWithRedirect has known issues on
                    // iOS Safari due to Intelligent Tracking Prevention (ITP)
                    // blocking cookies across redirects
                    await auth.signInWithPopup(provider);
                } catch (err) {
                    const code = err.code || '';
                    if (code === 'auth/popup-blocked' || code === 'auth/popup-closed-by-browser') {
                        setError('Popup was blocked. Please allow popups for this site and try again.');
                    } else if (code === 'auth/unauthorized-domain') {
                        setError('This domain is not authorized for Google sign-in. Please contact the administrator.');
                    } else {
                        setError(err.message.replace('Firebase: ', ''));
                    }
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-lg p-8 w-full max-w-sm">
                        <div className="text-center mb-6">

                            <p className="text-gray-500 text-sm mt-1">Surgical Resident Tracker</p>

                        {error && (
                            <div className="bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg p-3 mb-4">
                                {error}
                            </div>
                        )}

                        <button
                            onClick={handleGoogleLogin}
                            disabled={loading}
                            className="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-200 hover:border-gray-300 hover:bg-gray-50 text-gray-700 font-medium py-3 px-4 rounded-lg transition mb-4"
                        >
                            <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
                            Continue with Google
                        </button>

                        <div className="flex items-center gap-3 my-4">
                            <div className="flex-1 h-px bg-gray-200"></div>
                            <span className="text-xs text-gray-400 font-medium">OR</span>
                            <div className="flex-1 h-px bg-gray-200"></div>
                        </div>

                        <form onSubmit={handleEmailLogin} className="space-y-3">
                            {mode === 'signup' && (
                                <input
                                    type="text"
                                    placeholder="Display name (e.g., Dr. Bell)"
                                    value={displayName}
                                    onChange={e => setDisplayName(e.target.value)}
                                    className="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-medical-500 focus:border-transparent"
                                />
                            )}
                            <input
                                type="email"
                                placeholder="Email address"
                                value={email}
                                onChange={e => setEmail(e.target.value)}

                                className="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-medical-500 focus:border-transparent"
                            />
                            <input
                                type="password"
                                placeholder="Password"
                                value={password}
                                onChange={e => setPassword(e.target.value)}
                                required
                                minLength={6}
                                className="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-medical-500 focus:border-transparent"
                            />
                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full bg-medical-600 text-white hover:bg-medical-700 font-semibold py-3 px-4 rounded-lg transition disabled:opacity-50"
                            >
                                {loading ? 'Please wait...' : mode === 'signup' ? 'Create Account' : 'Sign In'}
                            </button>
                        </form>

                        <p className="text-center text-sm text-gray-500 mt-4">
                            {mode === 'login' ? (
                                <>No account? <button onClick={() => { setMode('signup'); setError(''); }} className="text-medical-600 font-medium">Sign up</button></>
