                                                        onClick={() => generateMMPresentation(lesson)}
                                                        disabled={generatingPptx}
                                                        className="text-xs bg-amber-500 hover:bg-amber-600 text-white px-3 py-1.5 rounded-lg font-medium transition flex items-center gap-1 disabled:opacity-50"
                                                    >
                                                        <span>{generatingPptx ? 'Generating...' : 'Generate Presentation'}</span>
                                                    </button>
                                                    <button onClick={() => startEdit(lesson)} className="text-xs text-medical-600 hover:text-medical-700 font-medium py-1.5">Edit</button>
                                                    <button onClick={() => { if (confirm('Delete this lesson?')) handleDelete(lesson.id); }} className="text-xs text-red-500 hover:text-red-600 font-medium py-1.5">Delete</button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        }

        // ==================== CASE PREP ====================
        function CasePrep() {
            const [cases, setCases] = React.useState([]);
            const [patients, setPatients] = React.useState([]);
            const [selectedDate, setSelectedDate] = React.useState(getTodayISO());
            const [currentMonth, setCurrentMonth] = React.useState(() => {
                const t = getTodayISO().split('-');
                return { year: parseInt(t[0]), month: parseInt(t[1]) };
            });
            const [showAddCase, setShowAddCase] = React.useState(false);
            const [newCaseName, setNewCaseName] = React.useState('');
            const [newCaseOrder, setNewCaseOrder] = React.useState(1);
            const [expandedCase, setExpandedCase] = React.useState(null);
            const [editingSteps, setEditingSteps] = React.useState(null);
            const [surgeonPrefs, setSurgeonPrefs] = React.useState([]);
            const [showSurgeonSuggestions, setShowSurgeonSuggestions] = React.useState(null);
            const [editingPrefs, setEditingPrefs] = React.useState({});
            const [savingPrefs, setSavingPrefs] = React.useState(false);
            const [surgeonDraft, setSurgeonDraft] = React.useState('');

            React.useEffect(() => { DB.init().then(() => { loadCases(); loadPatients(); loadSurgeonPrefs(); }); }, []);

            const loadCases = async () => {
                const all = await DB.getAll('casePrep');
                setCases(all || []);
            };
            const loadPatients = async () => {
                const all = await DB.getAll('patients');
                setPatients((all || []).filter(p => p.status !== 'discharged'));
            };

            const loadSurgeonPrefs = async () => {
                const snap = await db.collection('globalSurgeonPreferences').get();
                setSurgeonPrefs(snap.docs.map(d => ({ ...d.data(), id: d.id })));
            };

            const saveSurgeonPrefs = async (surgeonName, serviceName, updates) => {
                if (!surgeonName || !surgeonName.trim()) return;
                const existing = surgeonPrefs.find(p => p.surgeonName?.toLowerCase() === surgeonName.trim().toLowerCase());
                const prefData = {
                    surgeonName: surgeonName.trim(),
                    service: serviceName || existing?.service || 'General',
                    sutures: updates.sutures ?? existing?.sutures ?? '',
                    instruments: updates.instruments ?? existing?.instruments ?? '',
                    positioning: updates.positioning ?? existing?.positioning ?? '',
                    prepDrape: updates.prepDrape ?? existing?.prepDrape ?? '',
                    antibiotics: updates.antibiotics ?? existing?.antibiotics ?? '',
                    skinClosing: updates.skinClosing ?? existing?.skinClosing ?? '',
                    drains: updates.drains ?? existing?.drains ?? '',
                    notes: updates.notes ?? existing?.notes ?? '',
                    updatedAt: new Date().toISOString(),
                    updatedBy: ''
                };
                try { prefData.updatedBy = firebase.auth().currentUser?.displayName || firebase.auth().currentUser?.email || ''; } catch(e) {}

                if (existing) {
                    await db.collection('globalSurgeonPreferences').doc(existing.id).set(prefData, { merge: true });
                } else {
                    await db.collection('globalSurgeonPreferences').add(prefData);
                }
                await loadSurgeonPrefs();
            };

            const getSurgeonSuggestions = (input) => {
                if (!input || input.length < 1) return [];
                const lower = input.toLowerCase();
                return surgeonPrefs
                    .filter(p => p.surgeonName && p.surgeonName.toLowerCase().includes(lower))
                    .map(p => p.surgeonName);
            };

            const getPrefsForSurgeon = (name) => {
                if (!name) return null;
                return surgeonPrefs.find(p => p.surgeonName?.toLowerCase() === name.trim().toLowerCase()) || null;
            };

            const PREF_CATEGORIES = [
                { key: 'positioning', label: 'Positioning', placeholder: 'e.g. Supine, arms tucked, reverse Trendelenburg' },
                { key: 'antibiotics', label: 'Antibiotics', placeholder: 'e.g. Cefazolin 2g IV within 60 min' },
                { key: 'prepDrape', label: 'Prep & Drape', placeholder: 'e.g. ChloraPrep, square drape, Ioban' },
                { key: 'instruments', label: 'Instruments', placeholder: 'e.g. Harmonic scalpel, 5mm trocars, Endocatch bag' },
                { key: 'sutures', label: 'Sutures', placeholder: 'e.g. 0-Vicryl for fascia, 4-0 Monocryl for skin' },
                { key: 'skinClosing', label: 'Skin Closing', placeholder: 'e.g. Dermabond, Steri-Strips, staples' },
                { key: 'drains', label: 'Drains', placeholder: 'e.g. JP drain to bulb suction, Blake drain' },
                { key: 'notes', label: 'Other Notes', placeholder: 'Any other preferences, tips, or things to remember...' },
            ];

            // Calendar helpers
            const getDaysInMonth = (year, month) => new Date(year, month, 0).getDate();
            const getFirstDayOfWeek = (year, month) => new Date(year, month - 1, 1).getDay();
            const today = getTodayISO();

            const prevMonth = () => {
                setCurrentMonth(prev => {
                    if (prev.month === 1) return { year: prev.year - 1, month: 12 };
                    return { ...prev, month: prev.month - 1 };
                });
            };
            const nextMonth = () => {
                setCurrentMonth(prev => {
                    if (prev.month === 12) return { year: prev.year + 1, month: 1 };
                    return { ...prev, month: prev.month + 1 };
                });
            };

            const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

            const formatDateISO = (year, month, day) => `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

            const casesForDate = (dateStr) => cases.filter(c => c.date === dateStr).sort((a, b) => (a.order || 0) - (b.order || 0));
            const dayCasesSelected = casesForDate(selectedDate);

            const addCase = async () => {
                if (!newCaseName.trim()) return;
                await DB.add('casePrep', {
                    date: selectedDate,
                    caseName: newCaseName.trim(),
                    order: newCaseOrder,
                    preOpReviewed: false,
                    imagingReviewed: false,
                    imagingComment: '',
                    surgicalHistoryReviewed: false,
                    surgicalHistoryComment: '',
                    keyOperativeSteps: '',
                    attendingSurgeon: '',
                    addedToPatientList: false,
                    createdAt: new Date().toISOString()
                });
                setNewCaseName('');
                setNewCaseOrder(dayCasesSelected.length + 2);
                setShowAddCase(false);
                loadCases();
            };

            const updateCase = async (caseId, updates) => {
                const caseItem = cases.find(c => c.id === caseId);
                if (!caseItem) return;
                await DB.put('casePrep', { ...caseItem, ...updates });
                loadCases();
            };

            const deleteCase = async (caseId) => {
                if (!confirm('Remove this case?')) return;
                await DB.delete('casePrep', caseId);
                if (expandedCase === caseId) setExpandedCase(null);
                loadCases();
            };

            const addToPatientList = async (caseItem) => {
                // Create a new patient entry from this case
                await DB.add('patients', {
                    room: '',
                    diagnosis: caseItem.caseName,
                    problems: [],
                    procedures: [],
                    pmh: [],
                    psh: [],
                    homeMeds: [],
                    allergies: [],
                    antibiotics: [],
                    examFindings: '',
                    treatmentPlan: '',
                    diet: 'NPO',
                    activity: 'Per protocol',
                    dvtProphylaxis: 'Heparin 5000 TID',
                    giProphylaxis: 'Pantoprazole',
                    dispositionPlan: '',
                    concerns: '',
                    codeStatus: 'Full Code',
                    admitDate: caseItem.date,
                    status: 'active',
                    fromCasePrep: true,
                    casePrepId: caseItem.id,
                    createdAt: new Date().toISOString()
                });
                await updateCase(caseItem.id, { addedToPatientList: true });
                loadPatients();
                alert('Patient added to your list.');
            };

            // Dictation for key operative steps
            // Dictation for key operative steps - managed at CasePrep level to avoid remount
            const [stepsText, setStepsText] = React.useState('');
            const [dictatingCaseId, setDictatingCaseId] = React.useState(null);
            const stepsRecRef = React.useRef(null);
            const [stepsListening, setStepsListening] = React.useState(false);
            const [stepsInterim, setStepsInterim] = React.useState('');
            const stepsTextRef = React.useRef('');
            const savePendingRef = React.useRef(null);

            React.useEffect(() => {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SR) {
                    const rec = new SR();
                    rec.continuous = true;
                    rec.interimResults = true;
                    rec.lang = 'en-US';
                    rec.onstart = () => setStepsListening(true);
                    rec.onend = () => {
                        setStepsListening(false);
                        setStepsInterim('');
                        // Save on stop
                        if (savePendingRef.current) {
                            const { caseId, text } = savePendingRef.current;
                            DB.getAll('casePrep').then(all => {
                                const c = all.find(x => x.id === caseId);
                                if (c) DB.put('casePrep', { ...c, keyOperativeSteps: text }).then(() => loadCases());
                            });
                            savePendingRef.current = null;
                        }
                    };
                    rec.onerror = (e) => {
                        if (e.error !== 'no-speech') setStepsListening(false);
                    };
                    rec.onresult = (event) => {
                        let interim = '';
                        let finalText = stepsTextRef.current;
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            const t = event.results[i][0].transcript;
                            if (event.results[i].isFinal) {
                                const cleaned = cleanMedicalSpeech(t.trim());
                                finalText += (finalText ? ' ' : '') + cleaned;
                            } else {
                                interim += t;
                            }
                        }
                        stepsTextRef.current = finalText;
                        setStepsText(finalText);
                        setStepsInterim(interim);
                    };
                    stepsRecRef.current = rec;
                }
                return () => { if (stepsRecRef.current) try { stepsRecRef.current.stop(); } catch(e){} };
            }, []);

            // Organize raw dictation into clean, numbered operative steps
            const organizeOperativeSteps = (rawText) => {
                if (!rawText || !rawText.trim()) return '';
                let text = rawText.trim();

                // --- Surgical terminology fixes ---
                const surgTerms = [
                    // Common STT errors for surgical terms
                    [/\btro ?cars?\b/gi, 'trocars'],
                    [/\btroaker/gi, 'trocar'],
                    [/\bhas?son\b/gi, 'Hasson'],
                    [/\bvers?\s*ease?\s*needle\b/gi, 'Veress needle'],
                    [/\bvaries\s*needle\b/gi, 'Veress needle'],
                    [/\bvers?e?ss?\b/gi, 'Veress'],
                    [/\bnew?mo\s*peritoneum\b/gi, 'pneumoperitoneum'],
                    [/\binsufflat(?:e|ion)\b/gi, 'insufflation'],
                    [/\bpneu?mo\b/gi, 'pneumo'],
                    [/\bco2\b/gi, 'CO2'],
                    [/\bharmonic\b/gi, 'Harmonic'],
                    [/\bligature\b/gi, 'LigaSure'],
                    [/\bliga\s*sure\b/gi, 'LigaSure'],
                    [/\bendo\s*catch\b/gi, 'Endocatch'],
                    [/\bendo\s*loop\b/gi, 'Endoloop'],
                    [/\bendo\s*stitch\b/gi, 'Endostitch'],
                    [/\bendo\s*gia\b/gi, 'Endo GIA'],
                    [/\bgia\s*stapler\b/gi, 'GIA stapler'],
                    [/\bta\s*stapler\b/gi, 'TA stapler'],
                    [/\bstapler\b/gi, 'stapler'],
                    [/\bcalot'?s?\s*triangle\b/gi, "Calot's triangle"],
                    [/\bcalotte?\b/gi, "Calot's"],
                    [/\bcritical\s*view\s*(?:of\s*)?safety\b/gi, 'critical view of safety (CVS)'],
                    [/\bcvs\b/gi, 'CVS'],
                    [/\bclip\s*(?:and\s*)?appli(?:er|ed)\b/gi, 'clip applier'],
                    [/\bend?o\s*clip\b/gi, 'Endoclip'],
                    [/\bsupine\b/gi, 'supine'],
                    [/\blithotomy\b/gi, 'lithotomy'],
                    [/\btrendelenburg\b/gi, 'Trendelenburg'],
                    [/\breverse\s*trendelenburg\b/gi, 'reverse Trendelenburg'],
                    [/\bprep\s*(?:and|&)\s*drape\b/gi, 'prep and drape'],
                    [/\bmesentery\b/gi, 'mesentery'],
                    [/\bmesent?aric\b/gi, 'mesenteric'],
                    [/\bperiton?eum\b/gi, 'peritoneum'],
                    [/\bfascia\b/gi, 'fascia'],
                    [/\bfascial?\s*closure\b/gi, 'fascial closure'],
                    [/\bsub\s*q\b/gi, 'subcuticular'],
                    [/\bder?ma\s*bond\b/gi, 'Dermabond'],
                    [/\bsteri[\s-]?strip\b/gi, 'Steri-Strips'],
                    [/\bster[ie]l?\b/gi, 'sterile'],
                    [/\belectro\s*cautery\b/gi, 'electrocautery'],
                    [/\bbovie?\b/gi, 'Bovie'],
                    [/\bcaud[ae]d\b/gi, 'caudad'],
                    [/\bcephal?ad\b/gi, 'cephalad'],
                    [/\bumbili[ck](?:al|us)\b/gi, 'umbilical'],
                    [/\bpalmer'?s?\s*point\b/gi, "Palmer's point"],
                    [/\bsubc?ostal\b/gi, 'subcostal'],
                    [/\bmid\s*clavicular\b/gi, 'midclavicular'],
                    [/\banti?\s*(?:mesenteric|mesent[ae]ric)\b/gi, 'antimesenteric'],
                    [/\banastomos[ie]s\b/gi, 'anastomosis'],
                    [/\bhem[io]stasis\b/gi, 'hemostasis'],
                    [/\bespeci?al?ly\b/gi, 'especially'],
                    [/\bret?ro\s*periton?e(?:al|um)\b/gi, 'retroperitoneal'],
                    [/\blap(?:a)?roscop(?:ic|y)\b/gi, 'laparoscopic'],
                    [/\bsurgical\s*time\s*out\b/gi, 'surgical timeout'],
                    [/\btime\s*out\b/gi, 'timeout'],
                    [/\b12\s*(?:mm|millimeter)\b/gi, '12mm'],
                    [/\b10\s*(?:mm|millimeter)\b/gi, '10mm'],
                    [/\b5\s*(?:mm|millimeter)\b/gi, '5mm'],
                    [/\b3\s*(?:mm|millimeter)\b/gi, '3mm'],
                    [/\bport\s*site\b/gi, 'port site'],
                ];
                for (const [pat, rep] of surgTerms) {
                    text = text.replace(pat, rep);
                }

                // --- Conciseness pass: strip filler and convert to terse surgical shorthand ---
                // Remove filler phrases and verbal hedges
                text = text
                    .replace(/\b(?:so\s+)?(?:the\s+)?(?:first|next|second|third|fourth|fifth)\s+(?:thing\s+)?(?:we(?:'re|\s+are)\s+going\s+to\s+do\s+is\s+)?(?:we(?:'re|\s+are)\s+going\s+to\s+)?/gi, '')
                    .replace(/\b(?:we(?:'re|\s+are)\s+going\s+to|we\s+(?:will|want\s+to|need\s+to|have\s+to)|you(?:'re|\s+are)\s+going\s+to|you\s+(?:will|want\s+to|need\s+to))\s+/gi, '')
                    .replace(/\b(?:what\s+we\s+do\s+(?:here|now)\s+is|what\s+(?:I|we)\s+(?:like\s+to|usually)\s+do\s+is)\s+/gi, '')
                    .replace(/\b(?:at\s+this\s+point\s+(?:in\s+time\s+)?(?:we|you|I)\s+(?:will|are\s+going\s+to)\s+)/gi, '')
                    .replace(/\b(?:go\s+ahead\s+and|proceed\s+to|make\s+sure\s+(?:to|you|we))\s+/gi, '')
                    .replace(/\b(?:basically|essentially|obviously|actually|literally|really|just|simply)\s+/gi, '')
                    .replace(/\b(?:kind\s+of|sort\s+of|type\s+of)\s+/gi, '')
                    .replace(/\b(?:you\s+know|I\s+mean|if\s+you\s+will)\s*/gi, '')
                    .replace(/\b(?:we\s+then|we\s+now|we)\s+/gi, '')
                    .replace(/\b(?:I\s+then|I\s+now|I\s+would)\s+/gi, '')
                    .replace(/\b(?:it\s+is\s+important\s+to|it\s+is\s+(?:critical|crucial|essential)\s+(?:that\s+(?:we|you)\s+)?)\s*/gi, '')
                    .replace(/\b(?:in\s+order\s+to)\b/gi, 'to')
                    .replace(/\b(?:at\s+the\s+level\s+of\s+the)\b/gi, 'at')
                    .replace(/\b(?:in\s+the\s+area\s+of\s+the)\b/gi, 'at')
                    .replace(/\b(?:on\s+the\s+(?:right|left)\s+side)\b/gi, (m) => m.includes('right') ? 'on the right' : 'on the left')
                    .replace(/\b(?:is\s+used\s+to)\b/gi, 'to')
                    .replace(/\b(?:using\s+(?:a|the|our))\b/gi, 'with')
                    .replace(/\b(?:utilize|utilization\s+of)\b/gi, 'use')
                    .replace(/\b(?:the\s+patient\s+is\s+(?:then\s+)?(?:placed|positioned)\s+in)\b/gi, 'Position:')
                    .replace(/\b(?:place\s+the\s+patient\s+in)\b/gi, 'Position:')
                    .replace(/\b(?:a\s+skin\s+incision\s+is\s+(?:then\s+)?made)\b/gi, 'Incision')
                    .replace(/\b(?:make\s+(?:a|an|the)\s+(?:skin\s+)?incision)\b/gi, 'Incision')
                    .replace(/\b(?:an?\s+(?:\d+\s*mm\s+)?(?:trocar|port)\s+is\s+(?:then\s+)?(?:placed|inserted|introduced))/gi, (m) => {
                        const sizeM = m.match(/(\d+\s*mm)/i);
                        return 'Place ' + (sizeM ? sizeM[1] + ' ' : '') + (m.toLowerCase().includes('trocar') ? 'trocar' : 'port');
                    })
                    .replace(/\b(?:we\s+(?:place|insert|put)\s+(?:a|an|the)\s+)/gi, 'Place ')
                    .replace(/\b(?:(?:identify|identif(?:ied|ying))\s+(?:the|and\s+(?:isolate|dissect)))\s+/gi, 'Identify ')
                    .replace(/\b(?:(?:dissect|dissection)\s+(?:is\s+(?:then\s+)?(?:carried|performed|done)\s+)?(?:down\s+to|through|around))\b/gi, 'Dissect')
                    .replace(/\b(?:(?:the\s+)?(?:specimen|gallbladder|appendix|bowel|colon)\s+is\s+(?:then\s+)?(?:removed|extracted|retrieved)\s+(?:from\s+the\s+abdomen\s+)?(?:using|through|via))/gi, 'Extract specimen via')
                    .replace(/\b(?:(?:hemostasis|haemostasis)\s+is\s+(?:then\s+)?(?:achieved|confirmed|obtained|ensured|verified))\b/gi, 'Confirm hemostasis')
                    .replace(/\b(?:(?:the\s+)?fascia\s+is\s+(?:then\s+)?closed)\b/gi, 'Close fascia')
                    .replace(/\b(?:(?:the\s+)?skin\s+is\s+(?:then\s+)?closed)\b/gi, 'Close skin')
                    .replace(/\b(?:(?:the\s+)?(?:pneumoperitoneum|pneumo)\s+is\s+(?:then\s+)?(?:established|created|obtained|achieved))\b/gi, 'Establish pneumoperitoneum')
                    .replace(/\b(?:(?:the\s+)?camera\s+is\s+(?:then\s+)?(?:placed|inserted|introduced))\b/gi, 'Insert camera')
                    .replace(/\b(?:under\s+direct\s+(?:vision|visualization))\b/gi, 'under direct vision')
                    .replace(/\b(?:take\s+(?:a\s+)?(?:look|survey)\s+(?:around|at)\s+(?:the\s+)?(?:abdomen|cavity|field))\b/gi, 'Survey abdomen')
                    .replace(/\b(?:(?:we\s+)?(?:perform|do)\s+(?:a\s+)?(?:diagnostic\s+)?(?:laparoscopy|survey))\b/gi, 'Diagnostic laparoscopy');

                // Clean up double spaces and repeated words from removals
                text = text.replace(/\s{2,}/g, ' ').trim();

                // --- Split into individual steps ---
                let steps = text
                    .replace(/\b(?:step\s*\d+[.:]\s*)/gi, '|||')
                    .replace(/\b(\d+)[.)]\s+/g, '|||')
                    .replace(/\b(?:then|next|after that|after this|following that|subsequently|and then|from there|at this point|now)\b/gi, '|||')
                    .replace(/\.\s+/g, '|||')
                    .split('|||')
                    .map(s => s.trim())
                    .filter(s => s.length > 3);

                // If no meaningful splits, treat each sentence as a step
                if (steps.length <= 1 && text.length > 50) {
                    steps = text.split(/[.;]\s*/).map(s => s.trim()).filter(s => s.length > 3);
                }

                // Clean up each step
                steps = steps.map(s => {
                    // Strip leading articles/filler
                    s = s.replace(/^(?:the|a|an|so|and|or|also|now|okay|ok|um|uh|like)\s+/i, '');
                    // Remove trailing filler
                    s = s.replace(/\s+(?:and|or|then|next|so|okay|ok)\s*$/i, '');
                    // Start with action verb capitalized
                    if (s.length > 0) s = s.charAt(0).toUpperCase() + s.slice(1);
                    // Remove period then re-add for consistency
                    s = s.replace(/\.\s*$/, '').trim();
                    if (s.length > 0) s += '.';
                    return s;
                }).filter(s => s.replace(/\./g, '').trim().length > 3);

                // --- Detect missing standard elements and suggest additions ---
                const allText = steps.join(' ').toLowerCase();
                const missingParts = [];

                // Check for positioning
                if (!/\b(?:supine|prone|lateral|lithotomy|trendelenburg|position)/i.test(allText)) {
                    missingParts.push('Patient positioning');
                }
                // Check for timeout
                if (!/\b(?:timeout|time out|time-out|verification|safety check|briefing)\b/i.test(allText)) {
                    missingParts.push('Surgical timeout/verification');
                }
                // Check for prep/drape
                if (!/\b(?:prep|drape|betadine|chlorhexidine|chloraprep|sterile)\b/i.test(allText)) {
                    missingParts.push('Prep and drape');
                }
                // Check for closure
                if (!/\b(?:clos(?:ure|ed|ing)|sutur(?:e|ed)|skin|dermabond|steri|stapl(?:e|ed|er)|dressing)\b/i.test(allText)) {
                    missingParts.push('Closure and dressing');
                }
                // Check for specimen
                if (/\b(?:resect|excis|remov|cholecyst|appendect|colect)/i.test(allText) && !/\b(?:specimen|pathology|path|sent|backtable|labeled)\b/i.test(allText)) {
                    missingParts.push('Specimen to pathology');
                }
                // Check for hemostasis
                if (!/\b(?:hemostasis|hemosta|bleeding|cautery|control)/i.test(allText)) {
                    missingParts.push('Hemostasis confirmed');
                }

                // Build numbered output
                let output = '';
                let stepNum = 1;

                // Add missing pre-op elements at the start
                const preOpMissing = missingParts.filter(p =>
                    p.includes('positioning') || p.includes('timeout') || p.includes('Prep'));
                preOpMissing.forEach(item => {
                    output += `${stepNum}. [${item}]\n`;
                    stepNum++;
                });

                // Add the dictated steps
                steps.forEach(step => {
                    output += `${stepNum}. ${step}\n`;
                    stepNum++;
                });

                // Add missing post-op elements at the end
                const postOpMissing = missingParts.filter(p =>
                    p.includes('Hemostasis') || p.includes('Specimen') || p.includes('Closure'));
                postOpMissing.forEach(item => {
                    output += `${stepNum}. [${item}]\n`;
                    stepNum++;
                });

                return output.trim();
            };

            const startStepsDictation = (caseItem) => {
                if (!stepsRecRef.current) return;
                setDictatingCaseId(caseItem.id);
                const existing = caseItem.keyOperativeSteps || '';
                stepsTextRef.current = existing;
                setStepsText(existing);
                setStepsInterim('');
                try { stepsRecRef.current.start(); } catch(e) {}
            };
            const stopStepsDictation = (caseId) => {
                if (!stepsRecRef.current) return;
                // Organize the raw dictation into clean numbered steps on stop
                const organized = organizeOperativeSteps(stepsTextRef.current);
                stepsTextRef.current = organized;
                setStepsText(organized);
                savePendingRef.current = { caseId, text: organized };
                try { stepsRecRef.current.stop(); } catch(e) {}
            };
            const toggleStepsDictation = (caseItem) => {
                if (stepsListening && dictatingCaseId === caseItem.id) {
                    stopStepsDictation(caseItem.id);
                } else {
                    if (stepsListening) try { stepsRecRef.current.stop(); } catch(e) {}
                    startStepsDictation(caseItem);
                }
            };

            // Calendar grid
            const renderCalendar = () => {
                const { year, month } = currentMonth;
                const daysInMonth = getDaysInMonth(year, month);
                const firstDay = getFirstDayOfWeek(year, month);
                const cells = [];

                // Empty cells for days before month starts
                for (let i = 0; i < firstDay; i++) {
                    cells.push(<div key={`empty-${i}`} className="h-10 md:h-14"></div>);
                }

                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = formatDateISO(year, month, d);
                    const isToday = dateStr === today;
                    const isSelected = dateStr === selectedDate;
                    const daysCases = casesForDate(dateStr);
                    const hasCases = daysCases.length > 0;

                    cells.push(
                        <button key={d} onClick={() => setSelectedDate(dateStr)}
                            className={`h-10 md:h-14 rounded-lg text-sm font-medium relative transition-all
                                ${isSelected ? 'bg-medical-600 text-white shadow-md' : isToday ? 'bg-medical-50 text-medical-700 ring-2 ring-medical-300' : 'hover:bg-gray-100 text-gray-700'}
                            `}>
                            {d}
                            {hasCases && (
                                <span className={`absolute bottom-0.5 left-1/2 -translate-x-1/2 flex gap-0.5`}>
                                    {daysCases.slice(0, 3).map((_, i) => (
                                        <span key={i} className={`w-1.5 h-1.5 rounded-full ${isSelected ? 'bg-white' : 'bg-medical-500'}`}></span>
                                    ))}
                                    {daysCases.length > 3 && <span className={`text-[8px] ${isSelected ? 'text-white' : 'text-medical-500'}`}>+</span>}
                                </span>
                            )}
                        </button>
                    );
                }

                return cells;
            };

            const formatDisplayDate = (dateStr) => {
                const [y, m, d] = dateStr.split('-').map(Number);
                const date = new Date(y, m - 1, d);
                return date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
            };

            return (
                <div className="p-4 md:p-6 max-w-4xl mx-auto">
                    <h2 className="text-2xl font-bold text-medical-600 mb-6">Case Prep</h2>

                    {/* Calendar */}
                    <div className="bg-white border border-gray-100 rounded-xl p-4 mb-6">
                        <div className="flex items-center justify-between mb-4">
                            <button onClick={prevMonth} className="p-2 hover:bg-gray-100 rounded-lg text-gray-500 text-lg font-bold">&lt;</button>
                            <h3 className="text-lg font-bold text-gray-800">{monthNames[currentMonth.month - 1]} {currentMonth.year}</h3>
                            <button onClick={nextMonth} className="p-2 hover:bg-gray-100 rounded-lg text-gray-500 text-lg font-bold">&gt;</button>
                        </div>
                        <div className="grid grid-cols-7 gap-1 mb-2">
                            {dayNames.map(d => (
                                <div key={d} className="text-center text-xs font-semibold text-gray-400 py-1">{d}</div>
                            ))}
                        </div>
                        <div className="grid grid-cols-7 gap-1">
                            {renderCalendar()}
                        </div>
                    </div>

                    {/* Selected Day */}
                    <div className="mb-4">
                        <div className="flex items-center justify-between mb-3">
                            <h3 className="text-lg font-bold text-gray-800">{formatDisplayDate(selectedDate)}</h3>
                            <button onClick={() => { setShowAddCase(true); setNewCaseOrder(dayCasesSelected.length + 1); }}
                                className="px-4 py-2 bg-medical-600 hover:bg-medical-700 text-white rounded-lg text-sm font-medium">
                                + Add Case
                            </button>
                        </div>

                        {/* Add Case Form */}
                        {showAddCase && (
                            <div className="bg-gray-50 border border-gray-200 rounded-xl p-4 mb-4">
                                <div className="space-y-3">
                                    <div>
                                        <label className="text-xs font-semibold text-gray-500">Case Name (procedure/operation)</label>
                                        <input value={newCaseName} onChange={(e) => setNewCaseName(e.target.value)}
                                            placeholder="e.g. Laparoscopic Cholecystectomy"
                                            className="w-full mt-1 px-3 py-2 bg-white border border-gray-300 rounded text-sm" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-semibold text-gray-500">Case Order (position in list)</label>
                                        <input type="number" value={newCaseOrder} onChange={(e) => setNewCaseOrder(parseInt(e.target.value) || 1)}
                                            min="1" className="w-full mt-1 px-3 py-2 bg-white border border-gray-300 rounded text-sm" />
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={addCase} className="flex-1 px-4 py-2 bg-medical-600 hover:bg-medical-700 text-white rounded font-medium text-sm">Add Case</button>
                                        <button onClick={() => setShowAddCase(false)} className="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded font-medium text-sm">Cancel</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Cases List */}
                        {dayCasesSelected.length === 0 ? (
                            <div className="text-center py-12 text-gray-400">
                                <p className="text-4xl mb-2">📋</p>
                                <p className="font-medium">No cases scheduled</p>
                                <p className="text-sm mt-1">Tap "+ Add Case" to add your first case for this day.</p>
                            </div>
                        ) : (
                            <div className="space-y-3">
                                {dayCasesSelected.map((caseItem, idx) => (
                                    <div key={caseItem.id} className="bg-white border border-gray-200 rounded-xl overflow-hidden">
                                        {/* Case Header */}
                                        <div className="flex items-center gap-3 p-4 cursor-pointer hover:bg-gray-50"
                                            onClick={() => setExpandedCase(expandedCase === caseItem.id ? null : caseItem.id)}>
                                            <span className="w-8 h-8 rounded-full bg-medical-100 text-medical-700 flex items-center justify-center text-sm font-bold shrink-0">
                                                {idx + 1}
                                            </span>
                                            <div className="flex-1 min-w-0">
                                                <h4 className="font-bold text-gray-800 truncate">{caseItem.caseName}</h4>
                                                <div className="flex items-center gap-2 mt-1">
                                                    {caseItem.preOpReviewed && <span className="text-xs bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded">Pre-Op</span>}
                                                    {caseItem.imagingReviewed && <span className="text-xs bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded">Imaging</span>}
                                                    {caseItem.surgicalHistoryReviewed && <span className="text-xs bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded">Surg Hx</span>}
                                                    {caseItem.keyOperativeSteps && <span className="text-xs bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded">Steps</span>}
                                                    {caseItem.attendingSurgeon && <span className="text-xs bg-teal-100 text-teal-700 px-1.5 py-0.5 rounded">{caseItem.attendingSurgeon}</span>}
                                                    {caseItem.addedToPatientList && <span className="text-xs bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded">On List</span>}
                                                </div>
                                            </div>
                                            <span className="text-gray-400 text-lg">{expandedCase === caseItem.id ? '▲' : '▼'}</span>
                                        </div>

                                        {/* Expanded Case Details */}
                                        {expandedCase === caseItem.id && (
                                            <div className="border-t border-gray-100 p-4 space-y-4 bg-gray-50/50">
                                                {/* Pre-op Considerations */}
                                                <div className="flex items-center gap-3 p-3 bg-white rounded-lg border border-gray-200">
                                                    <input type="checkbox" checked={caseItem.preOpReviewed || false}
                                                        onChange={(e) => updateCase(caseItem.id, { preOpReviewed: e.target.checked })}
                                                        className="w-5 h-5 rounded text-emerald-600" />
                                                    <div>
                                                        <span className="font-semibold text-gray-800 text-sm">Pre-Op Considerations Reviewed</span>
                                                        <p className="text-xs text-gray-500 mt-0.5">Labs, consents, NPO status, antibiotic prophylaxis, VTE prophylaxis</p>
                                                    </div>
                                                </div>

                                                {/* Attending Surgeon */}
                                                <div className="p-3 bg-white rounded-lg border border-gray-200">
                                                    <label className="text-xs font-semibold text-gray-600 mb-1 block">Attending Surgeon</label>
                                                    <div className="relative">
                                                        <input
                                                            value={surgeonDraft !== null && expandedCase === caseItem.id ? surgeonDraft : (caseItem.attendingSurgeon || '')}
                                                            onChange={(e) => {
                                                                setSurgeonDraft(e.target.value);
                                                                setShowSurgeonSuggestions(e.target.value.length > 0 ? caseItem.id : null);
                                                            }}
                                                            onFocus={(e) => {
                                                                setSurgeonDraft(caseItem.attendingSurgeon || '');
                                                                if (e.target.value.length > 0) setShowSurgeonSuggestions(caseItem.id);
                                                            }}
                                                            onBlur={(e) => {
                                                                setTimeout(() => setShowSurgeonSuggestions(null), 200);
                                                                if (e.target.value !== (caseItem.attendingSurgeon || '')) {
                                                                    updateCase(caseItem.id, { attendingSurgeon: e.target.value });
                                                                }
                                                            }}
                                                            placeholder="Type surgeon name..."
                                                            className="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded text-sm text-gray-700"
                                                        />
                                                        {showSurgeonSuggestions === caseItem.id && getSurgeonSuggestions(surgeonDraft).length > 0 && (
                                                            <div className="absolute z-10 w-full mt-1 bg-white border border-gray-200 rounded-lg shadow-lg max-h-40 overflow-y-auto">
                                                                {getSurgeonSuggestions(surgeonDraft).map((name, i) => (
                                                                    <button key={i} className="w-full text-left px-3 py-2 hover:bg-medical-50 text-sm text-gray-700 border-b border-gray-100 last:border-0"
                                                                        onMouseDown={(e) => {
                                                                            e.preventDefault();
                                                                            setSurgeonDraft(name);
                                                                            updateCase(caseItem.id, { attendingSurgeon: name });
                                                                            setShowSurgeonSuggestions(null);
                                                                        }}>
                                                                        {name}
                                                                    </button>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>

                                                    {/* Surgeon Preferences Summary */}
                                                    {(() => {
                                                        const resolvedName = expandedCase === caseItem.id && surgeonDraft !== null ? surgeonDraft : (caseItem.attendingSurgeon || '');
                                                        const surgeonData = resolvedName ? surgeonPrefs.find(p => p.surgeonName?.toLowerCase() === resolvedName.trim().toLowerCase()) : null;
                                                        const procedures = surgeonData?.procedures || [];
                                                        if (!resolvedName || !resolvedName.trim()) return null;
                                                        return (
                                                            <div className="mt-3 pt-3 border-t border-gray-100">
                                                                <div className="flex items-center justify-between mb-2">
                                                                    <span className="text-xs font-semibold text-medical-600">Preferences for {resolvedName.trim()}</span>
                                                                </div>
                                                                {procedures.length > 0 ? (
                                                                    <div className="space-y-1.5">
                                                                        {procedures.map((proc, i) => {
                                                                            const filled = ['positioning','antibiotics','prepDrape','instruments','sutures','skinClosing','drains'].filter(k => proc[k]);
                                                                            return (
                                                                                <div key={i} className="bg-gray-50 rounded p-2">
                                                                                    <span className="text-xs font-semibold text-gray-700">{proc.name}</span>
                                                                                    {filled.length > 0 && (
                                                                                        <div className="mt-1 flex flex-wrap gap-1">
                                                                                            {filled.map(k => (
                                                                                                <span key={k} className="text-[10px] bg-white border border-gray-200 rounded px-1.5 py-0.5 text-gray-600">
                                                                                                    {k === 'prepDrape' ? 'Prep' : k === 'skinClosing' ? 'Skin' : k.charAt(0).toUpperCase() + k.slice(1)}: {proc[k].length > 30 ? proc[k].slice(0, 30) + '...' : proc[k]}
                                                                                                </span>
                                                                                            ))}
                                                                                        </div>
                                                                                    )}
                                                                                </div>
                                                                            );
                                                                        })}
                                                                    </div>
                                                                ) : (
                                                                    <p className="text-xs text-gray-400">No procedures added yet for this attending.</p>
                                                                )}
                                                                <p className="text-[10px] text-gray-400 mt-2 italic">Manage preferences in the Att. Prefs tab.</p>
                                                            </div>
                                                        );
                                                    })()}
                                                </div>

                                                {/* Imaging Review */}
                                                <div className="p-3 bg-white rounded-lg border border-gray-200">
                                                    <div className="flex items-center gap-3 mb-2">
                                                        <input type="checkbox" checked={caseItem.imagingReviewed || false}
                                                            onChange={(e) => updateCase(caseItem.id, { imagingReviewed: e.target.checked })}
                                                            className="w-5 h-5 rounded text-blue-600" />
                                                        <span className="font-semibold text-gray-800 text-sm">Imaging Reviewed</span>
                                                    </div>
                                                    <DictateField value={caseItem.imagingComment || ''}
                                                        onChange={(v) => updateCase(caseItem.id, { imagingComment: v })}
                                                        placeholder="Unique anatomy, considerations, notable findings..."
                                                        className="w-full mt-1 px-3 py-2 bg-gray-50 border border-gray-300 rounded text-sm text-gray-700"
                                                        rows={2} />
                                                </div>

                                                {/* Surgical History Review */}
                                                <div className="p-3 bg-white rounded-lg border border-gray-200">
                                                    <div className="flex items-center gap-3 mb-2">
                                                        <input type="checkbox" checked={caseItem.surgicalHistoryReviewed || false}
                                                            onChange={(e) => updateCase(caseItem.id, { surgicalHistoryReviewed: e.target.checked })}
                                                            className="w-5 h-5 rounded text-purple-600" />
                                                        <span className="font-semibold text-gray-800 text-sm">Surgical History Reviewed</span>
                                                    </div>
                                                    <DictateField value={caseItem.surgicalHistoryComment || ''}
                                                        onChange={(v) => updateCase(caseItem.id, { surgicalHistoryComment: v })}
                                                        placeholder="Previous surgeries, adhesions, relevant anatomy changes..."
                                                        className="w-full mt-1 px-3 py-2 bg-gray-50 border border-gray-300 rounded text-sm text-gray-700"
                                                        rows={2} />
                                                </div>

                                                {/* Key Operative Steps with Dictation */}
                                                <div className="p-3 bg-white rounded-lg border border-gray-200">
                                                    <div>
                                                        <div className="flex items-center justify-between mb-2">
                                                            <label className="text-xs font-semibold text-gray-600">Key Operative Steps</label>
                                                            <div className="flex gap-2">
                                                                {caseItem.keyOperativeSteps && !stepsListening && (
                                                                    <button onClick={() => {
                                                                        const organized = organizeOperativeSteps(caseItem.keyOperativeSteps);
                                                                        updateCase(caseItem.id, { keyOperativeSteps: organized });
                                                                    }}
                                                                        className="px-3 py-1 rounded text-xs font-medium bg-amber-100 text-amber-700 hover:bg-amber-200">
                                                                        Organize
                                                                    </button>
                                                                )}
                                                                <button onClick={() => toggleStepsDictation(caseItem)}
                                                                    className={`px-3 py-1 rounded text-xs font-medium ${stepsListening && dictatingCaseId === caseItem.id ? 'bg-red-500 text-white animate-pulse' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`}>
                                                                    {stepsListening && dictatingCaseId === caseItem.id ? 'Stop Dictation' : 'Dictate'}
                                                                </button>
                                                            </div>
                                                        </div>
                                                        <textarea
                                                            value={stepsListening && dictatingCaseId === caseItem.id
                                                                ? stepsText + (stepsInterim ? ' ' + stepsInterim : '')
                                                                : caseItem.keyOperativeSteps || ''}
                                                            onChange={(e) => {
                                                                if (stepsListening && dictatingCaseId === caseItem.id) {
                                                                    stepsTextRef.current = e.target.value;
                                                                    setStepsText(e.target.value);
                                                                } else {
                                                                    updateCase(caseItem.id, { keyOperativeSteps: e.target.value });
                                                                }
                                                            }}
                                                            onBlur={(e) => {
                                                                if (!stepsListening) updateCase(caseItem.id, { keyOperativeSteps: e.target.value });
                                                            }}
                                                            placeholder="Dictate or type: positioning, port placement, key steps chronologically..."
                                                            className="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded text-sm text-gray-700"
                                                            rows="5"
                                                        />
                                                        {stepsListening && dictatingCaseId === caseItem.id && (
                                                            <div className="flex gap-1 mt-1 items-center">
                                                                {[...Array(4)].map((_, i) => (
                                                                    <div key={i} className="w-1 h-3 bg-red-500 rounded-full animate-pulse" style={{animationDelay: `${i * 120}ms`}}></div>
                                                                ))}
                                                                <span className="text-xs text-red-500 ml-1">Listening...</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>

                                                {/* Actions */}
                                                <div className="flex gap-2 pt-2">
                                                    {!caseItem.addedToPatientList && (
                                                        <button onClick={() => addToPatientList(caseItem)}
                                                            className="flex-1 px-4 py-2 bg-medical-600 hover:bg-medical-700 text-white rounded font-medium text-sm">
                                                            Add to Patient List
                                                        </button>
                                                    )}
                                                    <button onClick={() => deleteCase(caseItem.id)}
                                                        className="px-4 py-2 bg-red-50 hover:bg-red-100 text-red-600 rounded font-medium text-sm border border-red-200">
                                                        Remove
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==================== ATTENDING PREFERENCES ====================
        function AttendingPreferences() {
            const [attendings, setAttendings] = React.useState([]);
            const [services, setServices] = React.useState([]);
            const [expandedService, setExpandedService] = React.useState(null);
            const [expandedAttending, setExpandedAttending] = React.useState(null);
            const [expandedProcedure, setExpandedProcedure] = React.useState(null);
            const [showAddService, setShowAddService] = React.useState(false);
            const [newServiceName, setNewServiceName] = React.useState('');
            const [addingAttendingTo, setAddingAttendingTo] = React.useState(null);
            const [newAttendingName, setNewAttendingName] = React.useState('');
            const [addingProcedureTo, setAddingProcedureTo] = React.useState(null);
            const [newProcedureName, setNewProcedureName] = React.useState('');
            const [searchQuery, setSearchQuery] = React.useState('');
            const [shareMessage, setShareMessage] = React.useState(null);
            const [sharingAttending, setSharingAttending] = React.useState(null); // attending being shared
            const [platformUsers, setPlatformUsers] = React.useState([]);
            const [shareSearch, setShareSearch] = React.useState('');
            const [shareSuccess, setShareSuccess] = React.useState(null);
            const [sharedWithList, setSharedWithList] = React.useState([]); // track who prefs were shared with
            const [receivedShares, setReceivedShares] = React.useState([]);
            const [expandedShare, setExpandedShare] = React.useState(null);

            const PREF_FIELDS = [
                { key: 'positioning', label: 'Positioning', placeholder: 'e.g. Supine, arms tucked, reverse Trendelenburg' },
                { key: 'antibiotics', label: 'Antibiotics', placeholder: 'e.g. Cefazolin 2g IV within 60 min' },
                { key: 'prepDrape', label: 'Prep & Drape', placeholder: 'e.g. ChloraPrep, square drape, Ioban' },
                { key: 'instruments', label: 'Instruments', placeholder: 'e.g. Harmonic scalpel, 5mm trocars, Endocatch bag' },
                { key: 'sutures', label: 'Sutures', placeholder: 'e.g. 0-Vicryl for fascia, 4-0 Monocryl for skin' },
                { key: 'skinClosing', label: 'Skin Closing', placeholder: 'e.g. Dermabond, Steri-Strips, staples' },
                { key: 'drains', label: 'Drains', placeholder: 'e.g. JP drain to bulb suction, Blake drain' },
                { key: 'notes', label: 'Other Notes', placeholder: 'Any other preferences, tips, or things to remember...' },
            ];

            React.useEffect(() => { loadAll(); }, []);

            const loadAll = async () => {
                const sSnap = await db.collection('globalSurgicalServices').get();
                setServices(sSnap.docs.map(d => ({ ...d.data(), id: d.id })));
                const aSnap = await db.collection('globalSurgeonPreferences').get();
                setAttendings(aSnap.docs.map(d => ({ ...d.data(), id: d.id })));
                const uSnap = await db.collection('users').get();
                const currentUid = firebase.auth().currentUser?.uid;
                setPlatformUsers(uSnap.docs.map(d => ({ ...d.data(), id: d.id })).filter(u => u.id !== currentUid));
                // Load received shares
                if (currentUid) {
                    const rSnap = await db.collection('sharedPreferences').where('sharedWithUid', '==', currentUid).get();
                    setReceivedShares(rSnap.docs.map(d => ({ ...d.data(), id: d.id })).sort((a, b) => (b.sharedAt || '').localeCompare(a.sharedAt || '')));
                }
            };

            const dismissShare = async (shareId) => {
                await db.collection('sharedPreferences').doc(shareId).delete();
                setReceivedShares(prev => prev.filter(s => s.id !== shareId));
            };

            const markShareRead = async (shareId) => {
                await db.collection('sharedPreferences').doc(shareId).update({ read: true });
                setReceivedShares(prev => prev.map(s => s.id === shareId ? { ...s, read: true } : s));
            };

            // Services
            const addService = async () => {
                const name = newServiceName.trim();
                if (!name) return;
                if (services.find(s => s.name?.toLowerCase() === name.toLowerCase())) {
                    alert('This service already exists.');
                    return;
                }
                await db.collection('globalSurgicalServices').add({
                    name,
                    createdAt: new Date().toISOString(),
                    createdBy: firebase.auth().currentUser?.displayName || firebase.auth().currentUser?.email || ''
                });
                setNewServiceName('');
                setShowAddService(false);
                await loadAll();
            };

            const removeService = async (serviceId) => {
                if (!confirm('Remove this service? Attendings under it will also be removed.')) return;
                // Remove all attendings under this service
                const svc = services.find(s => s.id === serviceId);
                if (svc) {
                    const toRemove = attendings.filter(a => a.service === svc.name);
                    for (const att of toRemove) {
                        await db.collection('globalSurgeonPreferences').doc(att.id).delete();
                    }
                }
                await db.collection('globalSurgicalServices').doc(serviceId).delete();
                if (expandedService === serviceId) setExpandedService(null);
                await loadAll();
            };

            // Attendings
            const addAttending = async (serviceName) => {
                const name = newAttendingName.trim();
                if (!name) return;
                await db.collection('globalSurgeonPreferences').add({
                    surgeonName: name,
                    service: serviceName,
                    procedures: [],
                    updatedAt: new Date().toISOString(),
                    updatedBy: firebase.auth().currentUser?.displayName || firebase.auth().currentUser?.email || ''
                });
                setNewAttendingName('');
                setAddingAttendingTo(null);
                await loadAll();
            };

            const removeAttending = async (attendingId) => {
                if (!confirm('Remove this attending and all their preferences?')) return;
                await db.collection('globalSurgeonPreferences').doc(attendingId).delete();
                if (expandedAttending === attendingId) setExpandedAttending(null);
                await loadAll();
            };

            // Procedures
            const addProcedure = async (attendingId) => {
                const name = newProcedureName.trim();
                if (!name) return;
                const att = attendings.find(a => a.id === attendingId);
                if (!att) return;
                const procedures = att.procedures || [];
                if (procedures.find(p => p.name?.toLowerCase() === name.toLowerCase())) {
                    alert('This procedure already exists for this attending.');
                    return;
                }
                procedures.push({
                    name,
                    positioning: '', antibiotics: '', prepDrape: '', instruments: '',
                    sutures: '', skinClosing: '', drains: '', notes: ''
                });
                await db.collection('globalSurgeonPreferences').doc(attendingId).set({
                    ...att, procedures,
                    updatedAt: new Date().toISOString(),
                    updatedBy: firebase.auth().currentUser?.displayName || firebase.auth().currentUser?.email || ''
                }, { merge: true });
                setNewProcedureName('');
                setAddingProcedureTo(null);
                await loadAll();
            };

            const removeProcedure = async (attendingId, procIdx) => {
                if (!confirm('Remove this procedure and its preferences?')) return;
                const att = attendings.find(a => a.id === attendingId);
                if (!att) return;
                const procedures = [...(att.procedures || [])];
                procedures.splice(procIdx, 1);
                await db.collection('globalSurgeonPreferences').doc(attendingId).set({
                    ...att, procedures,
                    updatedAt: new Date().toISOString(),
                    updatedBy: firebase.auth().currentUser?.displayName || firebase.auth().currentUser?.email || ''
                }, { merge: true });
                await loadAll();
            };

            const saveProcedurePref = async (attendingId, procIdx, key, value) => {
                const att = attendings.find(a => a.id === attendingId);
                if (!att) return;
                const procedures = [...(att.procedures || [])];
                if (!procedures[procIdx]) return;
                procedures[procIdx] = { ...procedures[procIdx], [key]: value };
                await db.collection('globalSurgeonPreferences').doc(attendingId).set({
                    ...att, procedures,
                    updatedAt: new Date().toISOString(),
                    updatedBy: firebase.auth().currentUser?.displayName || firebase.auth().currentUser?.email || ''
                }, { merge: true });
                await loadAll();
            };

            // Share
            const openShareModal = (attending) => {
                setSharingAttending(attending);
                setShareSearch('');
                setShareSuccess(null);
                // Load who this attending has already been shared with
                db.collection('sharedPreferences')
                    .where('attendingId', '==', attending.id)
                    .get()
                    .then(snap => {
                        setSharedWithList(snap.docs.map(d => d.data().sharedWithUid));
                    });
            };

            const shareWithUser = async (targetUser) => {
                if (!sharingAttending) return;
                const currentUser = firebase.auth().currentUser;
                await db.collection('sharedPreferences').add({
                    attendingId: sharingAttending.id,
                    attendingName: sharingAttending.surgeonName,
                    service: sharingAttending.service,
                    procedures: sharingAttending.procedures || [],
                    sharedByUid: currentUser?.uid || '',
                    sharedByName: currentUser?.displayName || currentUser?.email || '',
                    sharedWithUid: targetUser.id,
                    sharedWithName: targetUser.displayName || targetUser.email || '',
                    sharedAt: new Date().toISOString(),
                    read: false
                });
                setSharedWithList(prev => [...prev, targetUser.id]);
                setShareSuccess(targetUser.displayName || targetUser.email);
                setTimeout(() => setShareSuccess(null), 2000);
            };

            const filteredShareUsers = shareSearch.trim()
                ? platformUsers.filter(u => {
                    const q = shareSearch.toLowerCase();
                    return (u.displayName?.toLowerCase().includes(q) || u.email?.toLowerCase().includes(q));
                })
                : platformUsers;

            // Filter
            const attendingsForService = (serviceName) => {
                return attendings.filter(a => a.service === serviceName)
                    .sort((a, b) => (a.surgeonName || '').localeCompare(b.surgeonName || ''));
            };

            const filteredServices = searchQuery.trim()
                ? services.filter(s => {
                    const q = searchQuery.toLowerCase();
                    if (s.name?.toLowerCase().includes(q)) return true;
                    return attendingsForService(s.name).some(a =>
                        a.surgeonName?.toLowerCase().includes(q) ||
                        (a.procedures || []).some(p => p.name?.toLowerCase().includes(q))
                    );
                })
                : services;

            const sortedServices = [...filteredServices].sort((a, b) => (a.name || '').localeCompare(b.name || ''));

            return (
                <div className="p-4 md:p-6 max-w-4xl mx-auto">
                    <h2 className="text-2xl font-bold text-medical-600 mb-2">Attending Preferences</h2>
                    <p className="text-sm text-gray-500 mb-6">Add surgical services, then attendings, then their procedures with specific preferences.</p>

                    {/* Shared With Me */}
                    {receivedShares.length > 0 && (
