        // ==================== CASE CONFERENCE ====================
        function CaseConference() {
            const [conferences, setConferences] = React.useState([]);
            const [patients, setPatients] = React.useState([]);
            const [casePrepData, setCasePrepData] = React.useState([]);
            const [selectedConf, setSelectedConf] = React.useState(null);
            const [showAddConf, setShowAddConf] = React.useState(false);
            const [confTitle, setConfTitle] = React.useState('');
            const [confDate, setConfDate] = React.useState(getTodayISO());
            const [confPresenter, setConfPresenter] = React.useState('');
            const [showAddCase, setShowAddCase] = React.useState(false);
            const [generatingPptx, setGeneratingPptx] = React.useState(false);

            // Dictation for indications
            const indicationRecRef = React.useRef(null);
            const indicationFinalRef = React.useRef('');
            const [indicationListening, setIndicationListening] = React.useState(false);
            const [indicationText, setIndicationText] = React.useState('');
            const [indicationInterim, setIndicationInterim] = React.useState('');
            const [dictatingCaseIdx, setDictatingCaseIdx] = React.useState(null);

            React.useEffect(() => {
                loadData();
                setupIndicationDictation();
            }, []);

            const loadData = async () => {
                const confs = await DB.getAll('caseConference');
                setConferences((confs || []).sort((a, b) => (b.date || '').localeCompare(a.date || '')));
                const pts = await DB.getAll('patients');
                setPatients((pts || []).filter(p => p.status !== 'discharged'));
                const cp = await DB.getAll('casePrep');
                setCasePrepData(cp || []);
            };

            const setupIndicationDictation = () => {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SR) return;
                indicationRecRef.current = new SR();
                indicationRecRef.current.continuous = true;
                indicationRecRef.current.interimResults = true;
                indicationRecRef.current.onstart = () => setIndicationListening(true);
                indicationRecRef.current.onresult = (event) => {
                    let interim = '';
                    let finalText = indicationFinalRef.current;
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const t = event.results[i][0].transcript;
                        if (event.results[i].isFinal) {
                            finalText += (finalText ? ' ' : '') + cleanMedicalSpeech(t.trim());
                        } else {
                            interim += t;
                        }
                    }
                    indicationFinalRef.current = finalText;
                    setIndicationText(finalText);
                    setIndicationInterim(interim);
                };
                indicationRecRef.current.onerror = (e) => { if (e.error !== 'no-speech') setIndicationListening(false); };
                indicationRecRef.current.onend = () => { setIndicationListening(false); setIndicationInterim(''); };
            };

            const startIndicationDictation = (caseIdx, currentText) => {
                if (!indicationRecRef.current) return;
                indicationFinalRef.current = currentText || '';
                setIndicationText(currentText || '');
                setIndicationInterim('');
                setDictatingCaseIdx(caseIdx);
                try { indicationRecRef.current.start(); } catch(e) {}
            };

            const stopIndicationDictation = async () => {
                if (indicationRecRef.current) try { indicationRecRef.current.stop(); } catch(e) {}
                if (selectedConf && dictatingCaseIdx !== null) {
                    const updated = { ...selectedConf };
                    updated.cases[dictatingCaseIdx].indications = indicationFinalRef.current;
                    await DB.put('caseConference', updated);
                    setSelectedConf(updated);
                    loadData();
                }
                setDictatingCaseIdx(null);
            };

            const createConference = async () => {
                if (!confTitle.trim()) return;
                const newConf = {
                    title: confTitle.trim(),
                    date: confDate,
                    presenter: confPresenter.trim(),
                    cases: [],
                    createdAt: new Date().toISOString()
                };
                const id = await DB.add('caseConference', newConf);
                setShowAddConf(false);
                setConfTitle('');
                setConfPresenter('');
                await loadData();
                const all = await DB.getAll('caseConference');
                const created = all.find(c => c.id === id);
                if (created) setSelectedConf(created);
            };

            const deleteConference = async (id) => {
                if (!confirm('Delete this conference?')) return;
                await DB.delete('caseConference', id);
                if (selectedConf?.id === id) setSelectedConf(null);
                loadData();
            };

            const addCaseToConference = async (source, surgeryDate) => {
                if (!selectedConf) return;
                const caseDate = surgeryDate || getTodayISO();
                let newCase = {};
                if (source.type === 'patient') {
                    const p = source.patient;
                    newCase = {
                        patientId: p.id,
                        patientName: 'Rm ' + (p.room || '?'),
                        diagnosis: p.diagnosis || '',
                        pmh: (p.pmh || []).join(', '),
                        psh: (p.psh || []).join(', '),
                        meds: (p.homeMeds || []).join(', '),
                        allergies: (p.allergies || []).join(', '),
                        examFindings: p.examFindings || '',
                        labFindings: '',
                        imagingFindings: '',
                        procedure: (p.procedures || []).join(', '),
                        indications: '',
                        keySteps: '',
                        casePrepId: null,
                        surgeryDate: caseDate
                    };
                    // Try to find linked case prep
                    const linkedPrep = casePrepData.find(cp => cp.patientId === p.id || cp.caseName?.includes(p.diagnosis));
                    if (linkedPrep) {
                        newCase.casePrepId = linkedPrep.id;
                        newCase.keySteps = linkedPrep.keyOperativeSteps || '';
                        newCase.imagingFindings = linkedPrep.imagingComment || '';
                    }
                } else if (source.type === 'casePrep') {
                    const cp = source.casePrep;
                    newCase = {
                        patientId: null,
                        patientName: cp.caseName || '',
                        diagnosis: cp.caseName || '',
                        pmh: '', psh: '', meds: '', allergies: '',
                        examFindings: '',
                        labFindings: '',
                        imagingFindings: cp.imagingComment || '',
                        procedure: cp.caseName || '',
                        indications: '',
                        keySteps: cp.keyOperativeSteps || '',
                        casePrepId: cp.id,
                        surgeryDate: cp.date || caseDate
                    };
                } else {
                    newCase = {
                        patientId: null,
                        patientName: source.name || '',
                        diagnosis: '', pmh: '', psh: '', meds: '', allergies: '',
                        examFindings: '', labFindings: '', imagingFindings: '',
                        procedure: '', indications: '', keySteps: '', casePrepId: null,
                        surgeryDate: caseDate
                    };
                }
                const updated = { ...selectedConf, cases: [...(selectedConf.cases || []), newCase] };
                await DB.put('caseConference', updated);
                setSelectedConf(updated);
                setShowAddCase(false);

                // Auto-create Case Prep entry if one doesn't already exist for this case
                if (!newCase.casePrepId) {
                    try {
                        const caseName = newCase.procedure || newCase.diagnosis || newCase.patientName || 'Conference Case';
                        const existingPreps = await DB.getAll('casePrep');
                        const alreadyExists = existingPreps.find(cp =>
                            cp.date === newCase.surgeryDate && cp.caseName === caseName
                        );
                        if (!alreadyExists) {
                            const prepId = await DB.add('casePrep', {
                                date: newCase.surgeryDate,
                                caseName: caseName,
                                order: 1,
                                preOpReviewed: false,
                                imagingReviewed: !!newCase.imagingFindings,
                                imagingComment: newCase.imagingFindings || '',
                                surgicalHistoryReviewed: !!newCase.psh,
                                surgicalHistoryComment: newCase.psh || '',
                                keyOperativeSteps: newCase.keySteps || '',
                                addedToPatientList: !!newCase.patientId,
                                patientId: newCase.patientId || null,
                                fromConference: selectedConf.id,
                                createdAt: new Date().toISOString()
                            });
                            // Link the case back to the new prep entry
                            const caseIdx = updated.cases.length - 1;
                            updated.cases[caseIdx].casePrepId = prepId;
                            await DB.put('caseConference', updated);
                            setSelectedConf({ ...updated });
                        }
                    } catch(e) { console.error('Auto-create case prep error:', e); }
                }

                loadData();
            };

            const updateCaseField = async (caseIdx, field, value) => {
                const updated = { ...selectedConf };
                updated.cases[caseIdx][field] = value;
                await DB.put('caseConference', updated);
                setSelectedConf(updated);

                // Sync relevant fields back to linked Case Prep
                const caseData = updated.cases[caseIdx];
                if (caseData.casePrepId) {
                    const syncFields = { keySteps: 'keyOperativeSteps', imagingFindings: 'imagingComment', psh: 'surgicalHistoryComment' };
                    if (syncFields[field]) {
                        try {
                            const prep = (await DB.getAll('casePrep')).find(cp => cp.id === caseData.casePrepId);
                            if (prep) {
                                await DB.put('casePrep', { ...prep, [syncFields[field]]: value });
                            }
                        } catch(e) { console.error('Sync to case prep error:', e); }
                    }
                }
            };

            const removeCase = async (caseIdx) => {
                if (!confirm('Remove this case from the conference?')) return;
                const updated = { ...selectedConf };
                updated.cases.splice(caseIdx, 1);
                await DB.put('caseConference', updated);
                setSelectedConf(updated);
                loadData();
            };

            // ===== PRESENTATION GENERATOR =====
            const generatePresentation = async () => {
                if (!selectedConf || !selectedConf.cases?.length) { alert('Add cases first.'); return; }
                if (typeof PptxGenJS === 'undefined') { alert('Presentation library loading. Try again.'); return; }
                setGeneratingPptx(true);
                try {
                    const pres = new PptxGenJS();
                    pres.layout = 'LAYOUT_16x9';
                    pres.author = 'ChiefRounds';
                    pres.title = selectedConf.title || 'Case Conference';

                    const C = {
                        navy: '1E293B', slate: '334155', muted: '64748B', light: '94A3B8',
                        bg: 'F1F5F9', card: 'FFFFFF', accent: '0F766E', accentLight: 'CCFBF1',
                        white: 'FFFFFF', divider: 'E2E8F0', red: 'DC2626', amber: 'D97706',
                        blue: '2563EB', blueLight: 'DBEAFE'
                    };
                    const F = { head: 'Georgia', body: 'Calibri' };
                    const safeStr = (v) => v == null ? '' : String(v);
                    const cardShadow = () => ({ type: 'outer', blur: 6, offset: 2, angle: 135, color: '000000', opacity: 0.08 });
                    const safeTextRuns = (arr) => arr.map(item =>
                        typeof item === 'string' ? { text: item, options: {} } : { text: String(item.text || ''), options: item.options || {} }
                    );

                    // ====== SLIDE 1: Title ======
                    let s1 = pres.addSlide();
                    s1.background = { color: C.navy };
                    s1.addShape(pres.shapes.RECTANGLE, { x: 0, y: 0, w: 10, h: 0.06, fill: { color: C.accent } });
                    s1.addText('SURGICAL CASE CONFERENCE', {
                        x: 0.8, y: 1.2, w: 8.4, h: 0.5,
                        fontFace: F.head, fontSize: 13, color: C.accent, charSpacing: 5, bold: true
                    });
                    s1.addText(safeStr(selectedConf.title), {
                        x: 0.8, y: 1.7, w: 8.4, h: 1.0,
                        fontFace: F.head, fontSize: 36, color: C.white, bold: true
                    });
                    const confDateStr = new Date(selectedConf.date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
                    const metaLine = [confDateStr, selectedConf.presenter ? 'Presented by: ' + selectedConf.presenter : ''].filter(Boolean).join('  |  ');
                    s1.addText(metaLine, { x: 0.8, y: 3.0, w: 8.4, h: 0.5, fontFace: F.body, fontSize: 13, color: C.light });
                    s1.addText(selectedConf.cases.length + ' Case' + (selectedConf.cases.length !== 1 ? 's' : ''), {
                        x: 0.8, y: 3.5, w: 8.4, h: 0.4, fontFace: F.body, fontSize: 12, color: C.muted
                    });
                    s1.addShape(pres.shapes.RECTANGLE, { x: 0, y: 5.565, w: 10, h: 0.06, fill: { color: C.accent } });

                    // ====== SLIDE 2: Agenda ======
                    let s2 = pres.addSlide();
                    s2.background = { color: C.bg };
                    s2.addText('Agenda', { x: 0.6, y: 0.3, w: 8.8, h: 0.7, fontFace: F.head, fontSize: 28, color: C.navy, bold: true });
                    s2.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.0, w: 1.5, h: 0.04, fill: { color: C.accent } });
                    const agendaItems = selectedConf.cases.map((c, i) => ({
                        text: `${i + 1}. ${safeStr(c.patientName)} - ${safeStr(c.procedure || c.diagnosis)}`,
                        options: { breakLine: i < selectedConf.cases.length - 1, fontSize: 16, color: C.slate, bullet: false, lineSpacingMultiple: 1.8 }
                    }));
                    s2.addText(safeTextRuns(agendaItems), { x: 0.8, y: 1.4, w: 8.4, h: 3.8, fontFace: F.body });

                    // ====== PER-CASE SLIDES ======
                    selectedConf.cases.forEach((c, idx) => {
                        // --- Slide A: Patient Overview ---
                        let sA = pres.addSlide();
                        sA.background = { color: C.bg };
                        sA.addShape(pres.shapes.RECTANGLE, { x: 0, y: 0, w: 10, h: 0.8, fill: { color: C.navy } });
                        sA.addText(`Case ${idx + 1}: ${safeStr(c.patientName)}`, {
                            x: 0.6, y: 0.05, w: 8.8, h: 0.7, fontFace: F.head, fontSize: 22, color: C.white, bold: true, valign: 'middle'
                        });

                        // Diagnosis
                        sA.addShape(pres.shapes.RECTANGLE, { x: 0.5, y: 1.1, w: 9.0, h: 0.5, fill: { color: C.accent }, rectRadius: 0.05 });
                        sA.addText('Diagnosis: ' + safeStr(c.diagnosis), {
                            x: 0.7, y: 1.1, w: 8.6, h: 0.5, fontFace: F.body, fontSize: 15, color: C.white, bold: true, valign: 'middle'
                        });

                        // History section - 2 columns
                        const leftX = 0.5, rightX = 5.2, colW = 4.3, cardH = 1.6;
                        // PMH
                        sA.addShape(pres.shapes.RECTANGLE, { x: leftX, y: 1.85, w: colW, h: cardH, fill: { color: C.card }, shadow: cardShadow(), rectRadius: 0.05 });
                        sA.addText('Past Medical History', { x: leftX + 0.15, y: 1.9, w: colW - 0.3, h: 0.35, fontFace: F.body, fontSize: 11, color: C.accent, bold: true });
                        sA.addText(safeStr(c.pmh || 'None reported'), { x: leftX + 0.15, y: 2.25, w: colW - 0.3, h: cardH - 0.5, fontFace: F.body, fontSize: 10, color: C.slate, valign: 'top' });
                        // PSH
                        sA.addShape(pres.shapes.RECTANGLE, { x: rightX, y: 1.85, w: colW, h: cardH, fill: { color: C.card }, shadow: cardShadow(), rectRadius: 0.05 });
                        sA.addText('Past Surgical History', { x: rightX + 0.15, y: 1.9, w: colW - 0.3, h: 0.35, fontFace: F.body, fontSize: 11, color: C.accent, bold: true });
                        sA.addText(safeStr(c.psh || 'None reported'), { x: rightX + 0.15, y: 2.25, w: colW - 0.3, h: cardH - 0.5, fontFace: F.body, fontSize: 10, color: C.slate, valign: 'top' });
                        // Meds & Allergies
                        sA.addShape(pres.shapes.RECTANGLE, { x: leftX, y: 3.65, w: colW, h: 1.1, fill: { color: C.card }, shadow: cardShadow(), rectRadius: 0.05 });
                        sA.addText('Medications', { x: leftX + 0.15, y: 3.7, w: colW - 0.3, h: 0.3, fontFace: F.body, fontSize: 11, color: C.accent, bold: true });
                        sA.addText(safeStr(c.meds || 'None'), { x: leftX + 0.15, y: 4.0, w: colW - 0.3, h: 0.7, fontFace: F.body, fontSize: 10, color: C.slate, valign: 'top' });
                        sA.addShape(pres.shapes.RECTANGLE, { x: rightX, y: 3.65, w: colW, h: 1.1, fill: { color: C.card }, shadow: cardShadow(), rectRadius: 0.05 });
                        sA.addText('Allergies', { x: rightX + 0.15, y: 3.7, w: colW - 0.3, h: 0.3, fontFace: F.body, fontSize: 11, color: C.accent, bold: true });
                        sA.addText(safeStr(c.allergies || 'NKDA'), { x: rightX + 0.15, y: 4.0, w: colW - 0.3, h: 0.7, fontFace: F.body, fontSize: 10, color: C.slate, valign: 'top' });
                        // Footer
                        sA.addText(`Case Conference  |  ${confDateStr}`, { x: 0.5, y: 5.2, w: 9.0, h: 0.3, fontFace: F.body, fontSize: 8, color: C.light, align: 'right' });

                        // --- Slide B: Exam, Labs, Imaging ---
                        let sB = pres.addSlide();
                        sB.background = { color: C.bg };
                        sB.addShape(pres.shapes.RECTANGLE, { x: 0, y: 0, w: 10, h: 0.8, fill: { color: C.navy } });
                        sB.addText(`Case ${idx + 1}: Findings`, {
                            x: 0.6, y: 0.05, w: 8.8, h: 0.7, fontFace: F.head, fontSize: 22, color: C.white, bold: true, valign: 'middle'
                        });

                        // Exam Findings
                        sB.addShape(pres.shapes.RECTANGLE, { x: 0.5, y: 1.1, w: 4.3, h: 2.0, fill: { color: C.card }, shadow: cardShadow(), rectRadius: 0.05 });
                        sB.addText('Physical Exam', { x: 0.65, y: 1.15, w: 4.0, h: 0.35, fontFace: F.body, fontSize: 12, color: C.accent, bold: true });
                        sB.addText(safeStr(c.examFindings || 'Not documented'), { x: 0.65, y: 1.5, w: 4.0, h: 1.5, fontFace: F.body, fontSize: 11, color: C.slate, valign: 'top' });

                        // Lab Findings
                        sB.addShape(pres.shapes.RECTANGLE, { x: 5.2, y: 1.1, w: 4.3, h: 2.0, fill: { color: C.card }, shadow: cardShadow(), rectRadius: 0.05 });
                        sB.addText('Lab Findings', { x: 5.35, y: 1.15, w: 4.0, h: 0.35, fontFace: F.body, fontSize: 12, color: C.accent, bold: true });
                        sB.addText(safeStr(c.labFindings || 'Not documented'), { x: 5.35, y: 1.5, w: 4.0, h: 1.5, fontFace: F.body, fontSize: 11, color: C.slate, valign: 'top' });

                        // Imaging - large card with placeholder for images
                        sB.addShape(pres.shapes.RECTANGLE, { x: 0.5, y: 3.3, w: 9.0, h: 2.0, fill: { color: C.card }, shadow: cardShadow(), rectRadius: 0.05 });
                        sB.addText('Imaging Findings', { x: 0.65, y: 3.35, w: 4.0, h: 0.35, fontFace: F.body, fontSize: 12, color: C.accent, bold: true });
                        sB.addText(safeStr(c.imagingFindings || 'Not documented'), { x: 0.65, y: 3.7, w: 4.5, h: 1.5, fontFace: F.body, fontSize: 11, color: C.slate, valign: 'top' });
                        // Image placeholder boxes
                        sB.addShape(pres.shapes.RECTANGLE, { x: 5.5, y: 3.45, w: 1.8, h: 1.6, fill: { color: 'E2E8F0' }, line: { color: C.light, width: 1, dashType: 'dash' }, rectRadius: 0.05 });
                        sB.addText('CT / CXR\nImage', { x: 5.5, y: 3.45, w: 1.8, h: 1.6, fontFace: F.body, fontSize: 9, color: C.muted, align: 'center', valign: 'middle' });
                        sB.addShape(pres.shapes.RECTANGLE, { x: 7.5, y: 3.45, w: 1.8, h: 1.6, fill: { color: 'E2E8F0' }, line: { color: C.light, width: 1, dashType: 'dash' }, rectRadius: 0.05 });
                        sB.addText('Additional\nImaging', { x: 7.5, y: 3.45, w: 1.8, h: 1.6, fontFace: F.body, fontSize: 9, color: C.muted, align: 'center', valign: 'middle' });
                        sB.addText(`Case Conference  |  ${confDateStr}`, { x: 0.5, y: 5.2, w: 9.0, h: 0.3, fontFace: F.body, fontSize: 8, color: C.light, align: 'right' });

                        // --- Slide C: Procedure & Indications ---
                        let sC = pres.addSlide();
                        sC.background = { color: C.bg };
                        sC.addShape(pres.shapes.RECTANGLE, { x: 0, y: 0, w: 10, h: 0.8, fill: { color: C.navy } });
                        sC.addText(`Case ${idx + 1}: Surgical Plan`, {
                            x: 0.6, y: 0.05, w: 8.8, h: 0.7, fontFace: F.head, fontSize: 22, color: C.white, bold: true, valign: 'middle'
                        });

                        // Procedure
                        sC.addShape(pres.shapes.RECTANGLE, { x: 0.5, y: 1.1, w: 9.0, h: 0.6, fill: { color: C.accent }, rectRadius: 0.05 });
                        sC.addText('Planned Procedure: ' + safeStr(c.procedure), {
                            x: 0.7, y: 1.1, w: 8.6, h: 0.6, fontFace: F.body, fontSize: 16, color: C.white, bold: true, valign: 'middle'
                        });

                        // Indications
                        sC.addShape(pres.shapes.RECTANGLE, { x: 0.5, y: 1.95, w: 9.0, h: 1.6, fill: { color: C.card }, shadow: cardShadow(), rectRadius: 0.05 });
                        sC.addText('Indications for Surgery', { x: 0.65, y: 2.0, w: 8.7, h: 0.35, fontFace: F.body, fontSize: 12, color: C.accent, bold: true });
                        sC.addText(safeStr(c.indications || 'Not documented'), { x: 0.65, y: 2.35, w: 8.7, h: 1.1, fontFace: F.body, fontSize: 11, color: C.slate, valign: 'top' });

                        // Key Steps
                        if (c.keySteps) {
                            sC.addShape(pres.shapes.RECTANGLE, { x: 0.5, y: 3.75, w: 9.0, h: 1.5, fill: { color: C.card }, shadow: cardShadow(), rectRadius: 0.05 });
                            sC.addText('Key Operative Steps', { x: 0.65, y: 3.8, w: 8.7, h: 0.35, fontFace: F.body, fontSize: 12, color: C.accent, bold: true });
                            sC.addText(safeStr(c.keySteps), { x: 0.65, y: 4.15, w: 8.7, h: 1.0, fontFace: F.body, fontSize: 10, color: C.slate, valign: 'top' });
                        }
                        sC.addText(`Case Conference  |  ${confDateStr}`, { x: 0.5, y: 5.2, w: 9.0, h: 0.3, fontFace: F.body, fontSize: 8, color: C.light, align: 'right' });
                    });

                    // ====== FINAL SLIDE ======
                    let sF = pres.addSlide();
                    sF.background = { color: C.navy };
                    sF.addShape(pres.shapes.RECTANGLE, { x: 0, y: 0, w: 10, h: 0.06, fill: { color: C.accent } });
                    sF.addText('Questions & Discussion', {
                        x: 0.8, y: 1.8, w: 8.4, h: 1.0, fontFace: F.head, fontSize: 36, color: C.white, bold: true, align: 'center'
                    });
                    sF.addText('Thank you', {
                        x: 0.8, y: 3.0, w: 8.4, h: 0.6, fontFace: F.body, fontSize: 16, color: C.light, align: 'center'
                    });
                    sF.addShape(pres.shapes.RECTANGLE, { x: 0, y: 5.565, w: 10, h: 0.06, fill: { color: C.accent } });

                    const fileName = (selectedConf.title || 'Case_Conference').replace(/\s+/g, '_') + '.pptx';
                    await pres.writeFile({ fileName });
                } catch (e) {
                    console.error('Presentation error:', e);
                    alert('Error generating presentation: ' + e.message);
                }
                setGeneratingPptx(false);
            };

            // ===== RENDER =====
            const AddCaseModal = () => {
                const [newName, setNewName] = React.useState('');
                const [surgDate, setSurgDate] = React.useState('');
                if (!showAddCase) return null;

                const handleAddFromPatient = (p) => {
                    if (!surgDate) { alert('Please select a surgery date first.'); return; }
                    addCaseToConference({ type: 'patient', patient: p }, surgDate);
                };
                const handleAddFromPrep = (cp) => {
                    addCaseToConference({ type: 'casePrep', casePrep: cp }, cp.date || surgDate);
                };
                const handleAddManual = () => {
                    if (!newName.trim()) return;
                    if (!surgDate) { alert('Please select a surgery date first.'); return; }
                    addCaseToConference({ type: 'manual', name: newName.trim() }, surgDate);
                    setNewName('');
                };

                return (
                    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={() => setShowAddCase(false)}>
                        <div className="bg-white rounded-xl shadow-xl w-full max-w-md max-h-[80vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                            <div className="p-4 border-b border-gray-100">
                                <h3 className="font-bold text-gray-800">Add Case to Conference</h3>
                            </div>
                            <div className="p-4 space-y-3">
                                {/* Surgery Date - required for patient/manual sources */}
                                <div className="bg-amber-50 border border-amber-200 rounded-lg p-3">
                                    <label className="text-xs font-semibold text-amber-700 uppercase tracking-wide">Surgery Date *</label>
                                    <input type="date" value={surgDate} onChange={e => setSurgDate(e.target.value)}
                                        className="w-full border border-amber-200 rounded-lg px-3 py-2 text-sm mt-1 bg-white" />
                                    <p className="text-[10px] text-amber-600 mt-1">This case will be added to the Case Prep calendar on this date.</p>
                                </div>

                                {patients.length > 0 && (
                                    <div>
                                        <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">From Patient List</p>
                                        <div className="space-y-1 max-h-40 overflow-y-auto">
                                            {patients.map(p => (
                                                <button key={p.id} onClick={() => handleAddFromPatient(p)}
                                                    className="w-full text-left px-3 py-2 rounded-lg hover:bg-blue-50 text-sm transition flex justify-between items-center">
                                                    <span className="text-gray-800">Rm {String(p.room || '?')} - {String(p.diagnosis || 'No dx')}</span>
                                                    <span className="text-xs text-gray-400">{(p.procedures || []).join(', ') || 'No procedure'}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {casePrepData.length > 0 && (
                                    <div>
                                        <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">From Case Prep</p>
                                        <div className="space-y-1 max-h-40 overflow-y-auto">
                                            {casePrepData.filter(cp => cp.date >= getTodayISO()).sort((a,b) => (a.date||'').localeCompare(b.date||'')).map(cp => (
                                                <button key={cp.id} onClick={() => handleAddFromPrep(cp)}
                                                    className="w-full text-left px-3 py-2 rounded-lg hover:bg-emerald-50 text-sm transition flex justify-between items-center">
                                                    <span className="text-gray-800">{cp.caseName}</span>
                                                    <span className="text-xs text-gray-400">{cp.date}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                <div>
                                    <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">New Case (Manual)</p>
                                    <div className="flex gap-2">
                                        <input type="text" placeholder="Patient / case description" value={newName} onChange={e => setNewName(e.target.value)}
                                            className="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm"
                                            onKeyDown={e => e.key === 'Enter' && handleAddManual()} />
                                        <button onClick={handleAddManual}
                                            className="px-4 py-2 bg-medical-600 text-white rounded-lg text-sm font-medium hover:bg-medical-700">Add</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="p-4 max-w-4xl mx-auto">
                    <div className="flex items-center justify-between mb-6">
                        <h2 className="text-2xl font-bold text-medical-600">Case Conference</h2>
                        <button onClick={() => setShowAddConf(true)} className="px-4 py-2 bg-medical-600 text-white rounded-lg text-sm font-medium hover:bg-medical-700">
                            + New Conference
                        </button>
                    </div>

                    {showAddConf && (
                        <div className="bg-white rounded-xl border border-gray-200 p-4 mb-4 space-y-3">
                            <input type="text" placeholder="Conference title (e.g., Weekly Case Conference)" value={confTitle}
                                onChange={e => setConfTitle(e.target.value)} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" />
                            <div className="flex gap-3">
                                <input type="date" value={confDate} onChange={e => setConfDate(e.target.value)}
                                    className="border border-gray-300 rounded-lg px-3 py-2 text-sm" />
                                <input type="text" placeholder="Presenter name" value={confPresenter}
                                    onChange={e => setConfPresenter(e.target.value)} className="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm" />
                            </div>
                            <div className="flex gap-2">
                                <button onClick={createConference} className="px-4 py-2 bg-medical-600 text-white rounded-lg text-sm font-medium hover:bg-medical-700">Create</button>
                                <button onClick={() => setShowAddConf(false)} className="px-4 py-2 bg-gray-100 text-gray-600 rounded-lg text-sm">Cancel</button>
                            </div>
                        </div>
                    )}

                    {/* Conference List */}
                    {!selectedConf && (
                        <div className="space-y-2">
                            {conferences.length === 0 && (
                                <div className="text-center py-12 text-gray-400">
                                    <p className="text-lg mb-1">No conferences yet</p>
                                    <p className="text-sm">Create one to start adding cases for presentation.</p>
                                </div>
                            )}
                            {conferences.map(conf => (
                                <button key={conf.id} onClick={() => setSelectedConf(conf)}
                                    className="w-full text-left bg-white rounded-xl border border-gray-200 p-4 hover:shadow-md transition">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <h3 className="font-bold text-gray-800">{conf.title}</h3>
                                            <p className="text-sm text-gray-500 mt-0.5">
                                                {new Date(conf.date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}
                                                {conf.presenter ? ' - ' + conf.presenter : ''}
                                            </p>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <span className="text-xs bg-medical-100 text-medical-700 px-2 py-1 rounded-full font-medium">
                                                {(conf.cases || []).length} case{(conf.cases || []).length !== 1 ? 's' : ''}
                                            </span>
                                            <button onClick={(e) => { e.stopPropagation(); deleteConference(conf.id); }}
                                                className="text-gray-300 hover:text-red-500 transition text-lg leading-none">&times;</button>
                                        </div>
                                    </div>
                                </button>
                            ))}
                        </div>
                    )}

                    {/* Selected Conference Detail */}
                    {selectedConf && (
                        <div>
                            <div className="flex items-center gap-3 mb-4">
                                <button onClick={() => setSelectedConf(null)} className="text-medical-600 hover:text-medical-700 text-sm font-medium">
                                    &larr; All Conferences
                                </button>
                                <span className="text-gray-300">|</span>
                                <h3 className="font-bold text-gray-800">{selectedConf.title}</h3>
                            </div>

                            <div className="flex gap-2 mb-4">
                                <button onClick={() => setShowAddCase(true)}
                                    className="px-4 py-2 bg-medical-600 text-white rounded-lg text-sm font-medium hover:bg-medical-700">
                                    + Add Case
                                </button>
                                <button onClick={generatePresentation} disabled={generatingPptx || !selectedConf.cases?.length}
                                    className="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 disabled:opacity-50 flex items-center gap-2">
                                    {generatingPptx ? 'Generating...' : 'Generate Presentation'}
                                </button>
                            </div>

                            <AddCaseModal />

                            {/* Case Cards */}
                            <div className="space-y-4">
                                {(!selectedConf.cases || selectedConf.cases.length === 0) && (
                                    <div className="text-center py-8 text-gray-400 bg-white rounded-xl border border-dashed border-gray-300">
                                        <p>No cases added yet. Click "+ Add Case" to pull from patients or case prep.</p>
                                    </div>
                                )}
                                {(selectedConf.cases || []).map((c, idx) => (
                                    <div key={idx} className="bg-white rounded-xl border border-gray-200 overflow-hidden">
                                        <div className="p-4 bg-gray-50 border-b border-gray-200 flex items-center justify-between">
                                            <div>
                                                <span className="text-xs font-bold text-medical-600">CASE {idx + 1}</span>
                                                <h4 className="font-bold text-gray-800">{c.patientName || 'Unnamed'}</h4>
                                                {c.surgeryDate && <span className="text-[10px] text-gray-500">Surgery: {c.surgeryDate}</span>}
                                            </div>
                                            <button onClick={() => removeCase(idx)} className="text-gray-400 hover:text-red-500 text-lg">&times;</button>
                                        </div>
                                        <div className="p-4 space-y-3">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                                <DictateField label="Diagnosis" type="text" value={c.diagnosis || ''} onChange={v => updateCaseField(idx, 'diagnosis', v)} />
                                                <DictateField label="Planned Procedure" type="text" value={c.procedure || ''} onChange={v => updateCaseField(idx, 'procedure', v)} />
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                                <DictateField label="PMH" value={c.pmh || ''} onChange={v => updateCaseField(idx, 'pmh', v)} rows={2} />
                                                <DictateField label="PSH" value={c.psh || ''} onChange={v => updateCaseField(idx, 'psh', v)} rows={2} />
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                                <DictateField label="Medications" value={c.meds || ''} onChange={v => updateCaseField(idx, 'meds', v)} rows={2} />
                                                <DictateField label="Allergies" type="text" value={c.allergies || ''} onChange={v => updateCaseField(idx, 'allergies', v)} />
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                                <DictateField label="Exam Findings" value={c.examFindings || ''} onChange={v => updateCaseField(idx, 'examFindings', v)} rows={2} />
                                                <DictateField label="Lab Findings" value={c.labFindings || ''} onChange={v => updateCaseField(idx, 'labFindings', v)} rows={2} />
                                            </div>
                                            <DictateField label="Imaging Findings" value={c.imagingFindings || ''} onChange={v => updateCaseField(idx, 'imagingFindings', v)} rows={2} />
                                            <DictateField label="Indications for Surgery" value={c.indications || ''} onChange={v => updateCaseField(idx, 'indications', v)} rows={3}
                                                placeholder="Why is this surgery indicated? What are the clinical findings supporting operative intervention?" />
                                            <DictateField label="Key Operative Steps" value={c.keySteps || ''} onChange={v => updateCaseField(idx, 'keySteps', v)} rows={3}
                                                placeholder="Key steps of the planned procedure..." />
                                            {c.casePrepId && (
                                                <p className="text-[10px] text-gray-400">Linked to Case Prep</p>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==================== MAIN APP ====================
        function App() {
            const [user, setUser] = React.useState(null);
            const [teamId, setTeamId] = React.useState(null);
            const [teamData, setTeamData] = React.useState(null);
            const [allTeams, setAllTeams] = React.useState([]);
            const [authLoading, setAuthLoading] = React.useState(true);
            const [activeTab, setActiveTab] = React.useState('Home');
            const [isMobile, setIsMobile] = React.useState(window.innerWidth < 768);
            const [showProfile, setShowProfile] = React.useState(false);
            const [showTeamManager, setShowTeamManager] = React.useState(false);
            const [showDictionary, setShowDictionary] = React.useState(false);
            const [hipaaAccepted, setHipaaAccepted] = React.useState(null); // null = loading, true/false

            // Load all teams a user belongs to
            const loadAllTeams = async (uid) => {
                try {
                    const userDoc = await db.collection('users').doc(uid).get();
                    const userData = userDoc.exists ? userDoc.data() : {};
                    const teamIds = userData.teamIds || [];
                    // Always include current teamId if not in array (backwards compat)
                    if (userData.teamId && !teamIds.includes(userData.teamId)) {
                        teamIds.push(userData.teamId);
                    }
                    if (teamIds.length === 0) return [];
                    const teams = [];
                    for (const tid of teamIds) {
                        try {
                            const tDoc = await db.collection('teams').doc(tid).get();
                            if (tDoc.exists) teams.push({ id: tid, ...tDoc.data() });
                        } catch (e) { /* team may have been deleted */ }
                    }
                    setAllTeams(teams);
                    return teams;
                } catch (e) {
                    console.error('Error loading teams:', e);
                    return [];
                }
            };

            // Listen for auth state changes (persisted login)
            React.useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (u) => {
                    setUser(u);
                    if (u) {
                        try {
                            const userDoc = await db.collection('users').doc(u.uid).get();
                            const userData = userDoc.exists ? userDoc.data() : {};
                            if (userData.teamId) {
                                const tid = userData.teamId;
                                setTeamId(tid);
                                DB.setTeamId(tid);
                                const teamDoc = await db.collection('teams').doc(tid).get();
                                if (teamDoc.exists) setTeamData({ id: tid, ...teamDoc.data() });
                            }
                            // Check HIPAA acceptance (version-aware so policy updates re-prompt)
                            const acceptedVersion = userData.hipaaAcceptedVersion || null;
                            setHipaaAccepted(!!userData.hipaaAcceptedAt && acceptedVersion === '1.0');
                            await loadAllTeams(u.uid);
                        } catch (err) {
                            console.error('Error loading user/team data:', err);
                        }
                    } else {
                        setTeamId(null);
                        setTeamData(null);
                        setAllTeams([]);
                        setHipaaAccepted(null);
                    }
                    setAuthLoading(false);
                });
                return () => unsub();
            }, []);

            React.useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const handleTeamReady = async (tid) => {
                setTeamId(tid);
                DB.setTeamId(tid);
                const teamDoc = await db.collection('teams').doc(tid).get();
                if (teamDoc.exists) setTeamData({ id: tid, ...teamDoc.data() });
                if (user) await loadAllTeams(user.uid);
                setActiveTab('Home');
            };

            const switchTeam = async (tid) => {
                setTeamId(tid);
                DB.setTeamId(tid);
                const teamDoc = await db.collection('teams').doc(tid).get();
                if (teamDoc.exists) setTeamData({ id: tid, ...teamDoc.data() });
                // Update active teamId in user doc
                await db.collection('users').doc(user.uid).set({ teamId: tid }, { merge: true });
                setActiveTab('Home');
                setShowProfile(false);
                setShowTeamManager(false);
            };

            const leaveTeam = async (tid) => {
                if (!user) return;
                try {
                    // Remove user from team members
                    const teamDoc = await db.collection('teams').doc(tid).get();
                    if (teamDoc.exists) {
                        const members = (teamDoc.data().members || []).filter(m => m.uid !== user.uid);
                        await db.collection('teams').doc(tid).update({ members });
                    }
                    // Remove team from user's teamIds
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    const userData = userDoc.exists ? userDoc.data() : {};
                    const teamIds = (userData.teamIds || []).filter(id => id !== tid);
                    const newActiveTeam = tid === teamId ? (teamIds[0] || null) : teamId;
                    await db.collection('users').doc(user.uid).set({ teamIds, teamId: newActiveTeam }, { merge: true });
                    // If leaving current team, switch
                    if (tid === teamId) {
                        if (newActiveTeam) {
                            await switchTeam(newActiveTeam);
                        } else {
                            setTeamId(null);
                            setTeamData(null);
                        }
                    }
                    await loadAllTeams(user.uid);
                } catch (e) {
                    console.error('Error leaving team:', e);
                }
            };

            const deleteTeam = async (tid) => {
                if (!user) return;
                try {
                    const teamDoc = await db.collection('teams').doc(tid).get();
                    if (!teamDoc.exists) return;
                    const tData = teamDoc.data();
                    // Only admin/creator can delete
                    if (tData.createdBy !== user.uid) {
                        alert('Only the team creator can delete this team.');
                        return;
                    }
                    // Delete the team document
                    await db.collection('teams').doc(tid).delete();
                    // Remove from all members' teamIds (just current user for now)
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    const userData = userDoc.exists ? userDoc.data() : {};
                    const teamIds = (userData.teamIds || []).filter(id => id !== tid);
                    const newActiveTeam = tid === teamId ? (teamIds[0] || null) : teamId;
                    await db.collection('users').doc(user.uid).set({ teamIds, teamId: newActiveTeam }, { merge: true });
                    if (tid === teamId) {
                        if (newActiveTeam) {
                            await switchTeam(newActiveTeam);
                        } else {
                            setTeamId(null);
                            setTeamData(null);
                        }
                    }
                    await loadAllTeams(user.uid);
                } catch (e) {
                    console.error('Error deleting team:', e);
                }
            };

            // HIPAA encryption state
            const [hipaaEnabled, setHipaaEnabled] = React.useState(false);
            const [hipaaPassphrase, setHipaaPassphrase] = React.useState('');
            const [showHipaaSetup, setShowHipaaSetup] = React.useState(false);
            const [hipaaUnlocked, setHipaaUnlocked] = React.useState(false);
            const [hipaaError, setHipaaError] = React.useState('');

            // Auto-enable encryption using team invite code as default passphrase
            React.useEffect(() => {
                if (teamData && teamId) {
                    const passphrase = teamData.hipaaPassphrase || teamData.inviteCode || teamId;
                    CryptoHelper.init(passphrase, teamId).then(() => {
                        setHipaaEnabled(true);
                        setHipaaUnlocked(true);
                        // Ensure flag is set on team doc
                        if (!teamData.hipaaEncryption) {
                            db.collection('teams').doc(teamId).set({ hipaaEncryption: true }, { merge: true }).catch(() => {});
                            setTeamData(prev => ({ ...prev, hipaaEncryption: true }));
                            // Encrypt any existing unencrypted data in background
                            (async () => {
                                try {
                                    const patients = await DB.getAll('patients');
                                    for (const p of patients) { if (!p._encrypted) await DB.put('patients', p); }
                                    const consults = await DB.getAll('consults');
                                    for (const c of consults) { if (!c._encrypted) await DB.put('consults', c); }
                                } catch (e) { console.error('Error encrypting existing data:', e); }
                            })();
                        }
                        // Load custom dictionary for this team
                        CustomDictionary.load().catch(e => console.error('Custom dictionary load error:', e));
                    }).catch(e => console.error('Auto-encryption init failed:', e));
                }
            }, [teamData, teamId]);

            // Auto-logout on inactivity (locks session, requires re-login)
            React.useEffect(() => {
                if (user && hipaaEnabled) {
                    InactivityMonitor.start(() => {
                        CryptoHelper._enabled = false;
                        CryptoHelper._key = null;
                        auth.signOut();
                        setUser(null);
                        setTeamId(null);
                        setTeamData(null);
                        setHipaaUnlocked(false);
                        alert('Signed out due to inactivity.');
                    }, teamData?.hipaaTimeoutMinutes || 15);
                    return () => InactivityMonitor.stop();
                }
            }, [user, hipaaEnabled]);

            // Allow setting a custom passphrase (overrides invite code default)
            const enableHipaa = async () => {
                if (!hipaaPassphrase || hipaaPassphrase.length < 8) {
                    setHipaaError('Passphrase must be at least 8 characters.');
                    return;
                }
                try {
                    // First decrypt everything with old key
                    const oldPatients = await DB.getAll('patients');
                    const oldConsults = await DB.getAll('consults');

                    // Init with new passphrase
                    await CryptoHelper.init(hipaaPassphrase, teamId);
                    await db.collection('teams').doc(teamId).set({ hipaaEncryption: true, hipaaPassphrase: hipaaPassphrase }, { merge: true });
                    setHipaaEnabled(true);
                    setHipaaUnlocked(true);
                    setShowHipaaSetup(false);
                    setHipaaError('');
                    setTeamData(prev => ({ ...prev, hipaaEncryption: true, hipaaPassphrase: hipaaPassphrase }));

                    // Re-encrypt with new key
                    for (const p of oldPatients) { await DB.put('patients', p); }
                    for (const c of oldConsults) { await DB.put('consults', c); }

                    alert('Custom passphrase set. Share it securely with team members. They will need it to access encrypted data.');
                } catch (e) {
                    setHipaaError('Failed to update encryption: ' + e.message);
                }
            };

            const unlockHipaa = async () => {
                if (!hipaaPassphrase) return;
                try {
                    await CryptoHelper.init(hipaaPassphrase, teamId);
                    const testRead = await DB.getAll('patients');
                    if (testRead.length > 0 && testRead[0]._encrypted) {
                        setHipaaError('Incorrect passphrase. Could not decrypt data.');
                        CryptoHelper._enabled = false;
                        return;
                    }
                    setHipaaUnlocked(true);
                    setHipaaError('');
                } catch (e) {
                    setHipaaError('Incorrect passphrase or decryption failed.');
                }
            };

            const handleSignOut = () => {
                auth.signOut();
                InactivityMonitor.stop();
                sessionStorage.removeItem('cr_hipaa_' + teamId);
                CryptoHelper._enabled = false;
                CryptoHelper._key = null;
                setUser(null);
                setTeamId(null);
                setTeamData(null);
                setAllTeams([]);
                setShowProfile(false);
                setShowTeamManager(false);
                setHipaaUnlocked(false);
            };

            // Loading state
            if (authLoading || (user && hipaaAccepted === null)) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center">
                        <div className="text-center">
                            <h1 className="text-2xl font-bold text-medical-700 mb-2">🩺 ChiefRounds</h1>
                            <p className="text-gray-500">Loading...</p>
                        </div>
                    </div>
                );
            }

            // Not logged in
            if (!user) {
                return <LoginScreen />;
            }

            // HIPAA Disclaimer - must accept before accessing anything
            // Requires acceptance once per user. Version tracked so we can re-prompt on policy updates.
            const CURRENT_HIPAA_VERSION = '1.0';
            const needsHipaaAcceptance = !hipaaAccepted;

            const acceptHipaaDisclaimer = async () => {
                try {
                    await db.collection('users').doc(user.uid).set({
                        hipaaAcceptedAt: new Date().toISOString(),
                        hipaaAcceptedVersion: CURRENT_HIPAA_VERSION,
                        hipaaAcceptedFrom: navigator.userAgent
                    }, { merge: true });
                    setHipaaAccepted(true);
                } catch (e) {
                    console.error('Error saving HIPAA acceptance:', e);
                }
            };

            if (needsHipaaAcceptance) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                        <div className="bg-white rounded-xl shadow-lg w-full max-w-lg overflow-hidden">
                            <div className="bg-medical-700 p-6 text-center">
                                <h1 className="text-2xl font-bold text-white">🩺 ChiefRounds</h1>
                                <p className="text-medical-200 text-sm mt-1">HIPAA Compliance Agreement</p>
                            </div>

                            <div className="p-6 max-h-[60vh] overflow-y-auto">
                                <div className="prose prose-sm text-gray-700 space-y-4">
                                    <p className="font-semibold text-gray-900">Before using ChiefRounds, you must read and agree to the following terms regarding the handling of Protected Health Information (PHI).</p>

                                    <div className="bg-slate-50 rounded-lg p-4 space-y-3 text-sm">
                                        <h3 className="font-bold text-gray-800 text-base">1. Authorized Use Only</h3>
                                        <p>This application is intended exclusively for authorized members of the patient care team. Access by any unauthorized individual is strictly prohibited. By using this application, you confirm that you are a member of the care team with a legitimate clinical need to access the information contained herein.</p>

                                        <h3 className="font-bold text-gray-800 text-base">2. Protected Health Information (PHI)</h3>
                                        <p>This application may contain Protected Health Information as defined by the Health Insurance Portability and Accountability Act (HIPAA), including but not limited to: patient room numbers, diagnoses, medical histories, medications, lab results, clinical notes, and treatment plans. All PHI stored in this application is encrypted at rest using AES-256 encryption.</p>

                                        <h3 className="font-bold text-gray-800 text-base">3. User Responsibilities</h3>
                                        <p>As an authorized user, you agree to:</p>
                                        <p className="pl-3">a) Access only the minimum necessary PHI required for your clinical duties<br/>
                                        b) Never share your login credentials or team access codes with unauthorized individuals<br/>
                                        c) Never screenshot, copy, or transmit PHI outside of approved clinical channels<br/>
                                        d) Log out or lock the application when your device is unattended<br/>
                                        e) Immediately report any suspected unauthorized access or data breach to your compliance officer</p>

                                        <h3 className="font-bold text-gray-800 text-base">4. Room Numbers and Patient Identifiers</h3>
                                        <p>Room numbers in combination with clinical information constitute PHI. Users must exercise caution when displaying this application in public or shared spaces. The application includes auto-lock functionality to mitigate inadvertent exposure.</p>

                                        <h3 className="font-bold text-gray-800 text-base">5. No Guarantee of Compliance</h3>
                                        <p>While ChiefRounds implements technical safeguards including encryption at rest, automatic session timeouts, and access controls, HIPAA compliance also depends on the administrative and physical safeguards maintained by your institution. This application is a clinical tool and does not replace your institution's compliance program.</p>

                                        <h3 className="font-bold text-gray-800 text-base">6. Liability</h3>
                                        <p>By accepting these terms, you acknowledge that you are personally responsible for maintaining the confidentiality of any PHI you access through this application. Unauthorized disclosure of PHI may result in disciplinary action, civil penalties, and/or criminal prosecution under HIPAA (42 U.S.C. 1320d-6), with fines up to $250,000 and imprisonment up to 10 years for willful violations.</p>

                                        <h3 className="font-bold text-gray-800 text-base">7. Audit Trail</h3>
                                        <p>Your acceptance of these terms, along with your access activity, is logged for compliance and audit purposes.</p>
                                    </div>
                                </div>
                            </div>

                            <div className="p-6 border-t border-gray-100 bg-gray-50">
                                <p className="text-xs text-gray-500 mb-4 text-center">By clicking "I Agree", you acknowledge that you have read, understand, and agree to comply with all terms above.</p>
                                <div className="flex gap-3">
                                    <button
                                        onClick={handleSignOut}
                                        className="flex-1 bg-white border border-gray-300 text-gray-700 hover:bg-gray-100 font-medium py-3 rounded-lg transition text-sm"
                                    >
                                        Decline
                                    </button>
                                    <button
                                        onClick={acceptHipaaDisclaimer}
                                        className="flex-1 bg-medical-600 text-white hover:bg-medical-700 font-semibold py-3 rounded-lg transition text-sm"
                                    >
                                        I Agree
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // Logged in but no team
            if (!teamId) {
                return <TeamSetup user={user} onTeamReady={handleTeamReady} />;
            }

            // HIPAA encryption enabled with custom passphrase but not yet unlocked
            if (hipaaEnabled && !hipaaUnlocked && teamData?.hipaaPassphrase) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                        <div className="bg-white rounded-xl shadow-lg p-8 w-full max-w-sm">
                            <div className="text-center mb-6">
                                <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center text-3xl mx-auto mb-3">🔒</div>
                                <h1 className="text-2xl font-bold text-medical-700">HIPAA Protected</h1>
                                <p className="text-gray-500 text-sm mt-1">Enter your team passphrase to unlock</p>
                            </div>
                            {hipaaError && (
                                <div className="bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg p-3 mb-4">{hipaaError}</div>
                            )}
                            <input
                                type="password"
                                placeholder="Team passphrase"
                                value={hipaaPassphrase}
                                onChange={e => setHipaaPassphrase(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && unlockHipaa()}
                                className="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent mb-3"
                                autoFocus
                            />
                            <button
                                onClick={unlockHipaa}
                                className="w-full bg-green-600 text-white hover:bg-green-700 font-semibold py-3 rounded-lg transition"
                            >
                                Unlock
                            </button>
                            <button
                                onClick={handleSignOut}
                                className="w-full text-sm text-gray-500 hover:text-gray-700 mt-3"
                            >
                                Sign out instead
                            </button>
                        </div>
                    </div>
                );
            }

            const tabs = ['Patients', 'Attending', 'Tasks', 'Consults', 'Trauma', 'Census', 'Handoff', 'Pre-Round', 'Rounds', 'M&M', 'Case Prep', 'Case Conf', 'Att. Prefs'];

            // Home landing page component
            const HomeScreen = () => {
                const [stats, setStats] = React.useState({ patients: 0, incompleteTasks: 0, preRounded: 0 });

                React.useEffect(() => {
                    (async () => {
                        try {
                            const patients = (await DB.getAll('patients')).filter(p => p.status !== 'discharged');
                            const tasks = await DB.getAll('tasks');
                            const incomplete = tasks.filter(t => !t.completed).length;
                            const today = getTodayISO();
                            const preRounded = patients.filter(p => p.preRoundHistory?.[today]).length;
                            setStats({ patients: patients.length, incompleteTasks: incomplete, preRounded });
                        } catch (e) {}
                    })();
                }, []);

                const mainCards = [
                    {
                        title: 'Patients',
                        subtitle: `${stats.patients} on service`,
                        icon: '\uD83D\uDC65',
                        color: 'bg-blue-600',
                        lightBg: 'bg-blue-50',
                        tab: 'Patients'
                    },
                    {
                        title: 'Tasks',
                        subtitle: stats.incompleteTasks > 0 ? `${stats.incompleteTasks} incomplete` : 'All caught up',
                        icon: '\u2611\uFE0F',
                        color: 'bg-medical-600',
                        lightBg: 'bg-slate-50',
                        tab: 'Tasks'
                    },
                    {
                        title: 'Rounds',
                        subtitle: 'Record & parse rounds',
                        icon: '\uD83C\uDFA4',
                        color: 'bg-emerald-600',
                        lightBg: 'bg-emerald-50',
                        tab: 'Rounds'
                    },
                    {
                        title: 'Pre-Round',
                        subtitle: `${stats.preRounded}/${stats.patients} patients done`,
                        icon: '\uD83D\uDCCB',
                        color: 'bg-indigo-600',
                        lightBg: 'bg-indigo-50',
                        tab: 'Pre-Round'
                    }
                ];

                return (
                    <div className="p-4 md:p-8 max-w-4xl mx-auto">
                        <div className="mb-8 text-center md:text-left">
                            <h2 className="text-2xl md:text-3xl font-bold text-medical-800">
                                Good {new Date().getHours() < 12 ? 'morning' : new Date().getHours() < 17 ? 'afternoon' : 'evening'}{user.displayName ? `, ${user.displayName.split(' ')[0]}` : ''}
                            </h2>
                            <p className="text-gray-500 mt-1">{teamData?.name || 'Your team'} -- {stats.patients} patient{stats.patients !== 1 ? 's' : ''} on service</p>
                        </div>

                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                            {mainCards.map(card => (
                                <button
                                    key={card.tab}
                                    onClick={() => setActiveTab(card.tab)}
                                    className="text-left bg-white border border-gray-100 rounded-xl p-6 shadow-sm hover:shadow-md transition-all hover:-translate-y-0.5 active:scale-[0.98]"
                                >
                                    <div className={`w-12 h-12 ${card.lightBg} rounded-xl flex items-center justify-center text-2xl mb-4`}>
                                        {card.icon}
                                    </div>
                                    <h3 className="text-lg font-bold text-gray-800 mb-1">{card.title}</h3>
                                    <p className="text-sm text-gray-500">{card.subtitle}</p>

                            ))}
                        </div>

                        <div className="border-t border-gray-200 pt-6">

                                {tabs.map(tab => (
                                    <button
                                        key={tab}
                                        onClick={() => setActiveTab(tab)}
                                        className="bg-white border border-gray-100 rounded-xl py-3 px-2 text-center hover:bg-slate-50 hover:border-medical-300 transition text-sm font-medium text-gray-600 hover:text-medical-700 shadow-sm"
                                    >
                                        {tab}
                                    </button>
                                ))}
                            </div>
