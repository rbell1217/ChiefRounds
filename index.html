                const planPatterns = [
                    /plan\s+(?:is\s+(?:to\s+)?|for\s+(?:today\s+)?(?:is\s+)?(?:to\s+)?)(.+?)(?:\s+also\b|\s+concern|\s+diet|\s+disposition|$)/i,
                    /(?:today|this\s*morning)\s+(?:we\s*(?:will|are\s*going\s*to|want\s*to|need\s*to)|let'?s)\s+(.+?)(?:\s+also\b|\s+concern|\s+diet|$)/i,
                    /(?:going\s*to|want\s*to|need\s*to|should)\s+(.+?)(?:\s+also\b|\s+and\s+(?:then|also)|\s+concern|$)/i,
                    /(?:continue|maintain|keep)\s+(?:current\s+)?(.+?)(?:\s+also\b|\s+concern|\s+diet|$)/i,
                ];
                planPatterns.forEach(re => {
                    const m = t.match(re);
                    if (m && m[1].trim().length > 3 && m[1].trim().length < 200) {
                        planParts.push(m[1].trim());
                    }
                });
                if (planParts.length > 0) parsed.plan = planParts.join('. ');
                // If no explicit plan but we have orders, build plan from orders
                if (!parsed.plan && parsed.orders.length > 0) {
                    parsed.plan = parsed.orders.join('. ');
                }

                // Concerns
                const concernPatterns = [
                    /(?:concern(?:ed)?|worried|watch(?:ing)?\s*(?:for|out)?|monitor(?:ing)?|keep\s*(?:an?\s*)?eye\s*(?:on|for)?)\s*(?:for\s+|about\s+|on\s+)?(.+?)(?:\s+(?:plan|order|diet|discharge|disposition|start|stop|also|and\s+(?:plan|order))|$)/i,
                    /(?:red\s*flag|alert|warning)\s*(?:for\s+|about\s+)?(.+?)(?:\s+plan|\s+order|$)/i,
                ];
                for (const re of concernPatterns) {
                    const m = t.match(re);
                    if (m && m[1].trim().length > 2 && m[1].trim().length < 150) {
                        parsed.concerns = m[1].trim();
                        break;
                    }
                }

                // Exam findings
                const examPatterns = [
                    /(?:exam|on\s*exam|physical\s*exam|examination)\s*(?:shows?|reveals?|notable\s*for|significant\s*for|is|was)?\s*(.+?)(?:\s+(?:plan|diet|order|start|stop|discharge|disposition|concern)|$)/i,
                    /(?:abdomen|lungs?|chest|heart|extremit|wound|incision|drain|surgical\s*site)\s+(?:is|are|was|were|looks?|appears?)\s+(.+?)(?:\s+(?:plan|diet|order|start|stop)|$)/i,
                    /(?:belly|breath\s*sounds?|bowel\s*sounds?)\s+(?:is|are|was|were)?\s*(.+?)(?:\s+(?:plan|diet|order)|$)/i,
                ];
                const examParts = [];
                examPatterns.forEach(re => {
                    const m = t.match(re);
                    if (m && m[1].trim().length > 2) examParts.push(m[1].trim());
                });
                // Also capture specific exam findings
                if (/(?:clear\s*to\s*auscultation|cta\s*bilat)/i.test(lower)) examParts.push('Lungs CTA bilat');
                if (/(?:soft|non-?tender|non-?distended|nd|nt)/i.test(lower) && /(?:abd|belly)/i.test(lower)) examParts.push('Abd soft, NT/ND');
                if (/bowel\s*sounds?\s*(?:present|positive|active|normal)/i.test(lower)) examParts.push('BS present');
                if (/no\s*bowel\s*sounds?|bowel\s*sounds?\s*(?:absent|diminished|hypoactive)/i.test(lower)) examParts.push('BS diminished');
                if (/wound\s*(?:clean|healing|dry|intact|c\/d\/i|cdi)/i.test(lower)) examParts.push('Wound clean/dry/intact');
                if (/wound\s*(?:open|draining|erythema|red|infected|dehisc)/i.test(lower)) examParts.push('Wound concern');
                if (/edema|swelling/i.test(lower)) examParts.push('Edema noted');
                if (/drain\s*(?:output|putting\s*out)\s*(\d+)/i.test(t)) {
                    const drainMatch = t.match(/drain\s*(?:output|putting\s*out)\s*(\d+)/i);
                    examParts.push('Drain output ' + drainMatch[1] + 'mL');
                }
                if (examParts.length > 0) parsed.examFindings = [...new Set(examParts)].join('. ');

                // Problems mentioned
                if (/(?:new\s*(?:problem|issue|concern)|develop(?:ed|ing))\s*(?:of\s+|with\s+)?(.+?)(?:\s+(?:plan|order|start)|$)/i.test(t)) {
                    const m = t.match(/(?:new\s*(?:problem|issue|concern)|develop(?:ed|ing))\s*(?:of\s+|with\s+)?(.+?)(?:\s+(?:plan|order|start)|$)/i);
                    if (m && m[1].trim().length > 2) parsed.problems.push(m[1].trim());
                }
                // Common problem keywords
                const probKeywords = [
                    [/ileus/i, 'Ileus'], [/ssi|surgical\s*site\s*infection/i, 'SSI'], [/pneumonia/i, 'Pneumonia'],
                    [/uti|urinary\s*tract/i, 'UTI'], [/dvt|deep\s*vein/i, 'DVT'], [/pe\b|pulmonary\s*embol/i, 'PE'],
                    [/aki|acute\s*kidney/i, 'AKI'], [/sepsis/i, 'Sepsis'], [/atrial\s*fib|afib|a-?fib/i, 'Afib'],
                    [/delirium|altered\s*mental|confused/i, 'Delirium'], [/fall/i, 'Fall risk'],
                    [/nausea|vomiting|emesis/i, 'N/V'], [/constipat/i, 'Constipation'],
                    [/pain\s*(?:not\s*)?controlled|uncontrolled\s*pain/i, 'Pain management'],
                ];
                probKeywords.forEach(([re, label]) => {
                    if (re.test(lower) && !parsed.problems.includes(label) && !(patient?.problems || []).includes(label)) {
                        // Only add as problem if it seems like a new finding
                        if (/new|develop|now\s*(?:has|with|showing)|started/i.test(lower)) parsed.problems.push(label);
                    }
                });

                // Always show exam field for editing (even if nothing was parsed)
                if (parsed.examFindings === null) parsed.examFindings = '';

                // Build a concise SOAP-style summary of everything captured
                const summaryParts = [];
                if (parsed.subjective) summaryParts.push('S: ' + parsed.subjective);
                if (parsed.vitals) summaryParts.push('Vitals: ' + parsed.vitals);
                if (parsed.labNotes) summaryParts.push('Labs: ' + parsed.labNotes);
                if (parsed.examFindings) summaryParts.push('Exam: ' + parsed.examFindings);
                if (parsed.assessment) summaryParts.push('A: ' + parsed.assessment);
                if (parsed.plan) summaryParts.push('P: ' + parsed.plan);
                if (parsed.orders.length > 0) summaryParts.push('Orders: ' + parsed.orders.join(', '));
                if (parsed.diet) summaryParts.push('Diet: ' + parsed.diet);
                if (parsed.activity) summaryParts.push('Activity: ' + parsed.activity);
                if (parsed.disposition) summaryParts.push('Dispo: ' + parsed.disposition);
                if (parsed.concerns) summaryParts.push('Concerns: ' + parsed.concerns);
                if (summaryParts.length > 0) parsed.summary = summaryParts.join(' | ');

                setParsedItems(parsed);
            };

            const parsePE = () => {
                let t = transcript.trim();
                if (!t) return;
                const lower = t.toLowerCase();
                const examParts = [];

                // Explicit exam statement patterns
                const examPatterns = [
                    /(?:exam|on\s*exam|physical\s*exam|examination|pe)\s*(?:shows?|reveals?|notable\s*for|significant\s*for|is|was|:)?\s*(.+?)(?:\.|$)/i,
                    /(?:abdomen|abd|belly)\s+(?:is\s+)?(.+?)(?:\.|$)/i,
                    /(?:lungs?|chest|breath\s*sounds?)\s+(?:is|are\s+)?(.+?)(?:\.|$)/i,
                    /(?:heart|cardiac)\s+(?:is\s+)?(.+?)(?:\.|$)/i,
                    /(?:extremit(?:y|ies)|legs?|arms?)\s+(?:is|are\s+)?(.+?)(?:\.|$)/i,
                    /(?:wound|incision|surgical\s*site|staples|sutures)\s+(?:is|are\s+)?(.+?)(?:\.|$)/i,
                    /(?:drain|jp|jackson.pratt)\s+(?:is\s+)?(.+?)(?:\.|$)/i,
                    /(?:neuro|neurological)\s+(?:is\s+)?(.+?)(?:\.|$)/i,
                ];
                examPatterns.forEach(re => {
                    const m = t.match(re);
                    if (m && m[1].trim().length > 1) examParts.push(m[1].trim());
                });

                // Specific finding keywords
                if (/(?:soft|non.?tender|non.?distended|nd|nt|nontender|nondistended)/i.test(lower) && /(?:abd|abdom|belly)/i.test(lower)) examParts.push('Abd soft, NT/ND');
                else if (/(?:tender|distended|rigid|guarding|rebound)/i.test(lower) && /(?:abd|abdom|belly)/i.test(lower)) {
                    const findings = [];
                    if (/tender/i.test(lower)) findings.push('tender');
                    if (/distended/i.test(lower)) findings.push('distended');
                    if (/rigid/i.test(lower)) findings.push('rigid');
                    if (/guarding/i.test(lower)) findings.push('guarding');
                    if (/rebound/i.test(lower)) findings.push('rebound');
                    examParts.push('Abd ' + findings.join(', '));
                }
                if (/(?:clear\s*to\s*auscultation|cta\s*bilat|ctab|clear\s*bilat)/i.test(lower)) examParts.push('Lungs CTA bilaterally');
                if (/(?:crackles|rales|rhonchi|wheez|diminished\s*(?:breath|lung)|decreased\s*(?:breath|lung))/i.test(lower)) {
                    const m = t.match(/(crackles|rales|rhonchi|wheez\w*|diminished\s*breath\s*sounds?|decreased\s*breath\s*sounds?)/i);
                    if (m) examParts.push('Lungs: ' + m[1]);
                }
                if (/(?:rrr|regular\s*rate\s*(?:and|&)\s*rhythm)/i.test(lower)) examParts.push('Heart RRR');
                if (/(?:murmur|gallop|irregular)/i.test(lower)) {
                    const m = t.match(/(murmur|gallop|irregular\w*)/i);
                    if (m) examParts.push('Heart: ' + m[1]);
                }
                if (/bowel\s*sounds?\s*(?:present|positive|active|normal|\+)/i.test(lower)) examParts.push('BS present');
                if (/(?:no|absent|diminished|hypoactive)\s*bowel\s*sounds?/i.test(lower)) examParts.push('BS diminished');
                if (/wound\s*(?:clean|healing|dry|intact|c\/d\/i|cdi|well.?healed)/i.test(lower)) examParts.push('Wound clean/dry/intact');
                if (/wound\s*(?:open|draining|erythema|red|infected|dehisc)/i.test(lower)) examParts.push('Wound with concerning findings');
                if (/(?:no\s+)?edema|swelling/i.test(lower)) {
                    if (/no\s+(?:edema|swelling)/i.test(lower)) examParts.push('No edema');
                    else examParts.push('Edema noted');
                }
                if (/drain\s*(?:output|putting\s*out|producing)\s*(\d+)/i.test(t)) {
                    const m = t.match(/drain\s*(?:output|putting\s*out|producing)\s*(\d+)/i);
                    examParts.push('Drain output ' + m[1] + 'mL');
                }
                if (/(?:alert|oriented|a\s*&?\s*o\s*x?\s*\d)/i.test(lower)) {
                    const m = t.match(/(?:a\s*&?\s*o\s*x?\s*(\d))/i);
                    examParts.push(m ? 'A&Ox' + m[1] : 'Alert and oriented');
                }
                if (/(?:ng|ngt|nasogastric)\s+(?:in\s*place|output|putting\s*out|draining)/i.test(lower)) examParts.push('NGT in place');
                if (/(?:foley|catheter)\s+(?:in\s*place|draining|output|patent)/i.test(lower)) examParts.push('Foley in place');
                if (/(?:ostomy|stoma)\s+(?:pink|functioning|output|viable|healthy)/i.test(lower)) examParts.push('Stoma pink/viable');

                // Deduplicate
                const unique = [...new Set(examParts)];
                const examText = unique.length > 0 ? unique.join('. ') : t;

                // Set only the exam field in parsed items
                setParsedItems(prev => ({
                    ...prev,
                    examFindings: examText
                }));
            };

            const submitSOAP = async () => {
                const patient = patients.find(p => p.id === selectedPatientId);
                if (!patient || !transcript.trim()) return;

                // Organize the raw transcript into a concise SOAP note
                const raw = transcript.trim();
                const lower = raw.toLowerCase();

                // Build SOAP sections from the raw text
                let subjective = '';
                let objective = '';
                let assessment = '';
                let plan = '';

                // --- SUBJECTIVE: Extract how the patient feels, symptoms, complaints ---
                const subjParts = [];
                // Direct quotes / feelings
                const feelPatterns = [
                    /(?:patient|pt|they|he|she)\s+(?:says?|states?|reports?|denies?|complains?|mentions?|feels?|endorses?)\s+(.+?)(?:\.|$)/gi,
                    /(?:patient|pt|they|he|she)\s+(?:is|are|was|were)\s+(?:feeling|doing|looking|having)\s+(.+?)(?:\.|$)/gi,
                    /complain(?:ing|s)?\s+(?:of|about)\s+(.+?)(?:\.|$)/gi,
                ];
                feelPatterns.forEach(re => {
                    const matches = raw.matchAll(re);
                    for (const m of matches) {
                        if (m[1].trim().length > 2 && m[1].trim().length < 200) subjParts.push(m[1].trim());
                    }
                });
                // Symptom keywords
                const symptoms = [];
                if (/pain/i.test(lower)) symptoms.push('pain');
                if (/nausea|vomiting|emesis/i.test(lower)) symptoms.push('nausea/vomiting');
                if (/fever|febrile|chills/i.test(lower) && !/afebrile/i.test(lower)) symptoms.push('fever/chills');
                if (/no\s*complaints?|doing\s*(?:well|good|better|fine|okay)/i.test(lower)) symptoms.push('no acute complaints');
                if (/tolerating\s*(?:diet|po|oral)/i.test(lower)) symptoms.push('tolerating diet');
                if (/not\s*tolerating/i.test(lower)) symptoms.push('not tolerating diet');
                if (/passed?\s*(?:gas|flatus)/i.test(lower)) symptoms.push('passing flatus');
                if (/bowel\s*movement|had\s*(?:a\s*)?bm/i.test(lower)) symptoms.push('had BM');
                if (/no\s*(?:bm|bowel|flatus|gas)/i.test(lower)) symptoms.push('no BM/flatus');
                if (/short(?:ness)?\s*of\s*breath|dyspnea|sob\b/i.test(lower)) symptoms.push('SOB');
                if (/diarrhea/i.test(lower)) symptoms.push('diarrhea');
                if (/constipat/i.test(lower)) symptoms.push('constipation');
                if (/dizz|lightheaded/i.test(lower)) symptoms.push('dizziness');
                if (/anxious|anxiety|worried/i.test(lower)) symptoms.push('anxiety');
                if (/confused|confusion|altered/i.test(lower)) symptoms.push('AMS');
                if (/slept?\s*(?:well|poorly|okay|bad)/i.test(lower)) {
                    const sleepM = raw.match(/slept?\s*(well|poorly|okay|bad)/i);
                    if (sleepM) symptoms.push('slept ' + sleepM[1].toLowerCase());
                }
                // Combine
                symptoms.forEach(s => {
                    if (!subjParts.some(p => p.toLowerCase().includes(s.split('/')[0].toLowerCase()))) subjParts.push(s);
                });
                subjective = subjParts.length > 0 ? subjParts.join('; ') : raw.substring(0, 200);

                // --- OBJECTIVE: Vitals, labs, exam findings ---
                const objParts = [];
                // Vitals
                const vitalTokens = [];
                if (/afebrile|no\s*fever/i.test(lower)) vitalTokens.push('Afebrile');
                const tempM = raw.match(/(?:temp|temperature|t-?max)\s*(?:is|of|was)?\s*(\d{2,3}\.?\d?)/i);
                if (tempM) vitalTokens.push('Temp ' + tempM[1]);
                const bpM = raw.match(/BP\s*(\d+\/\d+)/i);
                if (bpM) vitalTokens.push('BP ' + bpM[1]);
                const hrM = raw.match(/HR\s*(\d{2,3})/i);
                if (hrM) vitalTokens.push('HR ' + hrM[1]);
                const spo2M = raw.match(/SpO2\s*(\d{2,3})/i);
                if (spo2M) vitalTokens.push('SpO2 ' + spo2M[1] + '%');
                if (vitalTokens.length > 0) objParts.push('Vitals: ' + vitalTokens.join(', '));
                // Labs
                const labTokens = [];
                const wbcM = raw.match(/WBC\s*(?:is|of|was|at)?\s*(\d+\.?\d*)/i);
                if (wbcM) labTokens.push('WBC ' + wbcM[1]);
                const hgbM = raw.match(/Hgb\s*(?:is|of|was|at)?\s*(\d+\.?\d*)/i);
                if (hgbM) labTokens.push('Hgb ' + hgbM[1]);
                const crM = raw.match(/Cr\s*(?:is|of|was|at)?\s*(\d+\.?\d*)/i);
                if (crM) labTokens.push('Cr ' + crM[1]);
                if (/labs?\s*(?:are|were|look)?\s*(?:normal|wnl|stable|unremarkable)/i.test(lower)) labTokens.push('WNL');
                if (labTokens.length > 0) objParts.push('Labs: ' + labTokens.join(', '));
                // Exam
                const examTokens = [];
                if (/clear\s*to\s*auscultation|cta/i.test(lower)) examTokens.push('Lungs CTA');
                if (/(?:soft|non-?tender|nt|nd)/i.test(lower) && /(?:abd|belly)/i.test(lower)) examTokens.push('Abd soft/NT/ND');
                if (/wound\s*(?:clean|healing|dry|intact|c\/d\/i)/i.test(lower)) examTokens.push('Wound CDI');
                if (/wound\s*(?:open|draining|erythema|infected)/i.test(lower)) examTokens.push('Wound concern');
                if (/edema|swelling/i.test(lower)) examTokens.push('Edema noted');
                if (/bowel\s*sounds?\s*(?:present|positive|active)/i.test(lower)) examTokens.push('BS+');
                if (examTokens.length > 0) objParts.push('Exam: ' + examTokens.join(', '));
                objective = objParts.join(' | ');

                // --- ASSESSMENT: Overall clinical picture ---
                const assessParts = [];
                if (/pod\s*(?:#?\s*)?\d+|post[- ]?op\s*day\s*\d+/i.test(lower)) {
                    const podM = raw.match(/pod\s*(?:#?\s*)?(\d+)|post[- ]?op\s*day\s*(\d+)/i);
                    if (podM) assessParts.push('POD #' + (podM[1] || podM[2]));
                }
                if (/(?:patient|pt)\s+(?:is|are)\s+(?:clinically\s+)?(?:stable|improved|improving|worse)/i.test(lower)) {
                    const m = raw.match(/(?:patient|pt)\s+(?:is|are)\s+(?:clinically\s+)?(\w+)/i);
                    if (m) assessParts.push('Patient ' + m[1].trim());
                }
                if (/doing\s+(?:well|better|good|great|fine)/i.test(lower)) assessParts.push('Doing well');
                if (/doing\s+(?:worse|poorly|bad)/i.test(lower)) assessParts.push('Doing worse');
                if (/ready\s+for\s+discharge/i.test(lower)) assessParts.push('Ready for discharge');
                if (/not\s+ready/i.test(lower)) assessParts.push('Not ready for discharge');
                assessment = assessParts.length > 0 ? assessParts.join('. ') : '';

                // --- PLAN: orders, next steps ---
                const planParts = [];
                const planM = raw.match(/plan\s+(?:is\s+(?:to\s+)?|for\s+(?:today\s+)?(?:is\s+)?(?:to\s+)?)(.+?)(?:\.|$)/i);
                if (planM && planM[1].trim().length > 3) planParts.push(planM[1].trim());
                // Capture orders/actions
                const actionPatterns = [
                    [/(?:start|begin|add)\s+(.+?)(?:\s+(?:and|also|then)|$)/gi, 'Start'],
                    [/(?:stop|discontinue|dc|hold)\s+(?:the\s+)?(.+?)(?:\s+(?:and|also|then)|$)/gi, 'DC'],
                    [/(?:order|get|check|send|draw)\s+(?:a\s+)?(.+?)(?:\s+(?:and|also|then)|$)/gi, 'Order'],
                    [/(?:continue|maintain|keep)\s+(.+?)(?:\s+(?:and|also|then)|$)/gi, 'Continue'],
                ];
                actionPatterns.forEach(([re, prefix]) => {
                    const matches = raw.matchAll(re);
                    for (const m of matches) {
                        const item = m[1].trim();
                        if (item.length > 2 && item.length < 80) planParts.push(prefix + ' ' + item);
                    }
                });
                // Diet/activity changes
                if (/advance\s*(?:diet|as\s*tolerated)/i.test(lower)) planParts.push('Advance diet as tolerated');
                if (/discharge\s*(?:home|today|tomorrow)/i.test(lower)) planParts.push('Discharge planning');
                plan = planParts.length > 0 ? planParts.join('; ') : '';

                // Build the concise SOAP note
                const soapNote = [];
                soapNote.push('S: ' + (subjective || 'See transcript'));
                if (objective) soapNote.push('O: ' + objective);
                if (assessment) soapNote.push('A: ' + assessment);
                if (plan) soapNote.push('P: ' + plan);
                const formattedSOAP = soapNote.join('\n');

                // Save to patient record
                const updates = { ...patient };
                updates.subjective = subjective;
                if (objective) updates.examFindings = objective;
                if (assessment) updates.assessment = assessment;
                if (plan) updates.treatmentPlan = plan;
                updates.roundsSummary = formattedSOAP;

                // Store in rounds history (merge with existing entry for today if any)
                const today = getTodayISO();
                const roundsHistory = updates.roundsHistory || {};
                const existingEntry = roundsHistory[today] || {};
                const existingParsed = existingEntry.parsed || {};
                roundsHistory[today] = {
                    ...existingEntry,
                    timestamp: new Date().toISOString(),
                    transcript: raw,
                    soapNote: formattedSOAP,
                    subjective: subjective,
                    assessment: assessment,
                    objective: objective,
                    plan: plan,
                    summary: formattedSOAP,
                    parsed: {
                        ...existingParsed,
                        subjective: subjective,
                        assessment: assessment,
                        examFindings: objective,
                        plan: plan,
                        summary: formattedSOAP
                    }
                };
                const allDates = Object.keys(roundsHistory).sort().reverse();
                if (allDates.length > 14) allDates.slice(14).forEach(d => delete roundsHistory[d]);
                updates.roundsHistory = roundsHistory;
                updates.updatedAt = new Date().toISOString();

                await DB.put('patients', updates);

                // Save to recordings list
                setRecordingsList(prev => ({
                    ...prev,
                    [selectedPatientId]: [...(prev[selectedPatientId] || []), { transcript: raw, timestamp: getCurrentDateTime(), soapNote: formattedSOAP }]
                }));

                loadPatients();
                setTranscript('');
                setLiveTranscript('');
                alert('SOAP note submitted to patient record.');
            };

            const applyToPatient = async () => {
                const patient = patients.find(p => p.id === selectedPatientId);
                if (!patient) return;

                const updates = { ...patient };
                if (parsedItems.diet) updates.diet = parsedItems.diet;
                if (parsedItems.activity) updates.activity = parsedItems.activity;
                if (parsedItems.dvtProphylaxis) updates.dvtProphylaxis = parsedItems.dvtProphylaxis;
                if (parsedItems.giProphylaxis) updates.giProphylaxis = parsedItems.giProphylaxis;
                if (parsedItems.subjective) updates.subjective = parsedItems.subjective;
                if (parsedItems.assessment) updates.assessment = parsedItems.assessment;
                if (parsedItems.plan) updates.treatmentPlan = parsedItems.plan;
                if (parsedItems.concerns) updates.concerns = parsedItems.concerns;
                if (parsedItems.examFindings) updates.examFindings = parsedItems.examFindings;
                if (parsedItems.vitals) updates.vitals = parsedItems.vitals;
                if (parsedItems.labNotes) updates.labNotes = parsedItems.labNotes;
                if (parsedItems.summary) updates.roundsSummary = parsedItems.summary;
                if ((parsedItems.problems || []).length > 0) {
                    updates.problems = [...(patient.problems || []), ...parsedItems.problems];
                }
                if (parsedItems.disposition === 'Discharge') {
                    updates.status = 'discharged';
                    updates.dischargeDate = new Date().toISOString();
                } else if (parsedItems.disposition) {
                    updates.dispositionPlan = parsedItems.disposition;
                }

                // Store rounds history for this patient (merge with existing SOAP data)
                const today = getTodayISO();
                const roundsHistory = updates.roundsHistory || {};
                const existingRounds = roundsHistory[today] || {};
                const existingParsed = existingRounds.parsed || {};
                roundsHistory[today] = {
                    ...existingRounds,
                    timestamp: new Date().toISOString(),
                    transcript: transcript,
                    parsed: { ...existingParsed, ...parsedItems },
                    orders: parsedItems.orders,
                    subjective: parsedItems.subjective || existingRounds.subjective,
                    assessment: parsedItems.assessment || existingRounds.assessment,
                    vitals: parsedItems.vitals,
                    labNotes: parsedItems.labNotes,
                    examFindings: parsedItems.examFindings,
                    summary: parsedItems.summary || existingRounds.summary
                };
                // Keep only last 14 days of rounds history
                const allRoundsDates = Object.keys(roundsHistory).sort().reverse();
                if (allRoundsDates.length > 14) {
                    allRoundsDates.slice(14).forEach(d => delete roundsHistory[d]);
                }
                updates.roundsHistory = roundsHistory;
                updates.updatedAt = new Date().toISOString();

                await DB.put('patients', updates);

                // Auto-create tasks from parsed orders
                if (parsedItems.orders && parsedItems.orders.length > 0) {
                    const existingTasks = await DB.getAll('tasks');
                    const patientExisting = existingTasks.filter(t => t.patientId === selectedPatientId && !t.completed);
                    const existingDescs = patientExisting.map(t => t.description.toLowerCase());

                    for (const order of parsedItems.orders) {
                        // Skip if a similar task already exists for this patient
                        if (existingDescs.some(d => d === order.toLowerCase() || d.includes(order.toLowerCase().substring(0, 15)))) continue;

                        // Determine category from order text
                        let category = 'Orders';
                        const ol = order.toLowerCase();
                        if (/check|draw|send|cbc|bmp|cmp|coag|culture|ua|lipase|troponin|lactate|lab/i.test(ol)) category = 'Labs';
                        else if (/ct |cxr|x-ray|xray|mri|ultrasound|echo|ekg|order\s*(ct|mr|us|xr)/i.test(ol)) category = 'Imaging';
                        else if (/consult/i.test(ol)) category = 'Consults';
                        else if (/pt\s*eval|ot\s*eval|ambulate|physical\s*therapy|occupational/i.test(ol)) category = 'Activity';
                        else if (/wound|dressing/i.test(ol)) category = 'Other';
                        else if (/place|insert|foley|ng|central|a-line/i.test(ol)) category = 'Orders';
                        else if (/start|stop|dc |switch|give|administer|bolus|transfuse/i.test(ol)) category = 'Orders';

                        await DB.add('tasks', {
                            patientId: selectedPatientId,
                            category,
                            description: order,
                            priority: 'Medium',
                            assignee: '',
                            completed: false,
                            createdAt: new Date().toISOString(),
                            assignedBy: 'Rounds Recorder',
                            fromRounds: true
                        });
                    }
                }

                loadPatients();
                setTranscript('');
                setLiveTranscript('');
                setParsedItems({ subjective: null, assessment: null, diet: null, activity: null, orders: [], disposition: null, plan: null, dvtProphylaxis: null, giProphylaxis: null, concerns: null, problems: [], examFindings: null, vitals: null, labNotes: null, summary: null });
            };

            const selectedPatient = patients.find(p => p.id === selectedPatientId);

            return (
                <div className="p-4 md:p-6 max-w-4xl mx-auto">
                    <h2 className="text-2xl font-bold text-medical-600 mb-6">Rounds Recorder</h2>

                    <div className="space-y-4">
                        {/* Patient Selector */}
                        <div>
                            <label className="text-sm text-gray-500 font-semibold">Select Patient</label>
                            <select value={selectedPatientId || ''} onChange={(e) => setSelectedPatientId(e.target.value)}
                                className="w-full mt-2 px-4 py-2 bg-gray-50 border border-gray-300 rounded text-gray-800">
                                {[...patients].sort((a, b) => {
                                    if (a.isTrauma && !b.isTrauma) return -1;
                                    if (!a.isTrauma && b.isTrauma) return 1;
                                    return parseInt(a.room) - parseInt(b.room);
                                }).map(p => (
                                    <option key={p.id} value={p.id}>{p.isTrauma ? '🔴 ' : ''}Room {p.room} - {p.diagnosis}</option>
                                ))}
                            </select>
                        </div>

                        {/* Current Patient Summary */}
                        {selectedPatient && (
                            <div className={`border rounded-lg p-3 text-sm ${selectedPatient.isTrauma ? 'bg-red-50 border-red-300' : 'bg-gray-50 border-gray-200'}`}>
                                <div className="flex items-center gap-2 mb-1">
                                    <span className={`font-bold ${selectedPatient.isTrauma ? 'text-red-600' : 'text-medical-600'}`}>Room {selectedPatient.room}</span>
                                    {selectedPatient.isTrauma && <span className="text-xs bg-red-500 text-white px-1.5 py-0.5 rounded">{selectedPatient.traumaLevel}</span>}
                                    <span className="text-gray-500">|</span>
                                    <span className="text-gray-600">{selectedPatient.diagnosis}</span>
                                    <span className="text-gray-400">POD {calculatePOD(selectedPatient.admitDate)}</span>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs text-gray-500">
                                    <span>Diet: <strong className="text-gray-700">{selectedPatient.diet || 'N/A'}</strong></span>
                                    <span>Activity: <strong className="text-gray-700">{selectedPatient.activity || 'N/A'}</strong></span>
                                    <span>DVT: <strong className="text-gray-700">{selectedPatient.dvtProphylaxis || 'N/A'}</strong></span>
                                    <span>GI: <strong className="text-gray-700">{selectedPatient.giProphylaxis || 'N/A'}</strong></span>
                                </div>
                                {selectedPatient.treatmentPlan && <p className="text-xs text-gray-500 mt-1">Plan: {selectedPatient.treatmentPlan}</p>}
                                {selectedPatient.concerns && <p className="text-xs text-red-600 mt-1">Concern: {selectedPatient.concerns}</p>}
                            </div>
                        )}

                        {/* Recording Controls */}
                        <div className="bg-white border border-gray-100 rounded-xl p-6">
                            <div className="text-center mb-6">
                                <button onClick={isRecording ? stopRecording : startRecording}
                                    className={`w-24 h-24 rounded-full flex items-center justify-center font-bold text-white transition transform ${isRecording ? 'bg-red-600 hover:bg-red-700 scale-110 shadow-lg shadow-red-500/50 animate-pulse' : 'bg-red-500 hover:bg-red-600'}`}>
                                    {isRecording ? '⏹' : '⏺'}
                                </button>
                            </div>

                            {/* Live Transcript */}
                            {isRecording && (
                                <div className="mb-4 p-3 bg-gray-50 border border-medical-500 rounded">
                                    <p className="text-sm text-gray-600">{transcript}{liveTranscript}</p>
                                    <div className="flex gap-1 mt-2 items-center">
                                        {[...Array(5)].map((_, i) => (
                                            <div key={i} className="w-1 h-4 bg-medical-500 text-white rounded-full animate-pulse" style={{animationDelay: `${i * 100}ms`}}></div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Transcript Editing */}
                            {transcript && !isRecording && (
                                <div className="mb-4">
                                    <DictateField label="Transcript" value={transcript} onChange={(v) => setTranscript(v)}
                                        className="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded text-gray-600"
                                        rows={4}/>
                                    <div className="flex gap-2 mt-2">
                                        <button onClick={parseTranscript}
                                            className="flex-1 px-4 py-2 bg-medical-600 hover:bg-medical-700 text-white rounded font-medium">
                                            Parse Plan
                                        </button>
                                        <button onClick={submitSOAP}
                                            className="flex-1 px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded font-medium">
                                            Add SOAP
                                        </button>
                                        <button onClick={() => { parseTranscript(); submitSOAP(); }}
                                            className="flex-1 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded font-medium">
                                            Both
                                        </button>
                                        <button onClick={parsePE}
                                            className="flex-1 px-4 py-2 bg-orange-600 hover:bg-orange-700 text-white rounded font-medium">
                                            Parse PE
                                        </button>
                                    </div>
                                </div>
                            )}

                            {/* Parsed Items */}
                            {(parsedItems.subjective || parsedItems.assessment || parsedItems.diet || parsedItems.activity || parsedItems.orders.length > 0 || parsedItems.disposition || parsedItems.plan || parsedItems.dvtProphylaxis || parsedItems.giProphylaxis || parsedItems.concerns || parsedItems.examFindings || (parsedItems.problems || []).length > 0 || parsedItems.vitals || parsedItems.labNotes || parsedItems.summary) && (
                                <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-4 space-y-2 mb-4">
                                    <p className="text-sm font-bold text-emerald-700 mb-2">Parsed from Rounds -- will update patient record:</p>
                                    {parsedItems.subjective && (
                                        <div className="bg-white/60 rounded-lg p-2 -mx-1">
                                            <label className="text-xs font-semibold text-blue-700">Subjective:</label>
                                            <textarea value={parsedItems.subjective} onChange={(e) => setParsedItems(prev => ({ ...prev, subjective: e.target.value }))}
                                                className="w-full mt-1 px-2 py-1 bg-white border border-blue-200 rounded text-sm text-gray-800 focus:border-blue-400 focus:outline-none" rows={2} />
                                        </div>
                                    )}
                                    {parsedItems.assessment && (
                                        <div className="bg-white/60 rounded-lg p-2 -mx-1">
                                            <label className="text-xs font-semibold text-indigo-700">Assessment:</label>
                                            <textarea value={parsedItems.assessment} onChange={(e) => setParsedItems(prev => ({ ...prev, assessment: e.target.value }))}
                                                className="w-full mt-1 px-2 py-1 bg-white border border-indigo-200 rounded text-sm text-gray-800 focus:border-indigo-400 focus:outline-none" rows={1} />
                                        </div>
                                    )}
                                    {parsedItems.diet && (
                                        <div className="flex items-center gap-2">
                                            <span className="text-xs font-semibold text-gray-500 w-20">Diet:</span>
                                            <span className="px-2 py-0.5 bg-medical-600 text-white rounded text-xs">{parsedItems.diet}</span>
                                        </div>
                                    )}
                                    {parsedItems.activity && (
                                        <div className="flex items-center gap-2">
                                            <span className="text-xs font-semibold text-gray-500 w-20">Activity:</span>
                                            <span className="px-2 py-0.5 bg-amber-600 text-white rounded text-xs">{parsedItems.activity}</span>
                                        </div>
                                    )}
                                    {parsedItems.dvtProphylaxis && (
                                        <div className="flex items-center gap-2">
                                            <span className="text-xs font-semibold text-gray-500 w-20">DVT Ppx:</span>
                                            <span className="px-2 py-0.5 bg-blue-600 text-white rounded text-xs">{parsedItems.dvtProphylaxis}</span>
                                        </div>
                                    )}
                                    {parsedItems.giProphylaxis && (
                                        <div className="flex items-center gap-2">
                                            <span className="text-xs font-semibold text-gray-500 w-20">GI Ppx:</span>
                                            <span className="px-2 py-0.5 bg-blue-600 text-white rounded text-xs">{parsedItems.giProphylaxis}</span>
                                        </div>
                                    )}
                                    {parsedItems.orders.length > 0 && (
                                        <div className="flex items-start gap-2">
                                            <span className="text-xs font-semibold text-gray-500 w-20 mt-0.5">Orders:</span>
                                            <div className="flex flex-wrap gap-1">
                                                {parsedItems.orders.map((item, i) => (
                                                    <span key={i} className="px-2 py-0.5 bg-purple-600 text-white rounded text-xs">{item}</span>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                    {parsedItems.plan && (
                                        <div className="bg-white/60 rounded-lg p-2 -mx-1">
                                            <label className="text-xs font-semibold text-purple-700">Plan:</label>
                                            <textarea value={parsedItems.plan} onChange={(e) => setParsedItems(prev => ({ ...prev, plan: e.target.value }))}
                                                className="w-full mt-1 px-2 py-1 bg-white border border-purple-200 rounded text-sm text-gray-800 focus:border-purple-400 focus:outline-none" rows={2} />
                                        </div>
                                    )}
                                    {parsedItems.vitals && (
                                        <div className="flex items-start gap-2">
                                            <span className="text-xs font-semibold text-gray-500 w-20 mt-0.5">Vitals:</span>
                                            <span className="text-sm text-gray-700">{parsedItems.vitals}</span>
                                        </div>
                                    )}
                                    {parsedItems.labNotes && (
                                        <div className="flex items-start gap-2">
                                            <span className="text-xs font-semibold text-gray-500 w-20 mt-0.5">Labs:</span>
                                            <span className="text-sm text-gray-700">{parsedItems.labNotes}</span>
                                        </div>
                                    )}
                                    {parsedItems.examFindings !== null && (
                                        <div className="bg-white/60 rounded-lg p-2 -mx-1">
                                            <label className="text-xs font-semibold text-emerald-700">Exam:</label>
                                            <textarea value={parsedItems.examFindings || ''} onChange={(e) => setParsedItems(prev => ({ ...prev, examFindings: e.target.value }))}
                                                className="w-full mt-1 px-2 py-1 bg-white border border-emerald-200 rounded text-sm text-gray-800 focus:border-emerald-400 focus:outline-none" rows={2}
                                                placeholder="Enter exam findings..." />
                                        </div>
                                    )}
                                    {parsedItems.concerns && (
                                        <div className="flex items-start gap-2">
                                            <span className="text-xs font-semibold text-gray-500 w-20 mt-0.5">Concerns:</span>
                                            <span className="text-sm text-red-600">{parsedItems.concerns}</span>
                                        </div>
                                    )}
                                    {parsedItems.disposition && (
                                        <div className="flex items-center gap-2">
                                            <span className="text-xs font-semibold text-gray-500 w-20">Dispo:</span>
                                            <span className="px-2 py-0.5 bg-emerald-600 text-white rounded text-xs">{parsedItems.disposition}</span>
                                        </div>
                                    )}
                                    {(parsedItems.problems || []).length > 0 && (
                                        <div className="flex items-start gap-2">
                                            <span className="text-xs font-semibold text-gray-500 w-20 mt-0.5">New Probs:</span>
                                            <div className="flex flex-wrap gap-1">
                                                {(parsedItems.problems || []).map((item, i) => (
                                                    <span key={i} className="px-2 py-0.5 bg-orange-600 text-white rounded text-xs">{item}</span>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                    {parsedItems.summary && (
                                        <div className="mt-2 pt-2 border-t border-emerald-200">
                                            <span className="text-xs font-semibold text-emerald-700">Rounds Summary:</span>
                                            <p className="text-sm text-gray-700 mt-1">{parsedItems.summary}</p>
                                        </div>
                                    )}

                                    <button onClick={applyToPatient}
                                        className="w-full mt-3 px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded font-bold text-sm">
                                        Apply to Patient Record
                                    </button>
                                </div>
                            )}
                        </div>

                        {/* Previous Recordings */}
                        {recordingsList[selectedPatientId] && recordingsList[selectedPatientId].length > 0 && (
                            <div className="bg-white border border-gray-100 rounded-xl p-4">
                                <h3 className="text-sm font-semibold text-gray-600 mb-3">Previous Recordings</h3>
                                <div className="space-y-2 max-h-80 overflow-y-auto">
                                    {recordingsList[selectedPatientId].map((recording, i) => (
                                        <div key={i} className="text-xs text-gray-500 p-2 bg-gray-50 rounded border border-gray-200">
                                            <div className="flex items-center justify-between mb-1">
                                                <p className="font-semibold">{recording.timestamp}</p>
                                                {editingRecIdx === i ? (
                                                    <button onClick={() => { setEditingRecIdx(null); setEditingRecText(''); }}
                                                        className="text-xs text-gray-400 hover:text-gray-600">Cancel</button>
                                                ) : (
                                                    <button onClick={() => { setEditingRecIdx(i); setEditingRecText(recording.transcript); }}
                                                        className="text-xs text-medical-600 hover:text-medical-800 font-medium">Edit</button>
                                                )}
                                            </div>
                                            {editingRecIdx === i ? (
                                                <div>
                                                    <DictateField label="" value={editingRecText} onChange={(v) => setEditingRecText(v)}
                                                        className="w-full px-2 py-1 bg-white border border-medical-300 rounded text-gray-700 text-xs"
                                                        rows={3}/>
                                                    <div className="flex gap-1 mt-2">
                                                        <button onClick={() => {
                                                            setRecordingsList(prev => {
                                                                const updated = { ...prev };
                                                                updated[selectedPatientId] = [...updated[selectedPatientId]];
                                                                updated[selectedPatientId][i] = { ...updated[selectedPatientId][i], transcript: editingRecText };
                                                                return updated;
                                                            });
                                                            setEditingRecIdx(null); setEditingRecText('');
                                                        }} className="px-2 py-1 bg-gray-600 hover:bg-gray-700 text-white rounded text-xs font-medium">
                                                            Save
                                                        </button>
                                                        <button onClick={() => {
                                                            setTranscript(editingRecText);
                                                            setRecordingsList(prev => {
                                                                const updated = { ...prev };
                                                                updated[selectedPatientId] = [...updated[selectedPatientId]];
                                                                updated[selectedPatientId][i] = { ...updated[selectedPatientId][i], transcript: editingRecText };
                                                                return updated;
                                                            });
                                                            setEditingRecIdx(null); setEditingRecText('');
                                                        }} className="px-2 py-1 bg-medical-600 hover:bg-medical-700 text-white rounded text-xs font-medium">
                                                            Load &amp; Parse
                                                        </button>
                                                        <button onClick={() => {
                                                            setRecordingsList(prev => {
                                                                const updated = { ...prev };
                                                                updated[selectedPatientId] = updated[selectedPatientId].filter((_, idx) => idx !== i);
                                                                return updated;
                                                            });
                                                            setEditingRecIdx(null); setEditingRecText('');
                                                        }} className="px-2 py-1 bg-red-500 hover:bg-red-600 text-white rounded text-xs font-medium">
                                                            Delete
                                                        </button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <p className="mt-1 text-gray-600 cursor-pointer hover:text-gray-800"
                                                    onClick={() => { setEditingRecIdx(i); setEditingRecText(recording.transcript); }}>
                                                    {recording.transcript}
                                                </p>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==================== CONSULTS SPEECH PARSER ====================
        function parseConsultSpeech(transcript) {
            const lower = transcript.toLowerCase();
            const result = {};

            // Patient ID lookup by room
            const roomMatch = transcript.match(/(?:room|patient room)\s+(\d+)/i);
            if (roomMatch) result.patientId = roomMatch[1];

            // Service
            const serviceKeywords = {
                'cardio': 'Cardiology', 'card': 'Cardiology',
                'pulmo': 'Pulmonology', 'respir': 'Pulmonology',
                'nephro': 'Nephrology', 'kidney': 'Nephrology',
                'gi': 'GI/Hepatology', 'hepato': 'GI/Hepatology', 'liver': 'GI/Hepatology',
                'infect': 'Infectious Disease', 'id': 'Infectious Disease',
                'endo': 'Endocrine', 'thyroid': 'Endocrine',
                'heme': 'Hematology/Oncology', 'onc': 'Hematology/Oncology', 'cancer': 'Hematology/Oncology',
                'neuro': 'Neurology', 'neuro': 'Neurosurgery',
                'ortho': 'Orthopedics', 'orthoped': 'Orthopedics',
                'vascular': 'Vascular Surgery', 'vasc': 'Vascular Surgery',
                'plastic': 'Plastic Surgery',
                'urology': 'Urology', 'urotogy': 'Urology', 'uro': 'Urology',
                'ob': 'OB/GYN', 'gyn': 'OB/GYN', 'obstet': 'OB/GYN',
                'psych': 'Psychiatry',
                'palli': 'Palliative Care',
                'pain': 'Pain Management',
                'pt': 'PT/OT', 'ot': 'PT/OT', 'physical': 'PT/OT',
                'speech': 'Speech/Swallow', 'swallow': 'Speech/Swallow',
                'nutri': 'Nutrition', 'diet': 'Nutrition',
                'social': 'Social Work',
                'case': 'Case Management',
                'ir': 'Interventional Radiology', 'intervent': 'Interventional Radiology',
                'radio': 'Radiology', 'imaging': 'Radiology',
                'path': 'Pathology',
                'wound': 'Wound Care'
            };
            for (let key in serviceKeywords) {
                if (lower.includes(key)) {
                    result.service = serviceKeywords[key];
                    break;
                }
            }

            // Reason
            const reasonMatch = transcript.match(/(?:reason|for|r\/o|rule out)\s+(.+?)(?:urgent|routine|emergent|finding|they found|consultant|recommend|$)/i);
            if (reasonMatch) result.reason = reasonMatch[1].trim();

            // Urgency
            if (/\b(?:emergent|emergenc|emergency)\b/i.test(lower)) result.urgency = 'Emergent';
            else if (/\b(?:urgent|urgency)\b/i.test(lower)) result.urgency = 'Urgent';
            else if (/\b(?:routine)\b/i.test(lower)) result.urgency = 'Routine';

            // Findings
            const findingsMatch = transcript.match(/(?:finding|found|show|they found|consultant found)\s+(.+?)(?:recommend|they recommend|follow|$)/i);
            if (findingsMatch) result.findings = findingsMatch[1].trim();

            // Recommendations
            const recsMatch = transcript.match(/(?:recommend|recs?|suggest)\s+(.+?)(?:follow|next|note|$)/i);
            if (recsMatch) result.recommendations = recsMatch[1].trim();

            // Follow up
            if (/follow[\s-]?up|they'll come back|come back|recheck|reassess|next visit|see again/i.test(lower)) {
                result.followUpNeeded = 'Yes - as recommended by consultant';
            }

            // Notes
            const noteMatch = transcript.match(/(?:note|notes)\s+(.+?)$/i);
            if (noteMatch) result.notes = noteMatch[1].trim();

            return result;
        }

        // ==================== CONSULTS TRACKER ====================
        function ConsultsTracker() {
            const [consults, setConsults] = React.useState([]);
            const [patients, setPatients] = React.useState([]);
            const [showForm, setShowForm] = React.useState(false);
            const [editingConsult, setEditingConsult] = React.useState(null);
            const [filter, setFilter] = React.useState('all');
            const [showQuickDictate, setShowQuickDictate] = React.useState(false);
            const [quickTranscript, setQuickTranscript] = React.useState('');
            const [quickInterim, setQuickInterim] = React.useState('');
            const [quickListening, setQuickListening] = React.useState(false);
            const quickRecognitionRef = React.useRef(null);
            const quickFinalRef = React.useRef('');
            const [hpNote, setHpNote] = React.useState(null);
            const [hpData, setHpData] = React.useState(null);
            const [hpCopied, setHpCopied] = React.useState(false);
            const [form, setForm] = React.useState({
                patientId: '', service: '', reason: '', urgency: 'Routine',
                requestedBy: '', requestTime: new Date().toISOString().slice(0, 16),
                recommendations: '', findings: '', followUpNeeded: '',
                status: 'Pending', notes: ''
            });

            const CONSULT_SERVICES = [
                'Cardiology', 'Pulmonology', 'Nephrology', 'GI/Hepatology', 'Infectious Disease',
                'Endocrine', 'Hematology/Oncology', 'Neurology', 'Neurosurgery', 'Orthopedics',
                'Vascular Surgery', 'Plastic Surgery', 'Urology', 'OB/GYN', 'Psychiatry',
                'Palliative Care', 'Pain Management', 'PT/OT', 'Speech/Swallow', 'Nutrition',
                'Social Work', 'Case Management', 'Interventional Radiology', 'Radiology',
                'Pathology', 'Wound Care', 'Emergency Department', 'Other'
            ];

            React.useEffect(() => {
                loadData();
                setupQuickDictation();
            }, []);

            const setupQuickDictation = () => {
                if (typeof window !== 'undefined') {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (SpeechRecognition) {
                        quickRecognitionRef.current = new SpeechRecognition();
                        quickRecognitionRef.current.continuous = true;
                        quickRecognitionRef.current.interimResults = true;
                        quickRecognitionRef.current.onstart = () => setQuickListening(true);
                        quickRecognitionRef.current.onresult = (event) => {
                            let interim = '';
                            let finalText = quickFinalRef.current;
                            for (let i = event.resultIndex; i < event.results.length; i++) {
                                const t = event.results[i][0].transcript;
                                if (event.results[i].isFinal) {
                                    const cleaned = cleanMedicalSpeech(t.trim());
                                    finalText += (finalText ? ' ' : '') + cleaned;
                                } else {
                                    interim += t;
                                }
                            }
                            quickFinalRef.current = finalText;
                            setQuickTranscript(finalText);
                            setQuickInterim(interim);
                        };
                        quickRecognitionRef.current.onerror = (e) => { if (e.error !== 'no-speech') setQuickListening(false); };
                        quickRecognitionRef.current.onend = () => { setQuickListening(false); setQuickInterim(''); };
                    }
                }
            };

            const startQuickDictation = () => {
                if (quickRecognitionRef.current) {
                    quickFinalRef.current = '';
                    setQuickTranscript('');
                    setQuickInterim('');
                    try { quickRecognitionRef.current.start(); } catch(e) {}
                }
            };

            const stopQuickDictation = () => {
                if (quickRecognitionRef.current) {
                    try { quickRecognitionRef.current.stop(); } catch(e) {}
                }
            };

            const parseToHP = (rawText) => {
                const t = rawText.trim();
                const lower = t.toLowerCase();
                const hp = { cc: '', hpi: '', pmh: [], psh: [], meds: [], allergies: [], ros: '', pe: '', vitals: '', labs: '', socialHx: '', familyHx: '', assessment: '', plan: '', age: '', gender: '', room: '', diagnosis: '' };

                // ---- DEMOGRAPHICS ----
                const roomMatch = t.match(/(?:room|rm)\s*(\d+[A-Za-z]?)/i);
                if (roomMatch) hp.room = roomMatch[1];

                const ageMatch = t.match(/(\d{1,3})\s*[-\s]?(?:year[s\-\s]*old|y\.?o\.?|yo)\s*(male|female|man|woman|gentleman|lady|m|f)\b/i);
                if (ageMatch) { hp.age = ageMatch[1]; const g = ageMatch[2].toLowerCase(); hp.gender = (g.startsWith('f') || g === 'lady' || g === 'woman') ? 'F' : 'M'; }
                if (!ageMatch) {
                    const ageOnly = t.match(/(\d{1,3})\s*[-\s]?(?:year[s\-\s]*old|y\.?o\.?|yo)\b/i);
                    if (ageOnly) hp.age = ageOnly[1];
                    const genderOnly = t.match(/\b(male|female|man|woman|gentleman|lady)\b/i);
                    if (genderOnly) { const g = genderOnly[1].toLowerCase(); hp.gender = (g.startsWith('f') || g === 'lady' || g === 'woman') ? 'F' : 'M'; }
                }

                // ---- SENTENCE-LEVEL SEGMENTATION ----
                // Split into sentences for context-aware parsing
                const sentences = t.split(/(?<=[.!?])\s+|(?<=\b(?:So|Anyway|Also|Additionally|Furthermore|Next|Now|Then|Currently|However|But)\b)\s+/i).filter(s => s.trim());

                // ---- SECTION DETECTION via contextual cues ----
                // Tag each sentence with likely H&P section
                const sectionTags = sentences.map((sent, idx) => {
                    const sl = sent.toLowerCase().trim();
                    // Explicit labels first
                    if (/^(?:chief\s*complaint|cc|reason\s*(?:for)?\s*(?:consult|admission)|presenting\s*(?:with|for|complaint))\b/i.test(sl)) return { section: 'cc', text: sent.replace(/^(?:chief\s*complaint|cc|reason\s*(?:for)?\s*(?:consult|admission)|presenting\s*(?:with|for|complaint))[:\s]*/i, '').trim() };
                    if (/^(?:hpi|history\s*of\s*present\s*illness)[:\s]/i.test(sl)) return { section: 'hpi', text: sent.replace(/^(?:hpi|history\s*of\s*present\s*illness)[:\s]*/i, '').trim() };
                    if (/^(?:pmh|past\s*medical\s*history|medical\s*history)[:\s]/i.test(sl)) return { section: 'pmh', text: sent.replace(/^(?:pmh|past\s*medical\s*history|medical\s*history)[:\s]*/i, '').trim() };
                    if (/^(?:psh|past\s*surgical\s*history|surgical\s*history|prior\s*surger)/i.test(sl)) return { section: 'psh', text: sent.replace(/^(?:psh|past\s*surgical\s*history|surgical\s*history|prior\s*surger\w*)[:\s]*/i, '').trim() };
                    if (/^(?:medications?|meds|home\s*(?:meds|medications)|currently\s*(?:on|taking))[:\s]/i.test(sl)) return { section: 'meds', text: sent.replace(/^(?:medications?|meds|home\s*(?:meds|medications)|currently\s*(?:on|taking))[:\s]*/i, '').trim() };
                    if (/^(?:allergies|allergy)[:\s]/i.test(sl)) return { section: 'allergies', text: sent.replace(/^(?:allergies|allergy)[:\s]*/i, '').trim() };
                    if (/^(?:ros|review\s*of\s*systems)[:\s]/i.test(sl)) return { section: 'ros', text: sent.replace(/^(?:ros|review\s*of\s*systems)[:\s]*/i, '').trim() };
                    if (/^(?:physical\s*exam|pe|on\s*(?:physical\s*)?exam|exam(?:ination)?)[:\s]/i.test(sl)) return { section: 'pe', text: sent.replace(/^(?:physical\s*exam|pe|on\s*(?:physical\s*)?exam|exam(?:ination)?)[:\s]*/i, '').trim() };
                    if (/^(?:vitals?|vital\s*signs?)[:\s]/i.test(sl)) return { section: 'vitals', text: sent.replace(/^(?:vitals?|vital\s*signs?)[:\s]*/i, '').trim() };
                    if (/^(?:labs?|laboratory|imaging|results|ct\s*(?:scan|showed)|x-?ray|mri|ultrasound)[:\s]/i.test(sl)) return { section: 'labs', text: sent.replace(/^(?:labs?|laboratory|imaging|results)[:\s]*/i, '').trim() };
                    if (/^(?:social\s*history|social\s*hx|sh)[:\s]/i.test(sl)) return { section: 'socialHx', text: sent.replace(/^(?:social\s*history|social\s*hx|sh)[:\s]*/i, '').trim() };
                    if (/^(?:family\s*history|family\s*hx|fh|fhx)[:\s]/i.test(sl)) return { section: 'familyHx', text: sent.replace(/^(?:family\s*history|family\s*hx|fh|fhx)[:\s]*/i, '').trim() };
                    if (/^(?:assessment\s*(?:and|&)?\s*plan|a\/?p|plan|impression|recommend)/i.test(sl)) return { section: 'plan', text: sent.replace(/^(?:assessment\s*(?:and|&)?\s*plan|a\/?p|plan|impression|recommend\w*)[:\s]*/i, '').trim() };

                    // Contextual cues (no explicit label)
                    // Social history cues
                    if (/\b(?:smokes?|smoking|tobacco|cigarettes?|pack[s\s-]*(?:per|a)\s*day|ppd|drinks?\s*(?:alcohol|beer|wine|liquor)|etoh|ivdu|iv\s*drug|marijuana|cocaine|heroin|denies\s*(?:tobacco|alcohol|drugs|smoking|etoh))\b/i.test(sl)) return { section: 'socialHx', text: sent.trim() };
                    // Family history cues
                    if (/\b(?:family\s*history|(?:no\s*(?:significant\s*)?)?(?:mother|father|brother|sister|parent|sibling|family\s*(?:member)?)s?\s*(?:with|has|had|diagnosed|history|cancer|disease|died))\b/i.test(sl) || /\bno\s*significant\s*family\s*history\b/i.test(sl)) return { section: 'familyHx', text: sent.trim() };
                    // Medications cues
                    if (/\b(?:currently\s*(?:on|taking)|(?:home|daily)\s*(?:meds|medications)|takes?|prescribed)\b/i.test(sl) && /\b(?:aspirin|metformin|lisinopril|amlodipine|atorvastatin|omeprazole|pantoprazole|metoprolol|losartan|heparin|insulin|warfarin|eliquis|xarelto|plavix|corticosteroids?|prednisone|steroids?|antibiotics?|ibuprofen|acetaminophen|tylenol|gabapentin|tramadol|oxycodone|hydrocodone|norvasc|lasix|furosemide|levothyroxine|synthroid)\b/i.test(sl)) return { section: 'meds', text: sent.trim() };
                    // Vitals cues
                    if (/\b(?:tachycardic|bradycardic|hypotensive|hypertensive|febrile|afebrile|heart\s*rate\s*(?:of|is|was)?\s*\d|hr\s*(?:of|is|was)?\s*\d|blood\s*pressure\s*(?:of|is|was)?\s*\d|bp\s*(?:of|is|was)?\s*\d|temp(?:erature)?\s*(?:of|is|was)?\s*\d|sats?\s*(?:of|is|was)?\s*\d|o2\s*sat|respiratory\s*rate|rr\s*(?:of|is|was)?\s*\d|pulse\s*(?:of|is|was)?\s*\d)\b/i.test(sl)) return { section: 'vitals', text: sent.trim() };
                    // Physical exam cues
                    if (/\b(?:on\s*(?:physical\s*)?exam|examination|(?:abdomen|belly|lungs?|chest|heart|extremities?|neuro)\s*(?:is|are|was|were|shows?|reveal|demonstrate)|tender\s*(?:on|to|with)|rebound\s*(?:tenderness)?|guarding|distended|peritoneal\s*signs?|murphy'?s|mcburney|bowel\s*sounds|inspection|palpat|auscultati|percuss|wound\s*(?:is|looks|appears)|incision)\b/i.test(sl)) return { section: 'pe', text: sent.trim() };
                    // Labs/imaging cues
                    if (/\b(?:white\s*(?:blood\s*)?(?:count|cell)|wbc|hemoglobin|hgb|hematocrit|hct|platelets?|plt|creatinine|bun|sodium|potassium|chloride|bicarb|co2|glucose|lactate|troponin|lipase|amylase|ast|alt|bilirubin|inr|pt\s|ptt|cbc|bmp|cmp|lfts?|ua\b|urinalysis|ct\s*(?:scan|showed|shows|revealed|demonstrates)|x-?ray|mri|ultrasound|imaging\s*(?:showed|shows|revealed))\b/i.test(sl)) return { section: 'labs', text: sent.trim() };
                    // Assessment cues
                    if (/\b(?:(?:likely|probable|possible|suspect(?:ed)?|concern\s*for|consistent\s*with|(?:most\s*likely|working)\s*diagnosis|diagnosed\s*with|assessment\s*is|impression\s*is|appears?\s*to\s*be|thinking)\s+\w|(?:we\s*(?:think|believe|suspect)|i\s*(?:think|believe|suspect))\s|recommend|plan\s*(?:is|to|for)|(?:will|going\s*to)\s*(?:take|get|order|start|consult|proceed|schedule|admit|discharge|observe))\b/i.test(sl)) return { section: 'plan', text: sent.trim() };
                    // Allergies cues
                    if (/\b(?:nkda|no\s*known\s*(?:drug\s*)?allergies|allergic\s*to|allergy\s*to)\b/i.test(sl)) return { section: 'allergies', text: sent.trim() };

                    return { section: null, text: sent.trim() };
                });

                // ---- ASSIGN UNTAGGED SENTENCES ----
                // Sentences without a tag inherit from surrounding context or go to HPI
                let lastSection = null;
                for (let i = 0; i < sectionTags.length; i++) {
                    if (sectionTags[i].section) {
                        lastSection = sectionTags[i].section;
                    } else if (lastSection && lastSection !== 'cc') {
                        // Continue previous section for untagged sentences (except CC which should be brief)
                        sectionTags[i].section = lastSection;
                    }
                }

                // ---- BUILD HP SECTIONS ----
                const sectionTexts = { cc: [], hpi: [], pmh: [], psh: [], meds: [], allergies: [], ros: [], pe: [], vitals: [], labs: [], socialHx: [], familyHx: [], plan: [] };
                let ccFound = false;
                let firstNarrativeIdx = -1;

                for (let i = 0; i < sectionTags.length; i++) {
                    const tag = sectionTags[i];
                    if (tag.section && tag.section !== 'cc') {
                        if (!sectionTexts[tag.section]) sectionTexts[tag.section] = [];
                        sectionTexts[tag.section].push(tag.text);
                    } else if (tag.section === 'cc') {
                        ccFound = true;
                        sectionTexts.cc.push(tag.text);
                    } else {
                        // Untagged, will be assigned to HPI
                        if (firstNarrativeIdx === -1) firstNarrativeIdx = i;
                        sectionTexts.hpi.push(tag.text);
                    }
                }

                // ---- CHIEF COMPLAINT (concise) ----
                if (sectionTexts.cc.length > 0) {
                    hp.cc = sectionTexts.cc[0];
                } else {
                    // Extract concise CC: age/gender + presenting complaint
                    const ccPattern = t.match(/(\d{1,3}\s*[-\s]?(?:year[s\-\s]*old|y\.?o\.?|yo)\s*(?:male|female|man|woman|gentleman|lady|m|f))\b[,\s]*(?:with|presenting\s*with|who\s*(?:is|has|presents)|(?:coming|came)\s*in\s*(?:for|with)|complaining\s*of|c\/o)[,\s]*(.+?)(?:\.|(?=\s*(?:He|She|The\s*patient|Patient|Pt)\s))/i);
                    if (ccPattern) {
                        hp.cc = ccPattern[1].trim() + ' with ' + ccPattern[2].trim();
                    } else {
                        // Try extracting just the complaint
                        const complaintMatch = t.match(/(?:coming\s*in\s*(?:for|with)|presenting\s*(?:with|for)|complaining\s*of|c\/o|(?:has|have)\s*(?:a\s*)?(?:patient\s*(?:that\s*is|who\s*is|with))?\s*(?:coming\s*in\s*(?:for|with)))\s*(.+?)(?:\.|(?=\s*(?:He|She|The\s*patient|Patient|Pt)\s))/i);
                        if (complaintMatch) {
                            const prefix = hp.age ? `${hp.age}${hp.gender ? hp.gender : ''} ` : '';
                            hp.cc = (prefix ? prefix + 'with ' : '') + complaintMatch[1].trim();
                        } else {
                            // Fallback: first sentence, trimmed
                            const firstSent = t.match(/^(.+?)(?:\.|$)/);
                            if (firstSent) {
                                let ccText = firstSent[1].trim();
                                // Trim filler from start
                                ccText = ccText.replace(/^(?:have\s*a\s*patient\s*(?:that\s*is|who\s*is)?|we\s*have\s*a|so\s*(?:we\s*have\s*)?(?:a\s*)?|okay\s*so\s*)\s*/i, '').trim();
                                hp.cc = ccText;
                            }
                        }
                    }
                }
                // Capitalize CC
                if (hp.cc) hp.cc = hp.cc.charAt(0).toUpperCase() + hp.cc.slice(1);

                // ---- HPI (the narrative) ----
                // If we got HPI from untagged sentences, use those
                if (sectionTexts.hpi.length > 0) {
                    hp.hpi = sectionTexts.hpi.join(' ').trim();
                }
                // If no HPI yet, extract narrative between CC and first labeled section
                if (!hp.hpi) {
                    // Find where the first labeled section begins in the original text
                    const sectionStarters = [
                        /\b(?:pmh|past\s*medical\s*history|medical\s*history)\b/i,
                        /\b(?:psh|past\s*surgical\s*history|surgical\s*history|prior\s*surger)\b/i,
                        /\b(?:medications?|meds|home\s*(?:meds|medications)|currently\s*(?:on|taking)\s*(?:aspirin|metformin|lisinopril|amlodipine|atorvastatin|omeprazole|pantoprazole|metoprolol|losartan|heparin|insulin|warfarin|prednisone|steroids?))\b/i,
                        /\b(?:allergies|allergy|nkda)\b/i,
                        /\bno\s*significant\s*family\s*history\b/i,
                        /\b(?:family\s*history)\b/i,
                        /\b(?:smokes?|tobacco|cigarettes?|denies\s*(?:tobacco|alcohol|smoking))\b/i,
                        /\b(?:on\s*(?:physical\s*)?exam|examination)\b/i,
                        /\b(?:vitals?|vital\s*signs?)\b/i,
                        /\b(?:assessment|impression|plan\s*(?:is|to|for)|recommend)\b/i
                    ];
                    let firstSectionPos = t.length;
                    for (const pat of sectionStarters) {
                        const m = t.search(pat);
                        if (m > 0 && m < firstSectionPos) firstSectionPos = m;
                    }
                    // HPI starts after first sentence (CC) and goes to first section
                    const firstSentEnd = t.indexOf('.') + 1;
                    if (firstSentEnd > 0 && firstSectionPos > firstSentEnd + 20) {
                        hp.hpi = t.substring(firstSentEnd, firstSectionPos).trim();
                        // Clean up HPI start
                        hp.hpi = hp.hpi.replace(/^\s*[.,;]\s*/, '').trim();
                    }
                }
                // Clean HPI - remove filler at start
                if (hp.hpi) {
                    hp.hpi = hp.hpi.replace(/^(?:so\s+|okay\s+|um\s+|uh\s+|basically\s+)/i, '').trim();
                    if (hp.hpi) hp.hpi = hp.hpi.charAt(0).toUpperCase() + hp.hpi.slice(1);
                }

                // ---- PMH (from tagged + inline detection) ----
                if (sectionTexts.pmh.length > 0) {
                    const pmhText = sectionTexts.pmh.join(' ');
                    hp.pmh = pmhText.split(/[,;.]/).map(s => s.trim()).filter(s => s.length > 2 && !/^(?:and|or|also|with|has|had|history\s*of)$/i.test(s));
                }
                // Inline PMH detection from full text
                const inlinePmh = [];
                const pmhPatterns = [
                    [/\b(?:htn|hypertension)\b/i, 'HTN'],
                    [/\b(?:dm\s*(?:type\s*)?2|dm2|type\s*2\s*diabetes|diabetes\s*(?:mellitus)?)\b/i, 'DM2'],
                    [/\b(?:dm\s*(?:type\s*)?1|type\s*1\s*diabetes)\b/i, 'DM1'],
                    [/\bcopd\b/i, 'COPD'],
                    [/\b(?:chf|(?:congestive\s*)?heart\s*failure)\b/i, 'CHF'],
                    [/\b(?:cad|coronary\s*artery\s*disease)\b/i, 'CAD'],
                    [/\b(?:ckd|chronic\s*kidney\s*disease)\b/i, 'CKD'],
                    [/\b(?:afib|atrial\s*fib(?:rillation)?)\b/i, 'Afib'],
                    [/\b(?:hld|hyperlipidemia|high\s*cholesterol)\b/i, 'HLD'],
                    [/\b(?:obesity|obese|morbidly\s*obese)\b/i, 'Obesity'],
                    [/\basthma\b/i, 'Asthma'],
                    [/\b(?:cirrhosis|liver\s*disease|hepatitis)\b/i, 'Cirrhosis'],
                    [/\b(?:gerd|reflux|acid\s*reflux)\b/i, 'GERD'],
                    [/\b(?:pvd|peripheral\s*(?:vascular|arterial)\s*disease|pad)\b/i, 'PVD'],
                    [/\b(?:dvt|deep\s*vein\s*thrombosis)\b/i, 'Hx DVT'],
                    [/\b(?:pe\b.*\bembolism|pulmonary\s*embolism)\b/i, 'Hx PE'],
                    [/\b(?:hypothyroid|hypothyroidism)\b/i, 'Hypothyroidism'],
                    [/\b(?:hyperthyroid|hyperthyroidism|graves)\b/i, 'Hyperthyroidism'],
                    [/\b(?:seizure\s*disorder|epilepsy)\b/i, 'Seizure disorder'],
                    [/\b(?:stroke|cva)\b/i, 'Hx CVA'],
                    [/\b(?:anxiety)\b/i, 'Anxiety'],
                    [/\b(?:depression)\b/i, 'Depression'],
                    [/\b(?:osa|sleep\s*apnea)\b/i, 'OSA'],
                    [/\b(?:esrd|end\s*stage\s*renal)\b/i, 'ESRD'],
                    [/\b(?:cancer|carcinoma|malignancy|lymphoma|leukemia|melanoma)\b/i, 'Cancer']
                ];
                for (const [pat, label] of pmhPatterns) {
                    if (pat.test(lower) && !hp.pmh.some(e => e.toLowerCase().includes(label.toLowerCase()))) {
                        inlinePmh.push(label);
                    }
                }
                hp.pmh = [...hp.pmh, ...inlinePmh];

                // ---- PSH ----
                if (sectionTexts.psh.length > 0) {
                    const pshText = sectionTexts.psh.join(' ');
                    hp.psh = pshText.split(/[,;.]/).map(s => s.trim()).filter(s => s.length > 2 && !/^(?:and|or|also|with|had|has|denies)$/i.test(s));
                }
                // Inline surgical history
                const surgPatterns = [
                    [/\b(?:appendectomy)\b/i, 'Appendectomy'],
                    [/\b(?:cholecystectomy)\b/i, 'Cholecystectomy'],
                    [/\b(?:c-?section|cesarean)\b/i, 'C-section'],
                    [/\b(?:hysterectomy)\b/i, 'Hysterectomy'],
                    [/\b(?:colectomy|hemicolectomy)\b/i, 'Colectomy'],
                    [/\b(?:hernia\s*repair|herniorrhaphy)\b/i, 'Hernia repair'],
                    [/\b(?:cabg|bypass\s*(?:surgery|graft))\b/i, 'CABG'],
                    [/\b(?:knee\s*replacement|tkr|tka)\b/i, 'TKA'],
                    [/\b(?:hip\s*replacement|thr|tha)\b/i, 'THA'],
                    [/\b(?:laminectomy|spinal\s*fusion)\b/i, 'Spine surgery']
                ];
                for (const [pat, label] of surgPatterns) {
                    if (pat.test(lower) && !hp.psh.some(e => e.toLowerCase().includes(label.toLowerCase()))) {
                        hp.psh.push(label);
                    }
                }

                // ---- MEDICATIONS ----
                if (sectionTexts.meds.length > 0) {
                    const medText = sectionTexts.meds.join(' ');
                    hp.meds = medText.split(/[,;.]/).map(s => s.trim()).filter(s => s.length > 2 && !/^(?:and|or|also|is|on|taking)$/i.test(s));
                }
                // Inline medication detection
