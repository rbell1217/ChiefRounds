        // ==================== UNIVERSAL DICTATION FIELD ====================
        // Drop-in replacement for textarea/input with built-in speech-to-text
        // Usage: <DictateField value={val} onChange={fn} rows={3} placeholder="..." />
        // Handles its own speech recognition lifecycle; debounces onBlur for Firestore-backed fields
        function DictateField({ value, onChange, onBlur, rows, placeholder, className, label, type, disabled }) {
            const [localVal, setLocalVal] = React.useState(value || '');
            const [listening, setListening] = React.useState(false);
            const [interim, setInterim] = React.useState('');
            const recRef = React.useRef(null);
            const finalRef = React.useRef(value || '');
            const dirty = React.useRef(false);

            // Sync external value changes (e.g., parent resets)
            React.useEffect(() => {
                if (!dirty.current && !listening) {
                    setLocalVal(value || '');
                    finalRef.current = value || '';
                }
            }, [value]);

            React.useEffect(() => {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SR) return;
                const rec = new SR();
                rec.continuous = true;
                rec.interimResults = true;
                rec.lang = 'en-US';
                rec.onstart = () => setListening(true);
                rec.onresult = (event) => {
                    let int = '';
                    let ft = finalRef.current;
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const t = event.results[i][0].transcript;
                        if (event.results[i].isFinal) {
                            const cleaned = cleanMedicalSpeech(t.trim());
                            ft += (ft ? ' ' : '') + cleaned;
                        } else { int += t; }
                    }
                    finalRef.current = ft;
                    setLocalVal(ft);
                    setInterim(int);
                    dirty.current = true;
                };
                rec.onerror = (e) => { if (e.error !== 'no-speech') setListening(false); };
                rec.onend = () => {
                    setListening(false);
                    setInterim('');
                    // Fire onChange with final value when dictation stops
                    if (dirty.current && onChange) {
                        onChange(finalRef.current);
                        dirty.current = false;
                    }
                };
                recRef.current = rec;
                return () => { try { rec.stop(); } catch(e) {} };
            }, []);

            const toggleDictation = () => {
                if (!recRef.current) return;
                if (listening) {
                    try { recRef.current.stop(); } catch(e) {}
                } else {
                    finalRef.current = localVal;
                    try { recRef.current.start(); } catch(e) {}
                }
            };

            const handleChange = (e) => {
                const v = e.target.value;
                setLocalVal(v);
                finalRef.current = v;
                dirty.current = true;
            };

            const handleBlur = () => {
                if (dirty.current && onChange) {
                    onChange(localVal);
                    dirty.current = false;
                }
                if (onBlur) onBlur();
            };

            const isTextarea = !type || type === 'textarea';
            const display = listening ? localVal + (interim ? ' ' + interim : '') : localVal;
            const baseClass = className || 'w-full border border-gray-200 rounded px-3 py-1.5 text-sm';
            const micAvailable = !!(window.SpeechRecognition || window.webkitSpeechRecognition);

            return (
                <div>
                    {label && (
                        <div className="flex items-center justify-between mb-1">
                            <label className="text-xs font-semibold text-gray-500">{label}</label>
                            {micAvailable && (
                                <button type="button" onClick={toggleDictation} disabled={disabled}
                                    className={`px-2 py-0.5 rounded text-[10px] font-medium transition ${
                                        listening ? 'bg-red-500 text-white animate-pulse' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'
                                    }`}>
                                    {listening ? '|| Stop' : '🎤'}
                                </button>
                            )}
                        </div>
                    )}
                    {!label && micAvailable && (
                        <div className="flex justify-end mb-0.5">
                            <button type="button" onClick={toggleDictation} disabled={disabled}
                                className={`px-2 py-0.5 rounded text-[10px] font-medium transition ${
                                    listening ? 'bg-red-500 text-white animate-pulse' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'
                                }`}>
                                {listening ? '|| Stop' : '🎤'}
                            </button>
                        </div>
                    )}
                    {isTextarea ? (
                        <textarea
                            value={display}
                            onChange={handleChange}
                            onBlur={handleBlur}
                            rows={rows || 2}
                            placeholder={placeholder}
                            className={baseClass + (listening ? ' ring-2 ring-red-300' : '')}
                            disabled={disabled || listening}
                        />
                    ) : (
                        <input
                            type={type || 'text'}
                            value={display}
                            onChange={handleChange}
                            onBlur={handleBlur}
                            placeholder={placeholder}
                            className={baseClass + (listening ? ' ring-2 ring-red-300' : '')}
                            disabled={disabled || listening}
                        />
                    )}
                </div>
            );
        }

        // ==================== GLOBAL FLOATING DICTATION BUTTON ====================
        // Adds speech-to-text to ANY focused input/textarea in the app
        function GlobalDictateButton() {
            const [listening, setListening] = React.useState(false);
            const [visible, setVisible] = React.useState(false);
            const recRef = React.useRef(null);
            const targetRef = React.useRef(null);
            const finalRef = React.useRef('');

            React.useEffect(() => {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SR) return;

                const rec = new SR();
                rec.continuous = true;
                rec.interimResults = true;
                rec.lang = 'en-US';
                rec.onstart = () => setListening(true);
                rec.onresult = (event) => {
                    if (!targetRef.current) return;
                    let ft = finalRef.current;
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const t = event.results[i][0].transcript;
                        if (event.results[i].isFinal) {
                            const cleaned = cleanMedicalSpeech(t.trim());
                            ft += (ft ? ' ' : '') + cleaned;
                        }
                    }
                    finalRef.current = ft;
                    // Update the target element natively so React picks it up
                    const nativeSetter = Object.getOwnPropertyDescriptor(
                        targetRef.current.tagName === 'TEXTAREA' ? window.HTMLTextAreaElement.prototype : window.HTMLInputElement.prototype,
                        'value'
                    ).set;
                    nativeSetter.call(targetRef.current, ft);
                    targetRef.current.dispatchEvent(new Event('input', { bubbles: true }));
                };
                rec.onerror = (e) => { if (e.error !== 'no-speech') setListening(false); };
                rec.onend = () => {
                    setListening(false);
                    // Trigger blur/change so any save-on-blur logic fires
                    if (targetRef.current) {
                        targetRef.current.dispatchEvent(new Event('change', { bubbles: true }));
                        targetRef.current.dispatchEvent(new Event('blur', { bubbles: true }));
                    }
                };
                recRef.current = rec;

                // Show button when an input/textarea is focused
                const showHandler = (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                        const type = e.target.type || 'text';
                        if (['text', 'textarea', 'search', 'url', ''].includes(type)) {
                            setVisible(true);
                        }
                    }
                };
                const hideHandler = (e) => {
                    // Small delay to allow clicking the dictate button before hiding
                    setTimeout(() => {
                        if (!listening) setVisible(false);
                    }, 200);
                };
                document.addEventListener('focusin', showHandler);
                document.addEventListener('focusout', hideHandler);
                return () => {
                    document.removeEventListener('focusin', showHandler);
                    document.removeEventListener('focusout', hideHandler);
                    try { rec.stop(); } catch(e) {}
                };
            }, [listening]);

            const toggle = () => {
                if (!recRef.current) return;
                if (listening) {
                    try { recRef.current.stop(); } catch(e) {}
                } else {
                    // Capture the currently focused element
                    const active = document.activeElement;
                    if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) {
                        targetRef.current = active;
                        finalRef.current = active.value || '';
                        try { recRef.current.start(); } catch(e) {}
                    }
                }
            };

            if (!visible && !listening) return null;
            const hasSR = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
            if (!hasSR) return null;

            return (
                <button
                    onMouseDown={(e) => { e.preventDefault(); toggle(); }}
                    className={`fixed z-40 right-4 bottom-24 md:bottom-8 w-12 h-12 rounded-full shadow-lg flex items-center justify-center text-xl transition-all ${
                        listening ? 'bg-red-500 text-white animate-pulse scale-110' : 'bg-medical-600 text-white hover:bg-medical-700'
                    }`}
                    title={listening ? 'Stop dictation' : 'Dictate to focused field'}
                >
                    {listening ? '||' : '🎤'}
                </button>
            );
        }

        // ==================== PATIENT TRACKER COMPONENT ====================
        function PatientTracker() {
            const [patients, setPatients] = React.useState([]);
            const [labs, setLabs] = React.useState([]);
            const [outputs, setOutputs] = React.useState([]);
            const [showPatientForm, setShowPatientForm] = React.useState(false);
            const [editingPatient, setEditingPatient] = React.useState(null);
            const [showLabForm, setShowLabForm] = React.useState(false);
            const [showOutputForm, setShowOutputForm] = React.useState(false);
            const [selectedPatientForLab, setSelectedPatientForLab] = React.useState(null);
            const [selectedPatientForOutput, setSelectedPatientForOutput] = React.useState(null);
            const [searchQuery, setSearchQuery] = React.useState('');
            const [sortBy, setSortBy] = React.useState('room');
            const [expandedPatient, setExpandedPatient] = React.useState(null);
            const [showQuickAdd, setShowQuickAdd] = React.useState(false);
            const [editingDateId, setEditingDateId] = React.useState(null);
            const [viewMode, setViewMode] = React.useState('list'); // 'list' or 'timeline'
            const [timelinePatientId, setTimelinePatientId] = React.useState(null);
            const [editingConcernId, setEditingConcernId] = React.useState(null);
            const [concernDraft, setConcernDraft] = React.useState('');
            const [editingRoundsField, setEditingRoundsField] = React.useState(null);
            const [roundsFieldDraft, setRoundsFieldDraft] = React.useState('');
            const quickDictation = useDictation();

            const saveRoundsField = async (patientId, fieldName) => {
                const patient = patients.find(p => p.id === patientId);
                if (!patient) return;
                const today = getTodayISO();
                const roundsHistory = patient.roundsHistory || {};
                const todayEntry = roundsHistory[today] || {};
                const parsed = todayEntry.parsed || todayEntry;
                parsed[fieldName] = roundsFieldDraft;

                // Rebuild summary to reflect updated fields
                const sp = [];
                if (parsed.subjective) sp.push('S: ' + parsed.subjective);
                if (parsed.vitals) sp.push('Vitals: ' + parsed.vitals);
                if (parsed.labNotes) sp.push('Labs: ' + parsed.labNotes);
                if (parsed.examFindings) sp.push('Exam: ' + parsed.examFindings);
                if (parsed.assessment) sp.push('A: ' + parsed.assessment);
                if (parsed.plan) sp.push('P: ' + parsed.plan);
                if ((parsed.orders || []).length > 0) sp.push('Orders: ' + parsed.orders.join(', '));
                if (parsed.diet) sp.push('Diet: ' + parsed.diet);
                if (parsed.activity) sp.push('Activity: ' + parsed.activity);
                if (parsed.disposition) sp.push('Dispo: ' + parsed.disposition);
                if (parsed.concerns) sp.push('Concerns: ' + parsed.concerns);
                if (sp.length > 0) parsed.summary = sp.join(' | ');

                if (todayEntry.parsed) {
                    roundsHistory[today] = { ...todayEntry, parsed };
                } else {
                    roundsHistory[today] = { ...todayEntry, ...parsed };
                }
                // Also update the patient-level field
                const patientFieldMap = { subjective: null, plan: 'treatmentPlan', examFindings: 'examFindings' };
                const updates = { ...patient, roundsHistory };
                if (patientFieldMap[fieldName]) {
                    updates[patientFieldMap[fieldName]] = roundsFieldDraft;
                }
                await DB.put('patients', updates);
                setEditingRoundsField(null);
                setRoundsFieldDraft('');
                loadPatients();
            };

            const handleFlagChange = async (patientId, flagLevel) => {
                const patient = patients.find(p => p.id === patientId);
                if (patient) {
                    const currentFlag = patient.flagLevel || (patient.concerns ? 'warning' : 'none');
                    const newFlag = currentFlag === flagLevel ? 'none' : flagLevel;
                    await DB.put('patients', { ...patient, flagLevel: newFlag, concerns: newFlag === 'none' ? '' : (patient.concerns || '') });
                    loadPatients();
                    if (newFlag !== 'none' && !patient.concerns) {
                        setEditingConcernId(patientId);
                        setConcernDraft('');
                    }
                }
            };

            const saveConcern = async (patientId) => {
                const patient = patients.find(p => p.id === patientId);
                if (patient) {
                    await DB.put('patients', { ...patient, concerns: concernDraft });
                    setEditingConcernId(null);
                    setConcernDraft('');
                    loadPatients();
                }
            };

            React.useEffect(() => {
                DB.init().then(() => loadPatients());
            }, []);

            const handleQuickDateChange = async (patientId, newDate) => {
                const patient = patients.find(p => p.id === patientId);
                if (patient && newDate) {
                    await DB.put('patients', { ...patient, admitDate: newDate });
                    setEditingDateId(null);
                    loadPatients();
                }
            };

            const loadPatients = async () => {
                const patientsData = await DB.getAll('patients');
                const active = patientsData.filter(p => p.status !== 'discharged');
                setPatients(active.sort((a, b) => {
                    if (sortBy === 'room') return parseInt(a.room) - parseInt(b.room);
                    if (sortBy === 'pod') return calculatePOD(b.admitDate) - calculatePOD(a.admitDate);
                    if (sortBy === 'flags') return (b.concerns ? 1 : 0) - (a.concerns ? 1 : 0);
                    return 0;
                }));

                const labsData = await DB.getAll('labs');
                setLabs(labsData);

                const outputsData = await DB.getAll('outputs');
                setOutputs(outputsData);
            };

            const handleSavePatient = async (patientData) => {
                try {
                    if (editingPatient?.id) {
                        await DB.put('patients', { ...patientData, id: editingPatient.id });
                        setEditingPatient(null);
                    } else {
                        await DB.add('patients', patientData);
                    }
                    setShowPatientForm(false);
                    loadPatients();
                } catch(err) {
                    console.error('Error saving patient:', err);
                    alert('Error saving patient: ' + err.message);
                }
            };

            const handleDeletePatient = async (id) => {
                if (confirm('Delete this patient?')) {
                    await DB.delete('patients', id);
                    loadPatients();
                }
            };

            const handleSaveLab = async (labData) => {
                await DB.add('labs', labData);
                setShowLabForm(false);
                setSelectedPatientForLab(null);
                loadPatients();
            };

            const handleSaveOutput = async (outputData) => {
                await DB.add('outputs', outputData);
                setShowOutputForm(false);
                setSelectedPatientForOutput(null);
                loadPatients();
            };

            const getPatientLabs = (patientId) => {
                return labs.filter(l => l.patientId === patientId).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            };

            const getPatientOutputs = (patientId) => {
                return outputs.filter(o => o.patientId === patientId).sort((a, b) => new Date(b.date) - new Date(a.date));
            };

            const getOutputRecommendations = (patientId) => {
                const patientOutputs = getPatientOutputs(patientId);
                const recommendations = [];

                const ngOutputs = patientOutputs.filter(o => o.type === 'NG Tube');
                if (ngOutputs.length >= 2) {
                    const recentTotal = ngOutputs.slice(0, 2).reduce((sum, o) => sum + o.amount, 0);
                    if (recentTotal < 200) recommendations.push('NG output <200mL/day → Consider clamp trial');
                    if (recentTotal < 100) recommendations.push('NG output <100mL/day → Consider removal');
                }

                const chestOutputs = patientOutputs.filter(o => o.type === 'Chest Tube');
                if (chestOutputs.length > 0 && chestOutputs[0].amount < 150) {
                    recommendations.push('Chest tube output <150mL/day → Consider removal');
                }

                const jpOutputs = patientOutputs.filter(o => o.type === 'JP Drain');
                if (jpOutputs.length > 0 && jpOutputs[0].amount < 30) {
                    recommendations.push('JP drain output <30mL/day → Consider removal');
                }

                return recommendations;
            };

            const handleQuickAddPatient = async (transcript) => {
                const parsed = parseSpeechCommand(transcript);
                if (!parsed.room) {
                    alert('Could not detect a room number. Please include "room" followed by the number.');
                    return;
                }
                const patientData = {
                    room: parsed.room || '',
                    diagnosis: parsed.diagnosis || '',
                    problems: parsed.problems ? (typeof parsed.problems === 'string' ? parsed.problems.split(',').map(p => p.trim()) : parsed.problems) : [],
                    procedures: parsed.procedures ? (typeof parsed.procedures === 'string' ? parsed.procedures.split(',').map(p => p.trim()) : parsed.procedures) : [],
                    treatmentPlan: parsed.treatmentPlan || '',
                    diet: parsed.diet || 'Regular',
                    activity: parsed.activity || 'Ambulate TID',
                    dvtProphylaxis: parsed.dvtProphylaxis || 'Heparin 5000 TID',
                    giProphylaxis: parsed.giProphylaxis || 'Pantoprazole',
                    dispositionPlan: parsed.dispositionPlan || '',
                    concerns: parsed.concerns || '',
                    codeStatus: parsed.codeStatus || 'Full Code',
                    admitDate: getTodayISO(),
                    status: 'active'
                };
                await DB.add('patients', patientData);
                quickDictation.clear();
                setShowQuickAdd(false);
                loadPatients();
            };

            const filteredPatients = patients.filter(p =>
                String(p.room || '').toLowerCase().includes(searchQuery.toLowerCase()) ||
                String(p.diagnosis || '').toLowerCase().includes(searchQuery.toLowerCase())
            );

            const sortedPatients = [...filteredPatients].sort((a, b) => {
                // Trauma patients always on top
                if (a.isTrauma && !b.isTrauma) return -1;
                if (!a.isTrauma && b.isTrauma) return 1;
                // Within each group, sort by selected criteria
                if (sortBy === 'room') return parseInt(a.room) - parseInt(b.room);
                if (sortBy === 'pod') return calculatePOD(b.admitDate) - calculatePOD(a.admitDate);
                if (sortBy === 'flags') return (b.concerns ? 1 : 0) - (a.concerns ? 1 : 0);
                return 0;
            });

            return (
                <div className="pb-24 md:pb-4">
                    {/* Search and Sort */}
                    <div className="sticky top-0 bg-white border-b border-gray-200 p-3 space-y-2 z-10">
                        <input
                            type="text"
                            placeholder="Search by room or diagnosis..."
                            value={searchQuery}
                            onChange={(e) => setSearchQuery(e.target.value)}
                            className="w-full bg-gray-50 border border-gray-300 rounded px-3 py-2 text-gray-800 text-sm"
                        />
                        <div className="flex gap-2 text-sm">
                            <select
                                value={sortBy}
                                onChange={(e) => setSortBy(e.target.value)}
                                className="flex-1 bg-gray-50 border border-gray-300 rounded px-2 py-1 text-gray-800"
                            >
                                <option value="room">Sort by Room</option>
                                <option value="pod">Sort by POD</option>
                                <option value="flags">Red Flags First</option>
                            </select>
                            <button
                                onClick={() => setShowQuickAdd(!showQuickAdd)}
                                className={`px-3 py-1 rounded font-medium transition ${
                                    showQuickAdd ? 'bg-red-500 hover:bg-red-600' : 'bg-emerald-600 hover:bg-emerald-700'
                                }`}
                            >
                                {showQuickAdd ? '✕ Close' : '🎤 Dictate'}
                            </button>
                            <button
                                onClick={() => {
                                    setEditingPatient(null);
                                    setShowPatientForm(true);
                                }}
                                className="bg-medical-600 text-white hover:bg-medical-700 text-white px-3 py-1 rounded font-medium"
                            >
                                + Form
                            </button>
                        </div>
                    </div>

                    {/* View Toggle */}
                    <div className="flex gap-1 px-3 pt-2">
                        <button onClick={() => setViewMode('list')}
                            className={`px-3 py-1 rounded text-xs font-medium transition ${viewMode === 'list' ? 'bg-medical-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                            Patient List
                        </button>
                        <button onClick={() => setViewMode('timeline')}
                            className={`px-3 py-1 rounded text-xs font-medium transition ${viewMode === 'timeline' ? 'bg-medical-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                            Timeline
                        </button>
                    </div>

                    {/* Quick Add by Dictation */}
                    {showQuickAdd && (
                        <div className="mx-3 mt-3 bg-white border-2 border-emerald-500/40 rounded-xl p-4 shadow-lg shadow-emerald-500/10">
                            <p className="text-sm text-gray-600 mb-1 font-medium">Quick Add Patient by Voice</p>
                            <p className="text-xs text-gray-400 mb-3">Say something like: "Room 512 diagnosis s/p lap chole diet clears activity ambulate heparin prophylaxis plan advance diet discharge home concern wound redness"</p>
                            <DictationBar dictation={quickDictation} onParse={handleQuickAddPatient} parseLabel="Save Patient" />
                        </div>
                    )}

                    {/* Timeline View */}
                    {viewMode === 'timeline' && (
                        <div className="p-3 space-y-4">
                            {timelinePatientId ? (() => {
                                const patient = patients.find(p => p.id === timelinePatientId);
                                if (!patient) return null;
                                const patientLabs = labs.filter(l => l.patientId === patient.id);
                                const patientOutputs = outputs.filter(o => o.patientId === patient.id);

                                                <div className="mt-2">
                                                    <p className="text-xs font-semibold text-gray-500">Antibiotics:</p>

                                                            {abx.name} {abx.startDate ? `(Day ${calculatePOD(abx.startDate)})` : ''}
                                                        </span>
                                                    ))}
                                                </div>
                                            )}
                                        </div>

                                        {/* Lab trend charts as text */}
                                        {(() => {
                                            const trends = getLabTrends(patient.id, labs);

                                                <div className="space-y-3">
                                                    <h4 className="text-sm font-bold text-gray-700">Lab Trends</h4>
                                                    {trends.map((t, i) => (
                                                        <div key={i} className="bg-white border border-gray-100 rounded-xl p-3">
                                                            <div className="flex justify-between items-center mb-1">
                                                                <span className={`text-sm font-bold ${t.isAbnormal ? 'text-red-600' : 'text-gray-700'}`}>{t.type}</span>

                                                                {t.values.map((v, vi) => {
                                                                    const range = LAB_RANGES[t.type];
                                                                    const abnormal = range && (v.value < range.min || v.value > range.max);
                                                                    return (
                                                                        <div key={vi} className="text-center flex-shrink-0">
                                                                            <div className={`text-xs font-mono px-2 py-1 rounded ${abnormal ? 'bg-red-100 text-red-700' : 'bg-gray-50 text-gray-700'}`}>
                                                                                {v.value}
                                                                            </div>
                                                                            <div className="text-xs text-gray-400 mt-0.5">{v.date ? v.date.substring(5, 10).replace('-', '/') : ''}</div>
                                                                            {vi < t.values.length - 1 && <span className="text-gray-300 text-xs">→</span>}
                                                                        </div>
                                                                    );
                                                                })}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            );
                                        })()}

                                        {/* Day-by-day timeline */}
                                        {dates.length > 0 && (
                                            <div className="mt-4">
                                                <h4 className="text-sm font-bold text-gray-700 mb-2">Daily Lab History</h4>
                                                {dates.map(date => {
                                                    const dayLabs = labsByDate[date];
                                                    const dayPod = calculatePOD(patient.admitDate) - calculatePOD(date + 'T00:00:00');
                                                    return (
                                                        <div key={date} className="bg-white border-l-4 border-medical-400 rounded-r-lg p-3 mb-2">
                                                            <div className="text-xs font-bold text-medical-600 mb-1">{date.substring(5).replace('-', '/')} (POD {calculatePOD(patient.admitDate) - Math.floor((new Date(getTodayISO()) - new Date(date)) / 86400000)})</div>
                                                            <div className="flex flex-wrap gap-2">
                                                                {dayLabs.map((l, li) => {
                                                                    const abnormal = isLabAbnormal(l.type, l.value);
                                                                    return (
                                                                        <span key={li} className={`text-xs px-2 py-0.5 rounded ${abnormal ? 'bg-red-100 text-red-700 font-bold' : 'bg-gray-50 text-gray-600'}`}>

                                                                        </span>
                                                                    );
                                                                })}
                                                            </div>
                                                        </div>
                                                    );

                                            </div>

                                                        <div className="flex flex-wrap gap-1 mt-1">

                                            </div>
                                        </div>

                                                    <span key={i} className="text-xs bg-purple-50 text-purple-700 px-2 py-1 rounded">{p}</span>

                                            </div>

                                            <p className="text-sm text-gray-700">{patient.examFindings}</p>

                                            <p className="text-xs font-semibold text-gray-500 uppercase">Plan:</p>
                                            <p className="text-sm text-gray-700">{patient.treatmentPlan}</p>
                                        </div>

                                    {/* Antibiotics */}
                                    {(() => {
                                        const abxList = patient.antibiotics || [];

                                            <div className="mb-2">

                                                    <p className="text-xs font-semibold text-gray-500 uppercase">Antibiotics:</p>

                                                    <div className="space-y-1 mt-1">
                                                        {abxList.map((abx, i) => {
                                                            const dayCount = abx.startDate ? calculatePOD(abx.startDate) : 0;

                                                                <div key={i} className={`text-xs px-2 py-1 rounded flex items-center justify-between ${isStopped ? 'bg-gray-100 text-gray-400 line-through' : 'bg-amber-50 text-amber-800 border border-amber-200'}`}>

                                                            { key: 'watch', label: 'Watch', active: 'bg-amber-500 text-white', inactive: 'bg-amber-50 text-amber-600 border border-amber-200 hover:bg-amber-100' },

                                                            { key: 'critical', label: 'Critical', active: 'bg-red-600 text-white', inactive: 'bg-red-50 text-red-600 border border-red-200 hover:bg-red-100' }

                                                                {flag.label}
                                                            </button>

                                                            onKeyDown={(e) => { if (e.key === 'Enter') saveConcern(patient.id); if (e.key === 'Escape') setEditingConcernId(null); }}
                                                            placeholder="What's the concern?"
                                                            autoFocus onClick={(e) => e.stopPropagation()}
                                                            className="flex-1 text-xs bg-white border border-gray-300 rounded px-2 py-1 text-gray-800" />
                                                        <button onClick={(e) => { e.stopPropagation(); saveConcern(patient.id); }} className="text-xs bg-medical-600 text-white px-2 py-1 rounded">Save</button>

                                                                <span>{flag.text}</span>
                                                            </div>

                                                    </div>

                                            </div>

                                    {/* Lab Trends - always visible */}
                                    {(() => {

                                                            {t.type} {t.previous} {t.arrow} {t.current} {t.unit}

                                            <span className="text-gray-500">Activity:</span> {patient.activity}

                                                            </div>

                                                    </div>
                                                );

                                                    p.concerns || p.disposition || p.dvtProphylaxis || p.giProphylaxis ||

        // ==================== ATTENDING VIEW COMPONENT ====================
        function AttendingView() {
            const [patients, setPatients] = React.useState([]);
            const [labs, setLabs] = React.useState([]);
            const [outputs, setOutputs] = React.useState([]);
            const [presentMode, setPresentMode] = React.useState(false);
            const [lastRefresh, setLastRefresh] = React.useState(new Date());

            React.useEffect(() => {
                loadData();
            }, []);

            const loadData = async () => {
                const patientsData = await DB.getAll('patients');
                const labsData = await DB.getAll('labs');
                const outputsData = await DB.getAll('outputs');

                // Filter out discharged, sort: red flags first, then by room
                const sorted = patientsData.filter(p => p.status !== 'discharged').sort((a, b) => {
                    if ((b.concerns ? 1 : 0) !== (a.concerns ? 1 : 0)) {
                        return (b.concerns ? 1 : 0) - (a.concerns ? 1 : 0);
                    }
                    return parseInt(a.room) - parseInt(b.room);
                });

                setPatients(sorted);
                setLabs(labsData);
                setOutputs(outputsData);
                setLastRefresh(new Date());
            };

            const getPatientLabs = (patientId) => {
                return labs.filter(l => l.patientId === patientId)
                    .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            };

            const getPatientOutputs = (patientId) => {
                return outputs.filter(o => o.patientId === patientId)
                    .sort((a, b) => new Date(b.date) - new Date(a.date));
            };

            const [copySuccess, setCopySuccess] = React.useState(false);

            const exportText = () => {
                let text = `CHIEFROUNDS SIGN-OUT\n${getCurrentDateTime()}\n`;
                text += '━'.repeat(30) + '\n\n';

                patients.forEach((patient) => {
                    const procText = patient.procedures?.length > 0 ? ` s/p ${patient.procedures.join(', ')}` : '';
                    text += `Rm ${patient.room} | ${patient.diagnosis}${procText} | POD#${calculatePOD(patient.admitDate)} | ${patient.codeStatus}\n`;

                    if (patient.problems?.length > 0) {
                        text += 'Problems:\n';
                        patient.problems.forEach(p => { text += `  - ${p}\n`; });
                    }

                    if (patient.treatmentPlan) {
                        text += `Plan: ${patient.treatmentPlan}\n`;
                    }

                    text += `Diet: ${patient.diet} | Activity: ${patient.activity}\n`;
                    text += `DVT: ${patient.dvtProphylaxis} | GI: ${patient.giProphylaxis}\n`;

                    const patientLabs = getPatientLabs(patient.id).slice(0, 5);
                    if (patientLabs.length > 0) {
                        text += 'Labs: ';
                        text += patientLabs.map(lab => {
                            const range = LAB_RANGES[lab.type];
                            const flag = isLabAbnormal(lab.type, lab.value) ? '*' : '';
                            return `${lab.type} ${lab.value}${flag}`;
                        }).join(', ') + '\n';
                    }

                    const patientOutputs = getPatientOutputs(patient.id).slice(0, 3);
                    if (patientOutputs.length > 0) {
                        text += 'I/O: ';
                        text += patientOutputs.map(o => `${o.type} ${o.amount}mL`).join(', ') + '\n';
                    }

                    if (patient.concerns) {
                        text += `⚠ CONCERNS: ${patient.concerns}\n`;
                    }

                    if (patient.dispositionPlan) {
                        text += `Dispo: ${patient.dispositionPlan}\n`;
                    }

                    text += '\n';
                });

                text += '━'.repeat(30) + '\n';
                text += `${patients.length} patient(s) | *abnormal lab`;

                navigator.clipboard.writeText(text).then(() => {
                    setCopySuccess(true);
                    setTimeout(() => setCopySuccess(false), 2500);
                }).catch(() => {
                    // Fallback for mobile browsers
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    ta.style.position = 'fixed';
                    ta.style.left = '-9999px';
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    setCopySuccess(true);
                    setTimeout(() => setCopySuccess(false), 2500);
                });
            };

            const exportPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('p', 'mm', 'a4');
                let yPos = 20;
                const pageHeight = doc.internal.pageSize.height;
                const margin = 15;
                const lineHeight = 5;

                doc.setFontSize(14);
                doc.text('ChiefRounds Patient Sign-Out', margin, yPos);
                yPos += 8;

                doc.setFontSize(9);
                doc.text(`Generated: ${getCurrentDateTime()}`, margin, yPos);
                yPos += 6;

                patients.forEach((patient) => {
                    if (yPos > pageHeight - 20) {
                        doc.addPage();
                        yPos = 20;
                    }

                    doc.setFontSize(11);
                    doc.setTextColor(100, 165, 233);
                    const pdfProc = patient.procedures?.length > 0 ? ` s/p ${patient.procedures.join(', ')}` : '';
                    doc.text(`Room ${patient.room} | ${patient.diagnosis}${pdfProc} | POD ${calculatePOD(patient.admitDate)} | ${patient.codeStatus}`, margin, yPos);
                    yPos += 6;

                    doc.setTextColor(200, 200, 200);
                    doc.setFontSize(9);

                    if (patient.problems?.length > 0) {
                        doc.text('Problems:', margin, yPos);
                        yPos += 4;
                        patient.problems.forEach(p => {
                            doc.text(`• ${p}`, margin + 2, yPos);
                            yPos += 4;
                        });
                    }

                    if (patient.examFindings) {
                        doc.text('Exam: ' + patient.examFindings, margin, yPos, { maxWidth: 180 });
                        yPos += doc.getTextDimensions(patient.examFindings).h + 4;
                    }

                    if (patient.treatmentPlan) {
                        doc.text('Plan: ' + patient.treatmentPlan, margin, yPos, { maxWidth: 180 });
                        yPos += doc.getTextDimensions(patient.treatmentPlan).h + 4;
                    }

                    doc.text(`Diet: ${patient.diet} | Activity: ${patient.activity}`, margin, yPos);
                    yPos += 4;
                    doc.text(`DVT: ${patient.dvtProphylaxis} | GI: ${patient.giProphylaxis}`, margin, yPos);
                    yPos += 6;

                    const patientLabs = getPatientLabs(patient.id).slice(0, 3);
                    if (patientLabs.length > 0) {
                        doc.text('Recent Labs:', margin, yPos);
                        yPos += 4;
                        patientLabs.forEach(lab => {
                            const range = LAB_RANGES[lab.type];
                            doc.text(`${lab.type}: ${lab.value} ${range?.unit}`, margin + 2, yPos);
                            yPos += 4;
                        });
                    }

                    if (patient.concerns) {
                        doc.setTextColor(239, 68, 68);
                        doc.text(`CONCERNS: ${patient.concerns}`, margin, yPos, { maxWidth: 180 });
                        doc.setTextColor(200, 200, 200);
                        yPos += doc.getTextDimensions(patient.concerns).h + 4;
                    }

                    yPos += 4;
                });

                doc.save('ChiefRounds_SignOut.pdf');
            };

            if (presentMode) {
                return (
                    <div className="fixed inset-0 bg-slate-50 z-50 overflow-y-auto">
                        {/* Exit button in its own row at top, not overlapping content */}
                        <div className="sticky top-0 bg-slate-50/95 backdrop-blur-sm p-3 flex justify-end z-50 border-b border-gray-200">
                            <button
                                onClick={() => setPresentMode(false)}
                                className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded font-bold text-sm"
                            >
                                Exit Present
                            </button>
                        </div>

                        <div className="space-y-6 p-4 pb-20">
                            {[...patients].sort((a, b) => {
                                if (a.isTrauma && !b.isTrauma) return -1;
                                if (!a.isTrauma && b.isTrauma) return 1;
                                return parseInt(a.room) - parseInt(b.room);
                            }).map((patient) => (
                                <div key={patient.id} className={`border-l-4 ${patient.isTrauma ? 'border-red-500' : 'border-medical-500'} pl-5 pr-2`}>
                                    {/* Header: Room and Code Status */}
                                    <div className={`text-xl font-bold ${patient.isTrauma ? 'text-red-600' : 'text-medical-600'} mb-1`}>
                                        Room {patient.room} {patient.isTrauma && <span className="text-xs bg-red-500 text-white px-2 py-0.5 rounded ml-2">{patient.traumaLevel || 'TRAUMA'}</span>} | {patient.codeStatus}
                                    </div>

                                    {/* Diagnosis s/p Procedure - combined on one line */}
                                    <div className="text-2xl font-bold text-gray-800 leading-snug">
                                        {patient.diagnosis}{patient.procedures?.length > 0 ? ` s/p ${patient.procedures.join(', ')}` : ''}
                                    </div>
                                    <div className="text-lg text-gray-500 font-medium mt-0.5">
                                        POD {calculatePOD(patient.admitDate)}
                                    </div>

                                    {/* PMH */}
                                    {patient.pmh?.length > 0 && (
                                        <div className="mt-2 text-base">
                                            <span className="font-semibold text-gray-500">PMH:</span>{' '}
                                            <span className="text-gray-600">{patient.pmh.join(', ')}</span>
                                        </div>
                                    )}
                                    {/* PSH */}
                                    {patient.psh?.length > 0 && (
                                        <div className="mt-1 text-base">
                                            <span className="font-semibold text-gray-500">PSH:</span>{' '}
                                            <span className="text-gray-600">{patient.psh.join(', ')}</span>
                                        </div>
                                    )}
                                    {/* Home Meds */}
                                    {patient.homeMeds?.length > 0 && (
                                        <div className="mt-1 text-base">
                                            <span className="font-semibold text-gray-500">Home Meds:</span>{' '}
                                            <span className="text-gray-600">{patient.homeMeds.join(', ')}</span>
                                        </div>
                                    )}
                                    {/* Allergies */}
                                    {patient.allergies?.length > 0 && (
                                        <div className="mt-1 text-base">
                                            <span className="font-semibold text-red-500">Allergies:</span>{' '}
                                            <span className="text-red-600 font-medium">{patient.allergies.join(', ')}</span>
                                        </div>
                                    )}

                                    {/* Active Problems */}
                                    {patient.problems?.length > 0 && (
                                        <div className="mt-3 text-lg">
                                            <div className="font-semibold text-gray-700">Active Problems:</div>
                                            {(Array.isArray(patient.problems) ? patient.problems : []).map((p, i) => (
                                                <div key={i} className="text-gray-600 ml-2">- {p}</div>
                                            ))}
                                        </div>
                                    )}

                                    {/* Exam Findings */}
                                    {patient.examFindings && (
                                        <div className="mt-3 text-lg">
                                            <div className="font-semibold text-gray-700">Exam:</div>
                                            <div className="text-gray-600">{patient.examFindings}</div>
                                        </div>
                                    )}

                                    {/* Pre-Round Summary */}
                                    {(() => {
                                        const todayPR = patient.preRoundHistory?.[getTodayISO()];
                                        if (!todayPR?.sections || Object.keys(todayPR.sections).length === 0) return null;
                                        const labels = { vitals: 'Vitals', ios: 'I/Os', labs: 'Labs', overnight: 'Overnight', lines: 'Lines', meds: 'Meds', pain: 'Pain', plan: 'Plan' };
                                        return (
                                            <div className="mt-3 text-base bg-indigo-50 rounded-lg p-3">
                                                <div className="font-semibold text-indigo-700 mb-1">Pre-Round Summary:</div>
                                                {Object.entries(todayPR.sections).map(([key, note]) => (
                                                    <div key={key} className="text-gray-600">
                                                        <span className="font-medium text-indigo-600">{labels[key] || key}:</span> {note}
                                                    </div>
                                                ))}
                                            </div>
                                        );
                                    })()}

        // ==================== TEAM TASKS COMPONENT ====================
        // ==================== QUICK TASK PANEL ====================
        function QuickTaskPanel({ patientId, tasks, quickTaskGroups, onSave }) {
            const [expanded, setExpanded] = React.useState(true);
            const [expandedGroup, setExpandedGroup] = React.useState('Common');

            const allPatientTasks = tasks.filter(t => t.patientId === patientId);
            const addedDescriptions = allPatientTasks.map(t => t.description);

            const totalAvailable = Object.values(quickTaskGroups).flat()
                .filter(qt => !addedDescriptions.includes(qt.description)).length;

            if (totalAvailable === 0) return null;

            const addTask = async (qt) => {
                await onSave({
                    patientId,
                    category: qt.category,
                    description: qt.description,
                    priority: 'Medium',
                    assignee: '',
                    completed: false,
                    createdAt: new Date().toISOString()
                });

            return (
                <div className="mb-3">
                    <button
                        onClick={() => setExpanded(!expanded)}
                        className="text-xs text-medical-600 font-medium mb-1.5 flex items-center gap-1"

                        <span>{expanded ? '▾' : '▸'}</span>
                        Quick Tasks ({totalAvailable})
                    </button>
                    {expanded && (
                        <div className="space-y-2">

                            <div className="flex gap-1 overflow-x-auto text-[11px]" style={{WebkitOverflowScrolling: 'touch', scrollbarWidth: 'none'}}>

                                    const available = quickTaskGroups[group].filter(qt => !addedDescriptions.includes(qt.description));
                                    if (available.length === 0) return null;
                                    return (
                                        <button
                                            key={group}
                                            onClick={() => setExpandedGroup(expandedGroup === group ? null : group)}
                                            className={`px-2 py-1 rounded-full whitespace-nowrap border transition ${
                                                expandedGroup === group
                                                    ? 'bg-medical-600 text-white border-medical-600'
                                                    : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'
                                            }`}
                                        >
                                            {group} ({available.length})
                                        </button>

                            </div>
                            {/* Tasks in selected group */}

                                <div className="flex flex-wrap gap-1.5">

        function TeamTasks({ teamData, currentUser }) {
            const [patients, setPatients] = React.useState([]);
            const [tasks, setTasks] = React.useState([]);
            const [filter, setFilter] = React.useState('All');
            const [memberFilter, setMemberFilter] = React.useState('Everyone');
            const [showTaskForm, setShowTaskForm] = React.useState(false);
            const [selectedPatientForTask, setSelectedPatientForTask] = React.useState(null);
            const [reassigningTaskId, setReassigningTaskId] = React.useState(null);
            const [expandedTaskId, setExpandedTaskId] = React.useState(null);
            const [commentText, setCommentText] = React.useState('');
            const [showHistoryFor, setShowHistoryFor] = React.useState({});
            const dictation = useDictation();
            const myName = currentUser?.displayName || currentUser?.email || '';
            const today = getTodayISO();

            // Helper: get the date portion of an ISO timestamp in Central Time
            const getTaskDate = (isoString) => {
                if (!isoString) return today;
                const d = new Date(isoString);
                const fmt = new Intl.DateTimeFormat('en-US', { timeZone: APP_TIMEZONE, year: 'numeric', month: 'numeric', day: 'numeric' }).format(d);
                const m = fmt.match(/(\d+)\/(\d+)\/(\d+)/);
                if (m) return `${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
                return today;
            };

            // Check if a task is a "carryover" (created before today, still incomplete)
            const isCarryover = (task) => {
                if (task.completed) return false;
                const taskDay = getTaskDate(task.createdAt);
                return taskDay < today;
            };

            // Split tasks for a patient into active vs history
            const getActiveTasksForPatient = (patientId) => {
                const ptTasks = tasks.filter(t => t.patientId === patientId);
                // Active = incomplete tasks (any day) + tasks completed TODAY
                return ptTasks.filter(t => {
                    if (!t.completed) return true;
                    const completedDay = getTaskDate(t.completedAt);
                    return completedDay === today;
                });
            };

            const getHistoryTasksForPatient = (patientId) => {
                const ptTasks = tasks.filter(t => t.patientId === patientId);
                // History = completed tasks from PRIOR days
                return ptTasks.filter(t => {
                    if (!t.completed) return false;
                    const completedDay = getTaskDate(t.completedAt);
                    return completedDay < today;
                });
            };

            // Group history tasks by completion date
            const groupHistoryByDate = (historyTasks) => {
                const groups = {};
                historyTasks.forEach(t => {
                    const day = getTaskDate(t.completedAt);
                    if (!groups[day]) groups[day] = [];
                    groups[day].push(t);
                });
                return Object.entries(groups).sort((a, b) => b[0].localeCompare(a[0]));
            };

            React.useEffect(() => {
                loadData();
            }, []);

            const loadData = async () => {
                const patientsData = await DB.getAll('patients');
                const tasksData = await DB.getAll('tasks');
                setPatients(patientsData.filter(p => p.status !== 'discharged').sort((a, b) => parseInt(a.room) - parseInt(b.room)));
                setTasks(tasksData);
            };

            const handleSaveTask = async (taskData) => {
                await DB.add('tasks', { ...taskData, assignedBy: currentUser?.displayName || currentUser?.email });
                setShowTaskForm(false);
                setSelectedPatientForTask(null);
                loadData();
            };

            const toggleTaskComplete = async (taskId, currentState) => {
                const task = tasks.find(t => t.id === taskId);
                if (task) {
                    await DB.put('tasks', { ...task, completed: !currentState, completedBy: !currentState ? (currentUser?.displayName || currentUser?.email) : null, completedAt: !currentState ? new Date().toISOString() : null });
                    loadData();
                }
            };

            const reassignTask = async (taskId, newAssignee) => {
                const task = tasks.find(t => t.id === taskId);
                if (task) {
                    await DB.put('tasks', { ...task, assignee: newAssignee });
                    setReassigningTaskId(null);
                    loadData();
                }
            };

            const deleteTask = async (taskId) => {
                await DB.delete('tasks', taskId);
                loadData();
            };

            const addComment = async (taskId) => {
                if (!commentText.trim()) return;
                const task = tasks.find(t => t.id === taskId);
                if (!task) return;
                const newComment = {
                    text: commentText.trim(),
                    author: currentUser?.displayName || currentUser?.email || 'Unknown',
                    timestamp: new Date().toISOString()
                };
                const comments = [...(task.comments || []), newComment];
                await DB.put('tasks', { ...task, comments });
                setCommentText('');
                loadData();
            };

            const handleQuickDictateTask = async (transcript) => {
                const parsed = parseTaskSpeech(transcript);
                if (!parsed.room) {
                    alert('Please mention a room number (e.g., "room 512...")');
                    return;
                }
                const foundPatient = patients.find(p => p.room === parsed.room);
                if (!foundPatient) {
                    alert(`Room ${parsed.room} not found`);
                    return;
                }
                await handleSaveTask({
                    patientId: foundPatient.id,
                    category: parsed.category || 'Other',
                    description: parsed.description,
                    priority: parsed.priority || 'Medium',
                    assignee: '',
                    completed: false,
                    createdAt: new Date().toISOString(),
                    assignedBy: currentUser?.displayName || currentUser?.email
                });
                dictation.clear();
            };

            // M&M Conference Timeline Export
            const exportMMTimeline = (patient) => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('p', 'mm', 'a4');
                const pageWidth = doc.internal.pageSize.getWidth();
                const margin = 15;
                const contentWidth = pageWidth - margin * 2;
                let y = margin;

                const addPage = () => { doc.addPage(); y = margin; };
                const checkPage = (needed) => { if (y + needed > 275) addPage(); };

                // Title
                doc.setFontSize(18);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(30, 41, 59);
                doc.text('M&M Conference', pageWidth / 2, y, { align: 'center' });
                y += 8;
                doc.setFontSize(10);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(100, 116, 139);
                doc.text('Hospital Course Timeline', pageWidth / 2, y, { align: 'center' });
                y += 4;
                doc.text(`Generated: ${new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`, pageWidth / 2, y, { align: 'center' });
                y += 10;

                // Patient Demographics
                doc.setDrawColor(200, 200, 200);
                doc.setFillColor(248, 250, 252);
                doc.roundedRect(margin, y, contentWidth, 28, 2, 2, 'F');
                y += 6;
                doc.setFontSize(13);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(30, 41, 59);
                doc.text(`Room ${patient.room} -- ${patient.diagnosis || 'No diagnosis'}`, margin + 4, y);
                y += 6;
                doc.setFontSize(9);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(71, 85, 105);
                const demoLine = [];
                if (patient.admitDate) demoLine.push('Admitted: ' + new Date(patient.admitDate).toLocaleDateString());
                if (patient.admitDate) demoLine.push('POD #' + calculatePOD(patient.admitDate));
                if (patient.attendingPhysician) demoLine.push('Attending: ' + patient.attendingPhysician);
                doc.text(demoLine.join('  |  '), margin + 4, y);
                y += 5;
                const demoLine2 = [];
                if (patient.codeStatus) demoLine2.push('Code: ' + patient.codeStatus);
                if (patient.allergies?.length > 0) demoLine2.push('Allergies: ' + patient.allergies.join(', '));
                if (demoLine2.length > 0) doc.text(demoLine2.join('  |  '), margin + 4, y);
                y += 12;

                // Procedures
                if (patient.procedures?.length > 0) {
                    checkPage(15);
                    doc.setFontSize(11);
                    doc.setFont('helvetica', 'bold');
                    doc.setTextColor(30, 41, 59);
                    doc.text('Procedures', margin, y);
                    y += 5;
                    doc.setFontSize(9);
                    doc.setFont('helvetica', 'normal');
                    doc.setTextColor(71, 85, 105);
                    patient.procedures.forEach(proc => {
                        checkPage(5);
                        doc.text('  ' + proc, margin, y);
                        y += 4.5;
                    });
                    y += 4;
                }

                // Problems / Complications
                if (patient.problems?.length > 0) {
                    checkPage(15);
                    doc.setFontSize(11);
                    doc.setFont('helvetica', 'bold');
                    doc.setTextColor(30, 41, 59);
                    doc.text('Problems / Complications', margin, y);
                    y += 5;
                    doc.setFontSize(9);
                    doc.setFont('helvetica', 'normal');
                    doc.setTextColor(180, 50, 50);
                    patient.problems.forEach(prob => {
                        checkPage(5);
                        doc.text('  ' + prob, margin, y);
                        y += 4.5;
                    });
                    y += 4;
                }

                // Current Status
                checkPage(30);
                doc.setFontSize(11);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(30, 41, 59);
                doc.text('Current Status', margin, y);
                y += 6;
                doc.setFontSize(9);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(71, 85, 105);
                const statusItems = [];
                if (patient.diet) statusItems.push(['Diet', patient.diet]);
                if (patient.activity) statusItems.push(['Activity', patient.activity]);
                if (patient.dvtProphylaxis) statusItems.push(['DVT Ppx', patient.dvtProphylaxis]);
                if (patient.giProphylaxis) statusItems.push(['GI Ppx', patient.giProphylaxis]);
                if (patient.vitals) statusItems.push(['Vitals', patient.vitals]);
                if (patient.labNotes) statusItems.push(['Labs', patient.labNotes]);
                if (patient.examFindings) statusItems.push(['Exam', patient.examFindings]);
                if (patient.subjective) statusItems.push(['Subjective', patient.subjective]);
                if (patient.assessment) statusItems.push(['Assessment', patient.assessment]);
                if (patient.treatmentPlan) statusItems.push(['Plan', patient.treatmentPlan]);
                if (patient.concerns) statusItems.push(['Concerns', patient.concerns]);
                if (patient.dispositionPlan) statusItems.push(['Disposition', patient.dispositionPlan]);
                statusItems.forEach(([label, val]) => {
                    checkPage(6);
                    doc.setFont('helvetica', 'bold');
                    doc.text(label + ':', margin + 2, y);
                    doc.setFont('helvetica', 'normal');
                    const lines = doc.splitTextToSize(val, contentWidth - 30);
                    doc.text(lines, margin + 28, y);
                    y += lines.length * 4 + 2;
                });
                y += 4;

                // Hospital Course Timeline from roundsHistory + preRoundHistory
                const allEvents = [];
                // Rounds history
                if (patient.roundsHistory) {
                    Object.entries(patient.roundsHistory).sort(([a],[b]) => a.localeCompare(b)).forEach(([date, data]) => {
                        const p = data.parsed || data;
                        const parts = [];
                        if (p.subjective) parts.push('S: ' + p.subjective);
                        if (p.vitals) parts.push('Vitals: ' + p.vitals);
                        if (p.labNotes) parts.push('Labs: ' + p.labNotes);
                        if (p.examFindings) parts.push('Exam: ' + p.examFindings);
                        if (p.assessment) parts.push('A: ' + p.assessment);
                        if (p.plan) parts.push('P: ' + p.plan);
                        if ((p.orders || []).length > 0) parts.push('Orders: ' + p.orders.join(', '));
                        if (p.diet) parts.push('Diet: ' + p.diet);
                        if (p.activity) parts.push('Activity: ' + p.activity);
                        if (p.concerns) parts.push('Concerns: ' + p.concerns);
                        if (parts.length > 0) {
                            allEvents.push({ date, type: 'Rounds', time: data.timestamp, text: parts.join(' | ') });
                        }
                    });
                }
                // Pre-round history
                if (patient.preRoundHistory) {
                    Object.entries(patient.preRoundHistory).sort(([a],[b]) => a.localeCompare(b)).forEach(([date, data]) => {
                        if (data.sections && Object.keys(data.sections).length > 0) {
                            const parts = Object.entries(data.sections).map(([k, v]) => k + ': ' + v);
                            allEvents.push({ date, type: 'Pre-Round', time: data.timestamp, text: parts.join(' | ') });
                        }
                    });
                }
                allEvents.sort((a, b) => {
                    const dc = a.date.localeCompare(b.date);
                    if (dc !== 0) return dc;
                    return a.type === 'Pre-Round' ? -1 : 1;
                });

                if (allEvents.length > 0) {
                    checkPage(15);
                    doc.setFontSize(11);
                    doc.setFont('helvetica', 'bold');
                    doc.setTextColor(30, 41, 59);
                    doc.text('Hospital Course Timeline', margin, y);
                    y += 2;
                    doc.setDrawColor(200, 200, 200);
                    doc.line(margin, y, margin + contentWidth, y);
                    y += 5;

                    allEvents.forEach(evt => {
                        checkPage(20);
                        // Date badge
                        const displayDate = new Date(evt.date + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                        const pod = patient.admitDate ? calculatePOD(patient.admitDate) - Math.floor((new Date(getTodayISO()) - new Date(evt.date)) / 86400000) : null;
                        doc.setFillColor(evt.type === 'Rounds' ? 220 : 224, evt.type === 'Rounds' ? 235 : 231, evt.type === 'Rounds' ? 220 : 245);
                        doc.roundedRect(margin, y - 3, 22, 6, 1, 1, 'F');
                        doc.setFontSize(7);
                        doc.setFont('helvetica', 'bold');
                        doc.setTextColor(71, 85, 105);
                        doc.text(displayDate, margin + 1, y);
                        if (pod !== null && pod >= 0) {
                            doc.setTextColor(130, 130, 130);
                            doc.text('POD ' + pod, margin + 24, y);
                        }
                        doc.setFontSize(7);
                        doc.setFont('helvetica', 'bold');
                        doc.setTextColor(evt.type === 'Rounds' ? [34, 120, 74] : [59, 78, 143]);
                        doc.text(evt.type, margin + 38, y);
                        y += 4;

                        // Event text
                        doc.setFontSize(8);
                        doc.setFont('helvetica', 'normal');
                        doc.setTextColor(71, 85, 105);
                        const lines = doc.splitTextToSize(evt.text, contentWidth - 5);
                        lines.forEach(line => {
                            checkPage(4);
                            doc.text(line, margin + 2, y);
                            y += 3.5;
                        });
                        y += 3;
                        // Separator
                        doc.setDrawColor(230, 230, 230);
                        doc.line(margin + 2, y - 1, margin + contentWidth - 2, y - 1);
                        y += 2;
                    });
                }

                // Tasks history
                const patientTasks = tasks.filter(t => t.patientId === patient.id);
                if (patientTasks.length > 0) {
                    checkPage(15);
                    doc.setFontSize(11);
                    doc.setFont('helvetica', 'bold');

        // ==================== CENSUS VIEW COMPONENT ====================
        function CensusManagement() {
            const [patients, setPatients] = React.useState([]);
            const [activeTab, setActiveTab] = React.useState('Active');
            const [sortBy, setSortBy] = React.useState('room');
            const [showTemplateModal, setShowTemplateModal] = React.useState(false);
            const [labs, setLabs] = React.useState([]);
            const dictation = useDictation();
            const [pendingAction, setPendingAction] = React.useState(null);
            const [editingDateId, setEditingDateId] = React.useState(null);
            const [editingConcernId, setEditingConcernId] = React.useState(null);
            const [concernDraft, setConcernDraft] = React.useState('');
            const [editingField, setEditingField] = React.useState(null);
            const [fieldDraft, setFieldDraft] = React.useState('');

            const saveInlineField = async (patientId, fieldName) => {
                const patient = patients.find(p => p.id === patientId);
                if (patient) {
                    await DB.put('patients', { ...patient, [fieldName]: fieldDraft });
                    setEditingField(null);
                    setFieldDraft('');
                    loadPatients();
                }
            };

            const handleQuickDateChange = async (patientId, newDate) => {
                const patient = patients.find(p => p.id === patientId);
                if (patient && newDate) {
                    await DB.put('patients', { ...patient, admitDate: newDate });
                    setEditingDateId(null);
                    loadPatients();
                }
            };

            const handleFlagChange = async (patientId, flagLevel) => {
                const patient = patients.find(p => p.id === patientId);
                if (patient) {
                    const currentFlag = patient.flagLevel || (patient.concerns ? 'warning' : 'none');
                    const newFlag = currentFlag === flagLevel ? 'none' : flagLevel;
                    await DB.put('patients', { ...patient, flagLevel: newFlag, concerns: newFlag === 'none' ? '' : (patient.concerns || '') });
                    loadPatients();
                    if (newFlag !== 'none' && !patient.concerns) {
                        setEditingConcernId(patientId);
                        setConcernDraft('');
                    }
                }
            };

            const saveConcern = async (patientId) => {
                const patient = patients.find(p => p.id === patientId);
                if (patient) {
                    await DB.put('patients', { ...patient, concerns: concernDraft });
                    setEditingConcernId(null);
                    setConcernDraft('');
                    loadPatients();
                }
            };

            React.useEffect(() => {
                DB.init().then(() => {
                    loadPatients();
                    loadLabs();
                });
            }, []);

            const loadPatients = async () => {
