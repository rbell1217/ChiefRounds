                                className="w-full bg-gray-50 border border-gray-300 rounded p-2 text-gray-800" rows={2} placeholder="Additional notes..."/>
                        </div>

                        <div className="flex gap-3 mt-4">
                            <button onClick={handleSave} className="flex-1 bg-red-500 hover:bg-red-600 text-white py-2 rounded-lg font-medium transition">
                                {editingTrauma ? 'Update' : 'Save'} Trauma
                            </button>
                            <button onClick={onClose}
                                className="px-4 py-2 bg-gray-50 hover:bg-gray-100 text-gray-600 rounded-lg transition">Cancel</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== LOGIN SCREEN ====================
        function LoginScreen({ onLogin }) {
            const [mode, setMode] = React.useState('login'); // 'login', 'signup', 'reset'
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [displayName, setDisplayName] = React.useState('');
            const [error, setError] = React.useState('');
            const [success, setSuccess] = React.useState('');
            const [loading, setLoading] = React.useState(false);

            const handleEmailLogin = async (e) => {
                e.preventDefault();
                setError('');
                setSuccess('');
                setLoading(true);
                try {
                    if (mode === 'signup') {
                        const cred = await auth.createUserWithEmailAndPassword(email, password);
                        await cred.user.updateProfile({ displayName: displayName || email.split('@')[0] });
                    } else {
                        await auth.signInWithEmailAndPassword(email, password);
                    }
                } catch (err) {
                    setError(err.message.replace('Firebase: ', ''));
                }
                setLoading(false);
            };

            const handlePasswordReset = async (e) => {
                e.preventDefault();
                if (!email.trim()) { setError('Please enter your email address.'); return; }
                setError('');
                setSuccess('');
                setLoading(true);
                try {
                    await auth.sendPasswordResetEmail(email.trim());
                    setSuccess('Password reset email sent! Check your inbox (and spam folder).');
                } catch (err) {
                    const msg = err.message.replace('Firebase: ', '');
                    if (err.code === 'auth/user-not-found') setError('No account found with that email.');
                    else setError(msg);
                }
                setLoading(false);
            };

            const handleGoogleLogin = async () => {
                setError('');
                setLoading(true);
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    // Always use popup - signInWithRedirect has known issues on
                    // iOS Safari due to Intelligent Tracking Prevention (ITP)
                    // blocking cookies across redirects
                    await auth.signInWithPopup(provider);
                } catch (err) {
                    const code = err.code || '';
                    if (code === 'auth/popup-blocked' || code === 'auth/popup-closed-by-browser') {
                        setError('Popup was blocked. Please allow popups for this site and try again.');
                    } else if (code === 'auth/unauthorized-domain') {
                        setError('This domain is not authorized for Google sign-in. Please contact the administrator.');
                    } else {
                        setError(err.message.replace('Firebase: ', ''));
                    }
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-lg p-8 w-full max-w-sm">
                        <div className="text-center mb-6">
                            <h1 className="text-3xl font-bold text-medical-700">🩺 ChiefRounds</h1>
                            <p className="text-gray-500 text-sm mt-1">Surgical Resident Tracker</p>
                        </div>

                        {error && (
                            <div className="bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg p-3 mb-4">
                                {error}
                            </div>
                        )}
                        {success && (
                            <div className="bg-green-50 border border-green-200 text-green-700 text-sm rounded-lg p-3 mb-4">
                                {success}
                            </div>
                        )}

                        {mode === 'reset' ? (
                            <div>
                                <p className="text-sm text-gray-600 mb-4">Enter your email and we'll send you a link to reset your password.</p>
                                <form onSubmit={handlePasswordReset} className="space-y-3">
                                    <input
                                        type="email"
                                        placeholder="Email address"
                                        value={email}
                                        onChange={e => setEmail(e.target.value)}
                                        required
                                        className="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-medical-500 focus:border-transparent"
                                        autoFocus
                                    />
                                    <button
                                        type="submit"
                                        disabled={loading}
                                        className="w-full bg-medical-600 text-white hover:bg-medical-700 font-semibold py-3 px-4 rounded-lg transition disabled:opacity-50"
                                    >
                                        {loading ? 'Sending...' : 'Send Reset Link'}
                                    </button>
                                </form>
                                <p className="text-center text-sm text-gray-500 mt-4">
                                    <button onClick={() => { setMode('login'); setError(''); setSuccess(''); }} className="text-medical-600 font-medium">Back to sign in</button>
                                </p>
                            </div>
                        ) : (
                            <div>
                                <button
                                    onClick={handleGoogleLogin}
                                    disabled={loading}
                                    className="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-200 hover:border-gray-300 hover:bg-gray-50 text-gray-700 font-medium py-3 px-4 rounded-lg transition mb-4"
                                >
                                    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
                                    Continue with Google
                                </button>

                                <div className="flex items-center gap-3 my-4">
                                    <div className="flex-1 h-px bg-gray-200"></div>
                                    <span className="text-xs text-gray-400 font-medium">OR</span>
                                    <div className="flex-1 h-px bg-gray-200"></div>
                                </div>

                                <form onSubmit={handleEmailLogin} className="space-y-3">
                                    {mode === 'signup' && (
                                        <input
                                            type="text"
                                            placeholder="Display name (e.g., Dr. Bell)"
                                            value={displayName}
                                            onChange={e => setDisplayName(e.target.value)}
                                            className="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-medical-500 focus:border-transparent"
                                        />
                                    )}
                                    <input
                                        type="email"
                                        placeholder="Email address"
                                        value={email}
                                        onChange={e => setEmail(e.target.value)}
                                        required
                                        className="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-medical-500 focus:border-transparent"
                                    />
                                    <input
                                        type="password"
                                        placeholder="Password"
                                        value={password}
                                        onChange={e => setPassword(e.target.value)}
                                        required

        // ==================== TEAM SETUP ====================
        function TeamSetup({ user, onTeamReady }) {
            const [mode, setMode] = React.useState(null); // null, 'create', 'join'
            const [teamName, setTeamName] = React.useState('');
            const [customCode, setCustomCode] = React.useState('');
            const [joinCode, setJoinCode] = React.useState('');
            const [error, setError] = React.useState('');
            const [loading, setLoading] = React.useState(false);

            const generateCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();

            const handleCreate = async () => {
                if (!teamName.trim()) return;
                setLoading(true);
                setError('');
                try {
                    const code = customCode.trim().length >= 4 ? customCode.trim().toUpperCase() : generateCode();
                    const teamRef = await db.collection('teams').add({
                        name: teamName.trim(),
                        inviteCode: code,
                        createdBy: user.uid,
                        createdAt: new Date().toISOString(),
                        members: [{ uid: user.uid, name: user.displayName || user.email, email: user.email, role: 'admin' }]
                    });
                    await db.collection('users').doc(user.uid).set({
                        email: user.email,
                        displayName: user.displayName || user.email.split('@')[0],
                        teamId: teamRef.id,
                        teamIds: firebase.firestore.FieldValue.arrayUnion(teamRef.id),
                        role: 'admin'
                    }, { merge: true });
                    onTeamReady(teamRef.id);
                } catch (err) {
                    setError(err.message);
                }
                setLoading(false);
            };

            const handleJoin = async () => {
                if (!joinCode.trim()) return;
                setLoading(true);
                setError('');
                try {
                    const snap = await db.collection('teams').where('inviteCode', '==', joinCode.trim().toUpperCase()).get();
                    if (snap.empty) {
                        setError('Invalid invite code. Please check and try again.');
                        setLoading(false);
                        return;
                    }
                    const teamDoc = snap.docs[0];
                    const teamData = teamDoc.data();
                    const alreadyMember = teamData.members?.some(m => m.uid === user.uid);
                    if (!alreadyMember) {
                        await teamDoc.ref.update({
                            members: firebase.firestore.FieldValue.arrayUnion({
                                uid: user.uid,
                                name: user.displayName || user.email,
                                email: user.email,
                                role: 'member'
                            })
                        });
                    }
                    await db.collection('users').doc(user.uid).set({
                        email: user.email,
                        displayName: user.displayName || user.email.split('@')[0],
                        teamId: teamDoc.id,
                        teamIds: firebase.firestore.FieldValue.arrayUnion(teamDoc.id),
                        role: 'member'
                    }, { merge: true });
                    onTeamReady(teamDoc.id);
                } catch (err) {
                    setError(err.message);
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-lg p-8 w-full max-w-sm">
                        <div className="text-center mb-6">
                            <h1 className="text-2xl font-bold text-medical-700">🩺 Welcome!</h1>
                            <p className="text-gray-500 text-sm mt-1">Hi {user.displayName || user.email}. Set up your team to get started.</p>
                        </div>

                        {error && (
                            <div className="bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg p-3 mb-4">{error}</div>
                        )}

                        {!mode && (
                            <div className="space-y-3">
                                <button onClick={() => setMode('create')} className="w-full bg-medical-600 text-white hover:bg-medical-700 font-semibold py-3 px-4 rounded-lg transition">
                                    Create a New Team
                                </button>
                                <button onClick={() => setMode('join')} className="w-full bg-white border-2 border-gray-200 hover:border-gray-300 text-gray-700 font-medium py-3 px-4 rounded-lg transition">
                                    Join an Existing Team
                                </button>
                            </div>
                        )}

                        {mode === 'create' && (
                            <div className="space-y-3">
                                <input
                                    type="text"
                                    placeholder="Team name (e.g., Gen Surg Gold)"
                                    value={teamName}
                                    onChange={e => setTeamName(e.target.value)}
                                    className="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-medical-500"
                                />
                                <div>
                                    <input
                                        type="text"
                                        placeholder="Custom invite code (optional, 4+ chars)"
                                        value={customCode}
                                        onChange={e => setCustomCode(e.target.value.toUpperCase())}
                                        className="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-medical-500 font-mono tracking-widest"
                                    />
                                    <p className="text-[10px] text-gray-400 mt-1 px-1">Leave blank to auto-generate. This code also serves as your encryption key.</p>
                                </div>
                                <button onClick={handleCreate} disabled={loading} className="w-full bg-medical-600 text-white hover:bg-medical-700 font-semibold py-3 rounded-lg transition disabled:opacity-50">
                                    {loading ? 'Creating...' : 'Create Team'}
                                </button>
                                <button onClick={() => setMode(null)} className="w-full text-sm text-gray-500 hover:text-gray-700">Back</button>
                            </div>
                        )}

                        {mode === 'join' && (
                            <div className="space-y-3">
                                <input
                                    type="text"
                                    placeholder="Enter invite code"
                                    value={joinCode}
                                    onChange={e => setJoinCode(e.target.value.toUpperCase())}
                                    maxLength={6}
                                    className="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm tracking-widest text-center font-mono uppercase focus:outline-none focus:ring-2 focus:ring-medical-500"
                                />
                                <button onClick={handleJoin} disabled={loading} className="w-full bg-medical-600 text-white hover:bg-medical-700 font-semibold py-3 rounded-lg transition disabled:opacity-50">
                                    {loading ? 'Joining...' : 'Join Team'}
                                </button>
                                <button onClick={() => setMode(null)} className="w-full text-sm text-gray-500 hover:text-gray-700">Back</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==================== M&M LESSONS LEARNED ====================
        function MMLessonsLearned({ currentUser }) {
            const [lessons, setLessons] = React.useState([]);
            const [showForm, setShowForm] = React.useState(false);
            const [editingId, setEditingId] = React.useState(null);
            const [patients, setPatients] = React.useState([]);
            const [form, setForm] = React.useState({ patientId: '', title: '', lesson: '', studies: [] });
            const [studyInput, setStudyInput] = React.useState({ citation: '', url: '' });
            const [loadingSummary, setLoadingSummary] = React.useState(null);
            const [expandedLesson, setExpandedLesson] = React.useState(null);
            const dictation = useDictation();

            React.useEffect(() => { loadData(); }, []);

            const loadData = async () => {
                const lessonsData = await DB.getAll('mmLessons');
                setLessons(lessonsData.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || '')));
                const patientsData = await DB.getAll('patients');
                setPatients(patientsData);
            };

            const handleSave = async () => {
                if (!form.lesson.trim() && !form.title.trim()) return;
                const data = {
                    ...form,
                    title: form.title.trim() || 'Untitled Lesson',
                    lesson: form.lesson.trim(),
                    author: currentUser?.displayName || currentUser?.email || 'Unknown',
                    updatedAt: new Date().toISOString()
                };
                if (editingId) {
                    const existing = lessons.find(l => l.id === editingId);
                    await DB.put('mmLessons', { ...existing, ...data });
                } else {
                    data.createdAt = new Date().toISOString();
                    await DB.add('mmLessons', data);
                }
                setForm({ patientId: '', title: '', lesson: '', studies: [] });
                setShowForm(false);
                setEditingId(null);
                dictation.clear();
                loadData();
            };

            const handleDelete = async (id) => {
                await DB.delete('mmLessons', id);
                loadData();
            };

            const startEdit = (lesson) => {
                setForm({
                    patientId: lesson.patientId || '',
                    title: lesson.title || '',
                    lesson: lesson.lesson || '',
                    studies: lesson.studies || []
                });
                setEditingId(lesson.id);
                setShowForm(true);
            };

            const addStudy = () => {
                if (!studyInput.citation.trim()) return;
                setForm(prev => ({
                    ...prev,
                    studies: [...prev.studies, { citation: studyInput.citation.trim(), url: studyInput.url.trim(), summary: '', fetchingSummary: false }]
                }));
                setStudyInput({ citation: '', url: '' });
            };

            const removeStudy = (idx) => {
                setForm(prev => ({ ...prev, studies: prev.studies.filter((_, i) => i !== idx) }));
            };

            const fetchStudySummary = async (idx) => {
                const study = form.studies[idx];
                if (!study.url && !study.citation) return;
                setLoadingSummary(idx);
                try {
                    let content = '';
                    // Try to fetch from URL if provided
                    if (study.url) {
                        try {
                            const resp = await fetch(study.url);
                            if (resp.ok) {
                                const text = await resp.text();
                                // Extract meaningful text (strip HTML)
                                const div = document.createElement('div');
                                div.innerHTML = text;
                                content = div.textContent?.substring(0, 3000) || '';
                            }
                        } catch (e) { /* URL fetch failed, fall back to citation text */ }
                    }
                    // Build a summary from what we have
                    const lessonContext = form.lesson || '';
                    let summary = '';
                    if (content) {
                        // Extract abstract-like content if available
                        const abstractMatch = content.match(/(?:abstract|summary|background|objective|purpose|aim|introduction)[:\s]*(.{100,800}?)(?:\.\s*(?:method|result|conclusion|keyword|introduction|material)|$)/i);
                        if (abstractMatch) {
                            summary = abstractMatch[1].trim();
                            if (summary.length > 300) summary = summary.substring(0, 300) + '...';
                        } else {
                            // Take first meaningful chunk
                            const meaningful = content.replace(/\s+/g, ' ').trim();
                            summary = meaningful.substring(0, 300) + '...';
                        }
                        // Add relevance note
                        summary += '\n\nRelevance: This study relates to the M&M lesson regarding ' + (form.title || 'this case') + '.';
                    } else {
                        // No URL content - create note from citation alone
                        summary = 'Study: ' + study.citation + '. Please review this reference in relation to: ' + (form.title || lessonContext.substring(0, 100) || 'this M&M case') + '.';
                    }
                    const updatedStudies = [...form.studies];
                    updatedStudies[idx] = { ...study, summary };
                    setForm(prev => ({ ...prev, studies: updatedStudies }));
                } catch (e) {
                    console.error('Error fetching study summary:', e);
                    const updatedStudies = [...form.studies];
                    updatedStudies[idx] = { ...study, summary: 'Unable to fetch summary. Please review manually.' };
                    setForm(prev => ({ ...prev, studies: updatedStudies }));
                }
                setLoadingSummary(null);
            };

            const handleDictationDone = (transcript) => {
                setForm(prev => ({ ...prev, lesson: (prev.lesson ? prev.lesson + ' ' : '') + transcript }));
                dictation.clear();
            };

            const getLinkedPatient = (patientId) => patients.find(p => p.id === patientId);

            // ===== M&M Presentation Generator =====
            const [generatingPptx, setGeneratingPptx] = React.useState(false);
            const generateMMPresentation = async (lesson) => {
                if (typeof PptxGenJS === 'undefined') {
                    alert('Presentation library is still loading. Please try again in a moment.');
                    return;
                }
                setGeneratingPptx(true);
                try {
                const pres = new PptxGenJS();
                pres.layout = 'LAYOUT_16x9';
                pres.author = 'ChiefRounds';
                pres.title = 'M&M Conference - ' + (lesson.title || 'Case Review');

                // Color palette - medical/professional
                const C = {
                    navy: '1E293B', slate: '334155', muted: '475569', light: '94A3B8',
                    bg: 'F8FAFC', card: 'FFFFFF', accent: '0F766E', accentLight: 'CCFBF1',
                    red: 'DC2626', redLight: 'FEE2E2', amber: 'D97706', amberLight: 'FEF3C7',
                    blue: '1D4ED8', blueLight: 'DBEAFE', white: 'FFFFFF', divider: 'E2E8F0'
                };
                const FONT = { head: 'Georgia', body: 'Calibri' };
                const patient = lesson.patientId ? patients.find(p => p.id === lesson.patientId) : null;

                // Helper: fresh shadow factory (pptxgenjs mutates option objects)
                const cardShadow = () => ({ type: 'outer', blur: 6, offset: 2, angle: 135, color: '000000', opacity: 0.08 });
                // Helper: sanitize text runs array - PptxGenJS crashes if any element is a raw string
                const safeTextRuns = (arr) => arr.map(item =>
                    (typeof item === 'string' || typeof item === 'number')
                        ? { text: String(item), options: {} }
                        : { text: String(item.text || ''), options: item.options || {} }
                );
                // Helper: safe string for addText
                const safeStr = (val) => val == null ? '' : String(val);

                // Helper: build bullet list items for addText arrays
                const bullets = (items, opts = {}) => items.map((item, i) => ({
                    text: safeStr(item),
                    options: { breakLine: i < items.length - 1, bullet: true, fontSize: opts.fontSize || 12, color: opts.color || C.slate, ...opts }
                }));

                // ====== SLIDE 1: Title ======
                let s1 = pres.addSlide();
                s1.background = { color: C.navy };
                s1.addShape(pres.shapes.RECTANGLE, { x: 0, y: 0, w: 10, h: 0.06, fill: { color: C.accent } });
                s1.addText('MORBIDITY & MORTALITY CONFERENCE', {
                    x: 0.8, y: 1.0, w: 8.4, h: 0.6,
                    fontFace: FONT.head, fontSize: 13, color: C.accent, charSpacing: 5, bold: true
                });
                s1.addText(lesson.title || 'Case Review', {
                    x: 0.8, y: 1.6, w: 8.4, h: 1.2,
                    fontFace: FONT.head, fontSize: 40, color: C.white, bold: true
                });
                const titleInfo = [];
                titleInfo.push(new Date(lesson.createdAt).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }));
                titleInfo.push('Presented by: ' + (lesson.author || 'Team'));
                s1.addText(titleInfo.join('  |  '), {
                    x: 0.8, y: 3.2, w: 8.4, h: 0.5,
                    fontFace: FONT.body, fontSize: 13, color: C.light
                });
                s1.addShape(pres.shapes.RECTANGLE, { x: 0, y: 5.565, w: 10, h: 0.06, fill: { color: C.accent } });

                // ====== SLIDE 2: Case Presentation / Patient History ======
                if (patient) {
                    let s2 = pres.addSlide();
                    s2.background = { color: C.bg };
                    s2.addText('Case Presentation', {
                        x: 0.6, y: 0.3, w: 8.8, h: 0.7,
                        fontFace: FONT.head, fontSize: 28, color: C.navy, bold: true
                    });
                    s2.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.05, w: 2.0, h: 0.03, fill: { color: C.accent } });

                    // HPI / Diagnosis card
                    s2.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.3, w: 9.0, h: 0.6, fill: { color: C.white }, shadow: cardShadow() });
                    s2.addText('Diagnosis: ' + safeStr(patient.diagnosis || 'Not recorded'), {
                        x: 0.9, y: 1.3, w: 8.4, h: 0.6,
                        fontFace: FONT.body, fontSize: 16, color: C.navy, bold: true, valign: 'middle'
                    });

                    // Two column layout: PMH/PSH left, Meds/Allergies right
                    // Left column
                    s2.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 2.1, w: 4.3, h: 3.2, fill: { color: C.white }, shadow: cardShadow() });
                    s2.addText('Past Medical History', { x: 0.9, y: 2.2, w: 3.7, h: 0.35, fontFace: FONT.body, fontSize: 11, color: C.accent, bold: true });
                    const pmhList = Array.isArray(patient.pmh) && patient.pmh.length > 0 ? patient.pmh : ['None documented'];
                    s2.addText(safeTextRuns(bullets(pmhList, { fontSize: 10 })), { x: 0.9, y: 2.55, w: 3.7, h: 1.1, fontFace: FONT.body, valign: 'top', paraSpaceAfter: 2 });

                    s2.addText('Past Surgical History', { x: 0.9, y: 3.7, w: 3.7, h: 0.35, fontFace: FONT.body, fontSize: 11, color: C.accent, bold: true });
                    const pshList = Array.isArray(patient.psh) && patient.psh.length > 0 ? patient.psh : ['None documented'];
                    s2.addText(safeTextRuns(bullets(pshList, { fontSize: 10 })), { x: 0.9, y: 4.05, w: 3.7, h: 1.1, fontFace: FONT.body, valign: 'top', paraSpaceAfter: 2 });

                    // Right column
                    s2.addShape(pres.shapes.RECTANGLE, { x: 5.1, y: 2.1, w: 4.3, h: 3.2, fill: { color: C.white }, shadow: cardShadow() });
                    s2.addText('Medications', { x: 5.4, y: 2.2, w: 3.7, h: 0.35, fontFace: FONT.body, fontSize: 11, color: C.accent, bold: true });
                    const medsList = Array.isArray(patient.homeMeds) && patient.homeMeds.length > 0 ? patient.homeMeds : ['None documented'];
                    s2.addText(safeTextRuns(bullets(medsList, { fontSize: 10 })), { x: 5.4, y: 2.55, w: 3.7, h: 1.1, fontFace: FONT.body, valign: 'top', paraSpaceAfter: 2 });

                    s2.addText('Allergies', { x: 5.4, y: 3.7, w: 3.7, h: 0.35, fontFace: FONT.body, fontSize: 11, color: C.accent, bold: true });
                    const allergyList = Array.isArray(patient.allergies) && patient.allergies.length > 0 ? patient.allergies : ['NKDA'];
                    s2.addText(safeTextRuns(bullets(allergyList, { fontSize: 10, color: C.red })), { x: 5.4, y: 4.05, w: 3.7, h: 0.6, fontFace: FONT.body, valign: 'top', paraSpaceAfter: 2 });

                    // Attending + Code Status footer
                    const footerParts = [];
                    if (patient.attendingPhysician) footerParts.push('Attending: ' + safeStr(patient.attendingPhysician));
                    footerParts.push('Code Status: ' + safeStr(patient.codeStatus || 'Full Code'));
                    if (patient.admitDate) footerParts.push('Admitted: ' + new Date(patient.admitDate).toLocaleDateString());
                    s2.addText(footerParts.join('   |   '), {
                        x: 0.6, y: 5.15, w: 8.8, h: 0.35,
                        fontFace: FONT.body, fontSize: 10, color: C.muted, align: 'center', valign: 'middle'
                    });
                }

                // ====== SLIDE 3: Procedures & Operative Course ======
                if (patient) {
                    let sOp = pres.addSlide();
                    sOp.background = { color: C.bg };
                    sOp.addText('Procedures & Operative Course', {
                        x: 0.6, y: 0.3, w: 8.8, h: 0.7,
                        fontFace: FONT.head, fontSize: 28, color: C.navy, bold: true
                    });
                    sOp.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.05, w: 2.0, h: 0.03, fill: { color: C.accent } });

                    const procList = Array.isArray(patient.procedures) && patient.procedures.length > 0 ? patient.procedures : ['No procedures documented'];
                    sOp.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.3, w: 9.0, h: 1.5, fill: { color: C.white }, shadow: cardShadow() });
                    sOp.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.3, w: 0.08, h: 1.5, fill: { color: C.accent } });
                    procList.forEach((proc, i) => {
                        if (1.5 + i * 0.35 > 2.6) return;
                        sOp.addText((i + 1) + '. ' + safeStr(proc), {
                            x: 1.0, y: 1.45 + i * 0.35, w: 8.3, h: 0.3,
                            fontFace: FONT.body, fontSize: 13, color: C.navy, bold: true, valign: 'middle'
                        });
                    });

                    // Space for operative details / notes
                    sOp.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 3.1, w: 9.0, h: 2.2, fill: { color: C.white }, shadow: cardShadow() });
                    sOp.addText('Operative Details / Findings', { x: 0.9, y: 3.2, w: 8.4, h: 0.35, fontFace: FONT.body, fontSize: 12, color: C.accent, bold: true });
                    sOp.addText('[Add intraoperative findings, EBL, complications, and relevant operative details here]', {
                        x: 0.9, y: 3.6, w: 8.4, h: 1.5,
                        fontFace: FONT.body, fontSize: 11, color: C.light, italic: true, valign: 'top'
                    });
                }

                // ====== SLIDE 3: Hospital Course Timeline ======
                if (patient && patient.roundsHistory) {
                    const dates = Object.keys(patient.roundsHistory).sort();
                    // Split into chunks of 5 dates per slide
                    const chunkSize = 5;
                    for (let chunk = 0; chunk < dates.length; chunk += chunkSize) {
                        const chunkDates = dates.slice(chunk, chunk + chunkSize);
                        let sT = pres.addSlide();
                        sT.background = { color: C.bg };
                        sT.addText(chunk === 0 ? 'Hospital Course Timeline' : 'Hospital Course (cont.)', {
                            x: 0.6, y: 0.3, w: 8.8, h: 0.7,
                            fontFace: FONT.head, fontSize: 28, color: C.navy, bold: true
                        });
                        sT.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.05, w: 2.0, h: 0.03, fill: { color: C.accent } });

                        chunkDates.forEach((date, idx) => {
                            const entry = patient.roundsHistory[date];
                            const yPos = 1.35 + idx * 0.82;
                            const dateStr = new Date(date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                            // Calculate POD for this specific date (not today)
                            let pod = '';
                            if (patient.admitDate) {
                                const admitD = new Date(patient.admitDate + 'T00:00:00');
                                const thisD = new Date(date + 'T00:00:00');
                                const diff = Math.floor((thisD - admitD) / (1000 * 60 * 60 * 24));
                                if (diff >= 0) pod = 'POD #' + diff;
                            }

                            // Date badge
                            sT.addShape(pres.shapes.RECTANGLE, {
                                x: 0.6, y: yPos, w: 1.6, h: 0.65,
                                fill: { color: C.navy }
                            });
                            sT.addText(safeTextRuns([
                                { text: dateStr, options: { breakLine: true, fontSize: 10, bold: true, color: C.white } },
                                { text: pod, options: { fontSize: 9, color: C.light } }
                            ]), { x: 0.6, y: yPos, w: 1.6, h: 0.65, fontFace: FONT.body, align: 'center', valign: 'middle' });

                            // Content card
                            sT.addShape(pres.shapes.RECTANGLE, {
                                x: 2.4, y: yPos, w: 7.0, h: 0.65,
                                fill: { color: C.white }, shadow: cardShadow()
                            });
                            const summary = safeStr(entry.summary) || [
                                entry.subjective ? 'S: ' + safeStr(entry.subjective) : '',
                                entry.assessment ? 'A: ' + safeStr(entry.assessment) : '',
                                Array.isArray(entry.orders) && entry.orders.length ? 'Orders: ' + entry.orders.map(String).join(', ') : ''
                            ].filter(Boolean).join(' | ') || 'Rounds completed';
                            sT.addText(String(summary).substring(0, 200), {
                                x: 2.6, y: yPos, w: 6.6, h: 0.65,
                                fontFace: FONT.body, fontSize: 10, color: C.slate, valign: 'middle', margin: 0
                            });
                        });
                    }
                }

                // ====== SLIDE: Complications & Problems ======
                if (patient && Array.isArray(patient.problems) && patient.problems.length > 0) {
                    let sP = pres.addSlide();
                    sP.background = { color: C.bg };
                    sP.addText('Complications & Problems', {
                        x: 0.6, y: 0.3, w: 8.8, h: 0.7,
                        fontFace: FONT.head, fontSize: 28, color: C.navy, bold: true
                    });
                    sP.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.05, w: 2.0, h: 0.03, fill: { color: C.red } });

                    patient.problems.forEach((prob, idx) => {
                        const yPos = 1.4 + idx * 0.7;
                        if (yPos > 4.8) return; // prevent overflow
                        // Number circle
                        sP.addShape(pres.shapes.OVAL, {
                            x: 0.8, y: yPos + 0.05, w: 0.45, h: 0.45,
                            fill: { color: C.red }
                        });
                        sP.addText(String(idx + 1), {
                            x: 0.8, y: yPos + 0.05, w: 0.45, h: 0.45,
                            fontFace: FONT.body, fontSize: 14, color: C.white, align: 'center', valign: 'middle', bold: true
                        });
                        // Problem card
                        sP.addShape(pres.shapes.RECTANGLE, {
                            x: 1.5, y: yPos, w: 8.0, h: 0.55,
                            fill: { color: C.white }, shadow: cardShadow()
                        });
                        sP.addText(safeStr(prob), {
                            x: 1.7, y: yPos, w: 7.6, h: 0.55,
                            fontFace: FONT.body, fontSize: 14, color: C.navy, valign: 'middle', bold: true
                        });
                    });
                }

                // ====== SLIDE: Imaging Placeholder Slides (2) ======
                for (let imgNum = 1; imgNum <= 2; imgNum++) {
                    let sI = pres.addSlide();
                    sI.background = { color: C.navy };
                    sI.addText('Imaging / Radiology - Slide ' + imgNum, {
                        x: 0.6, y: 0.3, w: 8.8, h: 0.6,
                        fontFace: FONT.head, fontSize: 24, color: C.white, bold: true
                    });
                    // Large placeholder box
                    sI.addShape(pres.shapes.RECTANGLE, {
                        x: 0.8, y: 1.2, w: 8.4, h: 3.8,
                        fill: { color: C.slate },
                        line: { color: C.light, width: 2, dashType: 'dash' }
                    });
                    sI.addText(safeTextRuns([
                        { text: 'INSERT CT / MRI / X-RAY IMAGE HERE', options: { breakLine: true, fontSize: 18, bold: true, color: C.light } },
                        { text: 'Right-click this area > Insert Picture > From File', options: { fontSize: 12, color: C.light } }

                        x: 0.8, y: 1.2, w: 8.4, h: 3.8,
                        fontFace: FONT.body, align: 'center', valign: 'middle'
                    });
                    // Notes area
                    sI.addShape(pres.shapes.RECTANGLE, {
                        x: 0.8, y: 5.15, w: 8.4, h: 0.35,
                        fill: { color: C.accent }
                    });
                    sI.addText('Findings: [Add imaging findings or annotations here]', {
                        x: 1.0, y: 5.15, w: 8.0, h: 0.35,
                        fontFace: FONT.body, fontSize: 11, color: C.white, italic: true, valign: 'middle'
                    });
                }

                // ====== SLIDE: Video / Intraop Placeholder ======
                let sV = pres.addSlide();
                sV.background = { color: C.navy };
                sV.addText('Intraoperative Video / Media', {
                    x: 0.6, y: 0.3, w: 8.8, h: 0.6,
                    fontFace: FONT.head, fontSize: 24, color: C.white, bold: true
                });
                sV.addShape(pres.shapes.RECTANGLE, {
                    x: 0.8, y: 1.2, w: 8.4, h: 3.8,
                    fill: { color: C.slate },
                    line: { color: C.light, width: 2, dashType: 'dash' }
                });
                sV.addText(safeTextRuns([
                    { text: 'INSERT VIDEO OR INTRAOP IMAGES HERE', options: { breakLine: true, fontSize: 18, bold: true, color: C.light } },
                    { text: 'Insert > Video > From File  or  Insert > Picture', options: { breakLine: true, fontSize: 12, color: C.light } },
                    { text: 'Supports MP4, MOV for embedded video playback', options: { fontSize: 10, color: C.light } }
                ]), {
                    x: 0.8, y: 1.2, w: 8.4, h: 3.8,
                    fontFace: FONT.body, align: 'center', valign: 'middle'
                });

                // ====== SLIDE: Lesson Learned ======
                let sL = pres.addSlide();
                sL.background = { color: C.bg };
                sL.addText('Lesson Learned', {
                    x: 0.6, y: 0.3, w: 8.8, h: 0.7,
                    fontFace: FONT.head, fontSize: 28, color: C.navy, bold: true
                });
                sL.addShape(pres.shapes.RECTANGLE, { x: 0.6, y: 1.05, w: 2.0, h: 0.03, fill: { color: C.accent } });

                // Lesson content card
                sL.addShape(pres.shapes.RECTANGLE, {
                    x: 0.6, y: 1.3, w: 8.8, h: 3.8,

                });
                // Accent left border
                sL.addShape(pres.shapes.RECTANGLE, {
                    x: 0.6, y: 1.3, w: 0.08, h: 3.8,
                    fill: { color: C.accent }
                });

                const lessonText = lesson.lesson || 'No lesson text recorded.';
                // Split lesson into paragraphs
                const lessonParagraphs = lessonText.split(/\n+/).filter(Boolean);
                const lessonRuns = lessonParagraphs.map((p, i) => ({
                    text: p,

                sL.addText(safeTextRuns(lessonRuns), {

                // ====== SLIDES: Supporting Literature ======
                if (lesson.studies && lesson.studies.length > 0) {

                    sRef.background = { color: C.bg };
                    sRef.addText('Supporting Literature', {

                        // Summary

                        sRef.addText(summaryText, {

                // ====== SLIDE: Discussion / Questions ======
                let sQ = pres.addSlide();
                sQ.background = { color: C.navy };

                sQ.addText('Questions, Comments & Takeaways', {

                // Generate and download
                const fileName = 'MM_' + (lesson.title || 'Conference').replace(/[^a-zA-Z0-9]/g, '_').substring(0, 30) + '.pptx';

                } catch (err) {

            return (
                <div className="p-4 md:p-6 max-w-4xl mx-auto">
                    <div className="flex justify-between items-center mb-6">
                        <div>
                            <h2 className="text-2xl font-bold text-medical-600">M&M Lessons Learned</h2>

                        </div>
                        <button
                            onClick={() => { setShowForm(true); setEditingId(null); setForm({ patientId: '', title: '', lesson: '', studies: [] }); }}

                    </div>

                    {/* Form Modal */}
                    {showForm && (
                        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4 modal-backdrop" onClick={() => setShowForm(false)}>
                            <div className="bg-white rounded-xl shadow-xl w-full max-w-lg max-h-[90vh] overflow-y-auto modal-content" onClick={e => e.stopPropagation()}>

                                                </div>
                                                {study.summary ? (

                                                    </div>
                                                ) : (
                                                    <button
                                                        onClick={() => fetchStudySummary(idx)}
                                                        disabled={loadingSummary === idx}
                                                        className="mt-2 text-xs text-medical-600 hover:text-medical-700 font-medium disabled:opacity-50"
                                                    >
                                                        {loadingSummary === idx ? 'Generating summary...' : 'Generate Summary'}
                                                    </button>
                                                )}
                                            </div>
                                        ))}
                                        {/* Add new study */}
                                        <div className="space-y-2 bg-gray-50 rounded-lg p-3">
                                            <input value={studyInput.citation} onChange={e => setStudyInput(prev => ({ ...prev, citation: e.target.value }))}
                                                placeholder="Study citation (e.g., Smith et al. Ann Surg 2024)"
                                                className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-800" />
                                            <input value={studyInput.url} onChange={e => setStudyInput(prev => ({ ...prev, url: e.target.value }))}

                                                className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-800" />
                                            <button onClick={addStudy} disabled={!studyInput.citation.trim()}
                                                className="text-xs bg-medical-600 hover:bg-medical-700 text-white px-3 py-1.5 rounded-lg font-medium disabled:opacity-50 transition">

                                    </div>
                                </div>
                                <div className="p-5 border-t border-gray-100 flex gap-2">
                                    <button onClick={handleSave} className="flex-1 bg-medical-600 hover:bg-medical-700 text-white py-2.5 rounded-lg font-medium text-sm transition">

                                    </button>
                                    <button onClick={() => setShowForm(false)} className="px-4 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-lg text-sm transition">
                                        Cancel

                            </div>
                        </div>

                    {/* Lessons List */}
                    {lessons.length === 0 ? (
                        <div className="text-center py-12">
                            <p className="text-gray-400 text-lg mb-2">No lessons recorded yet</p>
                            <p className="text-gray-400 text-sm">After M&M conferences, record what you learned for future reference.</p>
                        </div>
                    ) : (
                        <div className="space-y-3">
                            {lessons.map(lesson => {
                                const linked = getLinkedPatient(lesson.patientId);
                                const isExpanded = expandedLesson === lesson.id;
                                return (
                                    <div key={lesson.id} className="bg-white border border-gray-100 rounded-xl overflow-hidden shadow-sm">
                                        <div className="p-4 cursor-pointer" onClick={() => setExpandedLesson(isExpanded ? null : lesson.id)}>
                                            <div className="flex justify-between items-start">
                                                <div className="flex-1 min-w-0">
                                                    <div className="flex items-center gap-2 flex-wrap">
                                                        <h3 className="font-bold text-gray-800">{lesson.title || 'Untitled'}</h3>
                                                        {linked && (
                                                            <span className="text-[10px] bg-slate-100 text-gray-500 px-1.5 py-0.5 rounded">
                                                                Rm {linked.room} - {linked.diagnosis}
                                                            </span>
                                                        )}
                                                    </div>
                                                    <p className="text-xs text-gray-400 mt-1">
                                                        {new Date(lesson.createdAt).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}
                                                        {' by '}{lesson.author}
                                                        {lesson.studies?.length > 0 && ` -- ${lesson.studies.length} reference${lesson.studies.length !== 1 ? 's' : ''}`}
                                                    </p>
                                                    {!isExpanded && (
                                                        <p className="text-sm text-gray-600 mt-1 line-clamp-2" style={{display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden'}}>
                                                            {lesson.lesson}
                                                        </p>
                                                    )}
                                                </div>
                                                <span className="text-gray-300 text-sm ml-2">{isExpanded ? '\u25B2' : '\u25BC'}</span>
                                            </div>
                                        </div>
                                        {isExpanded && (
                                            <div className="px-4 pb-4 space-y-3">
                                                <div className="bg-slate-50 rounded-lg p-3">
                                                    <p className="text-sm text-gray-700 whitespace-pre-line">{lesson.lesson}</p>
                                                </div>
                                                {lesson.studies?.length > 0 && (
                                                    <div>
                                                        <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">References</p>

                                                            <div key={i} className="bg-indigo-50 border border-indigo-100 rounded-lg p-3 mb-2">
                                                                <p className="text-sm font-medium text-indigo-800">{study.citation}</p>
                                                                {study.url && (
                                                                    <a href={study.url} target="_blank" rel="noopener noreferrer" className="text-xs text-blue-500 hover:underline">{study.url}</a>
                                                                )}
                                                                {study.summary && (
                                                                    <p className="text-xs text-gray-600 mt-2 pt-2 border-t border-indigo-200 whitespace-pre-line">{study.summary}</p>

                                                <div className="flex gap-3 pt-2 border-t border-gray-100">
