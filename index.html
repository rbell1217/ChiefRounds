            async add(store, data) {
                const { id, ...rest } = data; // strip any existing id
                const ref = await this._col(store).add({ ...rest, createdAt: rest.createdAt || new Date().toISOString() });
                return ref.id;
            },
            async put(store, data) {
                if (data.id) {
                    const { id, ...rest } = data;
                    await this._col(store).doc(String(id)).set(rest, { merge: true });
                    return id;
                }
                return this.add(store, data);
            },
            async delete(store, id) {
                await this._col(store).doc(String(id)).delete();
            },
            async getByIndex(store, indexName, value) {

        // ==================== LAB NORMAL RANGES ====================
        const LAB_RANGES = {

        // ==================== TIMEZONE & UTILITY FUNCTIONS ====================
        const APP_TIMEZONE = 'America/Chicago'; // Central Time

        function getCurrentDateTime() {
            return new Date().toLocaleString('en-US', {
                timeZone: APP_TIMEZONE,
                month: '2-digit', day: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
            });
        }

        function formatDate(date) {
            return new Date(date).toLocaleDateString('en-US', { timeZone: APP_TIMEZONE });
        }

        function formatTime(date) {
            return new Date(date).toLocaleTimeString('en-US', { timeZone: APP_TIMEZONE, hour: '2-digit', minute: '2-digit' });
        }

        function formatDateTime(date) {
            return new Date(date).toLocaleString('en-US', { timeZone: APP_TIMEZONE });
        }

        function formatShortDateTime(date) {
            return new Date(date).toLocaleString('en-US', { timeZone: APP_TIMEZONE, month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function getTodayDateString() {
            return new Date().toLocaleDateString('en-US', { timeZone: APP_TIMEZONE });
        }

        function getTodayISO() {
            const now = new Date();
            const parts = new Intl.DateTimeFormat('en-CA', { timeZone: APP_TIMEZONE, year: 'numeric', month: '2-digit', day: '2-digit' }).format(now);
            return parts;
        }

        function calculatePOD(admitDate) {
            if (!admitDate) return 0;
            const admit = new Date(admitDate);
            const now = new Date();
            return Math.floor((now - admit) / (1000 * 60 * 60 * 24)) + 1;
        }

        function isLabAbnormal(type, value) {
            if (!LAB_RANGES[type]) return false;
            const range = LAB_RANGES[type];
            return value < range.min || value > range.max;
        }

        function getTrendArrow(currentValue, previousValue) {
            if (!previousValue) return '—';
            if (Math.abs(currentValue - previousValue) < 0.01) return '→';
            return currentValue > previousValue ? '↑' : '↓';
        }

        function parseSpeechCommand(transcript) {
            const t = transcript.toLowerCase();
            const result = {};

            // Room - flexible matching
            const roomMatch = transcript.match(/room\s+(\d+)/i) || transcript.match(/^(\d{3,4})\b/);
            if (roomMatch) result.room = roomMatch[1];

            // Diagnosis - many trigger phrases, captures until next section keyword
            const sectionBreak = /(?:\b(?:problems?|procedures?|diet|activity|plan|dispo|disposition|concern|red flag|code status|prophylaxis|dvt|gi prophy|admit)\b|$)/i;
            const diagMatch = transcript.match(/(?:diagnosis|diagnosed with|dx|for)\s+(.+?)(?=\s*(?:problems?|procedures?|diet|activity|plan|dispo|concern|red flag|code|prophylaxis|dvt|admit|$))/i);
            if (diagMatch) result.diagnosis = diagMatch[1].replace(/\s+/g, ' ').trim();
            // If no keyword, try "status post" or "s/p" pattern
            if (!result.diagnosis) {
                const spMatch = transcript.match(/(?:s\/p|status post|post)\s+(.+?)(?=\s*(?:problems?|procedures?|diet|activity|plan|dispo|concern|code|prophylaxis|dvt|admit|$))/i);
                if (spMatch) result.diagnosis = 's/p ' + spMatch[1].replace(/\s+/g, ' ').trim();
            }

            // Problems - flexible
            const probMatch = transcript.match(/(?:problems?(?:\s+(?:are|is|include))?)\s+(.+?)(?=\s*(?:procedures?|diet|activity|plan|dispo|concern|code|prophylaxis|$))/i);
            if (probMatch) result.problems = probMatch[1].replace(/\s+/g, ' ').trim();

            // Procedures
            const procMatch = transcript.match(/(?:procedures?(?:\s+(?:are|is|include|done|performed))?)\s+(.+?)(?=\s*(?:diet|activity|plan|dispo|concern|code|prophylaxis|$))/i);
            if (procMatch) result.procedures = procMatch[1].replace(/\s+/g, ' ').trim();

            // Diet - match natural speech patterns
            const dietMap = [
                { match: /\b(npo|nothing by mouth|nil per os)\b/i, val: 'NPO' },
                { match: /\b(ice chips)\b/i, val: 'Ice Chips' },
                { match: /\b(clear liquid|clears|clear diet)\b/i, val: 'Clears' },
                { match: /\b(full liquid)\b/i, val: 'Full Liquids' },
                { match: /\b(mechanical soft|soft diet)\b/i, val: 'Mechanical Soft' },
                { match: /\b(regular diet|regular|advance(d)? to regular|general diet|house diet)\b/i, val: 'Regular' },
                { match: /\b(cardiac diet|heart healthy)\b/i, val: 'Cardiac' },
                { match: /\b(renal diet)\b/i, val: 'Renal' },
                { match: /\b(diabetic diet|ada diet|carb controlled)\b/i, val: 'Diabetic' },
                { match: /\b(diet as tolerated|dat)\b/i, val: 'Regular' },
            ];
            for (const d of dietMap) {
                if (d.match.test(t)) { result.diet = d.val; break; }
            }
            // Also try "diet [word]" pattern
            if (!result.diet) {
                const dietKw = transcript.match(/diet\s+(?:is\s+)?(\w[\w\s]*?)(?=\s*(?:activity|plan|dispo|concern|code|prophylaxis|ambulate|bedrest|$))/i);
                if (dietKw) {
                    for (const d of dietMap) { if (d.match.test(dietKw[1])) { result.diet = d.val; break; } }
                }
            }

            // Activity - match natural patterns
            const actMap = [
                { match: /\b(bed\s*rest|strict bed rest|flat)\b/i, val: 'Bedrest' },
                { match: /\b(dangle|sit at edge)\b/i, val: 'Dangle' },
                { match: /\b(up to chair|out of bed to chair|oob to chair)\b/i, val: 'Up to Chair' },
                { match: /\b(ambulate with assist|walk with assist|ambulate with help)\b/i, val: 'Ambulate with Assist' },
                { match: /\b(ambulate (tid|three times|3 times)|walk (tid|three times))\b/i, val: 'Ambulate TID' },
                { match: /\b(ambulate|ambulat|walk|walking|up and walking|get (them |him |her )?up)\b/i, val: 'Ambulate TID' },
                { match: /\b(ad lib|as tolerated|activity as tolerated)\b/i, val: 'Ad Lib' },
            ];
            for (const a of actMap) {
                if (a.match.test(t)) { result.activity = a.val; break; }
            }

            // DVT Prophylaxis
            if (/\b(scd|scds|sequential compression|compression devices?)\b/i.test(t)) result.dvtProphylaxis = 'SCDs';
            else if (/\b(heparin|subq heparin|hep 5000)\b/i.test(t)) result.dvtProphylaxis = 'Heparin 5000 TID';
            else if (/\b(lovenox|enoxaparin)\b/i.test(t)) result.dvtProphylaxis = 'Lovenox 40 daily';
            else if (/\b(no dvt|no prophylaxis|hold anticoagul)\b/i.test(t)) result.dvtProphylaxis = 'None';

            // GI Prophylaxis
            if (/\b(famotidine|pepcid)\b/i.test(t)) result.giProphylaxis = 'Famotidine';
            else if (/\b(pantoprazole|protonix|ppi|omeprazole|prilosec)\b/i.test(t)) result.giProphylaxis = 'Pantoprazole';

            // Code Status
            if (/\b(comfort care|comfort measures|cmo)\b/i.test(t)) result.codeStatus = 'Comfort Care';
            else if (/\b(dnr\s*\/?\s*dni|do not resuscitate.*do not intubate)\b/i.test(t)) result.codeStatus = 'DNR/DNI';
            else if (/\b(dnr|do not resuscitate)\b/i.test(t)) result.codeStatus = 'DNR';
            else if (/\b(full code)\b/i.test(t)) result.codeStatus = 'Full Code';

            // Treatment Plan - flexible
            const planMatch = transcript.match(/(?:plan(?:\s+(?:is|to))?)\s+(.+?)(?=\s*(?:dispo|disposition|concern|red flag|code status|$))/i);
            if (planMatch) result.treatmentPlan = planMatch[1].replace(/\s+/g, ' ').trim();

            // Disposition
            const dispoMatch = transcript.match(/(?:dispo(?:sition)?(?:\s+(?:is|to|plan))?)\s+(.+?)(?=\s*(?:concern|red flag|code|$))/i);
            if (dispoMatch) result.dispositionPlan = dispoMatch[1].replace(/\s+/g, ' ').trim();
            // Also catch standalone keywords
            if (!result.dispositionPlan) {
                if (/\b(go(?:ing)? home|discharge home|dc home)\b/i.test(t)) result.dispositionPlan = 'Home';
                else if (/\b(rehab|acute rehab|inpatient rehab)\b/i.test(t)) result.dispositionPlan = 'Rehab';
                else if (/\b(snf|skilled nursing|nursing facility)\b/i.test(t)) result.dispositionPlan = 'SNF';
                else if (/\b(ltac|long term acute care)\b/i.test(t)) result.dispositionPlan = 'LTAC';
            }

            // Concerns / Red Flags
            const concernMatch = transcript.match(/(?:concern|red flag|worried about|watch for|flag)s?\s+(?:(?:is|are|about|for)\s+)?(.+?)$/i);
            if (concernMatch) result.concerns = concernMatch[1].replace(/\s+/g, ' ').trim();

            return result;
        }

        // ==================== SMART SPEECH CLEANUP ====================
        // Cleans up speech-to-text output while preserving medical terminology
        function cleanMedicalSpeech(text) {
            if (!text) return text;
            let cleaned = text;

            // Medical abbreviation corrections (speech-to-text often expands these)
            const medTerms = [
                [/\bstatus post\b/gi, 's/p'],
                [/\bpost op(erative)?\b/gi, 'postop'],
                [/\bpre op(erative)?\b/gi, 'preop'],
                [/\blap\s+(appy|chole|coly?|appendectomy)\b/gi, (m, p) => 'lap ' + p.toLowerCase()],
                [/\blaparoscopic\b/gi, 'lap'],
                [/\bappendectomy\b/gi, 'appy'],
                [/\bcholecystectomy\b/gi, 'chole'],
                [/\bpost operative day\s*(\d+)/gi, 'POD $1'],
                [/\bP\s*O\s*D\s*#?\s*(\d+)/gi, 'POD $1'],
                [/\bpee oh dee\b/gi, 'POD'],
                [/\bnothing by mouth\b/gi, 'NPO'],
                [/\bn\.?\s*p\.?\s*o\.?\b/gi, 'NPO'],
                [/\bT\s*I\s*D\b/gi, 'TID'],
                [/\bthree times (a |per )?day\b/gi, 'TID'],
                [/\btwice (a |per )?day\b/gi, 'BID'],
                [/\bB\s*I\s*D\b/gi, 'BID'],
                [/\bonce (a |per )?day\b/gi, 'daily'],
                [/\bsequential compression devices?\b/gi, 'SCDs'],
                [/\bdeep vein thrombosis\b/gi, 'DVT'],
                [/\bD\s*V\s*T\b/g, 'DVT'],
                [/\bdo not resuscitate\b/gi, 'DNR'],
                [/\bdo not intubate\b/gi, 'DNI'],
                [/\bD\s*N\s*R\b/g, 'DNR'],
                [/\bfull code\b/gi, 'Full Code'],
                [/\bout of bed\b/gi, 'OOB'],
                [/\bnasogastric tube\b/gi, 'NGT'],
                [/\bjackson[ -]?pratt\b/gi, 'JP'],
                [/\bJ\s*P\s*drain\b/gi, 'JP drain'],
                [/\bintravenous\b/gi, 'IV'],
                [/\bI\s*V\s*F?\b/g, (m) => m.replace(/\s/g, '')],
                [/\bwhite blood cell(s| count)?\b/gi, 'WBC'],
                [/\bhemoglobin\b/gi, 'Hgb'],
                [/\bcreatinine\b/gi, 'Cr'],
                [/\bblood urea nitrogen\b/gi, 'BUN'],
                [/\bcomplete blood count\b/gi, 'CBC'],
                [/\bcomprehensive metabolic panel\b/gi, 'CMP'],
                [/\bbasic metabolic panel\b/gi, 'BMP'],
                [/\bcomputed tomography\b/gi, 'CT'],
                [/\bC\s*T\s*scan\b/gi, 'CT scan'],
                [/\bphysical therapy\b/gi, 'PT'],
                [/\boccupational therapy\b/gi, 'OT'],
                [/\bper oral\b/gi, 'PO'],
                [/\bP\s*O\b/g, 'PO'],
                [/\bmilligrams?\b/gi, 'mg'],
                [/\bmilliliters?\b/gi, 'mL'],
                [/\bsubcutaneous(ly)?\b/gi, 'subQ'],
            ];

            for (const [pattern, replacement] of medTerms) {
                cleaned = cleaned.replace(pattern, replacement);
            }

            // Capitalize first letter of each sentence
            cleaned = cleaned.replace(/(^|[.!?]\s+)([a-z])/g, (m, pre, letter) => pre + letter.toUpperCase());

            // Capitalize first letter overall
            if (cleaned.length > 0) {
                cleaned = cleaned.charAt(0).toUpperCase() + cleaned.slice(1);
            }

            // Fix double spaces
            cleaned = cleaned.replace(/\s{2,}/g, ' ').trim();

            // Add period at end if missing punctuation
            if (cleaned.length > 0 && !/[.!?]$/.test(cleaned)) {
                cleaned += '.';
            }

            return cleaned;
        }

        // ==================== REUSABLE DICTATION HOOK ====================
        function useDictation(onTranscriptChange) {
            const recognitionRef = React.useRef(null);
            const [isListening, setIsListening] = React.useState(false);
            const [transcript, setTranscript] = React.useState('');
            const [interimText, setInterimText] = React.useState('');
            const finalTranscriptRef = React.useRef('');

            React.useEffect(() => {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SR) {
                    const rec = new SR();
                    rec.continuous = true;
                    rec.interimResults = true;
                    rec.lang = 'en-US';
                    rec.onstart = () => setIsListening(true);
                    rec.onend = () => {
                        setIsListening(false);
                        setInterimText('');
                    };
                    rec.onerror = (e) => {
                        if (e.error !== 'no-speech') setIsListening(false);
                    };
                    rec.onresult = (event) => {
                        let interim = '';
                        let finalText = finalTranscriptRef.current;
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            const t = event.results[i][0].transcript;
                            if (event.results[i].isFinal) {
                                // Apply smart medical cleanup to final speech results
                                const cleaned = cleanMedicalSpeech(t.trim());
                                // Remove trailing period if we're appending to existing text
                                const toAppend = finalText ? cleaned.replace(/\.$/, '') : cleaned;
                                finalText += (finalText ? ' ' : '') + toAppend;
                            } else {
                                interim += t;
                            }
                        }
                        finalTranscriptRef.current = finalText;
                        setTranscript(finalText);
                        setInterimText(interim);
                        if (onTranscriptChange) onTranscriptChange(finalText);
                    };
                    recognitionRef.current = rec;
                }
                return () => { if (recognitionRef.current) try { recognitionRef.current.stop(); } catch(e){} };
            }, []);

            const start = () => {
                if (recognitionRef.current && !isListening) {
                    finalTranscriptRef.current = transcript;
                    try { recognitionRef.current.start(); } catch(e){}
                }
            };
            const stop = () => {
                if (recognitionRef.current && isListening) {
                    try { recognitionRef.current.stop(); } catch(e){}
                }
            };
            const toggle = () => isListening ? stop() : start();
            const clear = () => {
                finalTranscriptRef.current = '';
                setTranscript('');
                setInterimText('');
            };
            const displayText = transcript + (interimText ? (transcript ? ' ' : '') + interimText : '');

            return { isListening, transcript, interimText, displayText, start, stop, toggle, clear, setTranscript };
        }

        // Reusable Dictation UI component
        function DictationBar({ dictation, onParse, parseLabel, compact }) {

            );
        }

        // ==================== SPEECH PARSERS FOR EACH SECTION ====================
        function parseTaskSpeech(transcript) {
            const t = transcript.toLowerCase();
            const result = {};
            const roomMatch = transcript.match(/room\s+(\d+)/i);
            if (roomMatch) result.room = roomMatch[1];

            const categories = {
                'Labs': /\b(lab|labs|check labs|draw labs|repeat labs|bmp|cmp|cbc|coags)\b/i,
                'Imaging': /\b(imaging|ct|x-ray|xray|mri|ultrasound|scan|echo|cxr)\b/i,
                'Consults': /\b(consult|call|page|notify)\b/i,
                'Medications': /\b(medication|med|start|give|administer|heparin|antibiotic|tylenol|morphine|dilaudid)\b/i,
                'Activity': /\b(activity|ambulate|pt eval|physical therapy|ot eval|walk|dangle|chair)\b/i,
                'Diet': /\b(diet|advance diet|npo|clears|regular diet|feed|nutrition|swallow)\b/i,
                'Discharge': /\b(discharge|dc|dispo|home|rehab|snf|case management|social work|follow.?up)\b/i,
            };
            for (const [cat, regex] of Object.entries(categories)) {
                if (regex.test(t)) { result.category = cat; break; }
            }
            if (!result.category) result.category = 'Other';

            if (/\b(urgent|high priority|important|asap|stat)\b/i.test(t)) result.priority = 'High';
            else if (/\b(low priority|when.?ever|if.?time|non.?urgent)\b/i.test(t)) result.priority = 'Low';
            else result.priority = 'Medium';

            result.description = transcript.replace(/room\s+\d+/i, '').trim();
            return result;
        }

        function parseHandoffSpeech(transcript) {
            const result = {};
            const ifThenMatch = transcript.match(/if\s+(.+?)(?:then|,)\s*(.+?)(?:also|and also|$)/i);
            if (ifThenMatch) {
                result.ifThen = 'If ' + ifThenMatch[1].trim() + ', then ' + ifThenMatch[2].trim();
            }
            const overnightMatch = transcript.match(/overnight\s+(?:plan\s+)?(?:is\s+)?(.+?)(?:if\s+|contact|$)/i);
            if (overnightMatch) result.overnightPlan = overnightMatch[1].trim();
            const contactMatch = transcript.match(/(?:contact|call|reach|page)\s+(.+?)$/i);
            if (contactMatch) result.contact = contactMatch[1].trim();
            result.fullText = transcript;
            return result;
        }

        function parsePreRoundSpeech(transcript) {
            const t = transcript.toLowerCase();
            const result = { notes: transcript };
            const checks = {
                vitals: /\b(vitals|vital signs|temp|temperature|blood pressure|bp|heart rate|hr|o2 sat|febrile|afebrile)\b/i,
                ios: /\b(i\/o|ins and outs|input|output|urine|foley|drain|ng|chest tube)\b/i,
                labs: /\b(labs|lab|wbc|hemoglobin|hgb|creatinine|bmp|cmp|cbc|potassium|sodium)\b/i,
                overnight: /\b(overnight|last night|during the night|nursing|nurse called|event)\b/i,
                lines: /\b(line|lines|drain|drains|tube|tubes|iv|central line|picc|foley|jp)\b/i,
                meds: /\b(medication|medications|med|meds|antibiotic|pain med|pca|drip|infusion)\b/i,
                pain: /\b(pain|comfort|hurting|sore|analgesic|pca|epidural|nerve block)\b/i,
                plan: /\b(plan|today|goal|discharge|dispo|surgery|procedure|scope)\b/i
            };
            result.checkedItems = [];
            for (const [key, regex] of Object.entries(checks)) {
                if (regex.test(t)) result.checkedItems.push(key);
            }
            return result;
        }

        function parseCensusSpeech(transcript) {
            const result = {};
            const roomMatch = transcript.match(/room\s+(\d+)/i);
            if (roomMatch) result.room = roomMatch[1];
            if (/\b(discharge|dc |dc$|send home)\b/i.test(transcript)) result.action = 'discharge';
            if (/\b(transfer|move to)\b/i.test(transcript)) result.action = 'transfer';
            const newRoomMatch = transcript.match(/(?:transfer|move)\s+(?:to\s+)?(?:room\s+)?(\d+)/i);
            if (newRoomMatch) result.newRoom = newRoomMatch[1];
            if (/\b(critical|unstable|crashing)\b/i.test(transcript)) result.status = 'critical';
            else if (/\b(guarded|concerning|watch)\b/i.test(transcript)) result.status = 'guarded';
            else if (/\b(stable|doing well|good)\b/i.test(transcript)) result.status = 'stable';
            return result;
        }

        // ==================== PATIENT TRACKER COMPONENT ====================
        function PatientTracker() {
            const [patients, setPatients] = React.useState([]);
            const [labs, setLabs] = React.useState([]);
            const [outputs, setOutputs] = React.useState([]);
            const [showPatientForm, setShowPatientForm] = React.useState(false);
            const [editingPatient, setEditingPatient] = React.useState(null);
            const [showLabForm, setShowLabForm] = React.useState(false);
            const [showOutputForm, setShowOutputForm] = React.useState(false);
            const [selectedPatientForLab, setSelectedPatientForLab] = React.useState(null);
            const [selectedPatientForOutput, setSelectedPatientForOutput] = React.useState(null);
            const [searchQuery, setSearchQuery] = React.useState('');
            const [sortBy, setSortBy] = React.useState('room');
            const [expandedPatient, setExpandedPatient] = React.useState(null);
            const [showQuickAdd, setShowQuickAdd] = React.useState(false);
            const quickDictation = useDictation();

            React.useEffect(() => {
                DB.init().then(() => loadPatients());
            }, []);

            const loadPatients = async () => {
                const patientsData = await DB.getAll('patients');
                setPatients(patientsData.sort((a, b) => {
                    if (sortBy === 'room') return parseInt(a.room) - parseInt(b.room);
                    if (sortBy === 'pod') return calculatePOD(b.admitDate) - calculatePOD(a.admitDate);
                    if (sortBy === 'flags') return (b.concerns ? 1 : 0) - (a.concerns ? 1 : 0);
                    return 0;
                }));

                const labsData = await DB.getAll('labs');
                setLabs(labsData);

                const outputsData = await DB.getAll('outputs');
                setOutputs(outputsData);
            };

            const handleSavePatient = async (patientData) => {
                if (editingPatient?.id) {
                    await DB.put('patients', { ...patientData, id: editingPatient.id });
                    setEditingPatient(null);
                } else {
                    await DB.add('patients', patientData);
                }
                setShowPatientForm(false);
                loadPatients();
            };

            const handleDeletePatient = async (id) => {
                if (confirm('Delete this patient?')) {
                    await DB.delete('patients', id);
                    loadPatients();
                }
            };

            const handleSaveLab = async (labData) => {
                await DB.add('labs', labData);
                setShowLabForm(false);
                setSelectedPatientForLab(null);
                loadPatients();
            };

            const handleSaveOutput = async (outputData) => {
                await DB.add('outputs', outputData);
                setShowOutputForm(false);
                setSelectedPatientForOutput(null);
                loadPatients();
            };

            const getPatientLabs = (patientId) => {
                return labs.filter(l => l.patientId === patientId).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            };

            const getPatientOutputs = (patientId) => {
                return outputs.filter(o => o.patientId === patientId).sort((a, b) => new Date(b.date) - new Date(a.date));
            };

            const getOutputRecommendations = (patientId) => {
                const patientOutputs = getPatientOutputs(patientId);
                const recommendations = [];

                const ngOutputs = patientOutputs.filter(o => o.type === 'NG Tube');
                if (ngOutputs.length >= 2) {
                    const recentTotal = ngOutputs.slice(0, 2).reduce((sum, o) => sum + o.amount, 0);
                    if (recentTotal < 200) recommendations.push('NG output <200mL/day → Consider clamp trial');
                    if (recentTotal < 100) recommendations.push('NG output <100mL/day → Consider removal');
                }

                const chestOutputs = patientOutputs.filter(o => o.type === 'Chest Tube');
                if (chestOutputs.length > 0 && chestOutputs[0].amount < 150) {
                    recommendations.push('Chest tube output <150mL/day → Consider removal');
                }

                const jpOutputs = patientOutputs.filter(o => o.type === 'JP Drain');
                if (jpOutputs.length > 0 && jpOutputs[0].amount < 30) {
                    recommendations.push('JP drain output <30mL/day → Consider removal');
                }

                return recommendations;
            };

            const handleQuickAddPatient = async (transcript) => {
                const parsed = parseSpeechCommand(transcript);
                if (!parsed.room) {
                    alert('Could not detect a room number. Please include "room" followed by the number.');
                    return;
                }
                const patientData = {
                    room: parsed.room || '',
                    diagnosis: parsed.diagnosis || '',
                    problems: parsed.problems ? (typeof parsed.problems === 'string' ? parsed.problems.split(',').map(p => p.trim()) : parsed.problems) : [],
                    procedures: parsed.procedures ? (typeof parsed.procedures === 'string' ? parsed.procedures.split(',').map(p => p.trim()) : parsed.procedures) : [],
                    treatmentPlan: parsed.treatmentPlan || '',
                    diet: parsed.diet || 'Regular',
                    activity: parsed.activity || 'Ambulate TID',
                    dvtProphylaxis: parsed.dvtProphylaxis || 'Heparin 5000 TID',
                    giProphylaxis: parsed.giProphylaxis || 'Pantoprazole',
                    dispositionPlan: parsed.dispositionPlan || '',
                    concerns: parsed.concerns || '',
                    codeStatus: parsed.codeStatus || 'Full Code',
                    admitDate: getTodayISO(),
                    status: 'active'
                };
                await DB.add('patients', patientData);
                quickDictation.clear();
                setShowQuickAdd(false);
                loadPatients();
            };

            const filteredPatients = patients.filter(p =>
                p.room.toLowerCase().includes(searchQuery.toLowerCase()) ||
                p.diagnosis?.toLowerCase().includes(searchQuery.toLowerCase())
            );

            const sortedPatients = [...filteredPatients].sort((a, b) => {
                if (sortBy === 'room') return parseInt(a.room) - parseInt(b.room);
                if (sortBy === 'pod') return calculatePOD(b.admitDate) - calculatePOD(a.admitDate);
                if (sortBy === 'flags') return (b.concerns ? 1 : 0) - (a.concerns ? 1 : 0);
                return 0;
            });

            return (
                <div className="pb-24 md:pb-4">
                    {/* Search and Sort */}
                    <div className="sticky top-0 bg-white border-b border-gray-200 p-3 space-y-2 z-10">
                        <input
                            type="text"
                            placeholder="Search by room or diagnosis..."
                            value={searchQuery}
                            onChange={(e) => setSearchQuery(e.target.value)}
                            className="w-full bg-gray-50 border border-gray-300 rounded px-3 py-2 text-gray-800 text-sm"
                        />
                        <div className="flex gap-2 text-sm">
                            <select
                                value={sortBy}
                                onChange={(e) => setSortBy(e.target.value)}
                                className="flex-1 bg-gray-50 border border-gray-300 rounded px-2 py-1 text-gray-800"
                            >
                                <option value="room">Sort by Room</option>
                                <option value="pod">Sort by POD</option>
                                <option value="flags">Red Flags First</option>
                            </select>
                            <button
                                onClick={() => setShowQuickAdd(!showQuickAdd)}
                                className={`px-3 py-1 rounded font-medium transition ${
                                    showQuickAdd ? 'bg-red-500 hover:bg-red-600' : 'bg-emerald-600 hover:bg-emerald-700'
                                }`}
                            >
                                {showQuickAdd ? '✕ Close' : '🎤 Dictate'}
                            </button>
                            <button
                                onClick={() => {
                                    setEditingPatient(null);
                                    setShowPatientForm(true);
                                }}
                                className="bg-medical-600 text-white hover:bg-medical-700 text-white px-3 py-1 rounded font-medium"
                            >
                                + Form
                            </button>
                        </div>
                    </div>

                    {/* Quick Add by Dictation */}
                    {showQuickAdd && (
                        <div className="mx-3 mt-3 bg-white border-2 border-emerald-500/40 rounded-lg p-4 shadow-lg shadow-emerald-500/10">
                            <p className="text-sm text-gray-600 mb-1 font-medium">Quick Add Patient by Voice</p>
                            <p className="text-xs text-gray-400 mb-3">Say something like: "Room 512 diagnosis s/p lap chole diet clears activity ambulate heparin prophylaxis plan advance diet discharge home concern wound redness"</p>
                            <DictationBar dictation={quickDictation} onParse={handleQuickAddPatient} parseLabel="Save Patient" />
                        </div>
                    )}

                    {/* Patient Cards */}
                    <div className="p-3 space-y-3">
                        {sortedPatients.length === 0 ? (
                            <div className="text-center py-8 text-gray-500">
                                <p>No patients yet. Add one to get started!</p>
                            </div>
                        ) : (
                            sortedPatients.map(patient => (
                                <div
                                    key={patient.id}
                                    className={`patient-card-hover bg-white shadow-sm border rounded-lg p-4 ${patient.concerns ? 'red-flag-patient border-red-600' : 'border-gray-200'}`}
                                >
                                    {/* Header Row */}
                                    <div className="flex justify-between items-start mb-2">
                                        <div>
                                            <h3 className="text-2xl font-bold text-medical-600">Room {patient.room}</h3>
                                            <p className="text-sm text-gray-500">{patient.diagnosis || 'No diagnosis'}</p>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-sm text-gray-600">POD {calculatePOD(patient.admitDate)}</div>
                                            <div className="text-xs text-gray-500">{patient.codeStatus}</div>
                                        </div>
                                    </div>

                                    {/* Problems */}
                                    {patient.problems?.length > 0 && (
                                        <div className="mb-2">
                                            <p className="text-xs font-semibold text-gray-500 uppercase">Problems:</p>
                                            <div className="flex flex-wrap gap-1">
                                                {patient.problems.map((p, i) => (
                                                    <span key={i} className="text-xs bg-gray-50 px-2 py-1 rounded">{p}</span>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* Concerns */}
                                    {patient.concerns && (
                                        <div className="mb-2 p-2 bg-red-50 border border-red-500/50 rounded text-sm text-red-600">
                                            <strong>⚠️ Concerns:</strong> {patient.concerns}

                                    {/* Quick Info */}
                                    <div className="grid grid-cols-2 gap-2 text-sm mb-2">

                                            <span className="text-gray-500">Activity:</span> {patient.activity}

                                        <div>
                                            <span className="text-gray-500">DVT Prophylaxis:</span> {patient.dvtProphylaxis}

                                                        onClick={() => {
                                                            setSelectedPatientForLab(patient.id);
                                                            setShowLabForm(true);
                                                        }}
                                                        className="text-xs bg-medical-600 text-white hover:bg-medical-700 text-white px-2 py-1 rounded"
                                                    >
                                                        + Lab
                                                    </button>
                                                </div>
                                                {getPatientLabs(patient.id).length === 0 ? (
                                                    <p className="text-xs text-gray-500">No labs yet</p>
                                                ) : (
                                                    <div className="space-y-1">

        // ==================== ATTENDING VIEW COMPONENT ====================
        function AttendingView() {
            const [patients, setPatients] = React.useState([]);
            const [labs, setLabs] = React.useState([]);
            const [outputs, setOutputs] = React.useState([]);
            const [presentMode, setPresentMode] = React.useState(false);
            const [lastRefresh, setLastRefresh] = React.useState(new Date());

            React.useEffect(() => {
                loadData();
            }, []);

            const loadData = async () => {
                const patientsData = await DB.getAll('patients');
                const labsData = await DB.getAll('labs');
                const outputsData = await DB.getAll('outputs');

                // Sort: red flags first, then by room
                const sorted = patientsData.sort((a, b) => {
                    if ((b.concerns ? 1 : 0) !== (a.concerns ? 1 : 0)) {
                        return (b.concerns ? 1 : 0) - (a.concerns ? 1 : 0);
                    }
                    return parseInt(a.room) - parseInt(b.room);
                });

                setPatients(sorted);
                setLabs(labsData);
                setOutputs(outputsData);
                setLastRefresh(new Date());
            };

            const getPatientLabs = (patientId) => {
                return labs.filter(l => l.patientId === patientId)
                    .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            };

            const getPatientOutputs = (patientId) => {
                return outputs.filter(o => o.patientId === patientId)
                    .sort((a, b) => new Date(b.date) - new Date(a.date));
            };

            const [copySuccess, setCopySuccess] = React.useState(false);

            const exportText = () => {
                let text = `CHIEFROUNDS SIGN-OUT\n${getCurrentDateTime()}\n`;
                text += '━'.repeat(30) + '\n\n';

                patients.forEach((patient) => {
                    text += `Rm ${patient.room} | ${patient.diagnosis} | POD#${calculatePOD(patient.admitDate)} | ${patient.codeStatus}\n`;

                    if (patient.problems?.length > 0) {
                        text += 'Problems:\n';
                        patient.problems.forEach(p => { text += `  - ${p}\n`; });
                    }

                    if (patient.treatmentPlan) {
                        text += `Plan: ${patient.treatmentPlan}\n`;
                    }

                    text += `Diet: ${patient.diet} | Activity: ${patient.activity}\n`;
                    text += `DVT: ${patient.dvtProphylaxis} | GI: ${patient.giProphylaxis}\n`;

                    const patientLabs = getPatientLabs(patient.id).slice(0, 5);
                    if (patientLabs.length > 0) {
                        text += 'Labs: ';
                        text += patientLabs.map(lab => {
                            const range = LAB_RANGES[lab.type];
                            const flag = isLabAbnormal(lab.type, lab.value) ? '*' : '';
                            return `${lab.type} ${lab.value}${flag}`;
                        }).join(', ') + '\n';
                    }

                    const patientOutputs = getPatientOutputs(patient.id).slice(0, 3);
                    if (patientOutputs.length > 0) {
                        text += 'I/O: ';
                        text += patientOutputs.map(o => `${o.type} ${o.amount}mL`).join(', ') + '\n';
                    }

                    if (patient.concerns) {
                        text += `⚠ CONCERNS: ${patient.concerns}\n`;
                    }

                    if (patient.dispositionPlan) {
                        text += `Dispo: ${patient.dispositionPlan}\n`;
                    }

                    text += '\n';
                });

                text += '━'.repeat(30) + '\n';
                text += `${patients.length} patient(s) | *abnormal lab`;

                navigator.clipboard.writeText(text).then(() => {
                    setCopySuccess(true);
                    setTimeout(() => setCopySuccess(false), 2500);
                }).catch(() => {
                    // Fallback for mobile browsers
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    ta.style.position = 'fixed';
                    ta.style.left = '-9999px';
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    setCopySuccess(true);
                    setTimeout(() => setCopySuccess(false), 2500);
                });
            };

            const exportPDF = () => {
                const { jsPDF } = window;
                const doc = new jsPDF('p', 'mm', 'a4');
                let yPos = 20;
                const pageHeight = doc.internal.pageSize.height;
                const margin = 15;
                const lineHeight = 5;

                doc.setFontSize(14);
                doc.text('ChiefRounds Patient Sign-Out', margin, yPos);
                yPos += 8;

                doc.setFontSize(9);
                doc.text(`Generated: ${getCurrentDateTime()}`, margin, yPos);
                yPos += 6;

                patients.forEach((patient) => {
                    if (yPos > pageHeight - 20) {
                        doc.addPage();
                        yPos = 20;
                    }

                    doc.setFontSize(11);
                    doc.setTextColor(100, 165, 233);
                    doc.text(`Room ${patient.room} | ${patient.diagnosis} | POD ${calculatePOD(patient.admitDate)} | ${patient.codeStatus}`, margin, yPos);
                    yPos += 6;

                    doc.setTextColor(200, 200, 200);
                    doc.setFontSize(9);

                    if (patient.problems?.length > 0) {
                        doc.text('Problems:', margin, yPos);
                        yPos += 4;
                        patient.problems.forEach(p => {
                            doc.text(`• ${p}`, margin + 2, yPos);
                            yPos += 4;
                        });
                    }

                    if (patient.treatmentPlan) {
                        doc.text('Plan: ' + patient.treatmentPlan, margin, yPos, { maxWidth: 180 });
                        yPos += doc.getTextDimensions(patient.treatmentPlan).h + 4;
                    }

                    doc.text(`Diet: ${patient.diet} | Activity: ${patient.activity}`, margin, yPos);
                    yPos += 4;
                    doc.text(`DVT: ${patient.dvtProphylaxis} | GI: ${patient.giProphylaxis}`, margin, yPos);
                    yPos += 6;

                    const patientLabs = getPatientLabs(patient.id).slice(0, 3);
                    if (patientLabs.length > 0) {
                        doc.text('Recent Labs:', margin, yPos);
                        yPos += 4;
                        patientLabs.forEach(lab => {
                            const range = LAB_RANGES[lab.type];
                            doc.text(`${lab.type}: ${lab.value} ${range?.unit}`, margin + 2, yPos);
                            yPos += 4;
                        });
                    }

                    if (patient.concerns) {
                        doc.setTextColor(239, 68, 68);
                        doc.text(`CONCERNS: ${patient.concerns}`, margin, yPos, { maxWidth: 180 });
                        doc.setTextColor(200, 200, 200);
                        yPos += doc.getTextDimensions(patient.concerns).h + 4;
                    }

                    yPos += 4;
                });

                doc.save('ChiefRounds_SignOut.pdf');
            };

            if (presentMode) {
                return (
                    <div className="fixed inset-0 bg-cream-50 z-50 overflow-y-auto">
                        {/* Exit button in its own row at top, not overlapping content */}
                        <div className="sticky top-0 bg-cream-50/95 backdrop-blur-sm p-3 flex justify-end z-50 border-b border-gray-200">
                            <button
                                onClick={() => setPresentMode(false)}
                                className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded font-bold text-sm"
                            >
                                Exit Present
                            </button>
                        </div>

                        <div className="space-y-6 p-4 pb-20">
                            {patients.map((patient) => (
                                <div key={patient.id} className="border-l-4 border-medical-500 pl-5 pr-2">
                                    {/* Header: Room and Code Status */}
                                    <div className="text-xl font-bold text-medical-600 mb-1">
                                        Room {patient.room} | {patient.codeStatus}
                                    </div>

                                    {/* Diagnosis and Procedure - prominent */}
                                    <div className="text-2xl font-bold text-gray-800 leading-snug">
                                        {patient.diagnosis}
                                    </div>
                                    {patient.procedures?.length > 0 && (
                                        <div className="text-xl text-gray-700 mt-0.5">
                                            S/p {patient.procedures.join(', ')}
                                        </div>
                                    )}
                                    <div className="text-lg text-gray-500 font-medium mt-0.5">
                                        POD {calculatePOD(patient.admitDate)}
                                    </div>

                                    {/* Active Problems */}
                                    {patient.problems?.length > 0 && (
                                        <div className="mt-3 text-lg">
                                            <div className="font-semibold text-gray-700">Active Problems:</div>
                                            {patient.problems.map((p, i) => (
                                                <div key={i} className="text-gray-600 ml-2">- {p}</div>
                                            ))}
                                        </div>
                                    )}

                                    {/* Treatment Plan */}
                                    {patient.treatmentPlan && (
                                        <div className="mt-3 text-lg">
                                            <div className="font-semibold text-gray-700">Plan:</div>
                                            <div className="text-gray-600">{patient.treatmentPlan}</div>
                                        </div>
                                    )}

                                    {/* Orders summary */}
                                    <div className="mt-3 text-base text-gray-600 space-y-0.5">
                                        <div><span className="font-semibold text-gray-700">Diet:</span> {patient.diet || 'N/A'}</div>
                                        <div><span className="font-semibold text-gray-700">Activity:</span> {patient.activity || 'N/A'}</div>
                                        <div><span className="font-semibold text-gray-700">DVT Ppx:</span> {patient.dvtProphylaxis || 'N/A'}</div>
                                    </div>

                                    {/* Disposition */}
                                    {patient.dispositionPlan && (
                                        <div className="mt-2 text-lg">
                                            <span className="font-semibold text-gray-700">Dispo:</span> {patient.dispositionPlan}
                                        </div>
                                    )}

                                    {/* Concerns - red alert */}
                                    {patient.concerns && (
                                        <div className="mt-3 text-lg text-red-600 font-bold bg-red-50 border border-red-200 rounded p-2">
                                            CONCERNS: {patient.concerns}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="pb-24 md:pb-4">
                    {/* Header */}
                    <div className="sticky top-0 bg-white border-b border-gray-200 p-4 flex justify-between items-center z-10">
                        <div>
                            <h2 className="text-lg font-bold">Attending Sign-Out</h2>
                            <p className="text-xs text-gray-500">Last refreshed: {formatTime(lastRefresh)}</p>
                        </div>
                        <div className="flex gap-1.5 flex-wrap justify-end text-sm">
                            <button
                                onClick={loadData}
                                className="bg-medical-600 text-white hover:bg-medical-700 px-3 py-1.5 rounded font-medium"
                            >
                                Refresh
                            </button>
                            <button
                                onClick={() => setPresentMode(true)}
                                className="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded font-medium"
                            >
                                Present
                            </button>
                            <button
                                onClick={exportPDF}
                                className="bg-amber-600 hover:bg-amber-700 text-white px-3 py-1.5 rounded font-medium"
                            >
                                PDF
                            </button>
                            <button
                                onClick={exportText}
                                className={`px-3 py-1.5 rounded font-medium transition ${
                                    copySuccess
                                        ? 'bg-green-600 text-white'
                                        : 'bg-gray-700 hover:bg-gray-800 text-white'
                                }`}
                            >
                                {copySuccess ? 'Copied!' : 'Copy Text'}
                            </button>
                        </div>
                    </div>

                    {/* Patient List */}
                    <div className="p-4 space-y-4">
                        {patients.length === 0 ? (
                            <div className="text-center py-8 text-gray-500">No patients yet</div>
                        ) : (
                            patients.map(patient => (
                                <div
                                    key={patient.id}
                                    className={`bg-white border rounded-lg p-4 ${patient.concerns ? 'border-red-600' : 'border-gray-200'}`}
                                >
                                    <div className="font-bold text-lg text-medical-500 mb-2">
                                        Room {patient.room} | {patient.diagnosis} | POD {calculatePOD(patient.admitDate)} | {patient.codeStatus}
                                    </div>

                                    {patient.problems?.length > 0 && (
                                        <div className="mb-2">
                                            <span className="font-semibold">Active Problems:</span>
                                            <div className="ml-2 space-y-1">
                                                {patient.problems.map((p, i) => (
                                                    <div key={i} className="text-sm">• {p}</div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {patient.treatmentPlan && (
                                        <div className="mb-2 text-sm">
                                            <span className="font-semibold">Plan:</span> {patient.treatmentPlan}
                                        </div>
                                    )}

                                    <div className="text-sm mb-2">
                                        Diet: {patient.diet} | Activity: {patient.activity} | DVT: {patient.dvtProphylaxis} | GI: {patient.giProphylaxis}
                                    </div>

                                    {getPatientLabs(patient.id).length > 0 && (
                                        <div className="mb-2 text-sm">
                                            <span className="font-semibold">Labs:</span>
                                            <div className="ml-2 space-y-1">
                                                {getPatientLabs(patient.id).slice(0, 5).map((lab) => {
                                                    const isAbnormal = isLabAbnormal(lab.type, lab.value);
                                                    return (
                                                        <div
                                                            key={lab.id}
                                                            className={isAbnormal ? 'text-red-600' : ''}
                                                        >
                                                            {lab.type}: {lab.value}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}

                                    {getPatientOutputs(patient.id).length > 0 && (
                                        <div className="mb-2 text-sm">
                                            <span className="font-semibold">Outputs:</span>
                                            <div className="ml-2">
                                                {getPatientOutputs(patient.id).slice(0, 3).map((out) => (
                                                    <div key={out.id}>{out.type}: {out.amount}mL</div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {patient.concerns && (
                                        <div className="mt-2 p-2 bg-red-50 border border-red-500/50 rounded text-sm text-red-600 font-semibold">
                                            ⚠️ {patient.concerns}
                                        </div>
                                    )}

                                    {patient.dispositionPlan && (
                                        <div className="text-sm mt-2">
                                            <span className="font-semibold">Dispo:</span> {patient.dispositionPlan}
                                        </div>
                                    )}
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }

        // ==================== TEAM TASKS COMPONENT ====================
        function TeamTasks({ teamData, currentUser }) {
            const [patients, setPatients] = React.useState([]);
            const [tasks, setTasks] = React.useState([]);
            const [filter, setFilter] = React.useState('All');
            const [memberFilter, setMemberFilter] = React.useState('Everyone');
            const [showTaskForm, setShowTaskForm] = React.useState(false);
            const [selectedPatientForTask, setSelectedPatientForTask] = React.useState(null);
            const [reassigningTaskId, setReassigningTaskId] = React.useState(null);
            const dictation = useDictation();
            const myName = currentUser?.displayName || currentUser?.email || '';

            React.useEffect(() => {
                loadData();
            }, []);

            const loadData = async () => {
                const patientsData = await DB.getAll('patients');
                const tasksData = await DB.getAll('tasks');
                setPatients(patientsData.sort((a, b) => parseInt(a.room) - parseInt(b.room)));
                setTasks(tasksData);
            };

            const handleSaveTask = async (taskData) => {
                await DB.add('tasks', { ...taskData, assignedBy: currentUser?.displayName || currentUser?.email });
                setShowTaskForm(false);
                setSelectedPatientForTask(null);
                loadData();
            };

            const toggleTaskComplete = async (taskId, currentState) => {
                const task = tasks.find(t => t.id === taskId);
                if (task) {
                    await DB.put('tasks', { ...task, completed: !currentState, completedBy: !currentState ? (currentUser?.displayName || currentUser?.email) : null, completedAt: !currentState ? new Date().toISOString() : null });
                    loadData();
                }
            };

            const reassignTask = async (taskId, newAssignee) => {
                const task = tasks.find(t => t.id === taskId);
                if (task) {
                    await DB.put('tasks', { ...task, assignee: newAssignee });
                    setReassigningTaskId(null);
                    loadData();
                }
            };

            const deleteTask = async (taskId) => {
                await DB.delete('tasks', taskId);
                loadData();
            };

            const handleQuickDictateTask = async (transcript) => {
                const parsed = parseTaskSpeech(transcript);
                if (!parsed.room) {
                    alert('Please mention a room number (e.g., "room 512...")');
                    return;
                }
                const foundPatient = patients.find(p => p.room === parsed.room);
                if (!foundPatient) {
                    alert(`Room ${parsed.room} not found`);
                    return;
                }
                await handleSaveTask({
                    patientId: foundPatient.id,
                    category: parsed.category || 'Other',
                    description: parsed.description,
                    priority: parsed.priority || 'Medium',
                    assignee: '',
                    completed: false,
                    createdAt: new Date().toISOString(),
                    assignedBy: currentUser?.displayName || currentUser?.email
                });
                dictation.clear();
            };

            const getTaskColor = (category) => {
                const colors = {
                    'Labs': 'purple',
                    'Imaging': 'blue',
                    'Consults': 'green',
                    'Medications': 'orange',
                    'Activity': 'teal',
                    'Diet': 'yellow',
                    'Discharge': 'pink',
                    'Other': 'gray'
                };
                const baseColors = {
                    'purple': 'bg-purple-500/20 border-purple-500/50 text-purple-300',
                    'blue': 'bg-blue-500/20 border-blue-500/50 text-blue-600',
                    'green': 'bg-green-500/20 border-green-500/50 text-green-600',
                    'orange': 'bg-orange-500/20 border-orange-500/50 text-orange-300',
                    'teal': 'bg-teal-500/20 border-teal-500/50 text-teal-300',
                    'yellow': 'bg-yellow-500/20 border-yellow-500/50 text-yellow-600',
                    'pink': 'bg-pink-500/20 border-pink-500/50 text-pink-300',
                    'gray': 'bg-gray-500/20 border-gray-500/50 text-gray-300'
                };
                return baseColors[colors[category] || 'gray'];
            };

            const quickTasks = [
                { category: 'Labs', description: 'Check AM labs' },
                { category: 'Activity', description: 'PT Evaluation' },
                { category: 'Activity', description: 'Wound Care' },
                { category: 'Discharge', description: 'DC Planning' },
                { category: 'Other', description: 'Family Update' }
            ];

            const filteredTasks = tasks.filter(t => {
                // Status filter
                if (filter === 'Incomplete' && t.completed) return false;
                if (filter === 'Completed' && !t.completed) return false;
                if (filter === 'My Tasks' && t.assignee !== myName) return false;
                // Member filter
                if (memberFilter !== 'Everyone') {
                    if (memberFilter === 'Unassigned' && t.assignee) return false;
                    if (memberFilter !== 'Unassigned' && t.assignee !== memberFilter) return false;
                }
                return true;
            });

            const groupedByPatient = {};
            patients.forEach(p => {
                groupedByPatient[p.id] = {
                    room: p.room,
                    tasks: filteredTasks.filter(t => t.patientId === p.id)
                };
            });

            const completionByPatient = {};
            patients.forEach(p => {
                const patientTasks = tasks.filter(t => t.patientId === p.id);
                const completed = patientTasks.filter(t => t.completed).length;
                completionByPatient[p.id] = patientTasks.length > 0
                    ? Math.round((completed / patientTasks.length) * 100)
                    : 0;
            });

            return (
                <div className="pb-24 md:pb-4">
                    {/* Header */}
                    <div className="sticky top-0 bg-white border-b border-gray-200 p-4 space-y-2 z-10">
                        <div className="flex justify-between items-center">
                            <h2 className="text-lg font-bold">Team Tasks</h2>
                            <button
                                onClick={() => {
                                    setSelectedPatientForTask(null);
                                    setShowTaskForm(true);
                                }}
                                className="bg-medical-600 text-white hover:bg-medical-700 px-3 py-1 rounded font-medium text-sm"
                            >
                                + Task
                            </button>
                        </div>
                        <div className="flex gap-2 text-sm overflow-x-auto">
                            {['All', 'My Tasks', 'Incomplete', 'Completed'].map(f => (
                                <button
                                    key={f}
                                    onClick={() => setFilter(f)}
                                    className={`px-3 py-1 rounded whitespace-nowrap ${
                                        filter === f
                                            ? 'bg-medical-600 text-white font-semibold'
                                            : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                                    }`}
                                >
                                    {f}
                                    {f === 'My Tasks' && (() => {
                                        const count = tasks.filter(t => t.assignee === myName && !t.completed).length;
                                        return count > 0 ? ` (${count})` : '';
                                    })()}
                                </button>
                            ))}
                        </div>
                        {/* Team member filter */}
                        {teamData?.members?.length > 1 && (
                            <div className="flex items-center gap-2">
                                <span className="text-xs text-gray-500 font-medium">Filter by:</span>
                                <select
                                    value={memberFilter}
                                    onChange={e => setMemberFilter(e.target.value)}
                                    className="text-sm bg-gray-50 border border-gray-200 rounded px-2 py-1 text-gray-700"
                                >
                                    <option value="Everyone">Everyone</option>
                                    <option value="Unassigned">Unassigned</option>
                                    {teamData.members.map((m, i) => (
                                        <option key={i} value={m.name || m.email}>{m.name || m.email}</option>
                                    ))}
                                </select>
                            </div>
                        )}
                    </div>

                    {/* Quick Dictation Bar */}
                    <div className="px-4 pt-3">
                        <DictationBar
                            dictation={dictation}
                            onParse={handleQuickDictateTask}
                            parseLabel="Save Task"
                        />
                    </div>

                    {/* Patient Task Groups */}
                    <div className="p-4 space-y-4">
                        {patients.length === 0 ? (
                            <div className="text-center py-8 text-gray-500">No patients</div>
                        ) : (
                            patients.map(patient => {
                                const patientTasks = groupedByPatient[patient.id].tasks;
                                const completion = completionByPatient[patient.id];
                                return (
                                    <div key={patient.id} className="bg-white border border-gray-200 rounded-lg p-4">
                                        {/* Patient Header */}
                                        <div className="flex justify-between items-center mb-3">
                                            <h3 className="text-lg font-bold text-medical-500">Room {patient.room}</h3>
                                            <button
                                                onClick={() => {
                                                    setSelectedPatientForTask(patient.id);
                                                    setShowTaskForm(true);
                                                }}
                                                className="text-sm bg-medical-600 text-white hover:bg-medical-700 text-white px-2 py-1 rounded"
                                            >
                                                Add Task
                                            </button>
                                        </div>

                                        {/* Progress Bar */}
                                        {tasks.filter(t => t.patientId === patient.id).length > 0 && (
                                            <div className="mb-3">
                                                <div className="flex justify-between text-xs text-gray-500 mb-1">
                                                    <span>Task Progress</span>
                                                    <span>{completion}%</span>
                                                </div>
                                                <div className="progress-bar">
                                                    <div className="progress-fill" style={{ width: `${completion}%` }}></div>
                                                </div>
                                            </div>
                                        )}

                                        {/* Quick Task Buttons */}
                                        {patientTasks.length === 0 && (
                                            <div className="mb-3 grid grid-cols-2 gap-1 text-xs">
                                                {quickTasks.map((qt, i) => (
                                                    <button
                                                        key={i}
                                                        onClick={async () => {
                                                            await handleSaveTask({
                                                                patientId: patient.id,
                                                                category: qt.category,
                                                                description: qt.description,
                                                                priority: 'Medium',
                                                                assignee: '',
                                                                completed: false,
                                                                createdAt: new Date().toISOString()
                                                            });
                                                        }}
                                                        className="bg-gray-50 hover:bg-gray-100 px-2 py-1 rounded"
                                                    >
                                                        {qt.description}
                                                    </button>
                                                ))}
                                            </div>
                                        )}

                                        {/* Task List */}
                                        {patientTasks.length === 0 ? (
                                            <p className="text-sm text-gray-500">No tasks</p>
                                        ) : (
                                            <div className="space-y-2">
                                                {patientTasks.map(task => (
                                                    <div
                                                        key={task.id}
                                                        className={`border rounded-lg p-3 text-sm ${getTaskColor(task.category)} ${
                                                            task.completed ? 'opacity-60' : ''
                                                        }`}
                                                    >
                                                        <div className="flex items-start gap-2">
                                                            <input
                                                                type="checkbox"
                                                                checked={task.completed}
                                                                onChange={() => toggleTaskComplete(task.id, task.completed)}
                                                                className="mt-1 w-4 h-4"
                                                            />
                                                            <div className="flex-1 min-w-0">
                                                                <div className={`font-medium ${task.completed ? 'line-through text-gray-400' : 'text-gray-800'}`}>
                                                                    {task.description}
                                                                </div>
                                                                {task.priority === 'High' && (
                                                                    <span className="text-xs font-semibold text-red-600">HIGH PRIORITY</span>
                                                                )}
                                                                <div className="flex flex-wrap items-center gap-2 mt-1.5">
                                                                    {/* Assignee badge - tap to reassign */}
                                                                    {reassigningTaskId === task.id ? (
                                                                        <select
                                                                            autoFocus
                                                                            value={task.assignee || ''}
                                                                            onChange={e => reassignTask(task.id, e.target.value)}
                                                                            onBlur={() => setReassigningTaskId(null)}
                                                                            className="text-xs bg-white border border-gray-300 rounded px-2 py-1"
                                                                        >
                                                                            <option value="">Unassigned</option>
                                                                            {teamData?.members?.map((m, i) => (
                                                                                <option key={i} value={m.name || m.email}>{m.name || m.email}</option>
                                                                            ))}
                                                                        </select>
                                                                    ) : (
                                                                        <button
                                                                            onClick={() => setReassigningTaskId(task.id)}
                                                                            className={`inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded-full border transition ${
                                                                                task.assignee

                                                                                    : 'bg-yellow-50 border-yellow-300 text-yellow-700'

                                                                    {task.assignedBy && (
                                                                        <span className="text-[10px] text-gray-400">added by {task.assignedBy}</span>
