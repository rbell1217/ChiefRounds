            };

            const renderContent = () => {
                switch (activeTab) {
                    case 'Home': return <HomeScreen />;
                    case 'Patients': return <PatientTracker />;
                    case 'Attending': return <AttendingView />;
                    case 'Tasks': return <TeamTasks teamData={teamData} currentUser={user} />;
                    case 'Consults': return <ConsultsTracker />;
                    case 'Trauma': return <TraumaActivations />;
                    case 'Census': return <CensusManagement />;
                    case 'Handoff': return <Handoff />;
                    case 'Pre-Round': return <PreRound />;
                    case 'Rounds': return <RoundsRecorder />;
                    case 'M&M': return <MMLessonsLearned currentUser={user} />;
                    case 'Case Prep': return <CasePrep />;
                    case 'Case Conf': return <CaseConference />;
                    case 'Att. Prefs': return <AttendingPreferences />;
                    default: return <HomeScreen />;
                }
            };

            // Team Manager Modal
            const TeamManagerModal = () => {
                const [mode, setMode] = React.useState(null); // null, 'create', 'join'
                const [newTeamName, setNewTeamName] = React.useState('');
                const [joinCode, setJoinCode] = React.useState('');
                const [error, setError] = React.useState('');
                const [loading, setLoading] = React.useState(false);
                const [confirmDelete, setConfirmDelete] = React.useState(null);
                const [confirmLeave, setConfirmLeave] = React.useState(null);
                const [expandedTeam, setExpandedTeam] = React.useState(null);
                const [confirmRemoveMember, setConfirmRemoveMember] = React.useState(null);

                const removeMember = async (tid, memberUid) => {
                    try {
                        const tDoc = await db.collection('teams').doc(tid).get();
                        if (!tDoc.exists) return;
                        const members = (tDoc.data().members || []).filter(m => m.uid !== memberUid);
                        await db.collection('teams').doc(tid).update({ members });
                        // Also remove from that user's teamIds
                        try {
                            const memberDoc = await db.collection('users').doc(memberUid).get();
                            if (memberDoc.exists) {
                                const mData = memberDoc.data();
                                const mTeamIds = (mData.teamIds || []).filter(id => id !== tid);
                                const updates = { teamIds: mTeamIds };
                                if (mData.teamId === tid) updates.teamId = mTeamIds[0] || null;
                                await db.collection('users').doc(memberUid).set(updates, { merge: true });
                            }
                        } catch (e) { /* user doc may not be accessible */ }
                        setConfirmRemoveMember(null);
                        await loadAllTeams(user.uid);
                    } catch (e) {
                        console.error('Error removing member:', e);
                    }
                };

                const generateCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();

                const handleCreateNew = async () => {
                    if (!newTeamName.trim()) return;
                    setLoading(true);
                    setError('');
                    try {
                        const code = generateCode();
                        const teamRef = await db.collection('teams').add({
                            name: newTeamName.trim(),
                            inviteCode: code,
                            createdBy: user.uid,
                            createdAt: new Date().toISOString(),
                            members: [{ uid: user.uid, name: user.displayName || user.email, email: user.email, role: 'admin' }]
                        });
                        await db.collection('users').doc(user.uid).set({
                            teamId: teamRef.id,
                            teamIds: firebase.firestore.FieldValue.arrayUnion(teamRef.id)
                        }, { merge: true });
                        await switchTeam(teamRef.id);
                        setShowTeamManager(false);
                    } catch (err) {
                        setError(err.message);
                    }
                    setLoading(false);
                };

                const handleJoinNew = async () => {
                    if (!joinCode.trim()) return;
                    setLoading(true);
                    setError('');
                    try {
                        const snap = await db.collection('teams').where('inviteCode', '==', joinCode.trim().toUpperCase()).get();
                        if (snap.empty) {
                            setError('Invalid invite code.');
                            setLoading(false);
                            return;
                        }
                        const tDoc = snap.docs[0];
                        const tData = tDoc.data();
                        const alreadyMember = tData.members?.some(m => m.uid === user.uid);
                        if (!alreadyMember) {
                            await tDoc.ref.update({
                                members: firebase.firestore.FieldValue.arrayUnion({
                                    uid: user.uid, name: user.displayName || user.email, email: user.email, role: 'member'
                                })
                            });
                        }
                        await db.collection('users').doc(user.uid).set({
                            teamId: tDoc.id,
                            teamIds: firebase.firestore.FieldValue.arrayUnion(tDoc.id)
                        }, { merge: true });
                        await switchTeam(tDoc.id);
                        setShowTeamManager(false);
                    } catch (err) {
                        setError(err.message);
                    }
                    setLoading(false);
                };

                return (
                    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4 modal-backdrop" onClick={() => setShowTeamManager(false)}>
                        <div className="bg-white rounded-xl shadow-xl w-full max-w-md max-h-[80vh] overflow-y-auto modal-content" onClick={e => e.stopPropagation()}>
                            <div className="p-5 border-b border-gray-100">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-lg font-bold text-gray-800">Manage Teams</h2>
                                    <button onClick={() => setShowTeamManager(false)} className="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
                                </div>
                            </div>

                            <div className="p-5 space-y-3">
                                <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Your Teams</p>
                                {allTeams.map(t => (
                                    <div key={t.id} className={`border rounded-xl p-3 transition ${t.id === teamId ? 'border-medical-400 bg-slate-50' : 'border-gray-100 hover:border-gray-200'}`}>
                                        <div className="flex justify-between items-start">
                                            <div className="flex-1">
                                                <div className="flex items-center gap-2">
                                                    <p className="font-semibold text-gray-800">{t.name}</p>
                                                    {t.id === teamId && <span className="text-[10px] bg-medical-600 text-white px-1.5 py-0.5 rounded">Active</span>}
                                                </div>
                                                <div className="flex items-center gap-2 mt-1">
                                                    <span className="text-xs text-gray-400">Code:</span>
                                                    <code className="text-xs font-mono bg-gray-100 px-1.5 py-0.5 rounded tracking-wider">{t.inviteCode}</code>
                                                </div>
                                                <button onClick={(e) => { e.stopPropagation(); setExpandedTeam(expandedTeam === t.id ? null : t.id); }}
                                                    className="text-xs text-gray-400 hover:text-gray-600 mt-1 flex items-center gap-1">
                                                    {t.members?.length || 1} member(s) <span>{expandedTeam === t.id ? '\u25B2' : '\u25BC'}</span>
                                                </button>
                                                {expandedTeam === t.id && t.members && (
                                                    <div className="mt-2 space-y-1">
                                                        {t.members.map((m, mi) => (
                                                            <div key={mi} className="flex items-center justify-between text-xs">
                                                                <div className="flex items-center gap-1.5">
                                                                    <div className="w-5 h-5 rounded-full bg-gray-200 flex items-center justify-center text-[10px] font-bold text-gray-500">{(m.name || m.email || '?')[0].toUpperCase()}</div>
                                                                    <span className="text-gray-600">{m.name || m.email}</span>
                                                                    {m.role === 'admin' && <span className="text-[9px] bg-medical-600 text-white px-1 py-0.5 rounded">Admin</span>}
                                                                </div>
                                                                {t.createdBy === user.uid && m.uid !== user.uid && (
                                                                    confirmRemoveMember === m.uid + '_' + t.id ? (
                                                                        <div className="flex gap-1">
                                                                            <button onClick={() => removeMember(t.id, m.uid)} className="text-[10px] bg-red-500 text-white px-1.5 py-0.5 rounded">Remove</button>
                                                                            <button onClick={() => setConfirmRemoveMember(null)} className="text-[10px] bg-gray-200 text-gray-600 px-1.5 py-0.5 rounded">No</button>
                                                                        </div>
                                                                    ) : (
                                                                        <button onClick={() => setConfirmRemoveMember(m.uid + '_' + t.id)} className="text-[10px] text-gray-400 hover:text-red-500">&times;</button>
                                                                    )
                                                                )}
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                            <div className="flex flex-col gap-1 ml-2">
                                                {t.id !== teamId && (
                                                    <button onClick={() => switchTeam(t.id)} className="text-xs bg-medical-600 text-white px-2.5 py-1 rounded-lg hover:bg-medical-700 transition">
                                                        Switch
                                                    </button>
                                                )}
                                                {confirmLeave === t.id ? (
                                                    <div className="flex gap-1">
                                                        <button onClick={() => { leaveTeam(t.id); setConfirmLeave(null); }} className="text-[10px] bg-red-500 text-white px-1.5 py-0.5 rounded">Yes</button>
                                                        <button onClick={() => setConfirmLeave(null)} className="text-[10px] bg-gray-200 text-gray-600 px-1.5 py-0.5 rounded">No</button>
                                                    </div>
                                                ) : (
                                                    <button onClick={() => setConfirmLeave(t.id)} className="text-xs text-gray-400 hover:text-amber-600 transition">
                                                        Leave
                                                    </button>
                                                )}
                                                {t.createdBy === user.uid && (
                                                    confirmDelete === t.id ? (
                                                        <div className="flex gap-1">
                                                            <button onClick={() => { deleteTeam(t.id); setConfirmDelete(null); }} className="text-[10px] bg-red-600 text-white px-1.5 py-0.5 rounded">Delete</button>
                                                            <button onClick={() => setConfirmDelete(null)} className="text-[10px] bg-gray-200 text-gray-600 px-1.5 py-0.5 rounded">No</button>
                                                        </div>
                                                    ) : (
                                                        <button onClick={() => setConfirmDelete(t.id)} className="text-xs text-gray-400 hover:text-red-600 transition">
                                                            Delete
                                                        </button>
                                                    )
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}

                                {allTeams.length === 0 && (
                                    <p className="text-sm text-gray-400 text-center py-4">No teams yet. Create or join one below.</p>
                                )}
                            </div>

                            <div className="p-5 border-t border-gray-100 space-y-3">
                                {!mode && (
                                    <div className="flex gap-2">
                                        <button onClick={() => setMode('create')} className="flex-1 bg-medical-600 hover:bg-medical-700 text-white py-2 rounded-lg font-medium text-sm transition">
                                            Create New Team
                                        </button>
                                        <button onClick={() => setMode('join')} className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 rounded-lg font-medium text-sm transition">
                                            Join Team
                                        </button>
                                    </div>
                                )}
                                {mode === 'create' && (
                                    <div className="space-y-2">
                                        <input value={newTeamName} onChange={e => setNewTeamName(e.target.value)} placeholder="Team name" className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-800" />
                                        <div className="flex gap-2">
                                            <button onClick={handleCreateNew} disabled={loading || !newTeamName.trim()} className="flex-1 bg-medical-600 hover:bg-medical-700 text-white py-2 rounded-lg font-medium text-sm disabled:opacity-50 transition">
                                                {loading ? 'Creating...' : 'Create'}
                                            </button>
                                            <button onClick={() => { setMode(null); setError(''); }} className="px-3 py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-lg text-sm transition">Cancel</button>
                                        </div>
                                    </div>
                                )}
                                {mode === 'join' && (
                                    <div className="space-y-2">
                                        <input value={joinCode} onChange={e => setJoinCode(e.target.value.toUpperCase())} placeholder="Invite code" maxLength={6} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-800 font-mono tracking-widest text-center uppercase" />
                                        <div className="flex gap-2">
                                            <button onClick={handleJoinNew} disabled={loading || !joinCode.trim()} className="flex-1 bg-medical-600 hover:bg-medical-700 text-white py-2 rounded-lg font-medium text-sm disabled:opacity-50 transition">
                                                {loading ? 'Joining...' : 'Join'}
                                            </button>
                                            <button onClick={() => { setMode(null); setError(''); }} className="px-3 py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-lg text-sm transition">Cancel</button>
                                        </div>
                                    </div>
                                )}
                                {error && <p className="text-xs text-red-500">{error}</p>}
                            </div>
                        </div>
                    </div>
                );
            };

            // Profile dropdown component
            // ==================== SPEECH DICTIONARY MODAL ====================
            const SpeechDictionaryModal = () => {
                const [entries, setEntries] = React.useState([]);
                const [newWrong, setNewWrong] = React.useState('');
                const [newRight, setNewRight] = React.useState('');
                const [saving, setSaving] = React.useState(false);

                React.useEffect(() => {
                    setEntries(CustomDictionary.getAll());
                }, []);

                const handleAdd = async () => {
                    if (!newWrong.trim() || !newRight.trim()) return;
                    setSaving(true);
                    try {
                        await CustomDictionary.add(newWrong, newRight);
                        setEntries(CustomDictionary.getAll());
                        setNewWrong('');
                        setNewRight('');
                    } catch(e) { alert('Error saving: ' + e.message); }
                    setSaving(false);
                };

                const handleRemove = async (id) => {
                    try {
                        await CustomDictionary.remove(id);
                        setEntries(CustomDictionary.getAll());
                    } catch(e) { alert('Error removing: ' + e.message); }
                };

                return (
                    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={() => setShowDictionary(false)}>
                        <div className="bg-white rounded-2xl w-full max-w-md max-h-[80vh] flex flex-col shadow-2xl" onClick={e => e.stopPropagation()}>
                            <div className="p-4 border-b border-gray-100">
                                <div className="flex justify-between items-center mb-1">
                                    <h2 className="text-lg font-bold text-gray-800">Speech Dictionary</h2>
                                    <button onClick={() => setShowDictionary(false)} className="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
                                </div>
                                <p className="text-xs text-gray-500">Teach the app to fix words that dictation gets wrong. When the mic hears the wrong word, it will automatically replace it with the correct one.</p>
                            </div>

                            <div className="p-4 border-b border-gray-100 bg-slate-50">
                                <div className="flex gap-2 items-end">
                                    <div className="flex-1">
                                        <label className="text-[10px] font-semibold text-gray-500 uppercase tracking-wide">Mic hears</label>
                                        <input type="text" value={newWrong} onChange={e => setNewWrong(e.target.value)}
                                            placeholder="e.g. city" className="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm mt-0.5" />
                                    </div>
                                    <div className="text-gray-400 text-lg pb-1.5">&rarr;</div>
                                    <div className="flex-1">
                                        <label className="text-[10px] font-semibold text-gray-500 uppercase tracking-wide">Replace with</label>
                                        <input type="text" value={newRight} onChange={e => setNewRight(e.target.value)}
                                            placeholder="e.g. CT" className="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm mt-0.5"
                                            onKeyDown={e => e.key === 'Enter' && handleAdd()} />
                                    </div>
                                    <button onClick={handleAdd} disabled={saving || !newWrong.trim() || !newRight.trim()}
                                        className="bg-medical-600 text-white px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-medical-700 disabled:opacity-40 transition shrink-0">
                                        Add
                                    </button>
                                </div>
                            </div>

                            <div className="overflow-y-auto flex-1 p-3">
                                {entries.length === 0 ? (
                                    <div className="text-center py-8">
                                        <p className="text-sm text-gray-400">No custom corrections yet.</p>
                                        <p className="text-xs text-gray-300 mt-1">Add words the mic commonly gets wrong.</p>
                                    </div>
                                ) : entries.map(entry => (
                                    <div key={entry.id} className="flex items-center justify-between py-2 border-b border-gray-50 last:border-0">
                                        <div className="flex items-center gap-2 text-sm min-w-0">
                                            <span className="text-red-400 line-through truncate">{entry.wrong}</span>
                                            <span className="text-gray-300">&rarr;</span>
                                            <span className="text-green-600 font-medium truncate">{entry.right}</span>
                                        </div>
                                        <button onClick={() => handleRemove(entry.id)} className="text-gray-300 hover:text-red-400 text-lg ml-2 shrink-0">&times;</button>
                                    </div>
                                ))}
                            </div>

                            <div className="p-3 border-t border-gray-100 text-center">
                                <p className="text-[10px] text-gray-400">{entries.length} custom correction{entries.length !== 1 ? 's' : ''} - shared with your team</p>
                            </div>
                        </div>
                    </div>
                );
            };

            const ProfileMenu = () => (
                <div className="relative">
                    <button
                        onClick={() => setShowProfile(!showProfile)}
                        className="flex items-center gap-2 bg-gray-50 hover:bg-gray-100 rounded-full py-1.5 px-3 transition"
                    >
                        <div className="w-7 h-7 rounded-full bg-medical-600 text-white flex items-center justify-center text-xs font-bold">
                            {(user.displayName || user.email || '?')[0].toUpperCase()}
                        </div>
                        <span className="text-sm font-medium text-gray-700 hidden md:inline">{user.displayName || user.email?.split('@')[0]}</span>
                    </button>
                    {showProfile && (
                        <div className="absolute right-0 top-full mt-2 bg-white border border-gray-100 rounded-xl shadow-lg w-72 z-50 overflow-hidden">
                            <div className="p-4 border-b border-gray-100">
                                <p className="font-semibold text-gray-800">{user.displayName || 'User'}</p>
                                <p className="text-xs text-gray-500">{user.email}</p>
                            </div>
                            {teamData && (
                                <div className="p-4 border-b border-gray-100">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <p className="text-xs text-gray-400 font-medium uppercase tracking-wide mb-1">Current Team</p>
                                            <p className="font-semibold text-gray-800">{teamData.name}</p>
                                        </div>
                                        <button onClick={() => { setShowTeamManager(true); setShowProfile(false); }} className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-2 py-1 rounded-lg transition">
                                            Manage
                                        </button>
                                    </div>
                                    <div className="flex items-center gap-2 mt-2">
                                        <span className="text-xs text-gray-500">Invite code:</span>
                                        <code className="text-xs font-mono bg-gray-100 px-2 py-0.5 rounded font-bold tracking-widest">{teamData.inviteCode}</code>
                                    </div>
                                    <p className="text-xs text-gray-400 mt-2">{teamData.members?.length || 1} member(s)</p>
                                    <div className="mt-2 space-y-1">
                                        {teamData.members?.map((m, i) => (
                                            <div key={i} className="flex items-center gap-2 text-xs text-gray-600">
                                                <div className="w-5 h-5 rounded-full bg-gray-200 flex items-center justify-center text-[10px] font-bold text-gray-500">{(m.name || m.email || '?')[0].toUpperCase()}</div>
                                                <span>{m.name || m.email}</span>
                                                {m.role === 'admin' && <span className="text-[10px] bg-medical-600 text-white px-1.5 py-0.5 rounded">Admin</span>}
                                            </div>
                                        ))}
                                    </div>
                                    {allTeams.length > 1 && (
                                        <div className="mt-3 pt-3 border-t border-gray-100">
                                            <p className="text-xs text-gray-400 mb-2">Switch team:</p>
                                            <div className="space-y-1">
                                                {allTeams.filter(t => t.id !== teamId).map(t => (
                                                    <button key={t.id} onClick={() => switchTeam(t.id)} className="w-full text-left text-xs px-2 py-1.5 rounded-lg hover:bg-slate-50 text-gray-600 hover:text-medical-700 transition flex justify-between items-center">
                                                        <span>{t.name}</span>
                                                        <span className="text-gray-300">{t.members?.length || 1}m</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                            <div className="p-3 border-b border-gray-100">
                                <div className="flex items-center justify-between">
                                    <div className="flex items-center gap-2">
                                        <span className="text-sm">🔒</span>
                                        <span className="text-xs font-medium text-gray-600">HIPAA Encryption</span>
                                    </div>
                                    <span className="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-medium">Active</span>
                                </div>
                                <p className="text-[10px] text-gray-400 mt-1">PHI encrypted at rest using {teamData?.hipaaPassphrase ? 'custom passphrase' : 'invite code'}. Auto-lock after {teamData?.hipaaTimeoutMinutes || 15} min idle.</p>
                                <button
                                    onClick={() => { setShowHipaaSetup(true); setShowProfile(false); }}
                                    className="text-[10px] text-medical-600 hover:text-medical-700 mt-1 font-medium"
                                >
                                    {teamData?.hipaaPassphrase ? 'Change passphrase' : 'Set custom passphrase'}
                                </button>
                            </div>
                            <div className="p-2 space-y-0.5">
                                <button onClick={() => { setShowTeamManager(true); setShowProfile(false); }} className="w-full text-left px-3 py-2 text-sm text-gray-600 hover:bg-gray-50 rounded-md transition">
                                    Manage Teams
                                </button>
                                <button onClick={() => { setShowDictionary(true); setShowProfile(false); }} className="w-full text-left px-3 py-2 text-sm text-gray-600 hover:bg-gray-50 rounded-md transition">
                                    Speech Dictionary
                                </button>
                                <button onClick={handleSignOut} className="w-full text-left px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded-md transition">
                                    Sign Out
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );

            // HIPAA Setup Modal
            const HipaaSetupModal = () => {
                if (!showHipaaSetup) return null;
                return (
                    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={() => setShowHipaaSetup(false)}>
                        <div className="bg-white rounded-xl shadow-xl w-full max-w-md p-6" onClick={e => e.stopPropagation()}>
                            <div className="text-center mb-4">
                                <div className="w-14 h-14 bg-green-100 rounded-full flex items-center justify-center text-2xl mx-auto mb-3">🔒</div>
                                <h2 className="text-xl font-bold text-gray-800">Custom Passphrase</h2>
                                <p className="text-sm text-gray-500 mt-1">By default, your team's invite code is used to encrypt PHI. You can set a separate passphrase for added security.</p>
                            </div>

                            <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 mb-4">
                                <p className="text-xs text-amber-800 font-medium">Important:</p>
                                <ul className="text-xs text-amber-700 mt-1 space-y-1">
                                    <li>- Choose a strong passphrase (8+ characters)</li>
                                    <li>- Share it securely with all team members</li>
                                    <li>- Team members will need to enter it on login</li>
                                    <li>- If the passphrase is lost, encrypted data cannot be recovered</li>
                                </ul>
                            </div>

                            {hipaaError && (
                                <div className="bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg p-3 mb-3">{hipaaError}</div>
                            )}

                            <input
                                type="password"
                                placeholder="Create team passphrase (8+ characters)"
                                value={hipaaPassphrase}
                                onChange={e => setHipaaPassphrase(e.target.value)}
                                className="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent mb-3"
                                autoFocus
                            />

                            <div className="flex gap-2">
                                <button
                                    onClick={() => { setShowHipaaSetup(false); setHipaaError(''); setHipaaPassphrase(''); }}
                                    className="flex-1 bg-gray-100 text-gray-700 hover:bg-gray-200 font-medium py-3 rounded-lg transition text-sm"
                                >
                                    Cancel
                                </button>
                                <button
                                    onClick={enableHipaa}
                                    className="flex-1 bg-green-600 text-white hover:bg-green-700 font-semibold py-3 rounded-lg transition text-sm"
                                >
                                    Enable Encryption
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const isHome = activeTab === 'Home';

            if (isMobile) {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col">
                        {showTeamManager && <TeamManagerModal />}
                        {showDictionary && <SpeechDictionaryModal />}
                        <HipaaSetupModal />
                        <GlobalDictateButton />
                        <div className="bg-white border-b border-gray-200 p-3 sticky top-0 z-20 shadow-sm">
                            <div className="flex justify-between items-center">
                                <div className="flex items-center gap-2">
                                    {!isHome && (
                                        <button onClick={() => setActiveTab('Home')} className="text-medical-600 hover:text-medical-700 p-1 -ml-1 transition">
                                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                                        </button>
                                    )}
                                    <div>
                                        <h1 className="text-xl font-bold text-medical-600">{isHome ? '\uD83E\uDE7A ChiefRounds' : activeTab}</h1>
                                        <p className="text-xs text-gray-500">{getTodayDateString()}</p>
                                    </div>
                                </div>
                                <ProfileMenu />
                            </div>
                        </div>

                        <div className={`flex-1 overflow-y-auto ${!isHome ? 'pb-20' : ''}`} onClick={() => showProfile && setShowProfile(false)}>
                            {renderContent()}
                        </div>

                        {!isHome && (
                            <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-[0_-2px_8px_rgba(0,0,0,0.06)] z-30" style={{paddingBottom: 'env(safe-area-inset-bottom)'}}>
                                <div className="flex overflow-x-auto scrollbar-hide" style={{WebkitOverflowScrolling: 'touch', scrollbarWidth: 'none', msOverflowStyle: 'none'}}>
                                    {tabs.map(tab => (
                                        <button
                                            key={tab}
                                            onClick={() => setActiveTab(tab)}
                                            className={`flex-shrink-0 py-3.5 px-4 text-[11px] font-medium transition whitespace-nowrap ${
                                                activeTab === tab
                                                    ? 'text-medical-600 border-t-2 border-medical-500 bg-slate-50/50'
                                                    : 'text-gray-400 hover:text-gray-600'
                                            }`}
                                        >
                                            {tab}
                                        </button>
                                    ))}
                                </div>
                            </nav>
                        )}
                    </div>
                );
            }

            // Desktop Layout
            return (
                <div className="min-h-screen bg-slate-50 flex flex-col">
                    {showTeamManager && <TeamManagerModal />}
                    {showDictionary && <SpeechDictionaryModal />}
                        <HipaaSetupModal />
                    <div className="bg-white border-b border-gray-200 p-4 sticky top-0 z-20 shadow-sm">
                        <div className="flex justify-between items-center">
                            <button onClick={() => setActiveTab('Home')} className="text-2xl font-bold text-medical-700 hover:text-medical-800 transition">
                                {'\uD83E\uDE7A'} ChiefRounds
                            </button>
                            <div className="flex items-center gap-4">
                                <p className="text-sm text-gray-500">{getCurrentDateTime()}</p>
                                <ProfileMenu />
                            </div>
                        </div>
                    </div>

                    {!isHome && (
                        <div className="bg-white border-b border-gray-200 flex overflow-x-auto shadow-sm">
                            <button
                                onClick={() => setActiveTab('Home')}
                                className="px-4 py-3 font-medium transition whitespace-nowrap text-gray-400 hover:text-medical-600"
                                title="Back to Home"
                            >
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="inline"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                            </button>
                            {tabs.map(tab => (
                                <button
                                    key={tab}
                                    onClick={() => setActiveTab(tab)}
                                    className={`px-4 py-3 font-medium transition whitespace-nowrap ${
                                        activeTab === tab
                                            ? 'text-medical-600 nav-item-active border-b-4 border-medical-500'
                                            : 'text-gray-500 hover:text-gray-600'
                                    }`}
                                >
                                    {tab}
                                </button>
                            ))}
                        </div>
                    )}

                    <div className="flex-1 overflow-y-auto" onClick={() => showProfile && setShowProfile(false)}>
                        {renderContent()}
                    </div>
                </div>
            );
        }

        // ==================== ERROR BOUNDARY ====================
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, info) { console.error('ChiefRounds Error:', error, info); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{padding: '2rem', textAlign: 'center'}}>
                            <h2 style={{color: '#dc2626', marginBottom: '1rem'}}>Something went wrong</h2>
                            <p style={{color: '#666', marginBottom: '1rem'}}>{this.state.error?.message}</p>
                            <button onClick={() => { this.setState({ hasError: false, error: null }); window.location.reload(); }}
                                style={{background: '#2563eb', color: 'white', padding: '0.5rem 1.5rem', borderRadius: '0.5rem', border: 'none', cursor: 'pointer'}}>
                                Reload App
                            </button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // ==================== RENDER APP ====================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
