                    <div className="sticky top-0 bg-white border-b border-gray-200 p-4 space-y-2 z-10">
                        <div className="flex justify-between items-center">
                            <h2 className="text-lg font-bold">Team Tasks</h2>
                            <button
                                onClick={() => {
                                    setSelectedPatientForTask(null);
                                    setShowTaskForm(true);
                                }}
                                className="bg-medical-600 text-white hover:bg-medical-700 px-3 py-1 rounded font-medium text-sm"
                            >
                                + Task
                            </button>
                        </div>
                        <div className="flex gap-2 text-sm overflow-x-auto">
                            {['All', 'My Tasks', 'Incomplete', 'Completed'].map(f => (
                                <button
                                    key={f}
                                    onClick={() => setFilter(f)}
                                    className={`px-3 py-1 rounded whitespace-nowrap ${
                                        filter === f
                                            ? 'bg-medical-600 text-white font-semibold'
                                            : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                                    }`}
                                >
                                    {f}
                                    {f === 'My Tasks' && (() => {
                                        const count = tasks.filter(t => t.assignee === myName && !t.completed).length;
                                        return count > 0 ? ` (${count})` : '';
                                    })()}
                                </button>
                            ))}
                        </div>
                        {/* Team member filter */}
                        {teamData?.members?.length > 1 && (
                            <div className="flex items-center gap-2">
                                <span className="text-xs text-gray-500 font-medium">Filter by:</span>
                                <select
                                    value={memberFilter}
                                    onChange={e => setMemberFilter(e.target.value)}
                                    className="text-sm bg-gray-50 border border-gray-200 rounded px-2 py-1 text-gray-700"
                                >
                                    <option value="Everyone">Everyone</option>
                                    <option value="Unassigned">Unassigned</option>
                                    {teamData.members.map((m, i) => (
                                        <option key={i} value={m.name || m.email}>{m.name || m.email}</option>
                                    ))}
                                </select>
                            </div>
                        )}
                    </div>

                    {/* Quick Dictation Bar */}
                    <div className="px-4 pt-3">
                        <DictationBar
                            dictation={dictation}
                            onParse={handleQuickDictateTask}
                            parseLabel="Save Task"
                        />
                    </div>

                    {/* Patient Task Groups */}
                    <div className="p-4 space-y-4">
                        {patients.length === 0 ? (
                            <div className="text-center py-8 text-gray-500">No patients</div>
                        ) : (
                            patients.map(patient => {
                                const patientTasks = groupedByPatient[patient.id].tasks;
                                const completion = completionByPatient[patient.id];
                                return (
                                    <div key={patient.id} className="bg-white border border-gray-100 rounded-xl p-4">
                                        {/* Patient Header */}
                                        <div className="flex justify-between items-center mb-3">
                                            <h3 className="text-lg font-bold text-medical-500">Room {patient.room}</h3>
                                            <div className="flex items-center gap-2">
                                                {patientTasks.some(t => t.description === 'M&M Conference') && (
                                                    <button
                                                        onClick={() => exportMMTimeline(patient)}
                                                        className="text-xs bg-amber-500 hover:bg-amber-600 text-white px-2 py-1 rounded font-medium transition"
                                                        title="Export M&M Timeline PDF"
                                                    >
                                                        Export M&M
                                                    </button>
                                                )}
                                                <button
                                                    onClick={() => {
                                                        setSelectedPatientForTask(patient.id);
                                                        setShowTaskForm(true);
                                                    }}
                                                    className="text-sm bg-medical-600 text-white hover:bg-medical-700 text-white px-2 py-1 rounded"
                                                >
                                                    Add Task
                                                </button>
                                            </div>
                                        </div>

                                        {/* Progress Bar */}
                                        {tasks.filter(t => t.patientId === patient.id).length > 0 && (
                                            <div className="mb-3">
                                                <div className="flex justify-between text-xs text-gray-500 mb-1">
                                                    <span>Task Progress</span>
                                                    <span>{completion}%</span>
                                                </div>
                                                <div className="progress-bar">
                                                    <div className="progress-fill" style={{ width: `${completion}%` }}></div>
                                                </div>
                                            </div>
                                        )}

                                        {/* Quick Task Buttons - grouped, collapsible */}
                                        <QuickTaskPanel
                                            patientId={patient.id}
                                            tasks={tasks}
                                            quickTaskGroups={quickTaskGroups}
                                            onSave={handleSaveTask}
                                        />

                                        {/* Task List */}
                                        {patientTasks.length === 0 ? (
                                            <p className="text-sm text-gray-400 italic">Tap a quick task above or Add Task to get started</p>
                                        ) : (
                                            <div className="space-y-2">
                                                {patientTasks.map(task => (
                                                    <div
                                                        key={task.id}
                                                        className={`border rounded-lg p-3 text-sm ${getTaskColor(task.category)} ${
                                                            task.completed ? 'opacity-60' : ''
                                                        }`}
                                                    >
                                                        <div className="flex items-start gap-2">
                                                            <input
                                                                type="checkbox"
                                                                checked={task.completed}
                                                                onChange={() => toggleTaskComplete(task.id, task.completed)}
                                                                className="mt-1 w-4 h-4"
                                                            />
                                                            <div className="flex-1 min-w-0">
                                                                <div className={`font-medium ${task.completed ? 'line-through text-gray-400' : 'text-gray-800'}`}>
                                                                    {task.description}
                                                                </div>
                                                                {task.priority === 'High' && (
                                                                    <span className="text-xs font-semibold text-red-600">HIGH PRIORITY</span>
                                                                )}
                                                                <div className="flex flex-wrap items-center gap-2 mt-1.5">
                                                                    {/* Assignee badge - tap to reassign */}
                                                                    {reassigningTaskId === task.id ? (
                                                                        <select
                                                                            autoFocus
                                                                            value={task.assignee || ''}
                                                                            onChange={e => reassignTask(task.id, e.target.value)}
                                                                            onBlur={() => setReassigningTaskId(null)}
                                                                            className="text-xs bg-white border border-gray-300 rounded px-2 py-1"
                                                                        >
                                                                            <option value="">Unassigned</option>
                                                                            {teamData?.members?.map((m, i) => (
                                                                                <option key={i} value={m.name || m.email}>{m.name || m.email}</option>
                                                                            ))}
                                                                        </select>
                                                                    ) : (
                                                                        <button
                                                                            onClick={() => setReassigningTaskId(task.id)}
                                                                            className={`inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded-full border transition ${
                                                                                task.assignee
                                                                                    ? task.assignee === myName
                                                                                        ? 'bg-medical-500/10 border-medical-500/30 text-medical-600 font-semibold'
                                                                                        : 'bg-gray-100 border-gray-300 text-gray-600'
                                                                                    : 'bg-yellow-50 border-yellow-300 text-yellow-700'
                                                                            }`}
                                                                            title="Tap to reassign"
                                                                        >
                                                                            <span>{task.assignee ? task.assignee : 'Unassigned'}</span>
                                                                            <span className="opacity-50 text-[10px]">&#9998;</span>
                                                                        </button>
                                                                    )}
                                                                    {task.assignedBy && (
                                                                        <span className="text-[10px] text-gray-400">added by {task.assignedBy}</span>
                                                                    )}
                                                                </div>
                                                                {task.completed && task.completedBy && (
                                                                    <div className="text-xs text-green-600 mt-1">done by {task.completedBy}{task.completedAt ? ` at ${new Date(task.completedAt).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZone: 'America/Chicago' })}` : ''}</div>
                                                                )}
                                                            </div>
                                                        </div>
                                                        <button
                                                            onClick={() => deleteTask(task.id)}
                                                            className="text-xs text-gray-400 hover:text-red-500 mt-1 ml-6"
                                                        >
                                                            ✕ Delete
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                );
                            })
                        )}
                    </div>

                    {/* Modals */}
                    {showTaskForm && (
                        <TaskFormModal
                            patientId={selectedPatientForTask}
                            teamData={teamData}
                            onClose={() => {
                                setShowTaskForm(false);
                                setSelectedPatientForTask(null);
                            }}
                            onSave={handleSaveTask}
                        />
                    )}
                </div>
            );
        }

        // ==================== CENSUS VIEW COMPONENT ====================
        function CensusManagement() {
            const [patients, setPatients] = React.useState([]);
            const [activeTab, setActiveTab] = React.useState('Active');
            const [sortBy, setSortBy] = React.useState('room');
            const [showTemplateModal, setShowTemplateModal] = React.useState(false);
            const [labs, setLabs] = React.useState([]);
            const dictation = useDictation();
            const [pendingAction, setPendingAction] = React.useState(null);
            const [editingDateId, setEditingDateId] = React.useState(null);
            const [editingConcernId, setEditingConcernId] = React.useState(null);
            const [concernDraft, setConcernDraft] = React.useState('');

            const handleQuickDateChange = async (patientId, newDate) => {
                const patient = patients.find(p => p.id === patientId);
                if (patient && newDate) {
                    await DB.put('patients', { ...patient, admitDate: newDate });
                    setEditingDateId(null);
                    loadPatients();
                }
            };

            const handleFlagChange = async (patientId, flagLevel) => {
                const patient = patients.find(p => p.id === patientId);
                if (patient) {
                    const currentFlag = patient.flagLevel || (patient.concerns ? 'warning' : 'none');
                    const newFlag = currentFlag === flagLevel ? 'none' : flagLevel;
                    await DB.put('patients', { ...patient, flagLevel: newFlag, concerns: newFlag === 'none' ? '' : (patient.concerns || '') });
                    loadPatients();
                    if (newFlag !== 'none' && !patient.concerns) {
                        setEditingConcernId(patientId);
                        setConcernDraft('');
                    }
                }
            };

            const saveConcern = async (patientId) => {
                const patient = patients.find(p => p.id === patientId);
                if (patient) {
                    await DB.put('patients', { ...patient, concerns: concernDraft });
                    setEditingConcernId(null);
                    setConcernDraft('');
                    loadPatients();
                }
            };

            React.useEffect(() => {
                DB.init().then(() => {
                    loadPatients();
                    loadLabs();
                });
            }, []);

            const loadPatients = async () => {
                const allPatients = await DB.getAll('patients');
                const sorted = allPatients.sort((a, b) => {
                    if (sortBy === 'room') return parseInt(a.room) - parseInt(b.room);
                    if (sortBy === 'acuity') return (b.status === 'critical' ? 1 : b.status === 'guarded' ? 2 : 3) - (a.status === 'critical' ? 1 : a.status === 'guarded' ? 2 : 3);
                    if (sortBy === 'pod') return calculatePOD(b.admitDate) - calculatePOD(a.admitDate);
                    return 0;
                });
                setPatients(sorted);
            };

            const loadLabs = async () => {
                const allLabs = await DB.getAll('labs');
                setLabs(allLabs);
            };

            const getLatestLab = (patientId, labType) => {
                return labs.filter(l => l.patientId === patientId && l.testName === labType)
                    .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))[0];
            };

            const handleDischarge = async (patientId) => {
                if (confirm('Discharge this patient?')) {
                    const patient = patients.find(p => p.id === patientId);
                    await DB.put('patients', { ...patient, status: 'discharged', dischargeDate: new Date().toISOString() });
                    loadPatients();
                }
            };

            const handleTransfer = async (patientId) => {
                const newRoom = prompt('Enter new room number:');
                if (newRoom) {
                    const patient = patients.find(p => p.id === patientId);
                    await DB.put('patients', { ...patient, room: newRoom });
                    loadPatients();
                }
            };

            const handleStatusChange = async (patientId, newStatus) => {
                const patient = patients.find(p => p.id === patientId);
                await DB.put('patients', { ...patient, status: newStatus });
                loadPatients();
            };

            const handleAddFromTemplate = async (templateName) => {
                const template = ERAS_TEMPLATES[templateName];
                const patientData = {
                    name: 'New Patient',
                    room: '0',
                    age: 0,
                    gender: 'M',
                    admitDate: getTodayISO(),
                    diagnosis: templateName,
                    procedure: template.procedures[0] || '',
                    problems: template.problems,
                    treatmentPlan: template.treatmentPlan,
                    diet: template.diet,
                    activity: template.activity,
                    dvtProphylaxis: template.dvtProphylaxis,
                    giProphylaxis: template.giProphylaxis,
                    status: 'stable',
                    codeStatus: 'FULL',
                    concerns: false
                };
                await DB.add('patients', patientData);
                setShowTemplateModal(false);
                loadPatients();
            };

            const activePatients = patients.filter(p => p.status !== 'discharged');
            const dischargedToday = patients.filter(p => p.status === 'discharged' && p.dischargeDate &&
                formatDate(p.dischargeDate) === getTodayDateString());

            const statusColor = (status) => {
                switch(status) {
                    case 'stable': return 'bg-emerald-900 text-emerald-600';
                    case 'guarded': return 'bg-amber-900 text-amber-600';
                    case 'critical': return 'bg-red-900 text-red-600';
                    default: return 'bg-gray-50 text-gray-600';
                }
            };

            const handleParseCensusDictation = (transcript) => {
                const parsed = parseCensusSpeech(transcript);
                if (parsed.room) {
                    const patient = patients.find(p => p.room === parsed.room);
                    if (patient) {
                        if (parsed.action === 'discharge') {
                            setPendingAction({ type: 'discharge', patientId: patient.id, patientRoom: patient.room });
                        } else if (parsed.action === 'transfer' && parsed.newRoom) {
                            setPendingAction({ type: 'transfer', patientId: patient.id, fromRoom: patient.room, toRoom: parsed.newRoom });
                        } else if (parsed.status) {
                            handleStatusChange(patient.id, parsed.status);
                        }
                        dictation.clear();
                    }
                }
            };

            const confirmAndExecuteAction = async () => {
                if (!pendingAction) return;
                if (pendingAction.type === 'discharge') {
                    const patient = patients.find(p => p.id === pendingAction.patientId);
                    if (patient) {
                        await DB.put('patients', { ...patient, status: 'discharged', dischargeDate: new Date().toISOString() });
                        await loadPatients();
                    }
                } else if (pendingAction.type === 'transfer') {
                    const patient = patients.find(p => p.id === pendingAction.patientId);
                    if (patient) {
                        await DB.put('patients', { ...patient, room: pendingAction.toRoom });
                        await loadPatients();
                    }
                }
                setPendingAction(null);
            };

            return (
                <div className="p-4 md:p-6 max-w-7xl mx-auto">
                    {pendingAction && (
                        <div className="mb-4 bg-amber-900 border border-amber-700 rounded-lg p-4">
                            <p className="text-amber-100 font-medium mb-2">
                                {pendingAction.type === 'discharge'
                                    ? `Discharge Room ${pendingAction.patientRoom}?`
                                    : `Transfer Room ${pendingAction.fromRoom} to Room ${pendingAction.toRoom}?`}
                            </p>
                            <div className="flex gap-2">
                                <button onClick={confirmAndExecuteAction} className="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded text-sm font-medium">
                                    Confirm
                                </button>
                                <button onClick={() => setPendingAction(null)} className="px-3 py-1.5 bg-gray-100 hover:bg-gray-50 text-white rounded text-sm font-medium">
                                    Cancel
                                </button>
                            </div>
                        </div>
                    )}

                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                        <div>
                            <h2 className="text-2xl font-bold text-medical-600 mb-2">
                                {activeTab === 'Active' ? `Active Patients: ${activePatients.length}` : `Discharged Today: ${dischargedToday.length}`}
                            </h2>
                        </div>
                        <div className="flex flex-wrap gap-2">
                            {activeTab === 'Active' && (
                                <>
                                    <select value={sortBy} onChange={(e) => { setSortBy(e.target.value); loadPatients(); }}
                                        className="px-3 py-2 bg-gray-50 border border-gray-300 rounded text-gray-600 text-sm">
                                        <option value="room">Sort by Room</option>
                                        <option value="acuity">Sort by Acuity</option>
                                        <option value="pod">Sort by POD</option>
                                    </select>
                                    <button onClick={() => setShowTemplateModal(true)}
                                        className="px-3 py-2 bg-medical-600 hover:bg-medical-700 text-white rounded text-sm font-medium">
                                        Add from Template
                                    </button>
                                </>
                            )}
                        </div>
                    </div>

                    <DictationBar dictation={dictation} onParse={handleParseCensusDictation} parseLabel="Execute Command" />

                    {/* Tabs */}
                    <div className="flex gap-2 mb-4 border-b border-gray-200">
                        <button onClick={() => setActiveTab('Active')}
                            className={`px-4 py-2 font-medium transition ${activeTab === 'Active' ? 'text-medical-600 border-b-2 border-medical-500' : 'text-gray-500 hover:text-gray-600'}`}>
                            Active
                        </button>
                        <button onClick={() => setActiveTab('Discharged')}
                            className={`px-4 py-2 font-medium transition ${activeTab === 'Discharged' ? 'text-medical-600 border-b-2 border-medical-500' : 'text-gray-500 hover:text-gray-600'}`}>
                            Discharged Today
                        </button>
                    </div>

                    {/* Active Tab */}
                    {activeTab === 'Active' && (
                        <div className="space-y-3">
                            {activePatients.sort((a, b) => {
                                if (a.isTrauma && !b.isTrauma) return -1;
                                if (!a.isTrauma && b.isTrauma) return 1;
                                return parseInt(a.room) - parseInt(b.room);
                            }).map(patient => (
                                <div key={patient.id} className={`bg-white border rounded p-4 ${patient.isTrauma ? 'border-red-500 border-l-4 border-l-red-600 bg-red-50/30' : 'border-gray-200'}`}>
                                    <div className="grid grid-cols-2 md:grid-cols-8 gap-3 mb-3">
                                        <div>
                                            <p className="text-xs text-gray-400">Room</p>
                                            <div className="flex items-center gap-1">
                                                <p className={`font-bold ${patient.isTrauma ? 'text-red-600' : 'text-medical-600'}`}>{patient.room}</p>
                                                {patient.isTrauma && <span className="text-xs bg-red-500 text-white px-1.5 py-0.5 rounded font-bold">{patient.traumaLevel || 'T'}</span>}
                                            </div>
                                        </div>
                                        <div>
                                            <p className="text-xs text-gray-400">Diagnosis</p>
                                            <p className="text-sm text-gray-600">{patient.diagnosis || 'N/A'}</p>
                                        </div>
                                        <div>
                                            <p className="text-xs text-gray-400">POD</p>
                                            {editingDateId === patient.id ? (
                                                <input type="date" defaultValue={patient.admitDate || getTodayISO()}
                                                    onChange={(e) => handleQuickDateChange(patient.id, e.target.value)}
                                                    onBlur={() => setEditingDateId(null)}
                                                    autoFocus
                                                    className="text-xs border border-medical-400 rounded px-1 py-0.5 bg-slate-50 w-28" />
                                            ) : (
                                                <p className="text-sm font-bold text-amber-600 cursor-pointer hover:underline"
                                                    onClick={() => setEditingDateId(patient.id)}
                                                    title="Tap to edit surgery date">
                                                    {calculatePOD(patient.admitDate)}
                                                </p>
                                            )}
                                        </div>
                                        <div>
                                            <p className="text-xs text-gray-400">Status</p>
                                            <div className="flex gap-1 flex-wrap">
                                                {['stable', 'guarded', 'critical'].map(s => (
                                                    <button key={s} onClick={() => handleStatusChange(patient.id, s)}
                                                        className={`text-xs px-2 py-1 rounded font-medium cursor-pointer transition ${patient.status === s ? statusColor(s) : 'bg-gray-50 text-gray-500 hover:bg-gray-100'}`}>
                                                        {s.charAt(0).toUpperCase() + s.slice(1)}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="col-span-2">
                                            <p className="text-xs text-gray-400 mb-1">Red Flags</p>
                                            <div className="flex gap-1 flex-wrap mb-1">
                                                {[
                                                    { key: 'watch', label: 'Watch', color: 'bg-amber-100 text-amber-700 border-amber-300', active: 'bg-amber-500 text-white' },
                                                    { key: 'warning', label: 'Warning', color: 'bg-orange-100 text-orange-700 border-orange-300', active: 'bg-orange-500 text-white' },
                                                    { key: 'critical', label: 'Critical', color: 'bg-red-100 text-red-700 border-red-300', active: 'bg-red-600 text-white' }
                                                ].map(flag => {
                                                    const currentFlag = patient.flagLevel || (patient.concerns ? 'warning' : 'none');
                                                    const isActive = currentFlag === flag.key;
                                                    return (
                                                        <button key={flag.key} onClick={() => handleFlagChange(patient.id, flag.key)}
                                                            className={`text-xs px-2 py-1 rounded border font-medium transition ${isActive ? flag.active : flag.color + ' hover:opacity-80'}`}>
                                                            {flag.label}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                            {editingConcernId === patient.id ? (
                                                <div className="flex gap-1">
                                                    <input type="text" value={concernDraft} onChange={(e) => setConcernDraft(e.target.value)}

        // ==================== SIGNOUT TEXT PARSER ====================
        function parseSignoutText(rawText) {
            if (!rawText || !rawText.trim()) return [];

            // First normalize medical abbreviations throughout the text
            let text = rawText.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            text = normalizeMedicalText(text);

            // Split into patient blocks. Common delimiters:
            // - "Room ###" or "Rm ###" at start of line
            // - "###-" or "### -" (room number dash)
            // - Blank line followed by a new room number
            // - "Pt:" or "Patient:" prefixes
            // - Numbered lists like "1." "2." at start with room info
            const roomPattern = /(?:^|\n)(?=\s*(?:room|rm|bed)\s*#?\s*\d+|\s*\d{3,4}\s*[-–—:|]|\s*(?:pt|patient)\s*(?:\d+|:)|\s*\d+\.\s*(?:room|rm|bed)?\s*#?\s*\d+)/gi;

            let blocks = [];
            const splitPoints = [];
            let match;
            const tempText = '\n' + text; // ensure first block catches

            // Find all split points
            const lines = text.split('\n');
            let currentBlock = [];
            let foundFirstPatient = false;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                // Check if this line starts a new patient block
                const isNewPatient = /^(?:room|rm|bed)\s*#?\s*\d+/i.test(line) ||
                    /^\d{3,4}\s*[-–—:|]/i.test(line) ||
                    /^\d{3,4}\s+\w/i.test(line) && /(?:yo|y\/o|M|F|male|female|dx|diagnosis|s\/p)/i.test(line) ||
                    /^(?:pt|patient)\s*[:#]?\s*\d/i.test(line) ||
                    /^\d+\.\s*(?:room|rm|bed)?\s*#?\s*\d+/i.test(line) ||
                    /^\d+\.\s*\d{3,4}\s/i.test(line);

                if (isNewPatient) {
                    if (currentBlock.length > 0 && foundFirstPatient) {
                        blocks.push(currentBlock.join('\n'));
                    }
                    currentBlock = [lines[i]];
                    foundFirstPatient = true;
                } else if (foundFirstPatient) {
                    currentBlock.push(lines[i]);
                }
            }
            // Push last block
            if (currentBlock.length > 0 && foundFirstPatient) {
                blocks.push(currentBlock.join('\n'));
            }

            // If no blocks detected, try splitting on double newlines
            if (blocks.length === 0) {
                blocks = text.split(/\n\s*\n/).filter(b => b.trim().length > 10);
            }

            // Parse each block into a patient object
            const parsedPatients = blocks.map(block => {
                const b = block.trim();
                const patient = {
                    room: '',
                    diagnosis: '',
                    procedures: [],
                    problems: [],
                    pmh: [],
                    psh: [],
                    homeMeds: [],
                    allergies: [],
                    examFindings: '',
                    treatmentPlan: '',
                    diet: '',
                    activity: '',
                    dvtProphylaxis: '',
                    giProphylaxis: '',
                    codeStatus: 'Full Code',
                    dispositionPlan: '',
                    concerns: '',
                    admitDate: getTodayISO(),
                    status: 'stable',
                    overnightPlan: '',
                    ifThen: '',
                    todos: []
                };

                // Extract room number
                const roomMatch = b.match(/(?:room|rm|bed)\s*#?\s*(\d+)/i) ||
                    b.match(/^(?:\d+\.\s*)?(\d{3,4})\s*[-–—:|]/i) ||
                    b.match(/^(?:\d+\.\s*)?(\d{3,4})\s+/i);
                if (roomMatch) patient.room = roomMatch[1];

                // Extract age/gender
                const ageGenderMatch = b.match(/(\d{1,3})\s*(?:yo|y\/o|year[- ]old)?\s*(M|F|male|female)/i) ||
                    b.match(/(M|F|male|female)\s*(\d{1,3})/i);
                if (ageGenderMatch) {
                    // handle either order
                    if (/\d/.test(ageGenderMatch[1])) {
                        patient.age = parseInt(ageGenderMatch[1]);
                        patient.gender = ageGenderMatch[2].charAt(0).toUpperCase();
                    } else {
                        patient.gender = ageGenderMatch[1].charAt(0).toUpperCase();
                        patient.age = parseInt(ageGenderMatch[2]);
                    }
                }

                // Extract code status
                const codeMatch = b.match(/(?:code(?:\s*status)?)\s*[:\-]?\s*(full\s*code|dnr\s*\/?\s*dni|dnr|dni|comfort\s*(?:care|measures)?)/i) ||
                    b.match(/\b(full code|DNR\/DNI|DNR|DNI|comfort care|comfort measures)\b/i);
                if (codeMatch) patient.codeStatus = codeMatch[1].trim();

                // Extract diagnosis - look for "Dx:", "Diagnosis:", or "Dx -" patterns
                const dxMatch = b.match(/(?:dx|diagnosis|hpi)\s*[:\-–]\s*(.+?)(?=\n|(?:\s*(?:s\/p|procedures?|problems?|plan|todo|to[- ]?do|tasks?|if[/ ]then|overnight|diet|activity|code|dispo|contact|$)))/i);
                if (dxMatch) patient.diagnosis = dxMatch[1].trim();

                // Extract procedure / s/p
                const spMatch = b.match(/(?:s\/p|status post|procedure|op)\s*[:\-]?\s*(.+?)(?=\n|(?:\s*(?:problems?|plan|todo|to[- ]?do|tasks?|if[/ ]then|overnight|diet|activity|code|dispo|pod|contact|PMH|pmh|past medical|$)))/i);
                if (spMatch) {
                    let procText = spMatch[1].trim();
                    // Strip dates from procedure text (e.g. "lap appy 3/18" -> "lap appy")
                    procText = procText.replace(/\s+\d{1,2}\/\d{1,2}(?:\/\d{2,4})?\s*/g, ' ').trim();
                    // Extract "c/b ..." (complicated by) from procedure text into problems
                    const cbInProc = procText.match(/\s+c\/b\s+(.+)$/i);
                    if (cbInProc) {
                        const complications = cbInProc[1].split(/[,;&]+/).map(c => c.trim()).filter(c => c.length > 1);
                        patient.problems = [...patient.problems, ...complications];
                        procText = procText.replace(/\s+c\/b\s+.+$/i, '').trim();
                    }
                    // Strip "w/" or "with" clauses that aren't part of the procedure name
                    // but keep "w/ LOA" since LOA is a procedure
                    patient.procedures = procText.split(/[,;]/).map(p => p.trim()).filter(Boolean);
                }

                // Extract dates - try explicit admit/surgery dates first
                const extractedDate = extractDateFromContext(b);
                if (extractedDate) {
                    patient.admitDate = extractedDate;
                }

                // Extract POD - if present, use it to back-calculate admit date relative to today
                const podMatch = b.match(/POD\s*#?\s*(\d+)/i) || b.match(/post[- ]?op(?:erative)?\s*day\s*#?\s*(\d+)/i);
                if (podMatch) {
                    const pod = parseInt(podMatch[1] || podMatch[2]);
                    // Back-calculate admit date from POD using today in Central Time
                    const todayStr = getTodayISO();
                    const todayParts = todayStr.split('-');
                    const todayDate = new Date(parseInt(todayParts[0]), parseInt(todayParts[1]) - 1, parseInt(todayParts[2]));
                    todayDate.setDate(todayDate.getDate() - pod);
                    patient.admitDate = `${todayDate.getFullYear()}-${String(todayDate.getMonth() + 1).padStart(2, '0')}-${String(todayDate.getDate()).padStart(2, '0')}`;
                    patient._parsedPOD = pod; // store for preview display
                }

                // Extract problems/issues - look for labeled sections
                const probMatch = b.match(/(?:problems?|issues?|active(?:\s*issues)?)\s*[:\-]\s*(.+?)(?=\n\s*(?:plan|todo|to[- ]?do|tasks?|if[/ ]then|overnight|diet|activity|code|dispo|contact|$))/is);
                if (probMatch) {
                    const probText = probMatch[1].trim();
                    patient.problems = probText.split(/[,;\n•\-]+/).map(p => p.trim()).filter(p => p.length > 1);
                }

                // Extract plan
                const planMatch = b.match(/(?:plan|management|overnight plan)\s*[:\-]\s*(.+?)(?=\n\s*(?:todo|to[- ]?do|tasks?|if[/ ]then|diet|activity|code|dispo|contact|problems?|$))/is);
                if (planMatch) patient.treatmentPlan = planMatch[1].trim().replace(/\n/g, ' ');

                // Extract overnight plan specifically
                const overnightMatch = b.match(/(?:overnight(?:\s*plan)?|on?\/n)\s*[:\-]\s*(.+?)(?=\n\s*(?:todo|to[- ]?do|tasks?|if[/ ]then|diet|code|dispo|contact|$))/is);
                if (overnightMatch) patient.overnightPlan = overnightMatch[1].trim().replace(/\n/g, ' ');

                // Extract if/then
                const ifThenMatch = b.match(/(?:if[/ ]?then|contingency|contingencies)\s*[:\-]\s*(.+?)(?=\n\s*(?:todo|to[- ]?do|tasks?|diet|code|dispo|contact|$))/is);
                if (ifThenMatch) patient.ifThen = ifThenMatch[1].trim().replace(/\n/g, ' ');

                // Extract diet
                const dietMatch = b.match(/(?:diet)\s*[:\-]\s*(.+?)(?=\n|$)/i);
                if (dietMatch) patient.diet = dietMatch[1].trim();

                // Extract activity
                const actMatch = b.match(/(?:activity)\s*[:\-]\s*(.+?)(?=\n|$)/i);
                if (actMatch) patient.activity = actMatch[1].trim();

                // Extract DVT prophylaxis
                const dvtMatch = b.match(/(?:dvt\s*(?:prophy(?:laxis)?)?|anticoag(?:ulation)?|vte)\s*[:\-]\s*(.+?)(?=\n|$)/i);
                if (dvtMatch) patient.dvtProphylaxis = dvtMatch[1].trim();

                // Extract antibiotics
                const abxMatch = b.match(/(?:abx|antibiotics?|antimicrobials?)\s*[:\-]\s*(.+?)(?=\n\s*(?:plan|todo|to[- ]?do|diet|activity|code|dispo|contact|$))/is);
                if (abxMatch) {
                    const abxText = abxMatch[1].trim();
                    patient.antibiotics = abxText.split(/[,;\n]+/).map(a => a.trim()).filter(a => a.length > 1).map(a => {
                        // Try to extract date from abx entry like "Zosyn (started 3/18)" or "Vanc day 3"
                        const dateMatch = a.match(/(?:started?|since|from)\s*(\d{1,2}\/\d{1,2}(?:\/\d{2,4})?)/i);
                        const dayMatch = a.match(/day\s*(\d+)/i);
                        let startDate = '';
                        if (dateMatch) {
                            startDate = parseFlexibleDate(dateMatch[1]) || '';
                        } else if (dayMatch) {
                            const days = parseInt(dayMatch[1]);
                            const todayParts = getTodayISO().split('-');
                            const d = new Date(parseInt(todayParts[0]), parseInt(todayParts[1]) - 1, parseInt(todayParts[2]));
                            d.setDate(d.getDate() - days + 1);
                            startDate = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                        }
                        const name = a.replace(/\s*\(.*\)/, '').replace(/\s*day\s*\d+/i, '').trim();
                        return { name, startDate, stopDate: '' };
                    });
                }

                // Extract disposition
                const dispoMatch = b.match(/(?:dispo(?:sition)?|dc\s*plan|discharge\s*plan)\s*[:\-]\s*(.+?)(?=\n|$)/i);
                if (dispoMatch) patient.dispositionPlan = dispoMatch[1].trim();

                // Extract to-dos / tasks
                const todoMatch = b.match(/(?:todo|to[- ]?do|tasks?|action\s*items?|follow[- ]?up|f\/u)\s*[:\-]\s*(.+?)(?=\n\s*(?:if[/ ]then|overnight|diet|code|dispo|contact|$))/is);
                if (todoMatch) {
                    const todoText = todoMatch[1].trim();
                    patient.todos = todoText.split(/[,;\n•\-]+/).map(t => t.trim()).filter(t => t.length > 2);
                }

                // Also scan for inline task indicators throughout the text
                const inlineTaskPatterns = [
                    /(?:needs?|requires?|please|order|check|follow[- ]?up|f\/u|get|obtain|schedule|call|contact|consult|notify)\s+(.+?)(?=[,;\n.]|$)/gi
                ];
                // Only add these if no explicit todo section was found
                if (patient.todos.length === 0) {
                    const allLines = b.split('\n');
                    allLines.forEach(line => {
                        const trimmed = line.trim();
                        // Look for checkbox-style items: [ ] or - [ ] or *
                        if (/^[\-\*]\s*\[[\sx]?\]\s*(.+)/i.test(trimmed)) {
                            const taskText = trimmed.match(/^[\-\*]\s*\[[\sx]?\]\s*(.+)/i)[1].trim();
                            if (taskText.length > 2) patient.todos.push(taskText);
                        }
                        // Look for "TODO:" or "TD:" inline
                        const tdMatch = trimmed.match(/(?:TODO|TD)\s*[:\-]\s*(.+)/i);
                        if (tdMatch) patient.todos.push(tdMatch[1].trim());
                    });
                }

                // Extract PMH (Past Medical History)
                const pmhMatch = b.match(/(?:PMH|PMHx|past medical(?: history)?|medical history|comorbidities|h\/o)\s*[:\-]\s*(.+?)(?=\n\s*(?:PSH|PSHx|past surgical|dx|diagnosis|s\/p|procedures?|problems?|plan|todo|to[- ]?do|tasks?|if[/ ]then|overnight|diet|activity|code|dispo|contact|meds|medications?|allergies?|$))/is);
                if (pmhMatch) {
                    const pmhText = pmhMatch[1].trim();
                    patient.pmh = pmhText.split(/[,;\n•\-]+/).map(p => p.trim()).filter(p => p.length > 1);
                }
                // Also try to pick up PMH from "h/o HTN, DM2, COPD" patterns
                if (patient.pmh.length === 0) {
                    const hoMatch = b.match(/\bh\/o\s+(.+?)(?=\n|(?:\s*(?:s\/p|dx|procedures?|problems?|plan|$)))/i);
                    if (hoMatch) {
                        patient.pmh = hoMatch[1].split(/[,;&]+/).map(p => p.trim()).filter(p => p.length > 1);
                    }
                }

                // Extract PSH (Past Surgical History)
                const pshMatch = b.match(/(?:PSH|PSHx|past surgical(?: history)?|surgical history|prior surgeries|prior ops)\s*[:\-]\s*(.+?)(?=\n\s*(?:PMH|PMHx|past medical|dx|diagnosis|s\/p|procedures?|problems?|plan|todo|to[- ]?do|tasks?|if[/ ]then|overnight|diet|activity|code|dispo|contact|meds|medications?|allergies?|home meds|abx|antibiotics?|$))/is);
                if (pshMatch) {
                    patient.psh = pshMatch[1].split(/[,;\n•\-]+/).map(p => p.trim()).filter(p => p.length > 1);
                }

                // Extract Home Medications
                const medsMatch = b.match(/(?:home meds|home medications?|meds|medications?|med(?:\s*list)?)\s*[:\-]\s*(.+?)(?=\n\s*(?:PMH|PMHx|PSH|PSHx|past medical|past surgical|dx|diagnosis|s\/p|procedures?|problems?|plan|todo|to[- ]?do|tasks?|if[/ ]then|overnight|diet|activity|code|dispo|contact|allergies?|abx|antibiotics?|$))/is);
                if (medsMatch) {
                    patient.homeMeds = medsMatch[1].split(/[,;\n•]+/).map(m => m.trim()).filter(m => m.length > 1);
                }

                // Extract Allergies
                const allergyMatch = b.match(/(?:allergies|allergy|NKDA|NKA)\s*[:\-]?\s*(.+?)(?=\n\s*(?:PMH|PMHx|PSH|PSHx|past medical|past surgical|dx|diagnosis|s\/p|procedures?|problems?|plan|todo|to[- ]?do|tasks?|if[/ ]then|overnight|diet|activity|code|dispo|contact|meds|medications?|home meds|abx|antibiotics?|$))/is);
                if (allergyMatch) {
                    const allergyText = allergyMatch[1].trim();
                    if (/^NKDA$/i.test(allergyText) || /^NKA$/i.test(allergyText) || /^none$/i.test(allergyText)) {
                        patient.allergies = ['NKDA'];
                    } else {
                        patient.allergies = allergyText.split(/[,;\n•]+/).map(a => a.trim()).filter(a => a.length > 1);
                    }
                }
                // Handle standalone NKDA/NKA in text
                if (patient.allergies.length === 0 && /\bNKDA\b/.test(b)) {
                    patient.allergies = ['NKDA'];
                }

                // Extract Exam Findings
                const examMatch = b.match(/(?:exam|notable exam|exam findings?|physical exam|PE|phys(?:ical)?)\s*[:\-]\s*(.+?)(?=\n\s*(?:PMH|PMHx|PSH|PSHx|past medical|past surgical|dx|diagnosis|s\/p|procedures?|problems?|plan|todo|to[- ]?do|tasks?|if[/ ]then|overnight|diet|activity|code|dispo|contact|meds|medications?|allergies?|home meds|abx|antibiotics?|$))/is);
                if (examMatch) {
                    patient.examFindings = examMatch[1].trim().replace(/\n/g, '; ');
                }

                // Smart diagnosis prediction from procedure if no explicit diagnosis found
                // NOTE: diagnosis is stored separately from procedures. The display template
                // shows "Diagnosis s/p Procedure" so we should NOT include "s/p" in the diagnosis field.
                if (!patient.diagnosis && patient.procedures.length > 0) {
                    for (const proc of patient.procedures) {
                        const procLower = proc.toLowerCase().trim();
                        // Direct match in procedure-diagnosis map
                        if (PROCEDURE_DIAGNOSIS_MAP[procLower]) {
                            patient.diagnosis = PROCEDURE_DIAGNOSIS_MAP[procLower];
                            break;
                        }
                        // Partial match: check if any key is contained in the procedure text
                        for (const [key, dx] of Object.entries(PROCEDURE_DIAGNOSIS_MAP)) {
                            if (procLower.includes(key.toLowerCase()) || key.toLowerCase().includes(procLower)) {
                                patient.diagnosis = dx;
                                break;
                            }
                        }
                        if (patient.diagnosis) break;
                    }
                }

                // If diagnosis has "c/b" in it, extract the complications into problems
                if (patient.diagnosis) {
                    const cbMatch = patient.diagnosis.match(/\bc\/b\s+(.+?)$/i);
                    if (cbMatch) {
                        const complications = cbMatch[1].split(/[,;&]+/).map(c => c.trim()).filter(c => c.length > 1);
                        // Add complications to problems if not already there
                        complications.forEach(c => {
                            if (!patient.problems.some(p => p.toLowerCase() === c.toLowerCase())) {
                                patient.problems.push(c);
                            }
                        });
                        // Clean diagnosis: remove the "c/b ..." part
                        patient.diagnosis = patient.diagnosis.replace(/\s*c\/b\s+.+$/i, '').trim();
                    }
                }

                // If we see "c/b" in the block text, also check for complications to add to problems
                const cbBlockMatch = b.match(/\bc\/b\s+(.+?)(?=\n|(?:\s*(?:plan|todo|overnight|diet|$)))/i);
                if (cbBlockMatch && patient.problems.length === 0) {
                    const complications = cbBlockMatch[1].split(/[,;&]+/).map(c => c.trim()).filter(c => c.length > 1);
                    patient.problems = [...patient.problems, ...complications];
                }

                return patient;
            }).filter(p => p.room); // Only keep patients with a room number

            return parsedPatients;
        }

        // ==================== SHIFT HANDOFF COMPONENT ====================
        function Handoff() {
            const [patients, setPatients] = React.useState([]);
            const [handoffPlans, setHandoffPlans] = React.useState({});
            const [ifsThens, setIfsThens] = React.useState({});
            const [contactInfo, setContactInfo] = React.useState({});
            const [activePatientId, setActivePatientId] = React.useState(null);
            const [showImportModal, setShowImportModal] = React.useState(false);
            const [importText, setImportText] = React.useState('');
            const [parsedImport, setParsedImport] = React.useState(null);
            const [importStatus, setImportStatus] = React.useState('');
            const dictation = useDictation();
            const patientDictations = {};

            React.useEffect(() => {
                DB.init().then(() => loadPatients());
            }, []);

            const loadPatients = async () => {
                const allPatients = await DB.getAll('patients');
                const active = allPatients.filter(p => p.status !== 'discharged').sort((a, b) => parseInt(a.room) - parseInt(b.room));
                setPatients(active);

                const plans = {};
                const ifs = {};
                const contact = {};
                active.forEach(p => {
                    plans[p.id] = p.treatmentPlan || '';
                    ifs[p.id] = '';
                    contact[p.id] = p.phone || '';
                });
                setHandoffPlans(plans);
                setIfsThens(ifs);
                setContactInfo(contact);
            };

            const handleAutoGenerate = async () => {
                const plans = { ...handoffPlans };
                patients.forEach(p => {
                    plans[p.id] = `Continue current management. ${p.treatmentPlan || 'Monitor status.'} Notify team of any deterioration.`;
                });
                setHandoffPlans(plans);
            };

            const handleParseSignout = () => {
                if (!importText.trim()) return;
                const parsed = parseSignoutText(importText);
                setParsedImport(parsed);
            };

            const handleConfirmImport = async () => {
                if (!parsedImport || parsedImport.length === 0) return;
                setImportStatus('Importing...');

                try {
                    const existingPatients = await DB.getAll('patients');
                    let importedCount = 0;
                    let taskCount = 0;

                    for (const parsed of parsedImport) {
                        // Check if a patient with this room already exists (and is not discharged)
                        const existing = existingPatients.find(p => p.room === parsed.room && p.status !== 'discharged');

                        let patientId;

                        if (existing) {
                            // Update existing patient with new info where fields are non-empty
                            const updated = { ...existing };
                            if (parsed.diagnosis && !updated.diagnosis) updated.diagnosis = parsed.diagnosis;
                            if (parsed.procedures.length > 0 && (!updated.procedures || updated.procedures.length === 0)) updated.procedures = parsed.procedures;
                            if (parsed.problems.length > 0) {
                                // Merge problems without duplicates
                                const existingProbs = updated.problems || [];
                                const newProbs = parsed.problems.filter(p => !existingProbs.some(ep => ep.toLowerCase() === p.toLowerCase()));
                                updated.problems = [...existingProbs, ...newProbs];
                            }
                            if (parsed.treatmentPlan && !updated.treatmentPlan) updated.treatmentPlan = parsed.treatmentPlan;
                            if (parsed.diet) updated.diet = parsed.diet;
                            if (parsed.activity) updated.activity = parsed.activity;
                            if (parsed.dvtProphylaxis) updated.dvtProphylaxis = parsed.dvtProphylaxis;
                            if (parsed.dispositionPlan) updated.dispositionPlan = parsed.dispositionPlan;
                            if (parsed.codeStatus) updated.codeStatus = parsed.codeStatus;
                            if (parsed.concerns) updated.concerns = parsed.concerns;
                            // Always update admitDate if the signout had a date or POD
                            if (parsed.admitDate && parsed.admitDate !== getTodayISO()) updated.admitDate = parsed.admitDate;
                            if (parsed.examFindings) updated.examFindings = parsed.examFindings;
                            // Merge PMH without duplicates
                            if (parsed.pmh && parsed.pmh.length > 0) {
                                const existingPmh = updated.pmh || [];
                                const newPmh = parsed.pmh.filter(p => !existingPmh.some(ep => ep.toLowerCase() === p.toLowerCase()));
                                updated.pmh = [...existingPmh, ...newPmh];
                            }
                            // Merge PSH without duplicates
                            if (parsed.psh && parsed.psh.length > 0) {
                                const existingPsh = updated.psh || [];
                                const newPsh = parsed.psh.filter(p => !existingPsh.some(ep => ep.toLowerCase() === p.toLowerCase()));
                                updated.psh = [...existingPsh, ...newPsh];
                            }
                            // Merge Home Meds without duplicates
                            if (parsed.homeMeds && parsed.homeMeds.length > 0) {
                                const existingMeds = updated.homeMeds || [];
                                const newMeds = parsed.homeMeds.filter(m => !existingMeds.some(em => em.toLowerCase() === m.toLowerCase()));
                                updated.homeMeds = [...existingMeds, ...newMeds];
                            }
                            // Merge Allergies without duplicates
                            if (parsed.allergies && parsed.allergies.length > 0) {
                                const existingAll = updated.allergies || [];
                                const newAll = parsed.allergies.filter(a => !existingAll.some(ea => ea.toLowerCase() === a.toLowerCase()));
                                updated.allergies = [...existingAll, ...newAll];
                            }
                            // Merge antibiotics
                            if (parsed.antibiotics && parsed.antibiotics.length > 0) {
                                const existingAbx = updated.antibiotics || [];
                                const newAbx = parsed.antibiotics.filter(a => !existingAbx.some(ea => ea.name.toLowerCase() === a.name.toLowerCase()));
                                updated.antibiotics = [...existingAbx, ...newAbx];
                            }

                            await DB.put('patients', updated);
                            patientId = existing.id;
                        } else {
                            // Create new patient
                            const newPatient = {
                                room: parsed.room,
                                diagnosis: parsed.diagnosis,
                                procedures: parsed.procedures,
                                problems: parsed.problems,
                                pmh: parsed.pmh || [],
                                psh: parsed.psh || [],
                                homeMeds: parsed.homeMeds || [],
                                allergies: parsed.allergies || [],
                                examFindings: parsed.examFindings || '',
                                antibiotics: parsed.antibiotics || [],
                                treatmentPlan: parsed.treatmentPlan || parsed.overnightPlan || '',
                                diet: parsed.diet || 'Regular',
                                activity: parsed.activity || 'Ambulate TID',
                                dvtProphylaxis: parsed.dvtProphylaxis || 'Heparin 5000 TID',
                                giProphylaxis: parsed.giProphylaxis || 'Pantoprazole',
                                dispositionPlan: parsed.dispositionPlan || '',
                                concerns: parsed.concerns || '',
                                codeStatus: parsed.codeStatus || 'Full Code',
                                admitDate: parsed.admitDate || getTodayISO(),
                                status: 'stable',
                                age: parsed.age || 0,
                                gender: parsed.gender || ''
                            };
                            const result = await DB.add('patients', newPatient);
                            patientId = result?.id || result;
                        }

                        importedCount++;

                        // Create tasks from parsed to-dos
                        if (parsed.todos && parsed.todos.length > 0) {
                            for (const todoText of parsed.todos) {
                                // Determine task category from content
                                let category = 'Other';
                                if (/lab|cbc|cmp|bmp|check am/i.test(todoText)) category = 'Labs';
                                else if (/diet|npo|clears|advance/i.test(todoText)) category = 'Diet';
                                else if (/ambulate|pt eval|activity|walk|ot eval/i.test(todoText)) category = 'Activity';
                                else if (/dc|discharge|dispo|social work|case manage/i.test(todoText)) category = 'Discharge';
                                else if (/med|antibiotic|pain|heparin|anticoag|oral/i.test(todoText)) category = 'Medications';
                                else if (/f\/u|follow|consult|call/i.test(todoText)) category = 'Other';

                                await DB.add('tasks', {
                                    patientId: patientId,
                                    category: category,
                                    description: todoText,
                                    completed: false,
                                    assignee: currentUser?.displayName || currentUser?.email || '',
                                    assignedBy: 'Signout Import',
                                    createdAt: new Date().toISOString()
                                });
                                taskCount++;
                            }
                        }
                    }

                    setImportStatus(`Imported ${importedCount} patient${importedCount !== 1 ? 's' : ''} and ${taskCount} task${taskCount !== 1 ? 's' : ''}`);

                    // Refresh patient list
                    await loadPatients();

                    // Clear after a moment
                    setTimeout(() => {
                        setShowImportModal(false);
                        setImportText('');
                        setParsedImport(null);
                        setImportStatus('');
                    }, 2000);
                } catch (err) {
                    console.error('Import error:', err);
                    setImportStatus('Error importing: ' + err.message);
                }
            };

            const handleParseHandoffDictation = (transcript) => {
                const parsed = parseHandoffSpeech(transcript);
                if (activePatientId) {
                    if (parsed.overnightPlan) {
                        setHandoffPlans({...handoffPlans, [activePatientId]: parsed.overnightPlan});
                    }
                    if (parsed.ifThen) {
                        setIfsThens({...ifsThens, [activePatientId]: parsed.ifThen});
                    }
                    if (parsed.contact) {
                        setContactInfo({...contactInfo, [activePatientId]: parsed.contact});
                    }
                    dictation.clear();
                }
            };

            const handleExportPDF = async () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const timestamp = getCurrentDateTime();

                doc.setFontSize(14);
                doc.text('Shift Handoff Report', 10, 10);
                doc.setFontSize(10);
                doc.text(`Generated: ${timestamp}`, 10, 18);

                let yPosition = 25;
                const pageHeight = doc.internal.pageSize.height;
                const margin = 10;
                const contentWidth = doc.internal.pageSize.width - 2 * margin;

                patients.forEach((patient, idx) => {
                    if (yPosition > pageHeight - 40) {
                        doc.addPage();
                        yPosition = 10;
                    }

                    doc.setFontSize(11);
                    doc.setTextColor(100, 150, 220);
                    doc.text(`Room ${patient.room} | ${patient.diagnosis || 'N/A'} | POD ${calculatePOD(patient.admitDate)} | ${patient.codeStatus || 'FULL'}`, margin, yPosition);
                    yPosition += 6;

                    doc.setFontSize(9);
                    doc.setTextColor(100, 100, 100);

                    doc.text('Summary:', margin, yPosition);
                    yPosition += 4;
                    const summaryLines = doc.splitTextToSize(handoffPlans[patient.id] || patient.treatmentPlan || '', contentWidth - 5);
                    summaryLines.forEach(line => {
                        doc.text(line, margin + 2, yPosition);
                        yPosition += 3;
                    });

                    doc.text('Active Issues:', margin, yPosition);
                    yPosition += 4;
                    const issues = patient.problems ? patient.problems.slice(0, 3) : [];
                    if (issues.length === 0) {
                        doc.text('None reported', margin + 2, yPosition);
                        yPosition += 3;
                    } else {
                        issues.forEach(issue => {
                            doc.text(`• ${issue}`, margin + 2, yPosition);
                            yPosition += 3;
                        });
                    }

                    doc.text('Overnight Plan:', margin, yPosition);
                    yPosition += 4;
                    const planLines = doc.splitTextToSize(handoffPlans[patient.id] || 'Monitor status', contentWidth - 5);
                    planLines.forEach(line => {
                        doc.text(line, margin + 2, yPosition);
                        yPosition += 3;
                    });

                    if (ifsThens[patient.id]) {
                        doc.text('If/Then:', margin, yPosition);
                        yPosition += 4;
                        const ifLines = doc.splitTextToSize(ifsThens[patient.id], contentWidth - 5);
                        ifLines.forEach(line => {
                            doc.text(line, margin + 2, yPosition);
                            yPosition += 3;
                        });
                    }

                    yPosition += 4;
                });

                doc.save(`handoff-${getTodayISO()}.pdf`);
            };

            return (
                <div className="p-4 md:p-6 max-w-4xl mx-auto">
                    <div className="flex justify-between items-center mb-6">
                        <div>
                            <h2 className="text-2xl font-bold text-medical-600">Shift Handoff</h2>
                            <p className="text-sm text-gray-500">{getCurrentDateTime()}</p>
                        </div>
                        <div className="flex gap-2 flex-wrap">
                            <button onClick={() => setShowImportModal(true)} className="px-4 py-2 bg-medical-600 hover:bg-medical-700 text-white rounded font-medium text-sm">
                                Import Signout
                            </button>
                            <button onClick={handleAutoGenerate} className="px-4 py-2 bg-amber-600 hover:bg-amber-700 text-white rounded font-medium text-sm">
                                Auto-Generate
                            </button>
                            <button onClick={handleExportPDF} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded font-medium text-sm">
                                Export PDF
                            </button>
                        </div>
                    </div>

                    <DictationBar dictation={dictation} onParse={handleParseHandoffDictation} parseLabel="Apply to Patient" />

                    <div className="space-y-4">
                        {[...patients].sort((a, b) => {
                            if (a.isTrauma && !b.isTrauma) return -1;
                            if (!a.isTrauma && b.isTrauma) return 1;
                            return parseInt(a.room) - parseInt(b.room);
                        }).map(patient => (
                            <div key={patient.id} className={`bg-white border rounded-xl p-4 ${patient.isTrauma ? 'border-red-500 border-l-4 border-l-red-600 bg-red-50/30' : 'border-gray-200'}`}>
                                <div className="grid grid-cols-4 gap-3 mb-4 text-sm">
                                    <div className={`font-bold ${patient.isTrauma ? 'text-red-600' : 'text-medical-600'}`}>Room {patient.room} {patient.isTrauma && <span className="text-xs bg-red-500 text-white px-1.5 py-0.5 rounded ml-1">{patient.traumaLevel || 'T'}</span>}</div>
                                    <div className="text-gray-600">{patient.diagnosis || 'N/A'}</div>
                                    <div className="text-amber-600">POD {calculatePOD(patient.admitDate)}</div>
                                    <div className="text-gray-600">{patient.codeStatus || 'FULL'}</div>
                                </div>

                                <div className="space-y-3">
                                    <div>
                                        <label className="text-xs text-gray-500 font-semibold">Brief Summary</label>
                                        <textarea value={handoffPlans[patient.id] || ''} onChange={(e) => setHandoffPlans({...handoffPlans, [patient.id]: e.target.value})}
                                            className="w-full mt-1 px-3 py-2 bg-gray-50 border border-gray-300 rounded text-gray-600 text-sm"
                                            rows="2" placeholder="Treatment plan and key points"/>
                                    </div>

                                    <div>
                                        <div className="flex items-center justify-between mb-1">
                                            <label className="text-xs text-gray-500 font-semibold">Overnight Plan</label>
                                            <button onClick={() => setActivePatientId(activePatientId === patient.id ? null : patient.id)}
                                                className={`text-xs px-2 py-1 rounded transition ${activePatientId === patient.id ? 'bg-medical-600 text-white' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'}`}>
                                                {activePatientId === patient.id ? '✓ Active' : 'Set Active'}
                                            </button>
                                        </div>
                                        <textarea value={handoffPlans[patient.id] || ''} onChange={(e) => setHandoffPlans({...handoffPlans, [patient.id]: e.target.value})}
                                            className="w-full mt-1 px-3 py-2 bg-gray-50 border border-gray-300 rounded text-gray-600 text-sm"
                                            rows="2" placeholder="Continue current management..."/>
                                    </div>

                                    <div>
                                        <label className="text-xs text-gray-500 font-semibold">If/Then Plan</label>
                                        <textarea value={ifsThens[patient.id] || ''} onChange={(e) => setIfsThens({...ifsThens, [patient.id]: e.target.value})}
                                            className="w-full mt-1 px-3 py-2 bg-gray-50 border border-gray-300 rounded text-gray-600 text-sm"
                                            rows="2" placeholder="E.g., If temp >38.5, then blood cultures x2"/>
                                    </div>

                                    <div>
                                        <label className="text-xs text-gray-500 font-semibold">Contact Info</label>
                                        <input type="text" value={contactInfo[patient.id] || ''} onChange={(e) => setContactInfo({...contactInfo, [patient.id]: e.target.value})}
                                            className="w-full mt-1 px-3 py-2 bg-gray-50 border border-gray-300 rounded text-gray-600 text-sm"
                                            placeholder="Phone/Contact"/>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Import Signout Modal */}
                    {showImportModal && (
                        <div className="fixed inset-0 bg-black/50 modal-backdrop flex items-end md:items-center justify-center p-4 z-50">
                            <div className="modal-content bg-white rounded-xl shadow-xl w-full md:max-w-3xl max-h-[90vh] overflow-y-auto">
                                <div className="sticky top-0 bg-white border-b border-gray-200 p-4 flex justify-between items-center z-10">
                                    <h2 className="text-xl font-bold text-medical-600">Import Signout</h2>
                                    <button onClick={() => { setShowImportModal(false); setParsedImport(null); setImportText(''); setImportStatus(''); }} className="text-gray-500 hover:text-gray-800 text-xl">✕</button>
                                </div>

                                <div className="p-4 space-y-4">
                                    {!parsedImport ? (
                                        <React.Fragment>
                                            <p className="text-sm text-gray-600">
                                                Paste a text signout below. The parser recognizes medical abbreviations (c/b, NWB, s/p, etc.), extracts diagnoses, procedures, PMH, problems, plans, dates/POD, and to-do items. It also predicts diagnoses from procedures automatically.
                                            </p>
                                            <div className="bg-gray-50 border border-gray-200 rounded-lg p-3">
                                                <p className="text-xs text-gray-400 mb-2 font-semibold">Example format:</p>
                                                <pre className="text-xs text-gray-500 whitespace-pre-wrap font-mono leading-relaxed">
{`512 - 65M s/p lap appy 3/18 c/b ileus
PMH: HTN, DM2, COPD
PSH: Prior chole, R inguinal hernia repair
Meds: Metformin, Lisinopril, Atorvastatin
Allergies: PCN, Sulfa
Abx: Zosyn (started 3/18)
Problems: Ileus, pain control
Plan: Advance diet, check AM labs
Code: Full
To-do: F/U CT results, check NGT output

514 - 45F SBO s/p ex-lap w/ LOA POD1
PMH: h/o Afib, HLD, prior SBO
PSH: Appy, C-section x2
Allergies: NKDA
Problems: High NGT output, AKI
Plan: NPO, IVF, NGT to LCWS
Activity: NWB
To-do: Check AM labs, I/Os q4h`}
                                                </pre>
                                            </div>
                                            <textarea
                                                value={importText}
                                                onChange={(e) => setImportText(e.target.value)}
                                                className="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg text-gray-800 text-sm font-mono"
                                                rows="12"
                                                placeholder="Paste your signout text here..."
                                                autoFocus
                                            />
                                            <div className="flex justify-end gap-2">
                                                <button onClick={() => { setShowImportModal(false); setImportText(''); }} className="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded font-medium text-sm">
                                                    Cancel
                                                </button>
                                                <button onClick={handleParseSignout} disabled={!importText.trim()} className="px-4 py-2 bg-medical-600 hover:bg-medical-700 text-white rounded font-medium text-sm disabled:opacity-50">
                                                    Parse Signout
                                                </button>
                                            </div>
                                        </React.Fragment>
                                    ) : (
                                        <React.Fragment>
                                            <p className="text-sm text-gray-600">
                                                Found <span className="font-bold text-medical-600">{parsedImport.length}</span> patient{parsedImport.length !== 1 ? 's' : ''}. Review below before importing.
                                            </p>

                                            <div className="space-y-3 max-h-[50vh] overflow-y-auto">
                                                {parsedImport.map((p, idx) => (
                                                    <div key={idx} className="bg-gray-50 border border-gray-200 rounded-lg p-3">
                                                        <div className="flex items-center gap-3 mb-2">
