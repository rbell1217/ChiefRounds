        // ==================== TRAUMA SPEECH PARSER ====================
        function parseTraumaSpeech(transcript) {
            const lower = transcript.toLowerCase();
            const result = {};

            // Level
            if (/level\s+1|level 1|l1/i.test(transcript)) result.level = 'Level 1';
            else if (/level\s+2|level 2|l2/i.test(transcript)) result.level = 'Level 2';
            else if (/trauma alert/i.test(transcript)) result.level = 'Trauma Alert';

            // Room
            const roomMatch = transcript.match(/(?:room|trauma bay)\s+(\w+)/i);
            if (roomMatch) result.room = roomMatch[1];

            // Mechanism
            const mechKeywords = {
                'mvc': 'MVC', 'motor vehicle': 'MVC',
                'motorcycle': 'MCC (Motorcycle)', 'mcc': 'MCC (Motorcycle)',
                'pedestrian': 'Pedestrian struck',
                'fall': 'Fall',
                'gsw': 'GSW', 'gunshot': 'GSW',
                'stab': 'Stab wound',
                'assault': 'Assault',
                'bicycle': 'Bicycle crash',
                'atv': 'ATV',
                'industrial': 'Industrial',
                'blast': 'Blast injury',
                'burn': 'Burn'
            };
            for (let key in mechKeywords) {
                if (lower.includes(key)) {
                    result.mechanism = mechKeywords[key];
                    break;
                }
            }

            // Injuries
            const injMatch = transcript.match(/(?:injur|sustain|trauma)\s+(.+?)(?:primary|survey|imaging|labs|consult|plan|dispo|$)/i);
            if (injMatch) result.injuries = injMatch[1].trim();

            // Primary Survey
            const primMatch = transcript.match(/(?:primary survey|abcde?|airway|breathing|circulation|disability)\s+(.+?)(?:secondary|imaging|labs|consult|plan|$)/i);
            if (primMatch) result.primarySurvey = primMatch[1].trim();

            // Secondary Survey
            const secMatch = transcript.match(/(?:secondary survey|head to toe)\s+(.+?)(?:imaging|labs|consult|plan|$)/i);
            if (secMatch) result.secondarySurvey = secMatch[1].trim();

            // Imaging Ordered
            const imgOrdMatch = transcript.match(/(?:imaging ordered|ordered|get|obtain)\s+(.+?)(?:imaging shows|findings|labs|$)/i);
            if (imgOrdMatch) result.imagingOrdered = imgOrdMatch[1].trim();

            // Imaging Findings
            const imgMatch = transcript.match(/(?:imaging shows|ct shows|x-ray|xray|radiology|fast|findings)\s+(.+?)(?:labs|consult|plan|next|$)/i);
            if (imgMatch) result.imagingFindings = imgMatch[1].trim();

            // Lab Findings
            const labMatch = transcript.match(/(?:labs? (?:show|findings)|hemoglobin|hgb|lactate|coag)\s+(.+?)(?:consult|plan|next|dispo|$)/i);
            if (labMatch) result.labFindings = labMatch[1].trim();

            // Consulting Services - parse multiple mentioned
            const consultKeywords = [
                'neurosurgery', 'neurosurg', 'neuro',
                'orthopedics', 'ortho', 'orthopedic',
                'vascular',
                'cardiothoracic', 'cardio', 'ct surgery',
                'urology', 'uro',
                'plastic',
                'oral', 'maxillofacial', 'omfs',
                'interventional', 'ir',
                'spine'
            ];
            const services = [];
            for (let keyword of consultKeywords) {
                if (lower.includes(keyword)) {
                    const mapping = {
                        'neurosurgery': 'Neurosurgery', 'neurosurg': 'Neurosurgery', 'neuro': 'Neurosurgery',
                        'orthopedics': 'Orthopedics', 'ortho': 'Orthopedics', 'orthopedic': 'Orthopedics',
                        'vascular': 'Vascular',
                        'cardiothoracic': 'Cardiothoracic', 'cardio': 'Cardiothoracic', 'ct surgery': 'Cardiothoracic',
                        'urology': 'Urology', 'uro': 'Urology',
                        'plastic': 'Plastic Surgery',
                        'oral': 'Oral/Maxillofacial', 'maxillofacial': 'Oral/Maxillofacial', 'omfs': 'Oral/Maxillofacial',
                        'interventional': 'Interventional Radiology', 'ir': 'Interventional Radiology',
                        'spine': 'Spine'
                    };
                    const mapped = mapping[keyword];
                    if (mapped && !services.includes(mapped)) services.push(mapped);
                }
            }
            if (services.length > 0) result.consultServices = services;

            // Consultant Findings
            const consultMatch = transcript.match(/(?:consultant|ortho|neurosurg|vascular|cardio)\s+(?:says|finds|recommends|findings)\s+(.+?)(?:plan|next|dispo|$)/i);
            if (consultMatch) result.consultFindings = consultMatch[1].trim();

            // Plan
            const planMatch = transcript.match(/(?:plan|we're going|going to|admission|admit)\s+(.+?)(?:next steps|action|dispo|$)/i);
            if (planMatch) result.plan = planMatch[1].trim();

            // Next Steps
            const nextMatch = transcript.match(/(?:next steps|action items|to do|need to)\s+(.+?)(?:dispo|disposition|$)/i);
            if (nextMatch) result.nextSteps = nextMatch[1].trim();

            // Disposition
            if (/trauma icu|t-?icu/i.test(lower)) result.disposition = 'Trauma ICU';
            else if (/step.?down/i.test(lower)) result.disposition = 'Step-down';
            else if (/\bfloor\b/i.test(lower)) result.disposition = 'Floor';
            else if (/\bor\b|operating room|surgery/i.test(lower)) result.disposition = 'OR';
            else if (/discharge/i.test(lower)) result.disposition = 'Discharge';
            else if (/transfer/i.test(lower)) result.disposition = 'Transfer';
            else if (/morgue|deceased/i.test(lower)) result.disposition = 'Morgue';

            return result;
        }

        // ==================== TRAUMA ACTIVATIONS ====================
        function TraumaActivations() {
            const [traumas, setTraumas] = React.useState([]);
            const [showForm, setShowForm] = React.useState(false);
            const [editingTrauma, setEditingTrauma] = React.useState(null);
            const [expandedId, setExpandedId] = React.useState(null);
            const [filter, setFilter] = React.useState('active');
            const [showQuickTrauma, setShowQuickTrauma] = React.useState(false);
            const [quickTranscript, setQuickTranscript] = React.useState('');
            const [quickListening, setQuickListening] = React.useState(false);
            const quickRecognitionRef = React.useRef(null);
            const [form, setForm] = React.useState({
                level: 'Level 1', room: '', mechanism: '', injuries: '',
                activationTime: new Date().toISOString().slice(0, 16),
                primarySurvey: '', secondarySurvey: '',
                imagingOrdered: '', imagingFindings: '',
                labFindings: '', consultServices: [],
                consultFindings: '', plan: '', nextSteps: '',
                disposition: '', status: 'Active', notes: ''
            });

            const TRAUMA_LEVELS = ['Level 1', 'Level 2', 'Trauma Alert', 'Trauma Consult'];
            const COMMON_CONSULTS = ['Neurosurgery', 'Orthopedics', 'Vascular', 'Cardiothoracic', 'Urology', 'Plastic Surgery', 'Oral/Maxillofacial', 'Interventional Radiology', 'Spine'];
            const COMMON_IMAGING = ['CT Head', 'CT C-spine', 'CT Chest', 'CT Abdomen/Pelvis', 'CT Pan Scan', 'CXR', 'Pelvis XR', 'FAST Exam', 'CTA Chest', 'CTA Neck', 'CT Angio Abdomen'];
            const COMMON_MECHANISMS = ['MVC', 'MCC (Motorcycle)', 'Pedestrian struck', 'Fall', 'GSW', 'Stab wound', 'Assault', 'Bicycle crash', 'ATV', 'Industrial', 'Blast injury', 'Burn'];

            React.useEffect(() => { loadData(); setupQuickTrauma(); }, []);

            const setupQuickTrauma = () => {
                if (typeof window !== 'undefined') {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (SpeechRecognition) {
                        quickRecognitionRef.current = new SpeechRecognition();
                        quickRecognitionRef.current.continuous = true;
                        quickRecognitionRef.current.interimResults = true;
                        quickRecognitionRef.current.onstart = () => setQuickListening(true);
                        quickRecognitionRef.current.onresult = (event) => {
                            let interimTranscript = '';
                            let finalTranscript = '';
                            for (let i = event.resultIndex; i < event.results.length; i++) {
                                const t = event.results[i][0].transcript;
                                if (event.results[i].isFinal) {
                                    finalTranscript += t + ' ';
                                } else {
                                    interimTranscript += t;
                                }
                            }
                            setQuickTranscript(prev => prev + finalTranscript + interimTranscript);
                        };
                        quickRecognitionRef.current.onerror = () => setQuickListening(false);
                        quickRecognitionRef.current.onend = () => setQuickListening(false);
                    }
                }
            };

            const startQuickTrauma = () => {
                if (quickRecognitionRef.current) {
                    setQuickTranscript('');
                    quickRecognitionRef.current.start();
                }
            };

            const stopQuickTrauma = () => {
                if (quickRecognitionRef.current) {
                    quickRecognitionRef.current.stop();
                }
            };

            const saveQuickTrauma = async () => {
                const parsed = parseTraumaSpeech(quickTranscript);
                if (!parsed.mechanism) {
                    alert('Could not parse mechanism from speech. Please provide more detail.');
                    return;
                }

                const data = {
                    level: parsed.level || 'Level 1',
                    room: parsed.room || '',
                    mechanism: parsed.mechanism || '',
                    injuries: parsed.injuries || '',
                    primarySurvey: parsed.primarySurvey || '',
                    secondarySurvey: parsed.secondarySurvey || '',
                    imagingOrdered: parsed.imagingOrdered || '',
                    imagingFindings: parsed.imagingFindings || '',
                    labFindings: parsed.labFindings || '',
                    consultServices: parsed.consultServices || [],
                    consultFindings: parsed.consultFindings || '',
                    plan: parsed.plan || '',
                    nextSteps: parsed.nextSteps || '',
                    disposition: parsed.disposition || '',
                    activationTime: new Date().toISOString().slice(0, 16),
                    status: 'Active',
                    notes: '',
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };

                await DB.add('traumas', data);
                setQuickTranscript('');
                setShowQuickTrauma(false);
                loadData();
            };

            const loadData = async () => {
                try {
                    const t = await DB.getAll('traumas');
                    setTraumas(t.sort((a, b) => new Date(b.activationTime) - new Date(a.activationTime)));
                } catch (e) { console.error(e); }
            };

            const resetForm = () => setForm({
                level: 'Level 1', room: '', mechanism: '', injuries: '',
                activationTime: new Date().toISOString().slice(0, 16),
                primarySurvey: '', secondarySurvey: '',
                imagingOrdered: '', imagingFindings: '',
                labFindings: '', consultServices: [],
                consultFindings: '', plan: '', nextSteps: '',
                disposition: '', status: 'Active', notes: ''
            });

            const handleSave = async () => {
                if (!form.mechanism) return;
                const data = { ...form, consultServices: form.consultServices || [], updatedAt: new Date().toISOString() };
                if (editingTrauma) {
                    await DB.put('traumas', { ...data, id: editingTrauma.id });
                } else {
                    data.createdAt = new Date().toISOString();
                    await DB.add('traumas', data);
                }
                resetForm(); setEditingTrauma(null); setShowForm(false); loadData();
            };

            const handleEdit = (t) => {
                setForm({ ...t, consultServices: t.consultServices || [] });
                setEditingTrauma(t);
                setShowForm(true);
            };

            const handleDelete = async (id) => {
                await DB.delete('traumas', id);
                loadData();
            };

            const toggleConsultService = (svc) => {
                setForm(prev => ({
                    ...prev,
                    consultServices: prev.consultServices.includes(svc)
                        ? prev.consultServices.filter(s => s !== svc)
                        : [...prev.consultServices, svc]
                }));
            };

            const filtered = filter === 'all' ? traumas : traumas.filter(t => filter === 'active' ? t.status === 'Active' : t.status !== 'Active');
            const levelColors = { 'Level 1': 'bg-red-500', 'Level 2': 'bg-amber-500', 'Trauma Alert': 'bg-orange-500', 'Trauma Consult': 'bg-medical-500' };
            const activeCount = traumas.filter(t => t.status === 'Active').length;

            return (
                <div className="p-4 pb-20 max-w-4xl mx-auto">
                    {showQuickTrauma && (
                        <div className="bg-white border border-red-500/50 rounded-lg p-4 mb-4 shadow-lg shadow-red-500/10">
                            <div className="flex items-center justify-between mb-3">
                                <h3 className="text-white font-bold">Quick Trauma Activation</h3>
                                <button onClick={() => { stopQuickTrauma(); setShowQuickTrauma(false); setQuickTranscript(''); }}
                                    className="text-gray-500 hover:text-gray-600 text-xl">×</button>
                            </div>
                            <button onClick={quickListening ? stopQuickTrauma : startQuickTrauma}
                                className={`w-full py-4 rounded-lg font-bold text-white mb-3 transition text-lg ${
                                    quickListening ? 'bg-red-500 text-white animate-pulse' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'
                                }`}>
                                {quickListening ? '🎤 Listening...' : '🎤 Start Dictating'}
                            </button>
                            {quickTranscript && (
                                <div className="bg-cream-50 border border-gray-300 rounded p-3 text-gray-600 text-sm min-h-[60px] mb-3 max-h-[120px] overflow-y-auto">
                                    {quickTranscript}
                                </div>
                            )}
                            <div className="flex gap-2">
                                <button onClick={saveQuickTrauma}
                                    className="flex-1 bg-red-500 hover:bg-red-600 text-white py-2 rounded-lg font-medium transition">
                                    Save Trauma
                                </button>
                                <button onClick={() => setQuickTranscript('')}
                                    className="bg-gray-50 hover:bg-gray-100 text-gray-600 px-3 py-2 rounded-lg transition">
                                    Clear
                                </button>
                            </div>
                        </div>
                    )}

                    <div className="flex justify-between items-center mb-4">
                        <div>
                            <h2 className="text-2xl font-bold text-red-600">Trauma Activations</h2>
                            <p className="text-sm text-gray-500">{activeCount} active | {traumas.length} total today</p>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setShowQuickTrauma(!showQuickTrauma)}
                                className="bg-red-600 hover:bg-red-700 text-white px-3 py-2 rounded-lg font-medium transition text-sm">
                                🎤 Quick Trauma
                            </button>
                            <button onClick={() => { resetForm(); setEditingTrauma(null); setShowForm(true); }}
                                className="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-medium transition">
                                + Trauma
                            </button>
                        </div>
                    </div>

                    <div className="flex gap-2 mb-4">
                        {['active', 'resolved', 'all'].map(f => (
                            <button key={f} onClick={() => setFilter(f)}
                                className={`px-3 py-1 rounded-full text-sm capitalize transition ${
                                    filter === f ? 'bg-red-500 text-white' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'
                                }`}>{f}</button>
                        ))}
                    </div>

                    {filtered.length === 0 ? (
                        <div className="text-center py-12 text-gray-400">
                            <p className="text-4xl mb-2">🚑</p>
                            <p>No trauma activations {filter !== 'all' ? `(${filter})` : ''}</p>
                        </div>
                    ) : filtered.map(t => (
                        <div key={t.id} className={`bg-white border border-gray-200 rounded-lg mb-3 overflow-hidden ${
                            t.status === 'Active' ? 'border-l-4 border-l-red-500' : ''
                        }`}>
                            {/* Header - always visible */}
                            <div className="p-4 cursor-pointer" onClick={() => setExpandedId(expandedId === t.id ? null : t.id)}>
                                <div className="flex justify-between items-start">
                                    <div className="flex items-center gap-2 flex-wrap">
                                        <span className={`${levelColors[t.level]} text-white text-xs font-bold px-2 py-0.5 rounded`}>{t.level}</span>
                                        <span className="font-bold text-white">{t.mechanism}</span>
                                        {t.room && <span className="text-gray-500 text-sm">| Rm {t.room}</span>}
                                        <span className={`text-xs px-2 py-0.5 rounded-full ${
                                            t.status === 'Active' ? 'bg-red-50 text-red-600' : 'bg-gray-100 text-gray-500'
                                        }`}>{t.status}</span>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <span className="text-xs text-gray-400">{formatTime(t.activationTime)}</span>
                                        <span className="text-gray-400">{expandedId === t.id ? '▲' : '▼'}</span>
                                    </div>
                                </div>
                                {t.injuries && <p className="text-sm text-gray-600 mt-1">{t.injuries}</p>}
                                {t.consultServices && t.consultServices.length > 0 && (
                                    <div className="flex gap-1 mt-2 flex-wrap">
                                        {t.consultServices.map(s => (
                                            <span key={s} className="text-xs bg-gray-50 text-gray-600 px-2 py-0.5 rounded">{s}</span>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* Expanded detail */}
                            {expandedId === t.id && (
                                <div className="border-t border-gray-200 p-4 space-y-3">
                                    {t.primarySurvey && (
                                        <div><p className="text-xs text-gray-400 font-medium">PRIMARY SURVEY (ABCDE)</p>
                                        <p className="text-sm text-gray-600">{t.primarySurvey}</p></div>
                                    )}
                                    {t.secondarySurvey && (
                                        <div><p className="text-xs text-gray-400 font-medium">SECONDARY SURVEY</p>
                                        <p className="text-sm text-gray-600">{t.secondarySurvey}</p></div>
                                    )}

                                    {(t.imagingOrdered || t.imagingFindings) && (
                                        <div className="bg-blue-500/10 border border-blue-500/30 rounded p-3">
                                            <p className="text-xs text-blue-600 font-medium mb-1">RADIOLOGY</p>
                                            {t.imagingOrdered && <p className="text-sm text-gray-600"><span className="text-gray-400">Ordered:</span> {t.imagingOrdered}</p>}
                                            {t.imagingFindings && <p className="text-sm text-blue-600 mt-1"><span className="text-blue-600">Findings:</span> {t.imagingFindings}</p>}
                                        </div>
                                    )}

                                    {t.labFindings && (
                                        <div className="bg-purple-500/10 border border-purple-500/30 rounded p-3">
                                            <p className="text-xs text-purple-400 font-medium mb-1">LAB FINDINGS</p>
                                            <p className="text-sm text-purple-300">{t.labFindings}</p>
                                        </div>
                                    )}

                                    {t.consultFindings && (
                                        <div className="bg-emerald-500/10 border border-emerald-500/30 rounded p-3">
                                            <p className="text-xs text-emerald-600 font-medium mb-1">CONSULTANT FINDINGS & RECS</p>
                                            <p className="text-sm text-emerald-600">{t.consultFindings}</p>
                                        </div>
                                    )}

                                    {t.plan && (
                                        <div className="bg-medical-500 text-white/10 border border-medical-500/30 rounded p-3">
                                            <p className="text-xs text-medical-600 font-medium mb-1">PLAN</p>
                                            <p className="text-sm text-medical-500">{t.plan}</p>
                                        </div>
                                    )}

                                    {t.nextSteps && (
                                        <div className="bg-amber-500/10 border border-amber-500/30 rounded p-3">
                                            <p className="text-xs text-amber-600 font-medium mb-1">NEXT STEPS</p>
                                            <p className="text-sm text-amber-600">{t.nextSteps}</p>
                                        </div>
                                    )}

                                    {t.disposition && <p className="text-sm text-gray-600"><span className="text-gray-400">Disposition:</span> {t.disposition}</p>}
                                    {t.notes && <p className="text-xs text-gray-400">Notes: {t.notes}</p>}

                                    <div className="flex gap-2 pt-2">
                                        <button onClick={() => handleEdit(t)} className="bg-medical-500 text-white/20 text-medical-600 hover:bg-medical-500 text-white/30 px-3 py-1 rounded text-sm transition">Edit</button>
                                        {t.status === 'Active' ? (
                                            <button onClick={async () => { await DB.put('traumas', {...t, status: 'Resolved', updatedAt: new Date().toISOString()}); loadData(); }}
                                                className="bg-emerald-50 text-emerald-600 hover:bg-emerald-500/30 px-3 py-1 rounded text-sm transition">Resolve</button>
                                        ) : (
                                            <button onClick={async () => { await DB.put('traumas', {...t, status: 'Active', updatedAt: new Date().toISOString()}); loadData(); }}
                                                className="bg-amber-500/20 text-amber-600 hover:bg-amber-500/30 px-3 py-1 rounded text-sm transition">Reactivate</button>
                                        )}
                                        <button onClick={() => handleDelete(t.id)} className="bg-red-50 text-red-600 hover:bg-red-500/30 px-3 py-1 rounded text-sm transition">Delete</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    ))}

                    {/* Form Modal with Voice Dictation */}
                    {showForm && (
                        <TraumaFormModal
                            form={form}
                            setForm={setForm}
                            TRAUMA_LEVELS={TRAUMA_LEVELS}
                            COMMON_CONSULTS={COMMON_CONSULTS}
                            COMMON_IMAGING={COMMON_IMAGING}
                            COMMON_MECHANISMS={COMMON_MECHANISMS}
                            editingTrauma={editingTrauma}
                            handleSave={handleSave}
                            toggleConsultService={toggleConsultService}
                            onClose={() => { setShowForm(false); setEditingTrauma(null); resetForm(); }}
                        />
                    )}
                </div>
            );
        }

        function TraumaFormModal({ form, setForm, TRAUMA_LEVELS, COMMON_CONSULTS, COMMON_IMAGING, COMMON_MECHANISMS, editingTrauma, handleSave, toggleConsultService, onClose }) {
            const [transcript, setTranscript] = React.useState('');
            const [listening, setListening] = React.useState(false);
            const recognitionRef = React.useRef(null);

            React.useEffect(() => {
                if (typeof window !== 'undefined') {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (SpeechRecognition) {
                        recognitionRef.current = new SpeechRecognition();
                        recognitionRef.current.continuous = true;
                        recognitionRef.current.interimResults = true;
                        recognitionRef.current.onstart = () => setListening(true);
                        recognitionRef.current.onresult = (event) => {
                            let interimTranscript = '';
                            let finalTranscript = '';
                            for (let i = event.resultIndex; i < event.results.length; i++) {
                                const t = event.results[i][0].transcript;
                                if (event.results[i].isFinal) {
                                    finalTranscript += t + ' ';
                                } else {
                                    interimTranscript += t;
                                }
                            }
                            setTranscript(prev => prev + finalTranscript + interimTranscript);
                        };
                        recognitionRef.current.onerror = () => setListening(false);
                        recognitionRef.current.onend = () => setListening(false);
                    }
                }
            }, []);

            const startListening = () => {
                if (recognitionRef.current) {
                    setTranscript('');
                    recognitionRef.current.start();
                }
            };

            const stopListening = () => {
                if (recognitionRef.current) {
                    recognitionRef.current.stop();
                }
            };

            const parseAndFill = () => {
                const parsed = parseTraumaSpeech(transcript);
                setForm(prev => {
                    const newForm = { ...prev, ...parsed };
                    if (parsed.consultServices) {
                        newForm.consultServices = parsed.consultServices;
                    }
                    return newForm;
                });
                setTranscript('');
                setListening(false);
            };

            return (
                <div className="fixed inset-0 bg-black/60 flex items-start justify-center pt-4 z-50 overflow-y-auto modal-backdrop" onClick={onClose}>
                    <div className="bg-white rounded-lg p-5 w-full max-w-lg mx-4 mb-8 modal-content" onClick={e => e.stopPropagation()}>
                        <h3 className="text-lg font-bold text-white mb-4">{editingTrauma ? 'Edit Trauma' : 'New Trauma Activation'}</h3>

                        {/* Voice Dictation Section */}
                        <div className="bg-cream-50 border border-gray-200 rounded-lg p-4 mb-4">
                            <button onClick={listening ? stopListening : startListening}
                                className={`w-full py-3 rounded-lg font-bold text-white mb-3 transition ${
                                    listening ? 'bg-red-500 text-white animate-pulse' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'
                                }`}>
                                {listening ? '🎤 Listening...' : '🎤 Tap to Dictate'}
                            </button>
                            {transcript && (
                                <div className="bg-cream-50 border border-gray-300 rounded p-3 text-gray-600 text-sm min-h-[60px] mb-3 max-h-[100px] overflow-y-auto">
                                    {transcript}
                                </div>
                            )}
                            <div className="flex gap-2">
                                <button onClick={parseAndFill}
                                    className="flex-1 bg-medical-500 hover:bg-medical-600 text-white py-2 rounded font-medium transition text-sm">
                                    Parse & Fill
                                </button>
                                <button onClick={() => setTranscript('')}
                                    className="bg-gray-50 hover:bg-gray-100 text-gray-600 px-3 py-2 rounded transition text-sm">
                                    Clear
                                </button>
                            </div>
                        </div>

                        <div className="space-y-3 max-h-[60vh] overflow-y-auto">
                            <div className="grid grid-cols-2 gap-3">
                                <div>
                                    <label className="text-sm text-gray-500 block mb-1">Level</label>
                                    <select value={form.level} onChange={e => setForm({...form, level: e.target.value})}
                                        className="w-full bg-gray-50 border border-gray-300 rounded p-2 text-white">
                                        {TRAUMA_LEVELS.map(l => <option key={l} value={l}>{l}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="text-sm text-gray-500 block mb-1">Room</label>
                                    <input value={form.room} onChange={e => setForm({...form, room: e.target.value})}
                                        className="w-full bg-gray-50 border border-gray-300 rounded p-2 text-white" placeholder="Trauma bay / room"/>
                                </div>
                            </div>

                            <div>
                                <label className="text-sm text-gray-500 block mb-1">Mechanism *</label>
                                <div className="flex flex-wrap gap-1 mb-2">
                                    {COMMON_MECHANISMS.map(m => (
                                        <button key={m} type="button" onClick={() => setForm({...form, mechanism: m})}
                                            className={`text-xs px-2 py-1 rounded transition ${form.mechanism === m ? 'bg-red-500 text-white' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'}`}>{m}</button>
                                    ))}
                                </div>
                                <input value={form.mechanism} onChange={e => setForm({...form, mechanism: e.target.value})}
                                    className="w-full bg-gray-50 border border-gray-300 rounded p-2 text-white" placeholder="Or type mechanism..."/>
                            </div>

                            <div>
                                <label className="text-sm text-gray-500 block mb-1">Injuries / Description</label>
                                <textarea value={form.injuries} onChange={e => setForm({...form, injuries: e.target.value})}
                                    className="w-full bg-gray-50 border border-gray-300 rounded p-2 text-white h-16" placeholder="e.g., Blunt abdominal trauma, L rib fractures 6-9, grade III splenic lac"/>
                            </div>

                            <div>
                                <label className="text-sm text-gray-500 block mb-1">Primary Survey (ABCDE)</label>
                                <textarea value={form.primarySurvey} onChange={e => setForm({...form, primarySurvey: e.target.value})}
                                    className="w-full bg-gray-50 border border-gray-300 rounded p-2 text-white h-16" placeholder="A: Patent, B: CTA bilat, C: Tachy to 110s, D: GCS 15, E: Abrasions L flank"/>
                            </div>

                            <div>
                                <label className="text-sm text-gray-500 block mb-1">Secondary Survey</label>
                                <textarea value={form.secondarySurvey} onChange={e => setForm({...form, secondarySurvey: e.target.value})}
                                    className="w-full bg-gray-50 border border-gray-300 rounded p-2 text-white h-16" placeholder="Head-to-toe findings..."/>
                            </div>

                            <div>
                                <label className="text-sm text-gray-500 block mb-1">Imaging Ordered</label>
                                <div className="flex flex-wrap gap-1 mb-2">
                                    {COMMON_IMAGING.map(img => (
                                        <button key={img} type="button" onClick={() => {
                                            const current = form.imagingOrdered ? form.imagingOrdered.split(', ') : [];
                                            if (current.includes(img)) {
                                                setForm({...form, imagingOrdered: current.filter(i => i !== img).join(', ')});
                                            } else {
                                                setForm({...form, imagingOrdered: [...current, img].join(', ')});
                                            }
                                        }}
                                            className={`text-xs px-2 py-1 rounded transition ${
                                                form.imagingOrdered && form.imagingOrdered.includes(img) ? 'bg-blue-500 text-white' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'
                                            }`}>{img}</button>
                                    ))}
                                </div>
                                <input value={form.imagingOrdered} onChange={e => setForm({...form, imagingOrdered: e.target.value})}
                                    className="w-full bg-gray-50 border border-gray-300 rounded p-2 text-white text-sm"/>
                            </div>

                            <div>
                                <label className="text-sm text-gray-500 block mb-1">Radiology Findings</label>
                                <textarea value={form.imagingFindings} onChange={e => setForm({...form, imagingFindings: e.target.value})}
                                    className="w-full bg-gray-50 border border-gray-300 rounded p-2 text-white h-20" placeholder="e.g., CT A/P: Grade III splenic laceration with small hemoperitoneum, no active extravasation. L rib fx 6-9, small L PTX."/>
                            </div>

                            <div>
                                <label className="text-sm text-gray-500 block mb-1">Lab Findings</label>
                                <textarea value={form.labFindings} onChange={e => setForm({...form, labFindings: e.target.value})}
                                    className="w-full bg-gray-50 border border-gray-300 rounded p-2 text-white h-12" placeholder="e.g., Hgb 11.2, Lactate 3.1, INR 1.0, FAST positive"/>
                            </div>

                            <div>
                                <label className="text-sm text-gray-500 block mb-1">Consulting Services</label>

                                    {COMMON_CONSULTS.map(svc => (
                                        <button key={svc} type="button" onClick={() => toggleConsultService(svc)}
                                            className={`text-xs px-2 py-1 rounded transition ${
                                                form.consultServices.includes(svc) ? 'bg-emerald-500 text-white' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'
                                            }`}>{svc}</button>
                                    ))}
                                </div>
                            </div>

                            <div>
                                <label className="text-sm text-gray-500 block mb-1">Consultant Findings & Recommendations</label>
                                <textarea value={form.consultFindings} onChange={e => setForm({...form, consultFindings: e.target.value})}
                                    className="w-full bg-gray-50 border border-gray-300 rounded p-2 text-white h-20" placeholder="e.g., Ortho: L tib-fib fx, plan for IM nail POD1. NSG: No surgical intervention needed for small EDH, serial neuro checks q1h."/>
                            </div>

                            <div>
                                <label className="text-sm text-gray-500 block mb-1">Plan</label>
                                <textarea value={form.plan} onChange={e => setForm({...form, plan: e.target.value})}
                                    className="w-full bg-gray-50 border border-gray-300 rounded p-2 text-white h-16" placeholder="Admit to Trauma ICU, serial H/H q6h, repeat CT 6h..."/>
                            </div>

                            <div>
                                <label className="text-sm text-gray-500 block mb-1">Next Steps / Action Items</label>
                                <textarea value={form.nextSteps} onChange={e => setForm({...form, nextSteps: e.target.value})}
                                    className="w-full bg-gray-50 border border-gray-300 rounded p-2 text-white h-16" placeholder="e.g., Repeat H/H in 4h, if drop >2 consider angio. Chest tube if PTX increases. Family at bedside, update after repeat imaging."/>
                            </div>

                            <div className="grid grid-cols-2 gap-3">
                                <div>
                                    <label className="text-sm text-gray-500 block mb-1">Disposition</label>
                                    <select value={form.disposition} onChange={e => setForm({...form, disposition: e.target.value})}
                                        className="w-full bg-gray-50 border border-gray-300 rounded p-2 text-white">
                                        <option value="">TBD</option>
                                        {['Trauma ICU', 'Step-down', 'Floor', 'OR', 'Discharge', 'Transfer', 'Morgue'].map(d => <option key={d} value={d}>{d}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="text-sm text-gray-500 block mb-1">Status</label>
                                    <select value={form.status} onChange={e => setForm({...form, status: e.target.value})}
                                        className="w-full bg-gray-50 border border-gray-300 rounded p-2 text-white">
                                        {['Active', 'Resolved', 'Admitted', 'Transferred', 'Deceased'].map(s => <option key={s} value={s}>{s}</option>)}
                                    </select>
                                </div>
                            </div>

                            <div>
                                <label className="text-sm text-gray-500 block mb-1">Notes</label>
                                <textarea value={form.notes} onChange={e => setForm({...form, notes: e.target.value})}
                                    className="w-full bg-gray-50 border border-gray-300 rounded p-2 text-white h-12" placeholder="Additional notes..."/>
                            </div>
                        </div>

                        <div className="flex gap-3 mt-4">
                            <button onClick={handleSave} className="flex-1 bg-red-500 hover:bg-red-600 text-white py-2 rounded-lg font-medium transition">
                                {editingTrauma ? 'Update' : 'Save'} Trauma
                            </button>
                            <button onClick={onClose}
                                className="px-4 py-2 bg-gray-50 hover:bg-gray-100 text-gray-600 rounded-lg transition">Cancel</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== LOGIN SCREEN ====================
        function LoginScreen({ onLogin }) {
            const [mode, setMode] = React.useState('login'); // 'login', 'signup'
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [displayName, setDisplayName] = React.useState('');
            const [error, setError] = React.useState('');
            const [loading, setLoading] = React.useState(false);

            const handleEmailLogin = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                try {
                    if (mode === 'signup') {
                        const cred = await auth.createUserWithEmailAndPassword(email, password);
                        await cred.user.updateProfile({ displayName: displayName || email.split('@')[0] });
                    } else {
                        await auth.signInWithEmailAndPassword(email, password);
                    }
                } catch (err) {
                    setError(err.message.replace('Firebase: ', ''));
                }
                setLoading(false);
            };

            const handleGoogleLogin = async () => {
                setError('');
                setLoading(true);
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    // Always use popup - signInWithRedirect has known issues on
                    // iOS Safari due to Intelligent Tracking Prevention (ITP)
                    // blocking cookies across redirects
                    await auth.signInWithPopup(provider);
                } catch (err) {
                    const code = err.code || '';
                    if (code === 'auth/popup-blocked' || code === 'auth/popup-closed-by-browser') {
                        setError('Popup was blocked. Please allow popups for this site and try again.');
                    } else if (code === 'auth/unauthorized-domain') {
                        setError('This domain is not authorized for Google sign-in. Please contact the administrator.');
                    } else {
                        setError(err.message.replace('Firebase: ', ''));
                    }
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen bg-cream-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-lg p-8 w-full max-w-sm">
                        <div className="text-center mb-6">
                            <h1 className="text-3xl font-bold text-medical-700">🩺 ChiefRounds</h1>
                            <p className="text-gray-500 text-sm mt-1">Surgical Resident Tracker</p>
                        </div>

                        {error && (
                            <div className="bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg p-3 mb-4">
                                {error}
                            </div>
                        )}

                        <button
                            onClick={handleGoogleLogin}
                            disabled={loading}
                            className="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-200 hover:border-gray-300 hover:bg-gray-50 text-gray-700 font-medium py-3 px-4 rounded-lg transition mb-4"
                        >
                            <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
                            Continue with Google
                        </button>

                        <div className="flex items-center gap-3 my-4">
                            <div className="flex-1 h-px bg-gray-200"></div>
                            <span className="text-xs text-gray-400 font-medium">OR</span>
                            <div className="flex-1 h-px bg-gray-200"></div>
                        </div>

                        <form onSubmit={handleEmailLogin} className="space-y-3">
                            {mode === 'signup' && (
                                <input
                                    type="text"
                                    placeholder="Display name (e.g., Dr. Bell)"
                                    value={displayName}
                                    onChange={e => setDisplayName(e.target.value)}
                                    className="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-medical-500 focus:border-transparent"
                                />
                            )}
                            <input
                                type="email"
                                placeholder="Email address"
                                value={email}
                                onChange={e => setEmail(e.target.value)}
                                required
                                className="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-medical-500 focus:border-transparent"
                            />
                            <input
                                type="password"
                                placeholder="Password"
                                value={password}
                                onChange={e => setPassword(e.target.value)}
                                required
                                minLength={6}
                                className="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-medical-500 focus:border-transparent"
                            />
                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full bg-medical-600 text-white hover:bg-medical-700 font-semibold py-3 px-4 rounded-lg transition disabled:opacity-50"
                            >
                                {loading ? 'Please wait...' : mode === 'signup' ? 'Create Account' : 'Sign In'}
                            </button>
                        </form>

                        <p className="text-center text-sm text-gray-500 mt-4">
                            {mode === 'login' ? (
                                <>No account? <button onClick={() => { setMode('signup'); setError(''); }} className="text-medical-600 font-medium">Sign up</button></>
                            ) : (
                                <>Already have one? <button onClick={() => { setMode('login'); setError(''); }} className="text-medical-600 font-medium">Sign in</button></>
                            )}
                        </p>
                    </div>
                </div>
            );
        }

        // ==================== TEAM SETUP ====================
        function TeamSetup({ user, onTeamReady }) {
            const [mode, setMode] = React.useState(null); // null, 'create', 'join'
            const [teamName, setTeamName] = React.useState('');
            const [joinCode, setJoinCode] = React.useState('');
            const [error, setError] = React.useState('');
            const [loading, setLoading] = React.useState(false);

            const generateCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();

            const handleCreate = async () => {
                if (!teamName.trim()) return;
                setLoading(true);
                setError('');
                try {
                    const code = generateCode();
                    const teamRef = await db.collection('teams').add({
                        name: teamName.trim(),
                        inviteCode: code,
                        createdBy: user.uid,
                        createdAt: new Date().toISOString(),
                        members: [{ uid: user.uid, name: user.displayName || user.email, email: user.email, role: 'admin' }]
                    });
                    await db.collection('users').doc(user.uid).set({
                        email: user.email,
                        displayName: user.displayName || user.email.split('@')[0],
                        teamId: teamRef.id,
                        role: 'admin'
                    }, { merge: true });
                    onTeamReady(teamRef.id);
                } catch (err) {
                    setError(err.message);
                }
                setLoading(false);
            };

            const handleJoin = async () => {
                if (!joinCode.trim()) return;
                setLoading(true);
                setError('');
                try {
                    const snap = await db.collection('teams').where('inviteCode', '==', joinCode.trim().toUpperCase()).get();
                    if (snap.empty) {
                        setError('Invalid invite code. Please check and try again.');
                        setLoading(false);
                        return;
                    }
                    const teamDoc = snap.docs[0];
                    const teamData = teamDoc.data();
                    const alreadyMember = teamData.members?.some(m => m.uid === user.uid);
                    if (!alreadyMember) {
                        await teamDoc.ref.update({
                            members: firebase.firestore.FieldValue.arrayUnion({
                                uid: user.uid,
                                name: user.displayName || user.email,
                                email: user.email,
                                role: 'member'
                            })
                        });
                    }
                    await db.collection('users').doc(user.uid).set({
                        email: user.email,
                        displayName: user.displayName || user.email.split('@')[0],
                        teamId: teamDoc.id,
                        role: 'member'
                    }, { merge: true });
                    onTeamReady(teamDoc.id);
                } catch (err) {
                    setError(err.message);
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen bg-cream-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-lg p-8 w-full max-w-sm">
                        <div className="text-center mb-6">
                            <h1 className="text-2xl font-bold text-medical-700">🩺 Welcome!</h1>
                            <p className="text-gray-500 text-sm mt-1">Hi {user.displayName || user.email}. Set up your team to get started.</p>
                        </div>

                        {error && (
                            <div className="bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg p-3 mb-4">{error}</div>
                        )}

                        {!mode && (
                            <div className="space-y-3">
                                <button onClick={() => setMode('create')} className="w-full bg-medical-600 text-white hover:bg-medical-700 font-semibold py-3 px-4 rounded-lg transition">
                                    Create a New Team
                                </button>
                                <button onClick={() => setMode('join')} className="w-full bg-white border-2 border-gray-200 hover:border-gray-300 text-gray-700 font-medium py-3 px-4 rounded-lg transition">
                                    Join an Existing Team
                                </button>
                            </div>
                        )}

                        {mode === 'create' && (
                            <div className="space-y-3">
                                <input
                                    type="text"
                                    placeholder="Team name (e.g., Gen Surg Gold)"
                                    value={teamName}
                                    onChange={e => setTeamName(e.target.value)}
                                    className="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-medical-500"
                                />
                                <button onClick={handleCreate} disabled={loading} className="w-full bg-medical-600 text-white hover:bg-medical-700 font-semibold py-3 rounded-lg transition disabled:opacity-50">
                                    {loading ? 'Creating...' : 'Create Team'}
                                </button>
                                <button onClick={() => setMode(null)} className="w-full text-sm text-gray-500 hover:text-gray-700">Back</button>
                            </div>
                        )}

                        {mode === 'join' && (
                            <div className="space-y-3">
                                <input
                                    type="text"
                                    placeholder="Enter invite code"
                                    value={joinCode}
                                    onChange={e => setJoinCode(e.target.value.toUpperCase())}
                                    maxLength={6}
                                    className="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm tracking-widest text-center font-mono uppercase focus:outline-none focus:ring-2 focus:ring-medical-500"
                                />
                                <button onClick={handleJoin} disabled={loading} className="w-full bg-medical-600 text-white hover:bg-medical-700 font-semibold py-3 rounded-lg transition disabled:opacity-50">
                                    {loading ? 'Joining...' : 'Join Team'}
                                </button>
                                <button onClick={() => setMode(null)} className="w-full text-sm text-gray-500 hover:text-gray-700">Back</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==================== MAIN APP ====================
        function App() {
            const [user, setUser] = React.useState(null);
            const [teamId, setTeamId] = React.useState(null);
            const [teamData, setTeamData] = React.useState(null);
            const [authLoading, setAuthLoading] = React.useState(true);
            const [activeTab, setActiveTab] = React.useState('Patients');
            const [isMobile, setIsMobile] = React.useState(window.innerWidth < 768);
            const [showProfile, setShowProfile] = React.useState(false);

            // Listen for auth state changes (persisted login)
            React.useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (u) => {
                    setUser(u);
                    if (u) {
                        try {
                            const userDoc = await db.collection('users').doc(u.uid).get();
                            if (userDoc.exists && userDoc.data().teamId) {
                                const tid = userDoc.data().teamId;
                                setTeamId(tid);
                                DB.setTeamId(tid);
                                const teamDoc = await db.collection('teams').doc(tid).get();
                                if (teamDoc.exists) setTeamData({ id: tid, ...teamDoc.data() });
                            }
                        } catch (err) {
                            console.error('Error loading user/team data:', err);
                        }
                    } else {
                        setTeamId(null);
                        setTeamData(null);
                    }
                    setAuthLoading(false);
                });
                return () => unsub();
            }, []);

            React.useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const handleTeamReady = async (tid) => {
                setTeamId(tid);
                DB.setTeamId(tid);
                const teamDoc = await db.collection('teams').doc(tid).get();
                if (teamDoc.exists) setTeamData({ id: tid, ...teamDoc.data() });
            };

            const handleSignOut = () => {
                auth.signOut();
                setUser(null);
                setTeamId(null);
                setTeamData(null);
                setShowProfile(false);
            };

            // Loading state
            if (authLoading) {
                return (
                    <div className="min-h-screen bg-cream-50 flex items-center justify-center">
                        <div className="text-center">
                            <h1 className="text-2xl font-bold text-medical-700 mb-2">🩺 ChiefRounds</h1>
                            <p className="text-gray-500">Loading...</p>
                        </div>
                    </div>
                );
            }

            // Not logged in
            if (!user) {
                return <LoginScreen />;
            }

            // Logged in but no team
            if (!teamId) {
                return <TeamSetup user={user} onTeamReady={handleTeamReady} />;
            }

            const tabs = ['Patients', 'Attending', 'Tasks', 'Consults', 'Trauma', 'Census', 'Handoff', 'Pre-Round', 'Rounds'];

            const renderContent = () => {
                switch (activeTab) {
                    case 'Patients': return <PatientTracker />;
                    case 'Attending': return <AttendingView />;
                    case 'Tasks': return <TeamTasks teamData={teamData} currentUser={user} />;
                    case 'Consults': return <ConsultsTracker />;
                    case 'Trauma': return <TraumaActivations />;
                    case 'Census': return <CensusManagement />;
                    case 'Handoff': return <Handoff />;
                    case 'Pre-Round': return <PreRound />;
                    case 'Rounds': return <RoundsRecorder />;
                    default: return <PatientTracker />;
                }
            };

            // Profile dropdown component
            const ProfileMenu = () => (
                <div className="relative">
                    <button
                        onClick={() => setShowProfile(!showProfile)}
                        className="flex items-center gap-2 bg-gray-50 hover:bg-gray-100 rounded-full py-1.5 px-3 transition"
                    >
                        <div className="w-7 h-7 rounded-full bg-medical-600 text-white flex items-center justify-center text-xs font-bold">
                            {(user.displayName || user.email || '?')[0].toUpperCase()}
                        </div>
                        <span className="text-sm font-medium text-gray-700 hidden md:inline">{user.displayName || user.email?.split('@')[0]}</span>
                    </button>
                    {showProfile && (
                        <div className="absolute right-0 top-full mt-2 bg-white border border-gray-200 rounded-lg shadow-lg w-72 z-50 overflow-hidden">
                            <div className="p-4 border-b border-gray-100">
                                <p className="font-semibold text-gray-800">{user.displayName || 'User'}</p>
                                <p className="text-xs text-gray-500">{user.email}</p>
                            </div>
                            {teamData && (
                                <div className="p-4 border-b border-gray-100">
                                    <p className="text-xs text-gray-400 font-medium uppercase tracking-wide mb-1">Team</p>
                                    <p className="font-semibold text-gray-800">{teamData.name}</p>
                                    <div className="flex items-center gap-2 mt-2">
                                        <span className="text-xs text-gray-500">Invite code:</span>
                                        <code className="text-xs font-mono bg-gray-100 px-2 py-0.5 rounded font-bold tracking-widest">{teamData.inviteCode}</code>
                                    </div>
                                    <p className="text-xs text-gray-400 mt-2">{teamData.members?.length || 1} member(s)</p>
                                    <div className="mt-2 space-y-1">
                                        {teamData.members?.map((m, i) => (
                                            <div key={i} className="flex items-center gap-2 text-xs text-gray-600">
                                                <div className="w-5 h-5 rounded-full bg-gray-200 flex items-center justify-center text-[10px] font-bold text-gray-500">{(m.name || m.email || '?')[0].toUpperCase()}</div>
                                                <span>{m.name || m.email}</span>
                                                {m.role === 'admin' && <span className="text-[10px] bg-medical-600 text-white px-1.5 py-0.5 rounded">Admin</span>}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                            <div className="p-2">
                                <button onClick={handleSignOut} className="w-full text-left px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded-md transition">
                                    Sign Out
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );

            if (isMobile) {
                return (
                    <div className="min-h-screen bg-cream-50 flex flex-col">
                        <div className="bg-white border-b border-gray-200 p-3 sticky top-0 z-20 shadow-sm">
                            <div className="flex justify-between items-center">
                                <div>
                                    <h1 className="text-xl font-bold text-medical-600">🩺 ChiefRounds</h1>
                                    <p className="text-xs text-gray-500">{getTodayDateString()}</p>
                                </div>
                                <ProfileMenu />
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto pb-20" onClick={() => showProfile && setShowProfile(false)}>
                            {renderContent()}
                        </div>

                        <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-[0_-2px_8px_rgba(0,0,0,0.06)] z-30" style={{paddingBottom: 'env(safe-area-inset-bottom)'}}>
                            <div className="flex overflow-x-auto scrollbar-hide" style={{WebkitOverflowScrolling: 'touch', scrollbarWidth: 'none', msOverflowStyle: 'none'}}>
                                {tabs.map(tab => (
                                    <button
                                        key={tab}
                                        onClick={() => setActiveTab(tab)}
                                        className={`flex-shrink-0 py-3.5 px-4 text-[11px] font-medium transition whitespace-nowrap ${
                                            activeTab === tab
                                                ? 'text-medical-600 border-t-2 border-medical-500 bg-blue-50/50'
                                                : 'text-gray-400 hover:text-gray-600'
                                        }`}
                                    >
                                        {tab}
                                    </button>
                                ))}
                            </div>
                        </nav>
                    </div>
                );
            }

            // Desktop Layout
            return (
                <div className="min-h-screen bg-cream-50 flex flex-col">
                    <div className="bg-white border-b border-gray-200 p-4 sticky top-0 z-20 shadow-sm">
                        <div className="flex justify-between items-center">
                            <h1 className="text-2xl font-bold text-medical-700">🩺 ChiefRounds</h1>
                            <div className="flex items-center gap-4">
                                <p className="text-sm text-gray-500">{getCurrentDateTime()}</p>
                                <ProfileMenu />
                            </div>
                        </div>
                    </div>

                    <div className="bg-white border-b border-gray-200 flex overflow-x-auto shadow-sm">
                        {tabs.map(tab => (
                            <button
                                key={tab}
                                onClick={() => setActiveTab(tab)}
                                className={`px-4 py-3 font-medium transition whitespace-nowrap ${
                                    activeTab === tab
                                        ? 'text-medical-600 nav-item-active border-b-4 border-medical-500'
                                        : 'text-gray-500 hover:text-gray-600'
                                }`}
                            >
                                {tab}
                            </button>
                        ))}
                    </div>

                    <div className="flex-1 overflow-y-auto" onClick={() => showProfile && setShowProfile(false)}>
                        {renderContent()}
                    </div>
                </div>
            );
        }

        // ==================== RENDER APP ====================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
