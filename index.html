        // ==================== SIGNOUT TEXT PARSER ====================
        function parseSignoutText(rawText) {
            if (!rawText || !rawText.trim()) return [];

            // First normalize medical abbreviations throughout the text
            let text = rawText.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            text = normalizeMedicalText(text);

            // Split into patient blocks. Common delimiters:
            // - "Room ###" or "Rm ###" at start of line
            // - "###-" or "### -" (room number dash)
            // - Blank line followed by a new room number
            // - "Pt:" or "Patient:" prefixes
            // - Numbered lists like "1." "2." at start with room info
            const roomPattern = /(?:^|\n)(?=\s*(?:room|rm|bed)\s*#?\s*\d+|\s*\d{3,4}\s*[-–—:|]|\s*(?:pt|patient)\s*(?:\d+|:)|\s*\d+\.\s*(?:room|rm|bed)?\s*#?\s*\d+)/gi;

            let blocks = [];
            const splitPoints = [];
            let match;
            const tempText = '\n' + text; // ensure first block catches

            // Find all split points
            const lines = text.split('\n');
            let currentBlock = [];
            let foundFirstPatient = false;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                // Check if this line starts a new patient block
                const isNewPatient = /^(?:room|rm|bed)\s*#?\s*\d+/i.test(line) ||
                    /^\d{3,4}\s*[-–—:|]/i.test(line) ||
                    /^\d{3,4}\s+\w/i.test(line) && /(?:yo|y\/o|M|F|male|female|dx|diagnosis|s\/p)/i.test(line) ||
                    /^(?:pt|patient)\s*[:#]?\s*\d/i.test(line) ||
                    /^\d+\.\s*(?:room|rm|bed)?\s*#?\s*\d+/i.test(line) ||
                    /^\d+\.\s*\d{3,4}\s/i.test(line);

                if (isNewPatient) {
                    if (currentBlock.length > 0 && foundFirstPatient) {
                        blocks.push(currentBlock.join('\n'));
                    }
                    currentBlock = [lines[i]];
                    foundFirstPatient = true;
                } else if (foundFirstPatient) {
                    currentBlock.push(lines[i]);
                }
            }
            // Push last block
            if (currentBlock.length > 0 && foundFirstPatient) {
                blocks.push(currentBlock.join('\n'));
            }

            // If no blocks detected, try splitting on double newlines
            if (blocks.length === 0) {
                blocks = text.split(/\n\s*\n/).filter(b => b.trim().length > 10);
            }

            // Parse each block into a patient object
            const parsedPatients = blocks.map(block => {
                const b = block.trim();
                const patient = {
                    room: '',
                    diagnosis: '',
                    procedures: [],
                    problems: [],
                    pmh: [],
                    psh: [],
                    homeMeds: [],
                    allergies: [],
                    examFindings: '',
                    treatmentPlan: '',
                    diet: '',
                    activity: '',
                    dvtProphylaxis: '',
                    giProphylaxis: '',
                    codeStatus: 'Full Code',
                    dispositionPlan: '',
                    concerns: '',
                    admitDate: getTodayISO(),
                    status: 'stable',
                    overnightPlan: '',
                    ifThen: '',
                    todos: []
                };

                // Extract room number
                const roomMatch = b.match(/(?:room|rm|bed)\s*#?\s*(\d+)/i) ||
                    b.match(/^(?:\d+\.\s*)?(\d{3,4})\s*[-–—:|]/i) ||
                    b.match(/^(?:\d+\.\s*)?(\d{3,4})\s+/i);
                if (roomMatch) patient.room = roomMatch[1];

                // Extract age/gender
                const ageGenderMatch = b.match(/(\d{1,3})\s*(?:yo|y\/o|year[- ]old)?\s*(M|F|male|female)/i) ||
                    b.match(/(M|F|male|female)\s*(\d{1,3})/i);
                if (ageGenderMatch) {
                    // handle either order
                    if (/\d/.test(ageGenderMatch[1])) {
                        patient.age = parseInt(ageGenderMatch[1]);
                        patient.gender = ageGenderMatch[2].charAt(0).toUpperCase();
                    } else {
                        patient.gender = ageGenderMatch[1].charAt(0).toUpperCase();
                        patient.age = parseInt(ageGenderMatch[2]);
                    }
                }

                // Extract code status
                const codeMatch = b.match(/(?:code(?:\s*status)?)\s*[:\-]?\s*(full\s*code|dnr\s*\/?\s*dni|dnr|dni|comfort\s*(?:care|measures)?)/i) ||
                    b.match(/\b(full code|DNR\/DNI|DNR|DNI|comfort care|comfort measures)\b/i);
                if (codeMatch) patient.codeStatus = codeMatch[1].trim();

                // Extract diagnosis - look for "Dx:", "Diagnosis:", or "Dx -" patterns
                const dxMatch = b.match(/(?:dx|diagnosis|hpi)\s*[:\-–]\s*(.+?)(?=\n|(?:\s*(?:s\/p|procedures?|problems?|plan|todo|to[- ]?do|tasks?|if[/ ]then|overnight|diet|activity|code|dispo|contact|$)))/i);
                if (dxMatch) patient.diagnosis = dxMatch[1].trim();

                // Extract procedure / s/p
                const spMatch = b.match(/(?:s\/p|status post|procedure|op)\s*[:\-]?\s*(.+?)(?=\n|(?:\s*(?:problems?|plan|todo|to[- ]?do|tasks?|if[/ ]then|overnight|diet|activity|code|dispo|pod|contact|PMH|pmh|past medical|$)))/i);
                if (spMatch) {
                    let procText = spMatch[1].trim();
                    // Strip dates from procedure text (e.g. "lap appy 3/18" -> "lap appy")
                    procText = procText.replace(/\s+\d{1,2}\/\d{1,2}(?:\/\d{2,4})?\s*/g, ' ').trim();
                    // Extract "c/b ..." (complicated by) from procedure text into problems
                    const cbInProc = procText.match(/\s+c\/b\s+(.+)$/i);
                    if (cbInProc) {
                        const complications = cbInProc[1].split(/[,;&]+/).map(c => c.trim()).filter(c => c.length > 1);
                        patient.problems = [...patient.problems, ...complications];
                        procText = procText.replace(/\s+c\/b\s+.+$/i, '').trim();
                    }
                    // Strip "w/" or "with" clauses that aren't part of the procedure name
                    // but keep "w/ LOA" since LOA is a procedure
                    patient.procedures = procText.split(/[,;]/).map(p => p.trim()).filter(Boolean);
                }

                // Extract dates - try explicit admit/surgery dates first
                const extractedDate = extractDateFromContext(b);
                if (extractedDate) {
                    patient.admitDate = extractedDate;
                }

                // Extract POD - if present, use it to back-calculate admit date relative to today
                const podMatch = b.match(/POD\s*#?\s*(\d+)/i) || b.match(/post[- ]?op(?:erative)?\s*day\s*#?\s*(\d+)/i);
                if (podMatch) {
                    const pod = parseInt(podMatch[1] || podMatch[2]);
                    // Back-calculate admit date from POD using today in Central Time
                    const todayStr = getTodayISO();
                    const todayParts = todayStr.split('-');
                    const todayDate = new Date(parseInt(todayParts[0]), parseInt(todayParts[1]) - 1, parseInt(todayParts[2]));
                    todayDate.setDate(todayDate.getDate() - pod);
                    patient.admitDate = `${todayDate.getFullYear()}-${String(todayDate.getMonth() + 1).padStart(2, '0')}-${String(todayDate.getDate()).padStart(2, '0')}`;
                    patient._parsedPOD = pod; // store for preview display
                }

                // Extract problems/issues - look for labeled sections
                const probMatch = b.match(/(?:problems?|issues?|active(?:\s*issues)?)\s*[:\-]\s*(.+?)(?=\n\s*(?:plan|todo|to[- ]?do|tasks?|if[/ ]then|overnight|diet|activity|code|dispo|contact|$))/is);
                if (probMatch) {
                    const probText = probMatch[1].trim();
                    patient.problems = probText.split(/[,;\n•\-]+/).map(p => p.trim()).filter(p => p.length > 1);
                }

                // Extract plan
                const planMatch = b.match(/(?:plan|management|overnight plan)\s*[:\-]\s*(.+?)(?=\n\s*(?:todo|to[- ]?do|tasks?|if[/ ]then|diet|activity|code|dispo|contact|problems?|$))/is);
                if (planMatch) patient.treatmentPlan = planMatch[1].trim().replace(/\n/g, ' ');

                // Extract overnight plan specifically
                const overnightMatch = b.match(/(?:overnight(?:\s*plan)?|on?\/n)\s*[:\-]\s*(.+?)(?=\n\s*(?:todo|to[- ]?do|tasks?|if[/ ]then|diet|code|dispo|contact|$))/is);
                if (overnightMatch) patient.overnightPlan = overnightMatch[1].trim().replace(/\n/g, ' ');

                // Extract if/then
                const ifThenMatch = b.match(/(?:if[/ ]?then|contingency|contingencies)\s*[:\-]\s*(.+?)(?=\n\s*(?:todo|to[- ]?do|tasks?|diet|code|dispo|contact|$))/is);
                if (ifThenMatch) patient.ifThen = ifThenMatch[1].trim().replace(/\n/g, ' ');

                // Extract diet
                const dietMatch = b.match(/(?:diet)\s*[:\-]\s*(.+?)(?=\n|$)/i);
                if (dietMatch) patient.diet = dietMatch[1].trim();

                // Extract activity
                const actMatch = b.match(/(?:activity)\s*[:\-]\s*(.+?)(?=\n|$)/i);
                if (actMatch) patient.activity = actMatch[1].trim();

                // Extract DVT prophylaxis
                const dvtMatch = b.match(/(?:dvt\s*(?:prophy(?:laxis)?)?|anticoag(?:ulation)?|vte)\s*[:\-]\s*(.+?)(?=\n|$)/i);
                if (dvtMatch) patient.dvtProphylaxis = dvtMatch[1].trim();

                // Extract antibiotics
                const abxMatch = b.match(/(?:abx|antibiotics?|antimicrobials?)\s*[:\-]\s*(.+?)(?=\n\s*(?:plan|todo|to[- ]?do|diet|activity|code|dispo|contact|$))/is);
                if (abxMatch) {
                    const abxText = abxMatch[1].trim();
                    patient.antibiotics = abxText.split(/[,;\n]+/).map(a => a.trim()).filter(a => a.length > 1).map(a => {
                        // Try to extract date from abx entry like "Zosyn (started 3/18)" or "Vanc day 3"
                        const dateMatch = a.match(/(?:started?|since|from)\s*(\d{1,2}\/\d{1,2}(?:\/\d{2,4})?)/i);
                        const dayMatch = a.match(/day\s*(\d+)/i);
                        let startDate = '';
                        if (dateMatch) {
                            startDate = parseFlexibleDate(dateMatch[1]) || '';
                        } else if (dayMatch) {
                            const days = parseInt(dayMatch[1]);
                            const todayParts = getTodayISO().split('-');
                            const d = new Date(parseInt(todayParts[0]), parseInt(todayParts[1]) - 1, parseInt(todayParts[2]));
                            d.setDate(d.getDate() - days + 1);
                            startDate = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                        }
                        const name = a.replace(/\s*\(.*\)/, '').replace(/\s*day\s*\d+/i, '').trim();
                        return { name, startDate, stopDate: '' };
                    });
                }

                // Extract disposition
                const dispoMatch = b.match(/(?:dispo(?:sition)?|dc\s*plan|discharge\s*plan)\s*[:\-]\s*(.+?)(?=\n|$)/i);
                if (dispoMatch) patient.dispositionPlan = dispoMatch[1].trim();

                // Extract to-dos / tasks
                const todoMatch = b.match(/(?:todo|to[- ]?do|tasks?|action\s*items?|follow[- ]?up|f\/u)\s*[:\-]\s*(.+?)(?=\n\s*(?:if[/ ]then|overnight|diet|code|dispo|contact|$))/is);
                if (todoMatch) {
                    const todoText = todoMatch[1].trim();
                    patient.todos = todoText.split(/[,;\n•\-]+/).map(t => t.trim()).filter(t => t.length > 2);
                }

                // Also scan for inline task indicators throughout the text
                const inlineTaskPatterns = [
                    /(?:needs?|requires?|please|order|check|follow[- ]?up|f\/u|get|obtain|schedule|call|contact|consult|notify)\s+(.+?)(?=[,;\n.]|$)/gi
                ];
                // Only add these if no explicit todo section was found
                if (patient.todos.length === 0) {
                    const allLines = b.split('\n');
                    allLines.forEach(line => {
                        const trimmed = line.trim();
                        // Look for checkbox-style items: [ ] or - [ ] or *
                        if (/^[\-\*]\s*\[[\sx]?\]\s*(.+)/i.test(trimmed)) {
                            const taskText = trimmed.match(/^[\-\*]\s*\[[\sx]?\]\s*(.+)/i)[1].trim();
                            if (taskText.length > 2) patient.todos.push(taskText);
                        }
                        // Look for "TODO:" or "TD:" inline
                        const tdMatch = trimmed.match(/(?:TODO|TD)\s*[:\-]\s*(.+)/i);
                        if (tdMatch) patient.todos.push(tdMatch[1].trim());
                    });
                }

                // Extract PMH (Past Medical History)
                const pmhMatch = b.match(/(?:PMH|PMHx|past medical(?: history)?|medical history|comorbidities|h\/o)\s*[:\-]\s*(.+?)(?=\n\s*(?:PSH|PSHx|past surgical|dx|diagnosis|s\/p|procedures?|problems?|plan|todo|to[- ]?do|tasks?|if[/ ]then|overnight|diet|activity|code|dispo|contact|meds|medications?|allergies?|$))/is);
                if (pmhMatch) {
                    const pmhText = pmhMatch[1].trim();
                    patient.pmh = pmhText.split(/[,;\n•\-]+/).map(p => p.trim()).filter(p => p.length > 1);
                }
                // Also try to pick up PMH from "h/o HTN, DM2, COPD" patterns
                if (patient.pmh.length === 0) {
                    const hoMatch = b.match(/\bh\/o\s+(.+?)(?=\n|(?:\s*(?:s\/p|dx|procedures?|problems?|plan|$)))/i);
                    if (hoMatch) {
                        patient.pmh = hoMatch[1].split(/[,;&]+/).map(p => p.trim()).filter(p => p.length > 1);
                    }
                }

                // Extract PSH (Past Surgical History)
                const pshMatch = b.match(/(?:PSH|PSHx|past surgical(?: history)?|surgical history|prior surgeries|prior ops)\s*[:\-]\s*(.+?)(?=\n\s*(?:PMH|PMHx|past medical|dx|diagnosis|s\/p|procedures?|problems?|plan|todo|to[- ]?do|tasks?|if[/ ]then|overnight|diet|activity|code|dispo|contact|meds|medications?|allergies?|home meds|abx|antibiotics?|$))/is);
                if (pshMatch) {
                    patient.psh = pshMatch[1].split(/[,;\n•\-]+/).map(p => p.trim()).filter(p => p.length > 1);
                }

                // Extract Home Medications
                const medsMatch = b.match(/(?:home meds|home medications?|meds|medications?|med(?:\s*list)?)\s*[:\-]\s*(.+?)(?=\n\s*(?:PMH|PMHx|PSH|PSHx|past medical|past surgical|dx|diagnosis|s\/p|procedures?|problems?|plan|todo|to[- ]?do|tasks?|if[/ ]then|overnight|diet|activity|code|dispo|contact|allergies?|abx|antibiotics?|$))/is);
                if (medsMatch) {
                    patient.homeMeds = medsMatch[1].split(/[,;\n•]+/).map(m => m.trim()).filter(m => m.length > 1);
                }

                // Extract Allergies
                const allergyMatch = b.match(/(?:allergies|allergy|NKDA|NKA)\s*[:\-]?\s*(.+?)(?=\n\s*(?:PMH|PMHx|PSH|PSHx|past medical|past surgical|dx|diagnosis|s\/p|procedures?|problems?|plan|todo|to[- ]?do|tasks?|if[/ ]then|overnight|diet|activity|code|dispo|contact|meds|medications?|home meds|abx|antibiotics?|$))/is);
                if (allergyMatch) {
                    const allergyText = allergyMatch[1].trim();
                    if (/^NKDA$/i.test(allergyText) || /^NKA$/i.test(allergyText) || /^none$/i.test(allergyText)) {
                        patient.allergies = ['NKDA'];
                    } else {
                        patient.allergies = allergyText.split(/[,;\n•]+/).map(a => a.trim()).filter(a => a.length > 1);
                    }
                }
                // Handle standalone NKDA/NKA in text
                if (patient.allergies.length === 0 && /\bNKDA\b/.test(b)) {
                    patient.allergies = ['NKDA'];
                }

                // Extract Exam Findings
                const examMatch = b.match(/(?:exam|notable exam|exam findings?|physical exam|PE|phys(?:ical)?)\s*[:\-]\s*(.+?)(?=\n\s*(?:PMH|PMHx|PSH|PSHx|past medical|past surgical|dx|diagnosis|s\/p|procedures?|problems?|plan|todo|to[- ]?do|tasks?|if[/ ]then|overnight|diet|activity|code|dispo|contact|meds|medications?|allergies?|home meds|abx|antibiotics?|$))/is);
                if (examMatch) {
                    patient.examFindings = examMatch[1].trim().replace(/\n/g, '; ');
                }

                // Smart diagnosis prediction from procedure if no explicit diagnosis found
                // NOTE: diagnosis is stored separately from procedures. The display template
                // shows "Diagnosis s/p Procedure" so we should NOT include "s/p" in the diagnosis field.
                if (!patient.diagnosis && patient.procedures.length > 0) {
                    for (const proc of patient.procedures) {
                        const procLower = proc.toLowerCase().trim();
                        // Direct match in procedure-diagnosis map
                        if (PROCEDURE_DIAGNOSIS_MAP[procLower]) {
                            patient.diagnosis = PROCEDURE_DIAGNOSIS_MAP[procLower];
                            break;
                        }
                        // Partial match: check if any key is contained in the procedure text
                        for (const [key, dx] of Object.entries(PROCEDURE_DIAGNOSIS_MAP)) {
                            if (procLower.includes(key.toLowerCase()) || key.toLowerCase().includes(procLower)) {
                                patient.diagnosis = dx;
                                break;
                            }
                        }
                        if (patient.diagnosis) break;
                    }
                }

                // If diagnosis has "c/b" in it, extract the complications into problems
                if (patient.diagnosis) {
                    const cbMatch = patient.diagnosis.match(/\bc\/b\s+(.+?)$/i);
                    if (cbMatch) {
                        const complications = cbMatch[1].split(/[,;&]+/).map(c => c.trim()).filter(c => c.length > 1);
                        // Add complications to problems if not already there
                        complications.forEach(c => {
                            if (!patient.problems.some(p => p.toLowerCase() === c.toLowerCase())) {
                                patient.problems.push(c);
                            }
                        });
                        // Clean diagnosis: remove the "c/b ..." part
                        patient.diagnosis = patient.diagnosis.replace(/\s*c\/b\s+.+$/i, '').trim();
                    }
                }

                // If we see "c/b" in the block text, also check for complications to add to problems
                const cbBlockMatch = b.match(/\bc\/b\s+(.+?)(?=\n|(?:\s*(?:plan|todo|overnight|diet|$)))/i);
                if (cbBlockMatch && patient.problems.length === 0) {
                    const complications = cbBlockMatch[1].split(/[,;&]+/).map(c => c.trim()).filter(c => c.length > 1);
                    patient.problems = [...patient.problems, ...complications];
                }

                return patient;
            }).filter(p => p.room); // Only keep patients with a room number

            return parsedPatients;
        }

        // ==================== SHIFT HANDOFF COMPONENT ====================
        function Handoff() {
            const [patients, setPatients] = React.useState([]);
            const [handoffPlans, setHandoffPlans] = React.useState({});
            const [ifsThens, setIfsThens] = React.useState({});
            const [contactInfo, setContactInfo] = React.useState({});
            const [activePatientId, setActivePatientId] = React.useState(null);
            const [tasks, setTasks] = React.useState([]);
            const [newTodoText, setNewTodoText] = React.useState({});
            const [showImportModal, setShowImportModal] = React.useState(false);
            const [importText, setImportText] = React.useState('');
            const [parsedImport, setParsedImport] = React.useState(null);
            const [importStatus, setImportStatus] = React.useState('');
            const dictation = useDictation();
            const patientDictations = {};

            React.useEffect(() => {
                DB.init().then(() => loadPatients());
            }, []);

            const loadPatients = async () => {
                const allPatients = await DB.getAll('patients');
                const active = allPatients.filter(p => p.status !== 'discharged').sort((a, b) => parseInt(a.room) - parseInt(b.room));
                setPatients(active);

                const allTasks = await DB.getAll('tasks');
                setTasks(allTasks.filter(t => !t.completed));

                const plans = {};
                const ifs = {};
                const contact = {};
                active.forEach(p => {
                    plans[p.id] = p.treatmentPlan || '';
                    ifs[p.id] = '';
                    contact[p.id] = p.phone || '';
                });
                setHandoffPlans(plans);
                setIfsThens(ifs);
                setContactInfo(contact);
            };

            const getPatientTasks = (patientId) => tasks.filter(t => t.patientId === patientId);

            const getPatientWarnings = (patient) => {
                const warnings = [];
                if (patient.concerns) warnings.push({ type: 'concern', text: patient.concerns });
                const pod = calculatePOD(patient.admitDate);
                if (pod >= 7) warnings.push({ type: 'los', text: 'Extended LOS (POD ' + pod + ')' });
                if ((patient.problems || []).some(p => /sepsis|aki|pe\b|dvt|hemorrh|bleed/i.test(p))) {
                    warnings.push({ type: 'critical', text: 'Active critical problem: ' + (patient.problems || []).filter(p => /sepsis|aki|pe\b|dvt|hemorrh|bleed/i.test(p)).join(', ') });
                }
                if (patient.antibiotics && patient.antibiotics.length > 0) {
                    patient.antibiotics.filter(a => !a.stoppedDate).forEach(a => {
                        const startDate = a.startDate || a.startedAt;
                        if (startDate) {
                            const days = Math.floor((new Date() - new Date(startDate)) / 86400000);
                            if (days >= 7) warnings.push({ type: 'abx', text: a.name + ' day ' + days + ' - review antibiotic duration' });
                        }
                    });
                }
                return warnings;
            };

            const addHandoffTodo = async (patientId) => {
                const text = (newTodoText[patientId] || '').trim();
                if (!text) return;
                let category = 'Other';
                if (/lab|cbc|cmp|bmp|check am/i.test(text)) category = 'Labs';
                else if (/diet|npo|clears|advance/i.test(text)) category = 'Diet';
                else if (/ambulate|pt eval|activity|walk|ot eval/i.test(text)) category = 'Activity';
                else if (/dc|discharge|dispo|social work|case manage/i.test(text)) category = 'Discharge';
                else if (/med|antibiotic|pain|heparin|anticoag|oral/i.test(text)) category = 'Medications';
                await DB.add('tasks', {
                    patientId: patientId,
                    category: category,
                    description: text,
                    completed: false,
                    priority: 'Medium',
                    assignee: currentUser?.displayName || currentUser?.email || '',
                    assignedBy: 'Handoff',
                    createdAt: new Date().toISOString()
                });
                setNewTodoText(prev => ({ ...prev, [patientId]: '' }));
                const allTasks = await DB.getAll('tasks');
                setTasks(allTasks.filter(t => !t.completed));
            };

            const handleAutoGenerate = async () => {
                const plans = { ...handoffPlans };
                patients.forEach(p => {
                    plans[p.id] = `Continue current management. ${p.treatmentPlan || 'Monitor status.'} Notify team of any deterioration.`;
                });
                setHandoffPlans(plans);
            };

            const handleParseSignout = () => {
                if (!importText.trim()) return;
                const parsed = parseSignoutText(importText);
                setParsedImport(parsed);
            };

            const handleConfirmImport = async () => {
                if (!parsedImport || parsedImport.length === 0) return;
                setImportStatus('Importing...');

                try {
                    const existingPatients = await DB.getAll('patients');
                    let importedCount = 0;
                    let taskCount = 0;

                    for (const parsed of parsedImport) {
                        // Check if a patient with this room already exists (and is not discharged)
                        const existing = existingPatients.find(p => p.room === parsed.room && p.status !== 'discharged');

                        let patientId;

                        if (existing) {
                            // Update existing patient with new info where fields are non-empty
                            const updated = { ...existing };
                            if (parsed.diagnosis && !updated.diagnosis) updated.diagnosis = parsed.diagnosis;
                            if (parsed.procedures.length > 0 && (!updated.procedures || updated.procedures.length === 0)) updated.procedures = parsed.procedures;
                            if (parsed.problems.length > 0) {
                                // Merge problems without duplicates
                                const existingProbs = updated.problems || [];
                                const newProbs = parsed.problems.filter(p => !existingProbs.some(ep => ep.toLowerCase() === p.toLowerCase()));
                                updated.problems = [...existingProbs, ...newProbs];
                            }
                            if (parsed.treatmentPlan && !updated.treatmentPlan) updated.treatmentPlan = parsed.treatmentPlan;
                            if (parsed.diet) updated.diet = parsed.diet;
                            if (parsed.activity) updated.activity = parsed.activity;
                            if (parsed.dvtProphylaxis) updated.dvtProphylaxis = parsed.dvtProphylaxis;
                            if (parsed.dispositionPlan) updated.dispositionPlan = parsed.dispositionPlan;
                            if (parsed.codeStatus) updated.codeStatus = parsed.codeStatus;
                            if (parsed.concerns) updated.concerns = parsed.concerns;
                            // Always update admitDate if the signout had a date or POD
                            if (parsed.admitDate && parsed.admitDate !== getTodayISO()) updated.admitDate = parsed.admitDate;
                            if (parsed.examFindings) updated.examFindings = parsed.examFindings;
                            // Merge PMH without duplicates
                            if (parsed.pmh && parsed.pmh.length > 0) {
                                const existingPmh = updated.pmh || [];
                                const newPmh = parsed.pmh.filter(p => !existingPmh.some(ep => ep.toLowerCase() === p.toLowerCase()));
                                updated.pmh = [...existingPmh, ...newPmh];
                            }
                            // Merge PSH without duplicates
                            if (parsed.psh && parsed.psh.length > 0) {
                                const existingPsh = updated.psh || [];
                                const newPsh = parsed.psh.filter(p => !existingPsh.some(ep => ep.toLowerCase() === p.toLowerCase()));
                                updated.psh = [...existingPsh, ...newPsh];
                            }
                            // Merge Home Meds without duplicates
                            if (parsed.homeMeds && parsed.homeMeds.length > 0) {
                                const existingMeds = updated.homeMeds || [];
                                const newMeds = parsed.homeMeds.filter(m => !existingMeds.some(em => em.toLowerCase() === m.toLowerCase()));
                                updated.homeMeds = [...existingMeds, ...newMeds];
                            }
                            // Merge Allergies without duplicates
                            if (parsed.allergies && parsed.allergies.length > 0) {
                                const existingAll = updated.allergies || [];
                                const newAll = parsed.allergies.filter(a => !existingAll.some(ea => ea.toLowerCase() === a.toLowerCase()));
                                updated.allergies = [...existingAll, ...newAll];
                            }
                            // Merge antibiotics
                            if (parsed.antibiotics && parsed.antibiotics.length > 0) {
                                const existingAbx = updated.antibiotics || [];
                                const newAbx = parsed.antibiotics.filter(a => !existingAbx.some(ea => ea.name.toLowerCase() === a.name.toLowerCase()));
                                updated.antibiotics = [...existingAbx, ...newAbx];
                            }

                            await DB.put('patients', updated);
                            patientId = existing.id;
                        } else {
                            // Create new patient
                            const newPatient = {
                                room: parsed.room,
                                diagnosis: parsed.diagnosis,
                                procedures: parsed.procedures,
                                problems: parsed.problems,
                                pmh: parsed.pmh || [],
                                psh: parsed.psh || [],
                                homeMeds: parsed.homeMeds || [],
                                allergies: parsed.allergies || [],
                                examFindings: parsed.examFindings || '',
                                antibiotics: parsed.antibiotics || [],
                                treatmentPlan: parsed.treatmentPlan || parsed.overnightPlan || '',
                                diet: parsed.diet || 'Regular',
                                activity: parsed.activity || 'Ambulate TID',
                                dvtProphylaxis: parsed.dvtProphylaxis || 'Heparin 5000 TID',
                                giProphylaxis: parsed.giProphylaxis || 'Pantoprazole',
                                dispositionPlan: parsed.dispositionPlan || '',
                                concerns: parsed.concerns || '',
                                codeStatus: parsed.codeStatus || 'Full Code',
                                admitDate: parsed.admitDate || getTodayISO(),
                                status: 'stable',
                                age: parsed.age || 0,
                                gender: parsed.gender || ''
                            };
                            const result = await DB.add('patients', newPatient);
                            patientId = result?.id || result;
                        }

                        importedCount++;

                        // Create tasks from parsed to-dos
                        if (parsed.todos && parsed.todos.length > 0) {
                            for (const todoText of parsed.todos) {
                                // Determine task category from content
                                let category = 'Other';
                                if (/lab|cbc|cmp|bmp|check am/i.test(todoText)) category = 'Labs';
                                else if (/diet|npo|clears|advance/i.test(todoText)) category = 'Diet';
                                else if (/ambulate|pt eval|activity|walk|ot eval/i.test(todoText)) category = 'Activity';
                                else if (/dc|discharge|dispo|social work|case manage/i.test(todoText)) category = 'Discharge';
                                else if (/med|antibiotic|pain|heparin|anticoag|oral/i.test(todoText)) category = 'Medications';
                                else if (/f\/u|follow|consult|call/i.test(todoText)) category = 'Other';

                                await DB.add('tasks', {
                                    patientId: patientId,
                                    category: category,
                                    description: todoText,
                                    completed: false,
                                    assignee: currentUser?.displayName || currentUser?.email || '',
                                    assignedBy: 'Signout Import',
                                    createdAt: new Date().toISOString()
                                });
                                taskCount++;
                            }
                        }
                    }

                    setImportStatus(`Imported ${importedCount} patient${importedCount !== 1 ? 's' : ''} and ${taskCount} task${taskCount !== 1 ? 's' : ''}`);

                    // Refresh patient list
                    await loadPatients();

                    // Clear after a moment
                    setTimeout(() => {
                        setShowImportModal(false);
                        setImportText('');
                        setParsedImport(null);
                        setImportStatus('');
                    }, 2000);
                } catch (err) {
                    console.error('Import error:', err);
                    setImportStatus('Error importing: ' + err.message);
                }
            };

            const handleParseHandoffDictation = (transcript) => {
                const parsed = parseHandoffSpeech(transcript);
                if (activePatientId) {
                    if (parsed.overnightPlan) {
                        setHandoffPlans({...handoffPlans, [activePatientId]: parsed.overnightPlan});
                    }
                    if (parsed.ifThen) {
                        setIfsThens({...ifsThens, [activePatientId]: parsed.ifThen});
                    }
                    if (parsed.contact) {
                        setContactInfo({...contactInfo, [activePatientId]: parsed.contact});
                    }
                    dictation.clear();
                }
            };

            const handleExportPDF = async () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const timestamp = getCurrentDateTime();

                doc.setFontSize(14);
                doc.text('Shift Handoff Report', 10, 10);
                doc.setFontSize(10);
                doc.text(`Generated: ${timestamp}`, 10, 18);

                let yPosition = 25;
                const pageHeight = doc.internal.pageSize.height;
                const margin = 10;
                const contentWidth = doc.internal.pageSize.width - 2 * margin;

                patients.forEach((patient, idx) => {
                    if (yPosition > pageHeight - 40) {
                        doc.addPage();
                        yPosition = 10;
                    }

                    doc.setFontSize(11);
                    doc.setTextColor(100, 150, 220);
                    doc.text(`Room ${patient.room} | ${patient.diagnosis || 'N/A'} | POD ${calculatePOD(patient.admitDate)} | ${patient.codeStatus || 'FULL'}`, margin, yPosition);
                    yPosition += 6;

                    doc.setFontSize(9);
                    doc.setTextColor(100, 100, 100);

                    doc.text('Summary:', margin, yPosition);
                    yPosition += 4;
                    const summaryLines = doc.splitTextToSize(handoffPlans[patient.id] || patient.treatmentPlan || '', contentWidth - 5);
                    summaryLines.forEach(line => {
                        doc.text(line, margin + 2, yPosition);
                        yPosition += 3;
                    });

                    doc.text('Active Issues:', margin, yPosition);

        // ==================== PRE-ROUND CHECKLIST COMPONENT ====================
        function PreRound() {
            const [patients, setPatients] = React.useState([]);
            const [checklist, setChecklist] = React.useState({});
            const [labs, setLabs] = React.useState([]);
            const [outputs, setOutputs] = React.useState([]);
            const [expandedPatient, setExpandedPatient] = React.useState(null);
            const dictation = useDictation();

            React.useEffect(() => {
                DB.init().then(() => {
                    loadPatients();
                    loadLabs();
                    loadOutputs();
                });
            }, []);

            const loadPatients = async () => {
                const allPatients = await DB.getAll('patients');
                const active = allPatients.filter(p => p.status !== 'discharged').sort((a, b) => parseInt(a.room) - parseInt(b.room));
                setPatients(active);

                const today = getTodayISO();
                const newChecklist = {};
                active.forEach(p => {
                    // Restore today's pre-round data if it exists (daily reset with persistence)
                    const todayPR = p.preRoundHistory?.[today];
                    const sections = todayPR?.sections || {};
                    const items = ['vitals', 'ios', 'labs', 'overnight', 'lines', 'meds', 'pain', 'plan'];
                    const notes = {};
                    const checks = {};
                    items.forEach(item => {
                        notes[item] = sections[item] || '';
                        checks[item] = !!sections[item];
                    });

                    // If no today data, carry forward prior day lab trends as a hint
                    if (!todayPR) {
                        const prevDays = Object.keys(p.preRoundHistory || {}).filter(d => d < today).sort().reverse();
                        if (prevDays.length > 0 && p.preRoundHistory[prevDays[0]]?.sections?.labs) {
                            notes._priorLabs = p.preRoundHistory[prevDays[0]].sections.labs;
                        }
                    }

                    newChecklist[p.id] = { ...checks, notes };
                });
                setChecklist(newChecklist);
            };

            const loadLabs = async () => {
                const allLabs = await DB.getAll('labs');
                setLabs(allLabs);
            };

            const loadOutputs = async () => {
                const allOutputs = await DB.getAll('outputs');
                setOutputs(allOutputs);
            };

            const getLatestLabs = (patientId) => {
                return labs.filter(l => l.patientId === patientId)
                    .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
                    .slice(0, 5);
            };

            const getLatestOutputs = (patientId) => {
                return outputs.filter(o => o.patientId === patientId)
                    .sort((a, b) => new Date(b.date) - new Date(a.date))
                    .slice(0, 3);
            };

            const toggleItem = (patientId, item) => {
                setChecklist(prev => ({
                    ...prev,
                    [patientId]: {
                        ...prev[patientId],
                        [item]: !prev[patientId][item]
                    }
                }));
            };

            const markAllReviewed = (patientId) => {
                setChecklist(prev => ({
                    ...prev,
                    [patientId]: {
                        vitals: true,
                        ios: true,
                        labs: true,
                        overnight: true,
                        lines: true,
                        meds: true,
                        pain: true,
                        plan: true,
                        notes: prev[patientId].notes
                    }
                }));
            };

            const updateNote = (patientId, item, note) => {
                setChecklist(prev => ({
                    ...prev,
                    [patientId]: {
                        ...prev[patientId],
                        notes: {
                            ...prev[patientId].notes,
                            [item]: note
                        }
                    }
                }));
            };

            const totalItems = patients.length * 8;
            const checkedItems = patients.reduce((sum, p) => {
                const c = checklist[p.id];
                if (!c) return sum;
                return sum + [c.vitals, c.ios, c.labs, c.overnight, c.lines, c.meds, c.pain, c.plan].filter(Boolean).length;
            }, 0);

            const items = ['vitals', 'ios', 'labs', 'overnight', 'lines', 'meds', 'pain', 'plan'];
            const itemLabels = ['Vitals reviewed', 'I/Os reviewed', 'Labs reviewed', 'Overnight events reviewed', 'Lines/drains/tubes assessed', 'Current medications reviewed', 'Pain assessment', 'Plan updated'];

            const uncheckedCount = patients.length * 8 - checkedItems;
            const timeRemaining = Math.ceil((uncheckedCount / 8) * 3);

            const handleParsePreRoundDictation = async (transcript) => {
                const parsed = parsePreRoundSpeech(transcript);
                const today = getTodayISO();

                // Determine which patient this applies to
                let targetPatientId = null;
                const roomMatch = transcript.match(/room\s+(\d+)/i);
                if (roomMatch) {
                    const patient = patients.find(p => p.room === roomMatch[1]);
                    if (patient) targetPatientId = patient.id;
                } else {
                    targetPatientId = expandedPatient;
                }

                if (targetPatientId) {
                    // Update checklist: check items AND fill in section notes
                    setChecklist(prev => {
                        const updated = { ...prev, [targetPatientId]: { ...prev[targetPatientId] } };
                        updated[targetPatientId].notes = { ...updated[targetPatientId].notes };
                        parsed.checkedItems.forEach(item => {
                            updated[targetPatientId][item] = true;
                            if (parsed.sectionNotes[item]) {
                                const existing = updated[targetPatientId].notes[item] || '';
                                const newNote = parsed.sectionNotes[item];
                                updated[targetPatientId].notes[item] = existing
                                    ? existing + '; ' + newNote
                                    : newNote;
                            }
                        });
                        return updated;
                    });

                    // Update patient profile: pre-round summary + physical exam only
                    const patient = patients.find(p => p.id === targetPatientId);
                    if (patient) {
                        const updates = { ...patient };

                        // Build today's pre-round summary from section notes
                        const preRoundHistory = patient.preRoundHistory || {};
                        const todaySummary = preRoundHistory[today] || { sections: {}, timestamp: '' };

                        // Merge section notes into today's summary
                        parsed.checkedItems.forEach(item => {
                            if (parsed.sectionNotes[item]) {
                                todaySummary.sections[item] = parsed.sectionNotes[item];
                            }
                        });
                        todaySummary.timestamp = new Date().toISOString();

                        // Carry forward yesterday's trending labs if today is fresh
                        if (!preRoundHistory[today]) {
                            // Find most recent previous day
                            const prevDays = Object.keys(preRoundHistory).filter(d => d < today).sort().reverse();
                            if (prevDays.length > 0) {
                                const prevLabs = preRoundHistory[prevDays[0]]?.sections?.labs;
                                if (prevLabs) {
                                    todaySummary.priorLabs = prevLabs;
                                }
                            }
                        }

                        preRoundHistory[today] = todaySummary;

                        // Keep only last 14 days of history
                        const allDates = Object.keys(preRoundHistory).sort().reverse();
                        if (allDates.length > 14) {
                            allDates.slice(14).forEach(d => delete preRoundHistory[d]);
                        }

                        updates.preRoundHistory = preRoundHistory;

                        // Only update examFindings with actual physical exam findings
                        if (parsed.examFindings) {
                            updates.examFindings = parsed.examFindings;
                        }

                        // Update diet if mentioned
                        if (parsed.patientUpdates.diet) {
                            updates.diet = parsed.patientUpdates.diet;
                        }

                        // Update plan from dictation only if explicit plan statement
                        if (parsed.sectionNotes.plan) {
                            updates.treatmentPlan = parsed.sectionNotes.plan;
                        }

                        await DB.put('patients', updates);
                        loadPatients();
                    }
                }
                dictation.clear();
            };

            return (
                <div className="p-4 md:p-6 max-w-4xl mx-auto">
                    <div className="mb-6">
                        <div className="flex justify-between items-center mb-2">
                            <h2 className="text-2xl font-bold text-medical-600">Pre-Rounded: {Math.floor(checkedItems / 8)}/{patients.length} patients</h2>
                            <p className="text-sm text-gray-500">Est. time remaining: ~{timeRemaining} min</p>
                        </div>
                        <div className="w-full bg-gray-50 rounded h-2">
                            <div className="bg-medical-500 text-white h-2 rounded transition-all" style={{width: `${patients.length > 0 ? (checkedItems / totalItems) * 100 : 0}%`}}></div>
                        </div>
                    </div>

                    <DictationBar dictation={dictation} onParse={handleParsePreRoundDictation} parseLabel="Auto-Fill Pre-Round" />

                    <div className="space-y-3">
                        {[...patients].sort((a, b) => {
                            if (a.isTrauma && !b.isTrauma) return -1;
                            if (!a.isTrauma && b.isTrauma) return 1;
                            return parseInt(a.room) - parseInt(b.room);
                        }).map(patient => {
                            const c = checklist[patient.id] || {};
                            const patientChecked = [c.vitals, c.ios, c.labs, c.overnight, c.lines, c.meds, c.pain, c.plan].filter(Boolean).length;
                            const isExpanded = expandedPatient === patient.id;

                            return (
                                <div key={patient.id} className={`bg-white border rounded-xl overflow-hidden ${patient.isTrauma ? 'border-red-500 border-l-4 border-l-red-600 bg-red-50/30' : 'border-gray-200'}`}>
                                    <div className="p-4 flex items-center justify-between cursor-pointer hover:bg-gray-50 transition" onClick={() => setExpandedPatient(isExpanded ? null : patient.id)}>
                                        <div className="flex items-center gap-4 flex-1">
                                            <div className={`font-bold text-lg ${patient.isTrauma ? 'text-red-600' : 'text-medical-600'}`}>Room {patient.room} {patient.isTrauma && <span className="text-xs bg-red-500 text-white px-1.5 py-0.5 rounded ml-1">{patient.traumaLevel || 'T'}</span>}</div>
                                            <div className="text-sm text-gray-500">{patient.diagnosis}</div>
                                            <div className="flex gap-1">
                                                <div className="text-xs bg-gray-50 px-2 py-1 rounded">{patientChecked}/8</div>
                                                <div className="w-20 bg-gray-50 rounded h-4">
                                                    <div className="bg-emerald-500 h-4 rounded transition-all" style={{width: `${(patientChecked / 8) * 100}%`}}></div>
                                                </div>
                                            </div>
                                        </div>
                                        <div>{isExpanded ? '▲' : '▼'}</div>
                                    </div>

                                    {isExpanded && (
                                        <div className="p-4 border-t border-gray-200 space-y-3">
                                            {c.notes?._priorLabs && (
                                                <div className="bg-slate-50 border border-slate-200 rounded p-2 text-xs">
                                                    <span className="font-semibold text-slate-700">Yesterday's labs:</span>{' '}
                                                    <span className="text-slate-600">{c.notes._priorLabs}</span>
                                                </div>
                                            )}
                                            <div className="bg-gray-50 rounded p-3 mb-2">
                                                <DictationBar dictation={dictation} onParse={handleParsePreRoundDictation} parseLabel="Auto-Fill" compact={true} />
                                            </div>
                                            {items.map((item, idx) => (
                                                <div key={item}>
                                                    <div className="flex items-start gap-3">
                                                        <input type="checkbox" checked={c[item] || false} onChange={() => toggleItem(patient.id, item)}
                                                            className="mt-1 w-4 h-4 cursor-pointer"/>
                                                        <div className="flex-1">
                                                            <label className={`text-sm cursor-pointer font-medium ${c[item] ? 'text-emerald-700' : 'text-gray-600'}`}>
                                                                {itemLabels[idx]}
                                                                {c[item] && c.notes?.[item] && <span className="ml-1 text-xs text-emerald-500 font-normal">(noted)</span>}
                                                            </label>
                                                            <textarea value={c.notes?.[item] || ''} onChange={(e) => updateNote(patient.id, item, e.target.value)}
                                                                className={`w-full mt-1 px-2 py-1 border rounded text-xs transition ${c.notes?.[item] ? 'bg-emerald-50 border-emerald-300 text-gray-800' : 'bg-gray-50 border-gray-300 text-gray-600'}`}
                                                                rows="2" placeholder="Add notes... (or dictate to auto-fill)"/>
                                                        </div>
                                                    </div>

                                                    {item === 'labs' && getLatestLabs(patient.id).length > 0 && (
                                                        <div className="ml-7 mt-2 text-xs text-gray-500">
                                                            {getLatestLabs(patient.id).map(lab => (
                                                                <div key={lab.id}>{lab.testName}: {lab.value} {lab.unit} {lab.abnormal && <span className="text-red-600">(HIGH)</span>}</div>
                                                            ))}
                                                        </div>
                                                    )}

                                                    {item === 'ios' && getLatestOutputs(patient.id).length > 0 && (
                                                        <div className="ml-7 mt-2 text-xs text-gray-500">
                                                            <div>Latest: {getLatestOutputs(patient.id)[0].amount}mL {getLatestOutputs(patient.id)[0].type}</div>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}

                                            <button onClick={() => markAllReviewed(patient.id)}
                                                className="w-full mt-4 px-3 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded text-sm font-medium">
                                                Mark All Reviewed
                                            </button>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // ==================== ROUNDS RECORDER COMPONENT ====================
        function RoundsRecorder() {
            const [patients, setPatients] = React.useState([]);
            const [selectedPatientId, setSelectedPatientId] = React.useState(null);
            const [isRecording, setIsRecording] = React.useState(false);
            const [transcript, setTranscript] = React.useState('');
            const [liveTranscript, setLiveTranscript] = React.useState('');
            const [parsedItems, setParsedItems] = React.useState({ subjective: null, assessment: null, diet: null, activity: null, orders: [], disposition: null, plan: null, dvtProphylaxis: null, giProphylaxis: null, concerns: null, problems: [], examFindings: null, vitals: null, labNotes: null, summary: null });
            const [recordingsList, setRecordingsList] = React.useState({});
            const [editingRecIdx, setEditingRecIdx] = React.useState(null);
            const [editingRecText, setEditingRecText] = React.useState('');
            const recordingRef = React.useRef(null);
            const recognitionRef = React.useRef(null);

            React.useEffect(() => {
                DB.init().then(() => loadPatients());

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.lang = 'en-US';

                    recognitionRef.current.onstart = () => setIsRecording(true);
                    recognitionRef.current.onend = () => setIsRecording(false);
                    recognitionRef.current.onerror = () => setIsRecording(false);

                    recognitionRef.current.onresult = (event) => {
                        let interim = '';
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            const t = event.results[i][0].transcript;
                            if (event.results[i].isFinal) {
                                const cleaned = cleanMedicalSpeech(t.trim());
                                setTranscript(prev => prev + cleaned + ' ');
                            } else {
                                interim += t;
                            }
                        }
                        setLiveTranscript(interim);
                    };
                }
            }, []);

            const loadPatients = async () => {
                const allPatients = await DB.getAll('patients');
                const active = allPatients.filter(p => p.status !== 'discharged').sort((a, b) => parseInt(a.room) - parseInt(b.room));
                setPatients(active);
                if (active.length > 0 && !selectedPatientId) {
                    setSelectedPatientId(active[0].id);
                }
            };

            const startRecording = () => {
                if (recognitionRef.current) {
                    setTranscript('');
                    setLiveTranscript('');
                    recognitionRef.current.start();
                }
            };

            const stopRecording = () => {
                if (recognitionRef.current) {
                    recognitionRef.current.stop();
                    const patient = patients.find(p => p.id === selectedPatientId);
                    if (patient && transcript) {
                        setRecordingsList(prev => ({
                            ...prev,
                            [selectedPatientId]: [...(prev[selectedPatientId] || []), { transcript, timestamp: getCurrentDateTime() }]
                        }));
                    }
                }
            };

            const parseTranscript = () => {
                // Normalize STT text (same approach as pre-round parser)
                let t = transcript
                    .replace(/IV(?=[a-z])/g, 'IV ')
                    .replace(/(?<=[a-z])IV/g, ' IV')
                    .replace(/(\d)(?=[a-zA-Z])/g, '$1 ')
                    .replace(/(?<=[a-zA-Z])(\d)/g, ' $1')
                    .replace(/\bpayments?\b/gi, 'pain meds')
                    .replace(/\boral\s*payments?\b/gi, 'oral pain meds')
                    .replace(/\bover\s*(\d)/gi, '/$1')
                    .replace(/\bby\s*mouth\b/gi, 'PO')
                    .replace(/\bintravenous\b/gi, 'IV')
                    .replace(/\bblood\s*pressure/gi, 'BP')
                    .replace(/\bheart\s*rate/gi, 'HR')
                    .replace(/\brespiratory\s*rate/gi, 'RR')
                    .replace(/\bsat(?:uration)?s?\s*(\d)/gi, 'SpO2 $1')
                    .replace(/\bo2\s*sat/gi, 'SpO2')
                    .replace(/\bwhite\s*(?:blood\s*)?(?:cell\s*)?count/gi, 'WBC')
                    .replace(/\bhemoglobin\b/gi, 'Hgb')
                    .replace(/\bcreatinine\b/gi, 'Cr')
                    .replace(/\bpotassium\b/gi, 'K')
                    .replace(/\bsodium\b/gi, 'Na')
                    .replace(/\bplatelets?\b/gi, 'Plt');

                const lower = t.toLowerCase();
                const parsed = { subjective: null, assessment: null, diet: null, activity: null, orders: [], disposition: null, plan: null, dvtProphylaxis: null, giProphylaxis: null, concerns: null, problems: [], examFindings: null, vitals: null, labNotes: null, summary: null };

                // ===== SUBJECTIVE: Patient complaints, symptoms, how they're doing =====
                const subjParts = [];
                // Symptom/complaint patterns
                const symptomPatterns = [
                    [/complain(?:ing|s)?\s+(?:of|about)\s+(.+?)(?:\s+(?:they|he|she|patient|we|plan|order|diet|exam|vitals|labs|blood|start|stop|also)|$)/i, null],
                    [/(?:patient|pt|they?|he|she)\s+(?:is|are|has|have|had)\s+(?:been\s+)?(?:having|experiencing|reporting|endorsing|complaining\s+of)\s+(.+?)(?:\s+(?:they|he|she|patient|we|plan|order|diet|exam|start|stop|also)|$)/i, null],
                    [/(?:patient|pt|they|he|she)\s+(?:reports?|states?|denies?|notes?|says?|mentions?)\s+(.+?)(?:\s+(?:they|he|she|patient|we|plan|order|diet|exam|start|stop|also)|$)/i, null],
                    [/(?:patient|pt|they|he|she)\s+(?:is|are|was|were)\s+(?:feeling|doing|looking)\s+(.+?)(?:\s+(?:they|he|she|patient|we|plan|order|diet|start|stop|also)|$)/i, null],
                ];
                symptomPatterns.forEach(([re]) => {
                    const m = t.match(re);
                    if (m && m[1].trim().length > 2 && m[1].trim().length < 200) {
                        subjParts.push(m[1].trim());
                    }
                });
                // Capture specific symptom mentions
                const symptomKeywords = [
                    [/(?:more|worsening|increased?|severe?|significant)\s+(?:abdominal\s+)?pain/i, 'worsening pain'],
                    [/abdominal\s+pain/i, 'abdominal pain'],
                    [/chest\s+pain/i, 'chest pain'],
                    [/(?:nausea\s+and\s+vomiting|nausea|vomiting|emesis|n\/v)/i, 'nausea/vomiting'],
                    [/(?:hasn't|haven't|has\s+not|unable\s+to)\s+(?:been\s+able\s+to\s+)?(?:get\s+out\s+of\s+bed|ambulate|walk|move|eat|tolerat)/i, 'unable to mobilize/eat'],
                    [/not\s+(?:eating|drinking|tolerating|ambulating|walking|moving)/i, 'not tolerating/mobilizing'],
                    [/(?:feeling|feels?)\s+(?:better|improved|good|great|well|fine)/i, 'feeling better'],
                    [/(?:feeling|feels?)\s+(?:worse|terrible|awful|bad|miserable|horrible)/i, 'feeling worse'],
                    [/doing\s+(?:well|better|good|great|fine|okay|ok)/i, 'doing well'],
                    [/doing\s+(?:worse|poorly|bad|terribly)/i, 'doing worse'],
                    [/(?:no|denies|without)\s+(?:complaints?|issues?|problems?|concerns?)/i, 'no complaints'],
                    [/tolerating\s+(?:diet|po|oral|food|liquids?)/i, 'tolerating diet'],
                    [/not\s+tolerating\s+(?:diet|po|oral|food|liquids?)/i, 'not tolerating diet'],
                    [/fever|febrile|chills|rigors/i, 'fever/chills'],
                    [/short(?:ness)?\s+of\s+breath|dyspnea|sob\b/i, 'shortness of breath'],
                    [/diarrhea|loose\s+stools?/i, 'diarrhea'],
                    [/constipat(?:ed|ion)/i, 'constipation'],
                    [/dizz(?:y|iness)|lightheaded/i, 'dizziness'],
                    [/headache/i, 'headache'],
                    [/swelling|edema/i, 'swelling'],
                    [/bleeding|bloody|blood\s+in/i, 'bleeding'],
                    [/(?:passed|passing)\s+(?:gas|flatus)/i, 'passing flatus'],
                    [/(?:had|having|has)\s+(?:a\s+)?bowel\s+movement|bm\b/i, 'had BM'],
                    [/no\s+(?:bowel\s+movement|bm|flatus|gas)/i, 'no BM/flatus'],
                    [/(?:slept|sleeping|rested)\s+(?:well|okay|poorly|bad)/i, 'sleep noted'],
                    [/anxious|anxiety|worried|nervous/i, 'anxiety'],
                    [/confused|confusion|disoriented|altered/i, 'confusion/altered'],
                ];
                const capturedSymptoms = [];
                symptomKeywords.forEach(([re, label]) => {
                    if (re.test(lower) && !capturedSymptoms.includes(label)) {
                        capturedSymptoms.push(label);
                    }
                });
                // Combine explicit complaints with keyword symptoms (dedup)
                const allSubjective = [...subjParts];
                capturedSymptoms.forEach(s => {
                    if (!allSubjective.some(existing => existing.toLowerCase().includes(s.split('/')[0].toLowerCase()))) {
                        allSubjective.push(s);
                    }
                });
                if (allSubjective.length > 0) parsed.subjective = allSubjective.join('; ');

                // ===== ASSESSMENT: Overall clinical status =====
                const assessParts = [];
                // Overall status patterns
                if (/(?:patient|pt|they|he|she)\s+(?:is|are|looks?|appears?)\s+(?:clinically\s+)?(?:stable|improved|improving|better|worse|declining|deteriorat)/i.test(lower)) {
                    const m = t.match(/(?:patient|pt|they|he|she)\s+(?:is|are|looks?|appears?)\s+(?:clinically\s+)?(\w+(?:\s+\w+)?)/i);
                    if (m) assessParts.push('Patient ' + m[1].trim());
                }
                if (/pod\s*(?:#?\s*)?\d+|post[- ]?op(?:erative)?\s*day\s*\d+/i.test(lower)) {
                    const podM = t.match(/pod\s*(?:#?\s*)?(\d+)|post[- ]?op(?:erative)?\s*day\s*(\d+)/i);
                    if (podM) assessParts.push('POD #' + (podM[1] || podM[2]));
                }
                if (/progressing\s+(?:well|as\s+expected|appropriately|slowly|poorly)/i.test(lower)) {
                    const m = t.match(/progressing\s+(\w+(?:\s+\w+)?)/i);
                    if (m) assessParts.push('Progressing ' + m[1].trim());
                }
                if (/ready\s+for\s+(?:discharge|dc|transfer|step\s*down)/i.test(lower)) assessParts.push('Ready for discharge');
                if (/not\s+ready\s+(?:for\s+)?(?:discharge|dc)/i.test(lower)) assessParts.push('Not ready for discharge');
                if (/overall\s+(.+?)(?:\s+(?:plan|order|diet|exam)|$)/i.test(t)) {
                    const m = t.match(/overall\s+(.+?)(?:\s+(?:plan|order|diet|exam)|$)/i);
                    if (m && m[1].trim().length > 2 && m[1].trim().length < 100) assessParts.push(m[1].trim());
                }
                if (assessParts.length > 0) parsed.assessment = assessParts.join('. ');

                // Diet - scan entire transcript
                if (/\bnpo\b/i.test(lower)) parsed.diet = 'NPO';
                else if (/full\s*liquids?/i.test(lower)) parsed.diet = 'Full Liquids';
                else if (/clear\s*liquids?|\bclears\b/i.test(lower)) parsed.diet = 'Clears';
                else if (/advance\s*(?:diet|as\s*tolerated)|advance\s*to/i.test(lower)) parsed.diet = 'Advance as tolerated';
                else if (/regular\s*diet|\bregular\b.*\bdiet\b/i.test(lower)) parsed.diet = 'Regular';
                else if (/low\s*residue/i.test(lower)) parsed.diet = 'Low Residue';
                else if (/cardiac|heart\s*healthy/i.test(lower) && /diet/i.test(lower)) parsed.diet = 'Cardiac';
                else if (/renal|kidney/i.test(lower) && /diet/i.test(lower)) parsed.diet = 'Renal';
                else if (/diabetic/i.test(lower) && /diet/i.test(lower)) parsed.diet = 'Diabetic';
                else if (/mechanical\s*soft/i.test(lower)) parsed.diet = 'Mechanical Soft';
                else if (/sips/i.test(lower)) parsed.diet = 'Sips';
                else if (/low\s*fat/i.test(lower)) parsed.diet = 'Low Fat';

                // Activity - scan entire transcript
                if (/bed\s*rest|bedrest/i.test(lower)) parsed.activity = 'Bedrest';
                else if (/dangle/i.test(lower)) parsed.activity = 'Dangle';
                else if (/up\s*to\s*chair|out\s*of\s*bed\s*to\s*chair|oob\s*to\s*chair/i.test(lower)) parsed.activity = 'Up to Chair';
                else if (/ambulate\s*(?:three\s*times|tid|3\s*times|t\.?i\.?d)/i.test(lower)) parsed.activity = 'Ambulate TID';
                else if (/ambulate\s*(?:twice|bid|2\s*times|b\.?i\.?d)/i.test(lower)) parsed.activity = 'Ambulate BID';
                else if (/ambulate|walking|walk\s*(?:patient|them|him|her)/i.test(lower)) parsed.activity = 'Ambulate';
                else if (/weight\s*bearing\s*as\s*tolerated|wbat/i.test(lower)) parsed.activity = 'WBAT';
                else if (/non\s*weight\s*bearing|nwb|no\s*weight\s*bearing/i.test(lower)) parsed.activity = 'NWB';
                else if (/toe\s*touch|tdwb/i.test(lower)) parsed.activity = 'TDWB';
                if (/physical\s*therapy|pt\s*(?:eval|consult|to\s*see)/i.test(lower)) parsed.orders.push('PT evaluation');
                if (/occupational\s*therapy|ot\s*(?:eval|consult|to\s*see)/i.test(lower)) parsed.orders.push('OT evaluation');

                // DVT Prophylaxis
                if (/heparin\s*5000\s*(?:tid|three|t\.?i\.?d)/i.test(lower) || /heparin\s*(?:sub\s*q|subcutaneous)\s*(?:tid|three)/i.test(lower)) parsed.dvtProphylaxis = 'Heparin 5000 TID';
                else if (/heparin\s*5000\s*(?:bid|twice|b\.?i\.?d)/i.test(lower)) parsed.dvtProphylaxis = 'Heparin 5000 BID';
                else if (/lovenox|enoxaparin/i.test(lower)) parsed.dvtProphylaxis = 'Lovenox';
                else if (/\bscds?\b|sequential\s*compression/i.test(lower)) parsed.dvtProphylaxis = 'SCDs';
                else if (/ted\s*hose|teds\b/i.test(lower)) parsed.dvtProphylaxis = 'TEDs';
                else if (/\bheparin\b/i.test(lower) && /prophylaxis|dvt|clot/i.test(lower)) parsed.dvtProphylaxis = 'Heparin';

                // GI Prophylaxis
                if (/pantoprazole|protonix/i.test(lower)) parsed.giProphylaxis = 'Pantoprazole';
                else if (/famotidine|pepcid/i.test(lower)) parsed.giProphylaxis = 'Famotidine';
                else if (/omeprazole|prilosec/i.test(lower)) parsed.giProphylaxis = 'Omeprazole';
                else if (/lansoprazole|prevacid/i.test(lower)) parsed.giProphylaxis = 'Lansoprazole';
                else if (/sucralfate|carafate/i.test(lower)) parsed.giProphylaxis = 'Sucralfate';

                // Vitals mentioned
                const vitalParts = [];
                const bpMatch = t.match(/BP\s*(\d+\/\d+)/i);
                if (bpMatch) vitalParts.push('BP ' + bpMatch[1]);
                const hrMatch = t.match(/HR\s*(\d{2,3})/i);
                if (hrMatch) vitalParts.push('HR ' + hrMatch[1]);
                const rrMatch = t.match(/RR\s*(\d{1,2})/i);
                if (rrMatch) vitalParts.push('RR ' + rrMatch[1]);
                const spo2Match = t.match(/SpO2\s*(\d{2,3})/i);
                if (spo2Match) vitalParts.push('SpO2 ' + spo2Match[1] + '%');
                const tempMatch = t.match(/(?:temp|temperature|t-?max)\s*(?:is|of|was)?\s*(\d{2,3}\.?\d?)/i);
                if (tempMatch) vitalParts.push('Temp ' + tempMatch[1]);
                if (/(?:a)?febrile|no\s*fever/i.test(lower)) vitalParts.push('Afebrile');
                if (/febrile|fever|temp\s*(?:up|elevated|spike)/i.test(lower) && !/afebrile/i.test(lower)) vitalParts.push('Febrile');
                if (vitalParts.length > 0) parsed.vitals = vitalParts.join(', ');

                // Lab values mentioned
                const labParts = [];
                const wbcMatch = t.match(/WBC\s*(?:is|of|was|at)?\s*(\d+\.?\d*)/i);
                if (wbcMatch) labParts.push('WBC ' + wbcMatch[1]);
                const hgbMatch = t.match(/Hgb\s*(?:is|of|was|at)?\s*(\d+\.?\d*)/i);
                if (hgbMatch) labParts.push('Hgb ' + hgbMatch[1]);
                const crMatch = t.match(/Cr\s*(?:is|of|was|at)?\s*(\d+\.?\d*)/i);
                if (crMatch) labParts.push('Cr ' + crMatch[1]);
                const kMatch = t.match(/\bK\s*(?:is|of|was|at)?\s*(\d+\.?\d*)/i);
                if (kMatch) labParts.push('K ' + kMatch[1]);
                const naMatch = t.match(/Na\s*(?:is|of|was|at)?\s*(\d+\.?\d*)/i);
                if (naMatch) labParts.push('Na ' + naMatch[1]);
                const lactateMatch = t.match(/lactate\s*(?:is|of|was|at)?\s*(\d+\.?\d*)/i);
                if (lactateMatch) labParts.push('Lactate ' + lactateMatch[1]);
                const pltMatch = t.match(/Plt\s*(?:is|of|was|at)?\s*(\d+)/i);
                if (pltMatch) labParts.push('Plt ' + pltMatch[1]);
                if (/labs?\s*(?:are|were|look|looking)?\s*(?:normal|within\s*normal|wnl|stable|unremarkable)/i.test(lower)) labParts.push('Labs WNL');
                if (/labs?\s*(?:are|were)?\s*(?:trending|improved|improving|better|normalized)/i.test(lower)) labParts.push('Labs improving');
                if (labParts.length > 0) parsed.labNotes = labParts.join(', ');

                // Orders - comprehensive scan
                const orderPatterns = [
                    [/(?:order|get|check|send|draw|repeat|recheck)\s+(?:a\s+)?(?:cbc|complete\s*blood)/i, 'Check CBC'],
                    [/(?:order|get|check|send|draw|repeat|recheck)\s+(?:a\s+)?(?:bmp|basic\s*metabolic)/i, 'Check BMP'],
                    [/(?:order|get|check|send|draw|repeat|recheck)\s+(?:a\s+)?(?:cmp|comprehensive\s*metabolic)/i, 'Check CMP'],
                    [/(?:order|get|check|send|draw|repeat|recheck)\s+(?:a\s+)?(?:coags?|inr|pt\s*ptt|coagulation)/i, 'Check coags'],
                    [/(?:order|get|check|send|draw|repeat|recheck)\s+(?:a\s+)?(?:type\s*and\s*screen|t&s)/i, 'T&S'],
                    [/(?:order|get|check|send|draw|repeat|recheck)\s+(?:a\s+)?(?:blood\s*culture|bcx)/i, 'Blood cultures'],
                    [/(?:order|get|check|send|draw|repeat|recheck)\s+(?:a\s+)?(?:ua|urinalysis|urine)/i, 'UA + culture'],
                    [/(?:order|get|check|send|draw|repeat|recheck)\s+(?:a\s+)?(?:lipase|amylase)/i, 'Check lipase'],
                    [/(?:order|get|check|send|draw|repeat|recheck)\s+(?:a\s+)?(?:troponin)/i, 'Check troponin'],
                    [/(?:order|get|check|send|draw|repeat|recheck)\s+(?:a\s+)?(?:lactic|lactate)/i, 'Check lactate'],
                    [/(?:order|get|check|send|draw)\s+(?:a\s+)?(?:ct|cat\s*scan)\s*(\w+)?/i, 'Order CT'],
                    [/(?:order|get|check|send)\s+(?:a\s+)?(?:x-?ray|xray|chest\s*x|cxr)/i, 'Order XR'],
                    [/(?:order|get)\s+(?:a\s+)?(?:ultrasound|us|doppler)/i, 'Order ultrasound'],
                    [/(?:order|get)\s+(?:a\s+)?(?:mri|mr\s*imaging)/i, 'Order MRI'],
                    [/(?:order|get)\s+(?:a\s+)?(?:ekg|ecg|echo)/i, 'Order EKG/Echo'],
                    [/(?:give|administer|bolus)\s+(?:a\s+)?(?:liter|litre|500|1000|normal\s*saline|lr|lactated|fluid|iv\s*fluid|bolus)/i, 'IV fluid bolus'],
                    [/transfuse|(?:give|order)\s+(?:a\s+)?(?:unit|prbc|blood|packed\s*red)/i, 'Transfuse PRBCs'],
                    [/(?:place|insert|put\s*in)\s+(?:a\s+)?(?:foley|catheter)/i, 'Place Foley'],
                    [/(?:place|insert|put\s*in)\s+(?:a\s+)?(?:ng|ngt|nasogastric)/i, 'Place NGT'],
                    [/(?:place|insert|put\s*in)\s+(?:a\s+)?(?:central\s*line|central\s*venous)/i, 'Place central line'],
                    [/(?:place|insert|put\s*in)\s+(?:a\s+)?(?:art\s*line|arterial\s*line|a-line)/i, 'Place A-line'],
                    [/wound\s*care|dressing\s*change|pack\s*(?:the\s*)?wound/i, 'Wound care/dressing change'],
                    [/incentive\s*spirometry|is\s*(?:every|q)/i, 'Incentive spirometry'],
                    [/(?:strict|monitor)\s*(?:i\s*(?:and|&)\s*o|i\/o|intake|output)/i, 'Strict I&Os'],
                    [/(?:daily|check)\s*(?:weight|weights)/i, 'Daily weights'],
                    [/blood\s*(?:sugar|glucose)\s*(?:check|monitoring|qid|q\s*6)/i, 'Blood glucose monitoring'],
                    [/sliding\s*scale\s*(?:insulin)?/i, 'Sliding scale insulin'],
                    [/telemetry|tele\s*monitor/i, 'Telemetry'],
                ];
                orderPatterns.forEach(([re, label]) => {
                    if (re.test(lower) && !parsed.orders.includes(label)) parsed.orders.push(label);
                });

                // Medication orders: start/stop/switch
                const startMatches = t.matchAll(/(?:start|begin|add|initiate)\s+(.+?)(?:\s+(?:and\s+(?:start|stop|also|check|order|get|switch)|then|also|$))/gi);
                for (const m of startMatches) {
                    const med = m[1].trim();
                    if (med.length > 2 && med.length < 80 && !/^(?:ambulate|walking|PT|OT)/i.test(med)) {
                        const label = 'Start ' + med;
                        if (!parsed.orders.some(o => o.toLowerCase() === label.toLowerCase())) parsed.orders.push(label);
                    }
                }
                const stopMatches = t.matchAll(/(?:stop|discontinue|dc|d\/c|hold|wean)\s+(?:the\s+)?(.+?)(?:\s+(?:and\s+(?:start|stop|also|check|order|get|switch)|then|also|$))/gi);
                for (const m of stopMatches) {
                    const med = m[1].trim();
                    if (med.length > 2 && med.length < 80) {
                        const label = 'DC ' + med;
                        if (!parsed.orders.some(o => o.toLowerCase() === label.toLowerCase())) parsed.orders.push(label);
                    }
                }
                const switchMatches = t.matchAll(/(?:switch|change|transition|convert)\s+(?:from\s+)?(.+?)\s+to\s+(.+?)(?:\s+(?:and|also|then|$))/gi);
                for (const m of switchMatches) {
                    const label = 'Switch ' + m[1].trim() + ' to ' + m[2].trim();
                    if (!parsed.orders.includes(label)) parsed.orders.push(label);
                }

                // Consults
                const consultMatches = t.matchAll(/consult\s+(\w+(?:\s+\w+)?)/gi);
                for (const m of consultMatches) {
                    const svc = m[1].trim();
                    if (svc.length > 1 && !/^(?:about|for|on|with|the|a|an)$/i.test(svc)) {
                        const label = 'Consult ' + svc;
                        if (!parsed.orders.includes(label)) parsed.orders.push(label);
                    }
                }

                // Remove/pull
                const removeMatches = t.matchAll(/(?:remove|pull|take\s*out|discontinue)\s+(?:the\s+)?(?:patient'?s?\s+)?((?:foley|catheter|drain|jp|ng|ngt|central\s*line|art?\s*line|staples|sutures|packing)(?:\s+\w+)?)/gi);
                for (const m of removeMatches) {
                    const label = 'Remove ' + m[1].trim();
                    if (!parsed.orders.includes(label)) parsed.orders.push(label);
                }

                // Disposition
                if (/discharge\s*(?:home|today|tomorrow|in\s*the\s*morning|when\s*ready|criteria\s*met)/i.test(lower)) parsed.disposition = 'Discharge home';
                else if (/discharge\b/i.test(lower)) parsed.disposition = 'Discharge';
                else if (/(?:transfer|move)\s*(?:to\s*)?(?:icu|intensive\s*care|micu|sicu)/i.test(lower)) parsed.disposition = 'Transfer to ICU';
                else if (/(?:transfer|move)\s*(?:to\s*)?(?:floor|step.?down|tele)/i.test(lower)) parsed.disposition = 'Transfer to floor';
                else if (/snf|skilled\s*nursing/i.test(lower)) parsed.disposition = 'SNF';
                else if (/rehab|rehabilitation|acute\s*rehab/i.test(lower)) parsed.disposition = 'Rehab';
                else if (/hospice/i.test(lower)) parsed.disposition = 'Hospice';
                else if (/(?:stay|keep|remain|another\s*day|not\s*ready)/i.test(lower) && /(?:observation|obs|overnight|monitor)/i.test(lower)) parsed.disposition = 'Continue monitoring';

                // Plan - build from entire transcript, collect all plan-like statements
                const planParts = [];
                // Explicit plan statements
